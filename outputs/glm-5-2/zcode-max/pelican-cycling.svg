<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" text-rendering="geometricPrecision" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>海边骑自行车的鹈鹕</title>
  <desc>一只鹈鹕在海边夕阳下骑着一辆红色自行车，背景是海浪、沙滩和椰子树。</desc>

  <defs>
    <!-- 天空渐变：夕阳 -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d2b53"/>
      <stop offset="30%" stop-color="#4a3b7a"/>
      <stop offset="55%" stop-color="#e06f3a"/>
      <stop offset="78%" stop-color="#f4b860"/>
      <stop offset="100%" stop-color="#fde0a6"/>
    </linearGradient>

    <!-- 太阳辉光 -->
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6cf"/>
      <stop offset="45%" stop-color="#ffd36b"/>
      <stop offset="100%" stop-color="#ffd36b" stop-opacity="0"/>
    </radialGradient>

    <!-- 海面渐变 -->
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9c5a3a"/>
      <stop offset="40%" stop-color="#c06a4a"/>
      <stop offset="100%" stop-color="#3a6ea8"/>
    </linearGradient>

    <!-- 沙滩渐变 -->
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3c98b"/>
      <stop offset="100%" stop-color="#d99a55"/>
    </linearGradient>

    <!-- 鹈鹕羽毛 -->
    <linearGradient id="feather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfbf3"/>
      <stop offset="55%" stop-color="#f0e4cc"/>
      <stop offset="100%" stop-color="#cdb78c"/>
    </linearGradient>

    <linearGradient id="wing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9dab8"/>
      <stop offset="100%" stop-color="#8c7240"/>
    </linearGradient>

    <linearGradient id="pouch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcf6a"/>
      <stop offset="100%" stop-color="#e08a2e"/>
    </linearGradient>

    <!-- 自行车金属漆 -->
    <linearGradient id="bikeRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6a5a"/>
      <stop offset="100%" stop-color="#b8281f"/>
    </linearGradient>

    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>

    <!-- 软阴影 -->
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== 背景 ===== -->
  <rect x="0" y="0" width="800" height="600" fill="url(#sky)"/>

  <!-- 太阳 -->
  <circle cx="560" cy="230" r="180" fill="url(#sun)" opacity="0.55"/>
  <circle cx="560" cy="230" r="58" fill="#fff1b8"/>

  <!-- 远处云 -->
  <g fill="#f3d6a0" opacity="0.6">
    <ellipse cx="180" cy="170" rx="80" ry="14"/>
    <ellipse cx="660" cy="120" rx="70" ry="11"/>
    <ellipse cx="380" cy="95" rx="55" ry="9"/>
  </g>

  <!-- 海鸥 -->
  <g fill="none" stroke="#3a2a2a" stroke-width="2.5" stroke-linecap="round" opacity="0.75">
    <path d="M120,130 q8,-9 16,0 q8,-9 16,0"/>
    <path d="M250,90 q6,-6 12,0 q6,-6 12,0"/>
    <path d="M710,180 q6,-6 12,0 q6,-6 12,0"/>
  </g>

  <!-- 海平线 / 海面 -->
  <rect x="0" y="280" width="800" height="170" fill="url(#sea)"/>
  <!-- 太阳在海上的倒影 -->
  <ellipse cx="560" cy="330" rx="120" ry="9" fill="#ffe39a" opacity="0.6"/>
  <ellipse cx="560" cy="360" rx="90" ry="6" fill="#ffd36b" opacity="0.5"/>
  <ellipse cx="560" cy="390" rx="60" ry="4" fill="#ffc34a" opacity="0.4"/>

  <!-- 海浪条纹 -->
  <g fill="none" stroke="#ffe6b0" stroke-linecap="round" opacity="0.55">
    <path d="M30,310 q20,-6 40,0 t40,0 t40,0 t40,0 t40,0" stroke-width="2"/>
    <path d="M380,300 q20,-6 40,0 t40,0 t40,0" stroke-width="2"/>
    <path d="M80,345 q18,-5 36,0 t36,0 t36,0" stroke-width="1.6"/>
    <path d="M520,340 q18,-5 36,0 t36,0 t36,0" stroke-width="1.6"/>
    <path d="M40,395 q22,-6 44,0 t44,0 t44,0" stroke-width="1.8"/>
    <path d="M450,400 q20,-5 40,0 t40,0 t40,0" stroke-width="1.8"/>
  </g>

  <!-- 沙滩 -->
  <path d="M0,440 Q200,420 400,438 T800,432 L800,600 L0,600 Z" fill="url(#sand)"/>
  <!-- 沙滩纹理 -->
  <g stroke="#b97f3e" stroke-width="1" opacity="0.35">
    <path d="M60,490 q30,4 60,0"/>
    <path d="M220,520 q40,5 80,0"/>
    <path d="M520,500 q40,5 80,0"/>
    <path d="M380,545 q40,5 80,0"/>
  </g>

  <!-- 贝壳 -->
  <g fill="#fff0d6" stroke="#caa05a" stroke-width="1">
    <path d="M150,505 l10,-14 l10,14 z"/>
    <path d="M680,540 l9,-12 l9,12 z"/>
  </g>

  <!-- ===== 椰子树（远处装饰） ===== -->
  <g transform="translate(60,250)" opacity="0.95">
    <!-- 树干 -->
    <path d="M12,200 Q6,120 18,40" fill="none" stroke="#6b3f22" stroke-width="9" stroke-linecap="round"/>
    <path d="M12,200 Q6,120 18,40" fill="none" stroke="#8a5532" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- 叶子 -->
    <g fill="#2f7d3f">
      <path d="M18,40 Q-10,28 -38,10 Q-12,30 14,46 Z"/>
      <path d="M18,40 Q40,20 70,8 Q44,28 22,48 Z"/>
      <path d="M18,40 Q-6,52 -34,58 Q-8,48 16,46 Z"/>
      <path d="M18,40 Q44,50 74,60 Q46,50 22,48 Z"/>
      <path d="M18,40 Q20,16 28,-10 Q22,18 22,46 Z"/>
    </g>
    <!-- 椰子 -->
    <circle cx="14" cy="46" r="4.5" fill="#5a3216"/>
    <circle cx="22" cy="48" r="4.5" fill="#5a3216"/>
  </g>

  <!-- ===== 自行车（含鹈鹕）整体定位 ===== -->
  <!-- 地面阴影 -->
  <ellipse cx="400" cy="528" rx="170" ry="14" fill="#000" opacity="0.18"/>

  <g transform="translate(70,0)">

    <!-- ===== 后轮 ===== -->
    <g transform="translate(330,480)">
      <circle r="48" fill="url(#rim)" stroke="#0c0c0c" stroke-width="3"/>
      <circle r="42" fill="none" stroke="#d8d8d8" stroke-width="2.5"/>
      <!-- 辐条 -->
      <g stroke="#cfcfcf" stroke-width="1.4">
        <line x1="0" y1="-42" x2="0" y2="42"/>
        <line x1="-42" y1="0" x2="42" y2="0"/>
        <line x1="-29.7" y1="-29.7" x2="29.7" y2="29.7"/>
        <line x1="29.7" y1="-29.7" x2="-29.7" y2="29.7"/>
        <line x1="-16" y1="-38.8" x2="16" y2="38.8"/>
        <line x1="16" y1="-38.8" x2="-16" y2="38.8"/>
        <line x1="-38.8" y1="-16" x2="38.8" y2="16"/>
        <line x1="38.8" y1="-16" x2="-38.8" y2="16"/>
      </g>
      <circle r="5" fill="#3a3a3a"/>
      <circle r="2" fill="#888"/>
    </g>

    <!-- ===== 前轮 ===== -->
    <g transform="translate(90,480)">
      <circle r="48" fill="url(#rim)" stroke="#0c0c0c" stroke-width="3"/>
      <circle r="42" fill="none" stroke="#d8d8d8" stroke-width="2.5"/>
      <g stroke="#cfcfcf" stroke-width="1.4">
        <line x1="0" y1="-42" x2="0" y2="42"/>
        <line x1="-42" y1="0" x2="42" y2="0"/>
        <line x1="-29.7" y1="-29.7" x2="29.7" y2="29.7"/>
        <line x1="29.7" y1="-29.7" x2="-29.7" y2="29.7"/>
        <line x1="-16" y1="-38.8" x2="16" y2="38.8"/>
        <line x1="16" y1="-38.8" x2="-16" y2="38.8"/>
        <line x1="-38.8" y1="-16" x2="38.8" y2="16"/>
        <line x1="38.8" y1="-16" x2="-38.8" y2="16"/>
      </g>
      <circle r="5" fill="#3a3a3a"/>
      <circle r="2" fill="#888"/>
    </g>

    <!-- 车架 -->
    <g fill="none" stroke="url(#bikeRed)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
      <!-- 下管 -->
      <line x1="200" y1="350" x2="330" y2="480"/>
      <!-- 座管 -->
      <line x1="270" y1="470" x2="250" y2="320"/>
      <!-- 上管 -->
      <line x1="250" y1="320" x2="200" y2="350"/>
      <!-- 后上叉 -->
      <line x1="270" y1="470" x2="330" y2="480"/>
      <!-- 后下叉 -->
      <line x1="250" y1="320" x2="330" y2="480"/>
      <!-- 头管 -->
      <line x1="200" y1="350" x2="120" y2="350"/>
      <!-- 前叉 -->
      <line x1="120" y1="350" x2="90" y2="480"/>
    </g>

    <!-- 车把 -->
    <g fill="none" stroke="#222" stroke-width="6" stroke-linecap="round">
      <path d="M120,350 q-6,-30 14,-46"/>
      <path d="M134,304 q22,-4 40,2"/>
    </g>
    <circle cx="174" cy="306" r="5" fill="#1a1a1a"/>
    <circle cx="126" cy="306" r="4" fill="#1a1a1a"/>

    <!-- 车座 -->
    <g>
      <path d="M232,318 q22,-12 44,2 q6,6 -2,10 q-26,8 -48,2 q-8,-6 6,-14 z" fill="#1a1a1a"/>
      <path d="M236,318 q20,-8 38,1" fill="none" stroke="#444" stroke-width="2"/>
    </g>

    <!-- 脚踏 / 曲柄 -->
    <g stroke="#2a2a2a" stroke-width="5" stroke-linecap="round">
      <line x1="270" y1="470" x2="270" y2="505"/>
      <line x1="270" y1="435" x2="288" y2="448"/>
    </g>
    <rect x="262" y="503" width="20" height="6" rx="2" fill="#3a3a3a"/>
    <rect x="280" y="446" width="18" height="6" rx="2" fill="#3a3a3a"/>

    <!-- 链条罩 -->
    <path d="M270,470 Q300,478 330,484" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.7"/>
    <path d="M270,470 Q300,462 330,476" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.7"/>

    <!-- ===== 鹈鹕 ===== -->
    <g filter="url(#soft)">

      <!-- 尾巴 -->
      <path d="M330,300 q38,-6 60,18 q-30,8 -58,-2 z" fill="url(#wing)"/>
      <path d="M340,302 q26,2 42,16" fill="none" stroke="#7a6230" stroke-width="1.5" opacity="0.6"/>

      <!-- 身体 -->
      <path d="M250,330
               C 232,300 244,282 276,276
               C 320,268 360,286 380,316
               C 392,336 384,360 360,366
               C 320,376 268,366 250,346 Z"
            fill="url(#feather)"/>

      <!-- 身体阴影 -->
      <path d="M260,356 C 290,372 340,374 372,360 C 350,372 300,374 260,356 Z"
            fill="#b89a68" opacity="0.35"/>

      <!-- 翅膀（骑行中微微张开） -->
      <path d="M286,300
               C 308,296 332,304 348,322
               C 360,338 354,356 336,360
               C 316,364 298,354 292,338
               C 286,324 280,308 286,300 Z"
            fill="url(#wing)"/>
      <!-- 翅膀羽毛分层 -->
      <g fill="none" stroke="#7a6230" stroke-width="1.4" opacity="0.7" stroke-linecap="round">
        <path d="M300,318 q20,6 38,-2"/>
        <path d="M300,330 q22,8 40,-2"/>
        <path d="M300,342 q22,8 38,-2"/>
      </g>
      <!-- 翅膀搭在车把上 -->
      <path d="M296,348 q-22,16 -50,22 q-30,4 -56,-6" fill="none" stroke="url(#wing)" stroke-width="14" stroke-linecap="round"/>
      <path d="M296,348 q-22,16 -50,22 q-30,4 -56,-6" fill="none" stroke="#9a7d44" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

      <!-- 颈部 -->
      <path d="M250,300
               C 232,278 232,254 252,244
               C 266,238 280,246 286,262
               C 290,278 286,296 274,306
               C 266,312 256,310 250,300 Z"
            fill="url(#feather)"/>

      <!-- 头 -->
      <circle cx="244" cy="232" r="30" fill="url(#feather)"/>
      <!-- 头顶蓬松冠羽 -->
      <path d="M232,210 q6,-12 14,-4 q6,-10 14,-2 q8,-8 14,2" fill="none" stroke="#cdb78c" stroke-width="3" stroke-linecap="round"/>
      <path d="M240,206 q4,-10 10,-3" fill="#f0e4cc"/>

      <!-- 眼睛 -->
      <ellipse cx="252" cy="228" rx="6.5" ry="7" fill="#fff"/>
      <circle cx="254" cy="229" r="4.2" fill="#1a1a1a"/>
      <circle cx="255.4" cy="227.6" r="1.5" fill="#fff"/>
      <!-- 眼周裸皮 -->
      <path d="M242,222 q10,-6 22,0" fill="none" stroke="#e9b94e" stroke-width="2.5" opacity="0.8"/>

      <!-- 大嘴喙（鹈鹕标志特征） -->
      <!-- 上喙 -->
      <path d="M270,230
               C 300,224 340,226 366,238
               C 372,241 372,246 366,248
               C 340,250 300,252 272,250 Z"
            fill="url(#pouch)" stroke="#c97a22" stroke-width="1"/>
      <!-- 喙尖钩 -->
      <path d="M362,238 q10,4 6,12 q-6,4 -10,-2" fill="#e08a2e" stroke="#c97a22" stroke-width="1"/>
      <!-- 下喙囊（喉囊） -->
      <path d="M272,250
               C 296,278 320,286 350,278
               C 360,274 366,266 366,250
               C 340,256 300,254 272,250 Z"
            fill="url(#pouch)" stroke="#c97a22" stroke-width="1"/>
      <!-- 囊的褶皱 -->
      <g fill="none" stroke="#c97a22" stroke-width="1" opacity="0.55">
        <path d="M286,258 q12,18 36,20"/>
        <path d="M300,262 q12,16 32,15"/>
        <path d="M316,262 q12,14 28,10"/>
      </g>
      <!-- 鼻孔 -->
      <ellipse cx="288" cy="236" rx="1.6" ry="1" fill="#9a5a14"/>

      <!-- 戴着的小围巾（生动细节） -->
      <path d="M256,272 q20,8 38,2 l6,16 q-26,10 -50,-2 z" fill="#d94a3a"/>
      <path d="M296,290 l16,28 -10,4 -14,-26 z" fill="#b8281f"/>
      <g stroke="#f1c0a0" stroke-width="1.4" opacity="0.7">
        <path d="M300,296 l12,20"/>
        <path d="M306,294 l12,22"/>
      </g>

      <!-- 腿：踩踏 -->
      <!-- 左腿（后侧） -->
      <path d="M312,360 q-4,30 -42,46 q-6,30 6,58" fill="none" stroke="#e0a020" stroke-width="7" stroke-linecap="round"/>
      <!-- 蹼爪 -->
      <path d="M276,464 q-10,6 -2,14 q8,-2 8,-10 z" fill="#e0a020"/>
      <path d="M276,464 q0,10 10,12 q4,-8 -2,-14 z" fill="#d99018"/>

      <!-- 右腿（前侧踩在踏板上） -->
      <path d="M300,362 q30,30 56,82" fill="none" stroke="#f0b020" stroke-width="7" stroke-linecap="round"/>
      <path d="M356,444 q12,4 22,0 q-4,10 -22,8 z" fill="#f0b020"/>
    </g>

  </g>

  <!-- 鹈鹕前方溅起的小沙 -->
  <g fill="#f3c98b" opacity="0.9">
    <circle cx="210" cy="520" r="3"/>
    <circle cx="196" cy="512" r="2"/>
    <circle cx="184" cy="524" r="2.4"/>
    <circle cx="172" cy="514" r="1.8"/>
  </g>

  <!-- 运动速度线 -->
  <g stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <path d="M70,420 q60,-2 120,0"/>
    <path d="M50,460 q60,-2 130,0"/>
    <path d="M40,495 q70,-2 150,0"/>
  </g>

</svg>
