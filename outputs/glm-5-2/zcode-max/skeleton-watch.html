<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKELETON — 镂空机械腕表 3D 展示</title>
<style>
  :root{
    --gold:#d9b46a;
    --gold-bright:#ffe7a8;
    --bg0:#07080b;
    --panel:rgba(14,16,22,.72);
    --line:rgba(217,180,106,.28);
    --txt:#ece7dc;
    --muted:#9aa0ab;
  } 
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg0);color:var(--txt);
    font-family:"Helvetica Neue","PingFang SC","Microsoft YaHei",Arial,sans-serif;-webkit-font-smoothing:antialiased}
  #app{position:fixed;inset:0}
  canvas{display:block}

  /* vignette overlay */
  #app::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,.55) 100%);}

  /* ====== 顶栏品牌 ====== */
  .topbar{position:absolute;top:22px;left:0;right:0;display:flex;justify-content:space-between;
    align-items:flex-start;padding:0 34px;pointer-events:none;z-index:20}
  .brand{pointer-events:auto}
  .brand .mark{font-size:11px;letter-spacing:.62em;color:var(--gold);font-weight:600;opacity:.9}
  .brand .name{font-size:30px;font-weight:200;letter-spacing:.34em;margin-top:4px;
    background:linear-gradient(180deg,#fff,#cbb277);-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand .sub{font-size:10px;letter-spacing:.42em;color:var(--muted);margin-top:5px}
  .serial{text-align:right;pointer-events:auto}
  .serial .l{font-size:9px;letter-spacing:.4em;color:var(--muted)}
  .serial .v{font-size:13px;letter-spacing:.24em;color:var(--gold);margin-top:3px}

  /* ====== 左控制面板 ====== */
  .controls{position:absolute;left:24px;top:50%;transform:translateY(-50%);z-index:20;
    width:248px;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:20px 18px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 24px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04)}
  .controls h3{font-size:10px;letter-spacing:.36em;color:var(--gold);font-weight:600;margin-bottom:16px;
    text-transform:uppercase;border-bottom:1px solid var(--line);padding-bottom:12px}
  .row{display:flex;align-items:center;justify-content:space-between;margin:13px 0;font-size:12px}
  .row .lbl{color:var(--muted);letter-spacing:.06em}
  .row .val{color:var(--gold-bright);font-variant-numeric:tabular-nums;font-weight:600}

  .btn{display:block;width:100%;padding:11px 12px;margin-top:11px;border-radius:9px;cursor:pointer;
    border:1px solid var(--line);background:linear-gradient(180deg,rgba(217,180,106,.16),rgba(217,180,106,.05));
    color:var(--txt);font-size:11.5px;letter-spacing:.16em;transition:all .25s ease;font-family:inherit;text-align:left}
  .btn:hover{background:linear-gradient(180deg,rgba(217,180,106,.32),rgba(217,180,106,.12));border-color:var(--gold);
    transform:translateY(-1px);box-shadow:0 8px 22px rgba(217,180,106,.18)}
  .btn.on{background:linear-gradient(180deg,rgba(217,180,106,.45),rgba(217,180,106,.18));color:#1a1207;
    font-weight:700;border-color:var(--gold-bright)}
  .btn .k{float:right;opacity:.55;font-size:10px;letter-spacing:.1em}
  .btn.on .k{opacity:.8;color:#1a1207}

  .toggle{position:relative;width:42px;height:22px;border-radius:11px;background:rgba(255,255,255,.08);
    cursor:pointer;transition:.25s;border:1px solid var(--line)}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;
    background:var(--gold);transition:.25s;box-shadow:0 2px 6px rgba(0,0,0,.5)}
  .toggle.on{background:rgba(217,180,106,.4)}
  .toggle.on::after{left:22px;background:var(--gold-bright)}

  /* ====== 右信息面板 ====== */
  .info{position:absolute;right:24px;top:50%;transform:translateY(-50%);z-index:20;width:268px;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px 20px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 24px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04);
    transition:opacity .4s,transform .4s}
  .info .tag{font-size:9px;letter-spacing:.42em;color:var(--gold);font-weight:600}
  .info h2{font-size:21px;font-weight:300;letter-spacing:.06em;margin:8px 0 4px}
  .info .role{font-size:11px;letter-spacing:.14em;color:var(--muted);margin-bottom:14px}
  .info p{font-size:12px;line-height:1.78;color:#cfc9bb;margin-bottom:14px}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
  .stat{padding:11px 12px;border-radius:9px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}
  .stat .k{font-size:9px;letter-spacing:.24em;color:var(--muted)}
  .stat .v{font-size:16px;color:var(--gold-bright);font-weight:600;margin-top:5px;font-variant-numeric:tabular-nums}
  .info .close{position:absolute;top:12px;right:14px;cursor:pointer;color:var(--muted);font-size:14px;width:22px;height:22px;
    display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.2s}
  .info .close:hover{color:#fff;background:rgba(255,255,255,.08)}
  .info.hidden{opacity:0;transform:translateY(-50%) translateX(20px);pointer-events:none}

  /* ====== 底部时间显示 ====== */
  .dock{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:20;text-align:center}
  .dock .clock{font-size:38px;font-weight:200;letter-spacing:.14em;color:var(--gold-bright);
    font-variant-numeric:tabular-nums;text-shadow:0 0 24px rgba(217,180,106,.35)}
  .dock .clock .sep{opacity:.5;animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.1}}
  .dock .hint{font-size:10px;letter-spacing:.34em;color:var(--muted);margin-top:7px}

  /* ====== 悬浮零件标签 ====== */
  .tag3d{position:absolute;z-index:25;pointer-events:none;transform:translate(-50%,-50%);
    transition:opacity .25s ease;opacity:0}
  .tag3d .dot{width:9px;height:9px;border-radius:50%;background:var(--gold-bright);
    box-shadow:0 0 12px var(--gold),0 0 0 3px rgba(217,180,106,.18);margin:0 auto}
  .tag3d .line{width:1px;height:26px;background:linear-gradient(180deg,var(--gold-bright),transparent);margin:0 auto}
  .tag3d .lbl{white-space:nowrap;font-size:10.5px;letter-spacing:.14em;color:var(--gold-bright);
    background:rgba(8,9,13,.78);border:1px solid var(--line);padding:4px 9px;border-radius:5px;margin-top:2px}
  .tag3d.show{opacity:1}

  /* hint for hover in canvas */
  .cursor-pointer{cursor:pointer}

  /* loader */
  #loader{position:fixed;inset:0;background:var(--bg0);z-index:100;display:flex;align-items:center;justify-content:center;
    flex-direction:column;transition:opacity .8s}
  #loader .sp{width:46px;height:46px;border-radius:50%;border:2px solid rgba(217,180,106,.18);
    border-top-color:var(--gold);animation:spin 1s linear infinite}
  #loader .t{margin-top:20px;font-size:11px;letter-spacing:.4em;color:var(--muted)}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media (max-width:880px){
    .controls,.info{width:calc(100% - 48px);position:absolute;transform:none;top:auto}
    .controls{top:90px}.info{bottom:90px;top:auto;transform:none}
    .info.hidden{transform:translateY(20px)}
    .topbar{padding:0 18px}.brand .name{font-size:22px}
    .dock{display:none}
  }
</style>

<div id="app"></div>

<div class="topbar">
  <div class="brand">
    <div class="mark">MANUFACTURE · GENÈVE</div>

<script type="importmap">
{
  "imports":{

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

/* ============================================================
   全局状态
============================================================ */
const state = {
  autoRotate:true, movement:true, reflection:true, bloom:true,
  rate:5.0, exploded:false, explodeT:0
};
const clock = new THREE.Clock();
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-2,-2);

/* ============================================================
   场景 / 相机 / 渲染器
============================================================ */
const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07080b);
scene.fog = new THREE.Fog(0x07080b, 22, 60);

const camera = new THREE.PerspectiveCamera(34, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 6.5, 13);

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

/* ============================================================
   环境贴图（程序化生成，营造高端摄影棚反射）
============================================================ */
function makeEnvTexture(){
  const c = document.createElement('canvas'); c.width=512; c.height=256;
  const g = c.getContext('2d');
  // base dark
  g.fillStyle='#0a0c12'; g.fillRect(0,0,512,256);
  // gradient studio
  const grd=g.createLinearGradient(0,0,0,256);
  grd.addColorStop(0,'#1a1f2b'); grd.addColorStop(0.5,'#0a0c12'); grd.addColorStop(1,'#05060a');
  g.fillStyle=grd; g.fillRect(0,0,512,256);
  // key light strip (warm)
  const k=g.createRadialGradient(150,90,5,150,90,140);
  k.addColorStop(0,'rgba(255,220,160,0.95)'); k.addColorStop(0.3,'rgba(255,200,130,0.45)');
  k.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=k; g.fillRect(0,0,512,256);
  // fill strip (cool)
  const f=g.createRadialGradient(400,120,5,400,120,120);
  f.addColorStop(0,'rgba(140,170,255,0.55)'); f.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=f; g.fillRect(0,0,512,256);
  // rim
  const r=g.createRadialGradient(256,20,5,256,20,90);
  r.addColorStop(0,'rgba(255,255,255,0.7)'); r.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=r; g.fillRect(0,0,512,256);
  // bottom subtle bounce
  const b=g.createLinearGradient(0,200,0,256);
  b.addColorStop(0,'rgba(0,0,0,0)'); b.addColorStop(1,'rgba(120,90,40,0.35)');
  g.fillStyle=b; g.fillRect(0,0,512,256);

  const tex = new THREE.CanvasTexture(c);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const envTex = makeEnvTexture();
const pmrem = new THREE.PMREMGenerator(renderer);
const envMap = pmrem.fromEquirectangular(envTex).texture;
scene.environment = envMap;

/* ============================================================
   光照（三点 + 边缘）
============================================================ */
const ambient = new THREE.AmbientLight(0x6a7080, 0.35);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xfff0d8, 2.6);
keyLight.position.set(7,12,8);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048,2048);
keyLight.shadow.camera.near=1; keyLight.shadow.camera.far=40;
keyLight.shadow.camera.left=-12; keyLight.shadow.camera.right=12;
keyLight.shadow.camera.top=12; keyLight.shadow.camera.bottom=-12;
keyLight.shadow.bias=-0.0003; keyLight.shadow.radius=4;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x88aaff, 0.9);
fillLight.position.set(-9,4,-3);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffd9a0, 1.6);
rimLight.position.set(0,7,-10);
scene.add(rimLight);

const accentPoint = new THREE.PointLight(0xffe7b0, 1.2, 22, 2);
accentPoint.position.set(0,3,4);
scene.add(accentPoint);

/* ============================================================
   反射地板
============================================================ */
const floorMat = new THREE.MeshStandardMaterial({
  color:0x0a0b10, metalness:0.9, roughness:0.35, envMap:envMap, envMapIntensity:0.5
});
const floor = new THREE.Mesh(new THREE.CircleGeometry(30,64), floorMat);
floor.rotation.x = -Math.PI/2; floor.position.y = -3.2;
floor.receiveShadow = true;
scene.add(floor);

/* ============================================================
   控制器
============================================================ */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.06;
controls.minDistance = 6; controls.maxDistance = 22;
controls.maxPolarAngle = Math.PI*0.52; controls.minPolarAngle = Math.PI*0.12;
controls.target.set(0,0,0);
controls.autoRotate = state.autoRotate;
controls.autoRotateSpeed = 0.6;

/* ============================================================
   材质库
============================================================ */
const M = {
  gold:    new THREE.MeshPhysicalMaterial({color:0xd9b46a, metalness:1, roughness:0.18, envMap:envMap, envMapIntensity:1.4, clearcoat:0.6, clearcoatRoughness:0.15}),
  goldPolish:new THREE.MeshPhysicalMaterial({color:0xf4d68a, metalness:1, roughness:0.09, envMap:envMap, envMapIntensity:1.6, clearcoat:0.9, clearcoatRoughness:0.08}),
  steel:   new THREE.MeshPhysicalMaterial({color:0xb8bcc4, metalness:1, roughness:0.28, envMap:envMap, envMapIntensity:1.2}),
  steelDark:new THREE.MeshPhysicalMaterial({color:0x4a4e58, metalness:1, roughness:0.35, envMap:envMap, envMapIntensity:1.0}),
  brass:   new THREE.MeshPhysicalMaterial({color:0xc9a45a, metalness:1, roughness:0.22, envMap:envMap, envMapIntensity:1.4}),
  bluedSteel:new THREE.MeshPhysicalMaterial({color:0x2a4cc8, metalness:1, roughness:0.18, envMap:envMap, envMapIntensity:1.5, clearcoat:0.7}),
  ruby:    new THREE.MeshPhysicalMaterial({color:0xff2a4d, metalness:0.1, roughness:0.05, envMap:envMap, envMapIntensity:1.8, transmission:0.55, thickness:0.4, ior:1.77, emissive:0x550010, emissiveIntensity:0.4, clearcoat:1}),
  sapphire:new THREE.MeshPhysicalMaterial({color:0xeaf2ff, metalness:0, roughness:0.02, envMap:envMap, envMapIntensity:1.5, transmission:0.96, thickness:0.5, ior:1.77, clearcoat:1, clearcoatRoughness:0.0, transparent:true, opacity:0.35}),
  lume:    new THREE.MeshStandardMaterial({color:0xb4ff8a, emissive:0x7dff5a, emissiveIntensity:1.4, roughness:0.4, metalness:0}),
  hairlinePlate:new THREE.MeshPhysicalMaterial({color:0xc8b070, metalness:1, roughness:0.32, envMap:envMap, envMapIntensity:1.2, clearcoat:0.3}),
  blackDial:new THREE.MeshPhysicalMaterial({color:0x0c0e14, metalness:0.6, roughness:0.45, envMap:envMap, envMapIntensity:0.6}),
  darkMetal:new THREE.MeshStandardMaterial({color:0x16181f, metalness:0.9, roughness:0.5, envMap:envMap, envMapIntensity:0.7})
};

/* ============================================================
   工具：齿轮几何体（带渐开线近似齿）
============================================================ */
function makeGearGeometry(teeth, outerR, innerR, holeR, depth, bevel=0.06){
  const shape = new THREE.Shape();
  const step = (Math.PI*2)/teeth;
  const toothW = step*0.46;
  const rootR = outerR - bevel*2;
  for(let i=0;i<teeth;i++){
    const a = i*step;
    const a1 = a, a2 = a + (step-toothW)/2, a3 = a + (step-toothW)/2 + toothW*0.18,
          a4 = a + step - toothW*0.18, a5 = a + step;
    if(i===0) shape.moveTo(Math.cos(a1)*rootR, Math.sin(a1)*rootR);
    shape.lineTo(Math.cos(a2)*rootR, Math.sin(a2)*rootR);
    shape.lineTo(Math.cos(a3)*outerR, Math.sin(a3)*outerR);
    shape.lineTo(Math.cos(a4)*outerR, Math.sin(a4)*outerR);
    shape.lineTo(Math.cos(a5)*rootR, Math.sin(a5)*rootR);
  }
  // 中心孔
  const hole = new THREE.Path();
  hole.absarc(0,0,holeR,0,Math.PI*2,true);
  shape.holes.push(hole);
  // 减重孔（轻量化镂空）
  const spokes = 5;
  for(let s=0;s<spokes;s++){
    const ang = (s/spokes)*Math.PI*2;
    const cx = Math.cos(ang)*((innerR+holeR)/1.7);
    const cy = Math.sin(ang)*((innerR+holeR)/1.7);
    const r = (innerR-holeR)*0.32;
    const p = new THREE.Path();
    p.absarc(cx,cy,r,0,Math.PI*2,true);
    shape.holes.push(p);
  }
  const geo = new THREE.ExtrudeGeometry(shape,{depth,bevelEnabled:true,bevelThickness:bevel,bevelSize:bevel,bevelSegments:2,steps:1});
  geo.translate(0,0,-depth/2);
  geo.computeVertexNormals();
  return geo;
}

/* 中心带盖的齿轮（发条盒等） */
function makeBarrelGeometry(teeth, outerR, holeR, depth, bevel=0.05){
  const shape = new THREE.Shape();
  const step=(Math.PI*2)/teeth, toothW=step*0.46, rootR=outerR-bevel*2;
  for(let i=0;i<teeth;i++){
    const a=i*step;
    if(i===0) shape.moveTo(Math.cos(a)*rootR, Math.sin(a)*rootR);
    shape.lineTo(Math.cos(a+(step-toothW)/2)*rootR, Math.sin(a+(step-toothW)/2)*rootR);
    shape.lineTo(Math.cos(a+(step-toothW)/2+toothW*0.18)*outerR, Math.sin(a+(step-toothW)/2+toothW*0.18)*outerR);
    shape.lineTo(Math.cos(a+step-toothW*0.18)*outerR, Math.sin(a+step-toothW*0.18)*outerR);
    shape.lineTo(Math.cos(a+step)*rootR, Math.sin(a+step)*rootR);
  }
  const hole=new THREE.Path(); hole.absarc(0,0,holeR,0,Math.PI*2,true); shape.holes.push(hole);
  const geo=new THREE.ExtrudeGeometry(shape,{depth,bevelEnabled:true,bevelThickness:bevel,bevelSize:bevel,bevelSegments:2,steps:1});
  geo.translate(0,0,-depth/2); geo.computeVertexNormals();
  return geo;
}

/* ============================================================
   标记零件组（用于交互）
============================================================ */
const interactive = [];
let hoverGroup = null;

function markPart(group, info){
  group.userData.info = info;
  group.traverse(o=>{ if(o.isMesh){o.userData.parentGroup=group;} });
  interactive.push(group);
  return group;
}

/* 用于高亮：为每个被高亮网格克隆材质，避免共享材质互相影响 */
const _origMat = new WeakMap();
function setHighlight(group, on){
  group.traverse(o=>{
    if(!o.isMesh) return;
    if(on){
      if(!_origMat.has(o)){
        const m = o.material;
        _origMat.set(o, m);
        const c = m.clone();
        if(c.emissive){ c.emissive.setHex(0xffcf7a); c.emissiveIntensity = 0.85; }
        else { // 标准材质若无 emissive 属性则补一个发光
          c.emissive = new THREE.Color(0xffcf7a); c.emissiveIntensity = 0.8;
        }
        o.material = c;
      }
    } else {
      if(_origMat.has(o)){ o.material = _origMat.get(o); _origMat.delete(o); }
    }
  });
}

  // 表圈底部
  const ringBot = new THREE.Mesh(new THREE.TorusGeometry(5.05,0.16,18,90), M.goldPolish);
  ringBot.rotation.x = Math.PI/2; ringBot.position.y = -0.5;
  caseParts.add(ringBot);

  // 蓝宝石水晶玻璃（顶面）
  const glass = new THREE.Mesh(new THREE.CylinderGeometry(4.9,4.9,0.12,80), M.sapphire);
  glass.position.y = 0.22;
  caseParts.add(glass);
  // 玻璃上沿倒角圈
  const glassBev = new THREE.Mesh(new THREE.TorusGeometry(4.88,0.05,12,80), M.goldPolish);
  glassBev.rotation.x=Math.PI/2; glassBev.position.y=0.28; caseParts.add(glassBev);

  // 底盖
  const back = new THREE.Mesh(new THREE.CylinderGeometry(5.0,4.95,0.2,80), M.goldPolish);
  back.position.y = -0.62; back.castShadow=true;
  caseParts.add(back);

  // 表耳（lugs）4个
  for(let i=0;i<4;i++){
    const ang = (i<2? (i===0?0.42:-0.42):(i===2?Math.PI-0.42:Math.PI+0.42));
    const lug = new THREE.Mesh(new THREE.BoxGeometry(0.55,0.7,0.9), M.gold);
    lug.position.set(Math.cos(ang)*4.9, -0.1, Math.sin(ang)*4.9);
    lug.rotation.y = -ang + Math.PI/2;
    lug.castShadow=true;
    caseParts.add(lug);
  }

  // 表冠
  const crown = new THREE.Group();
  const cBody = new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.32,0.45,24), M.goldPolish);
  cBody.rotation.z = Math.PI/2;
  const cTip = new THREE.Mesh(new THREE.SphereGeometry(0.32,24,16), M.goldPolish);
  cTip.position.x = 0.22;
  // 齿纹（小柱）
  for(let i=0;i<16;i++){
    const a=i/16*Math.PI*2;
    const t = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.05,0.05), M.goldPolish);
    t.position.set(0,Math.cos(a)*0.32,Math.sin(a)*0.32); t.rotation.x=a;
    crown.add(t);
  }
  crown.add(cBody); crown.add(cTip);
  crown.position.set(5.55,-0.1,0);
  crown.castShadow=true;
  caseParts.add(crown);

  // 外环刻度（表盘外圈分钟刻度）
  const scaleRing = new THREE.Group();
  for(let i=0;i<60;i++){
    const a = Math.PI/2 - i/60*Math.PI*2; // 12 点位于 +Z，顺时针
    const major = i%5===0;
    const tickGeo = new THREE.BoxGeometry(major?0.07:0.035, 0.02, major?0.34:0.18);
    const tickMat = major ? M.lume.clone() : new THREE.MeshStandardMaterial({color:0xcfcab8, metalness:0.6, roughness:0.3, envMap:envMap, envMapIntensity:1});
    const tick = new THREE.Mesh(tickGeo, tickMat);
    tick.position.set(Math.cos(a)*4.55, 0.05, Math.sin(a)*4.55);
    tick.rotation.y = -a + Math.PI/2;
    scaleRing.add(tick);
  }
  // 数字时标（荧光，仅12个位置贴块）
  for(let i=0;i<12;i++){
    const a = Math.PI/2 - i/12*Math.PI*2; // 12 点位于 +Z，顺时针
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.03,0.18), M.lume);
    m.position.set(Math.cos(a)*4.35, 0.06, Math.sin(a)*4.35);
    m.rotation.y = -a + Math.PI/2;
    scaleRing.add(m);
  }
  caseParts.add(scaleRing);

  // 表带片段（装饰，上下各两节）
  function strap(off, flip){
    const grp = new THREE.Group();
    for(let i=0;i<3;i++){
      const seg = new THREE.Mesh(new THREE.BoxGeometry(1.4,0.32,0.7), M.gold);
      seg.position.z = i*0.62 + 0.5;
      seg.castShadow=true;
      grp.add(seg);
      const link = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,1.5,16), M.steel);
      link.rotation.z = Math.PI/2; link.position.z = i*0.62 + 0.85;
      grp.add(link);
    }
    grp.position.set(off?3.2:-3.2,-0.1,0); grp.rotation.y = off?0:Math.PI;
    return grp;
  }
  caseParts.add(strap(false)); caseParts.add(strap(true));
}

/* --- 主夹板（带日内瓦波纹 + 红宝石轴承 + 螺丝） --- */
function buildMainPlate(){
  const plateGroup = new THREE.Group();

  // 主夹板（圆形，带凹陷镂空造型）
  const plateShape = new THREE.Shape();
  plateShape.absarc(0,0,4.6,0,Math.PI*2,false);
  // 镂空窗孔
  const windows = [[0,0,1.3],[2.6,1.6,0.9],[-2.6,1.6,0.9],[2.6,-1.6,0.9],[-2.6,-1.6,0.9],[0,2.6,0.7]];
  windows.forEach(w=>{
    const p=new THREE.Path(); p.absarc(w[0],w[1],w[2],0,Math.PI*2,true); plateShape.holes.push(p);
  });
  const plateGeo = new THREE.ExtrudeGeometry(plateShape,{depth:0.12,bevelEnabled:true,bevelThickness:0.03,bevelSize:0.03,bevelSegments:2,steps:1});

/* --- 摆轮 + 游丝 --- */
function buildBalanceWheel(){
  const g = new THREE.Group();
  // 摆动组：仅轮缘/轮辐/螺丝/中心轴/游丝随摆动，调节件保持静止
  const osc = new THREE.Group();
  g.add(osc);
  const RR = 0.95;
  // 摆轮外环（金色）
  const ring = new THREE.Mesh(new THREE.TorusGeometry(RR,0.09,18,64), M.goldPolish);
  ring.rotation.x = -Math.PI/2; // 水平放置
  osc.add(ring);
  // 摆轮轮辐（3条，减轻重量）
  for(let i=0;i<3;i++){
    const spoke = new THREE.Mesh(new THREE.BoxGeometry(RR*2-0.1,0.05,0.08), M.gold);
    spoke.rotation.y = i*Math.PI/3;
    osc.add(spoke);
  }
  // 配重螺丝（摆轮边缘的微调螺丝，径向拧入轮缘）
  const _up = new THREE.Vector3(0,1,0);
  for(let i=0;i<8;i++){
    const a = i/8*Math.PI*2;
    const w = new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,0.18,12), M.bluedSteel);
    w.position.set(Math.cos(a)*RR,0,Math.sin(a)*RR);
    // 使圆柱轴向沿径向
    w.quaternion.setFromUnitVectors(_up, new THREE.Vector3(Math.cos(a),0,Math.sin(a)));
    osc.add(w);
  }
  // 中心轴（摆轴，垂直）
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.34,16), M.steel);
  osc.add(hub);

  // 游丝（螺旋线）—— 使用 TubeGeometry
  const pts = [];
  const turns = 11, seg = 240;
  for(let i=0;i<=seg;i++){
    const t = i/seg * turns * Math.PI*2;
    const rr = 0.2 + (0.6-0.2)*(i/seg);
    pts.push(new THREE.Vector3(Math.cos(t)*rr, 0.22, Math.sin(t)*rr));
  }
  const curve = new THREE.CatmullRomCurve3(pts);
  const hairspring = new THREE.Mesh(new THREE.TubeGeometry(curve, 300, 0.018, 6, false),
    new THREE.MeshPhysicalMaterial({color:0x3a5fff, metalness:1, roughness:0.15, envMap:envMap, envMapIntensity:1.6, clearcoat:0.7}));
  osc.add(hairspring);

  // 游丝外端固定桩（垂直立柱，固定于夹板，不随摆轮转动）
  const stud = new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,0.2,10), M.goldPolish);
  stud.position.set(0.62,0.1,0); g.add(stud);
  // 快慢针（调节器，固定）
  const index = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.04,0.05), M.bluedSteel);
  index.position.set(0.4,0.2,0); g.add(index);

  g.position.set(-1.7,0,-1.75);
  movement.add(g);
  g.userData.osc = osc;
  markPart(g,{
    tag:'BALANCE WHEEL', title:'摆轮 + 游丝', role:'时间基准 / Oscillator 5 Hz',
    desc:'腕表的“心脏”，决定走时精度。摆轮以 5 Hz（每小时 36,000 次）高频振荡，蓝钢游丝提供等时性回复力。边缘的蓝钢螺丝用于精密调校。每秒 10 次半振荡，画面中清晰可见。',
    stats:[['频率','5 Hz · 36,000 vph',''],['游丝','蓝钢',''],['宝石','防震 Incabloc','']]
  });
  return g;
}
const balanceWheel = buildBalanceWheel();

/* ============================================================
   指针（在机芯之上，玻璃之下）
============================================================ */
function buildHands(){
  const g = new THREE.Group();
  // 时针
  const hour = new THREE.Mesh(new THREE.BoxGeometry(0.14,0.04,2.4), M.lume);
  hour.geometry.translate(0,0,1.0); // 顶端伸出
  hour.position.set(0,0.16,0);
  hour.castShadow=true;
  g.add(hour);
  // 时针针尖菱形
  const hTip = new THREE.Mesh(new THREE.ConeGeometry(0.09,0.3,4), M.lume);
  hTip.rotation.x=-Math.PI/2; hTip.position.set(0,0.16,2.4);
  g.add(hTip);

  // 分针
  const min = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.04,3.5), M.lume);
  min.geometry.translate(0,0,1.55);
  min.position.set(0,0.2,0);
  g.add(min);
  const mTip = new THREE.Mesh(new THREE.ConeGeometry(0.07,0.25,4), M.lume);
  mTip.rotation.x=-Math.PI/2; mTip.position.set(0,0.2,3.5);
  g.add(mTip);

  // 秒针（细钢针）
  const sec = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,4.2,8), M.bluedSteel);
  sec.rotation.x=-Math.PI/2; sec.geometry.translate(0,0,0);
  sec.position.set(0,0.24,1.7);
  g.add(sec);
  // 秒针配重
  const secW = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.06,16), M.bluedSteel);
  secW.position.set(0,0.24,-0.5); g.add(secW);

  // 中心轴帽
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.14,0.12,16), M.goldPolish);
  cap.position.y=0.28; g.add(cap);

  watch.add(g);
  return {g,hour,min,sec};
}
const hands = buildHands();

/* ============================================================
   后处理
============================================================ */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.7, 0.7, 0.85);
composer.addPass(bloom);
const outPass = new OutputPass();
composer.addPass(outPass);

/* ============================================================
   爆炸视图目标位置
============================================================ */
function setExplodeTargets(){
  // 纯增量偏移（爆炸时叠加到原始位置上）
  bridgeGroup.userData.explode = new THREE.Vector3(0,1.4,0);
  balanceWheel.userData.explode = new THREE.Vector3(0,1.2,0);
  palletFork.userData.explode = new THREE.Vector3(0,1.0,0);
  wheels.forEach((w,i)=>{ w.userData.explode = new THREE.Vector3(0, 0.7+i*0.22, 0); });
  mainspring.g.userData.explode = new THREE.Vector3(0,2.2,0);
  plateGroup.userData.explode = new THREE.Vector3(0,-1.1,0);
  caseParts.userData.explode = new THREE.Vector3(0,-0.6,0); // 表壳下沉
}
setExplodeTargets();

/* ============================================================
   交互：射线检测 / 标签 / 信息面板
============================================================ */
const tagEl = document.createElement('div');
tagEl.className='tag3d'; tagEl.innerHTML='<div class="dot"></div><div class="line"></div><div class="lbl"></div>';
app.appendChild(tagEl);

function onPointerMove(e){
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
}
function onPointerLeave(){
  mouse.set(-2,-2);
  tagEl.classList.remove('show');
  if(hoverGroup){ setHighlight(hoverGroup,false); hoverGroup=null; }
  renderer.domElement.classList.remove('cursor-pointer');
}
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerleave', onPointerLeave);
renderer.domElement.addEventListener('click', ()=>{
  if(hoverGroup){ showInfo(hoverGroup.userData.info); }
});

function checkHover(){
  if(state.exploded) return; // 爆炸时暂停高亮避免混乱
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(interactive, true);
  if(hits.length){
    const top = hits[0].object.userData.parentGroup || hoverGroup;
    if(top !== hoverGroup){
      if(hoverGroup) setHighlight(hoverGroup,false);
      hoverGroup = top; setHighlight(hoverGroup,true);
    }
    // 更新标签
    const pos = hits[0].point.clone();
    const info = hoverGroup.userData.info;
    tagEl.querySelector('.lbl').textContent = info.title + ' · ' + info.tag;
    projectTag(pos);
    tagEl.classList.add('show');
    renderer.domElement.classList.add('cursor-pointer');
  } else {
    if(hoverGroup){ setHighlight(hoverGroup,false); hoverGroup=null; }
    tagEl.classList.remove('show');
    renderer.domElement.classList.remove('cursor-pointer');
  }
}
function projectTag(pos3){
  const v = pos3.clone().project(camera);
  const x = (v.x*0.5+0.5)*innerWidth;
  const y = (-v.y*0.5+0.5)*innerHeight - 40;
  tagEl.style.left = x+'px'; tagEl.style.top = y+'px';
}

const infoEl = document.getElementById('info');
function showInfo(info){
  document.getElementById('iTag').textContent = info.tag;
  document.getElementById('iTitle').textContent = info.title;
  document.getElementById('iRole').textContent = info.role;
  document.getElementById('iDesc').textContent = info.desc;
  const st = document.getElementById('iStats');
  st.innerHTML = '';
  info.stats.forEach(s=>{
    const d = document.createElement('div'); d.className='stat';
    d.innerHTML = `<div class="k">${s[0]}</div><div class="v">${s[1]}</div>`;
    st.appendChild(d);
  });
  infoEl.classList.remove('hidden');
}
document.getElementById('closeInfo').addEventListener('click', ()=>infoEl.classList.add('hidden'));

/* ============================================================
   UI 控件绑定
============================================================ */
function bindToggle(id, key, onChange){
  const el = document.getElementById(id);
  el.addEventListener('click', ()=>{
    state[key]=!state[key]; el.classList.toggle('on',state[key]);
    onChange&&onChange(state[key]);
  });
}
bindToggle('tAuto','autoRotate',v=>{controls.autoRotate=v;});
bindToggle('tRun','movement');
bindToggle('tRefl','reflection',v=>{ floor.visible=v; scene.environment = v?envMap:null; scene.background = v? null : new THREE.Color(0x07080b); });
bindToggle('tBloom','bloom',v=>{bloom.enabled=v;});

document.getElementById('bExplode').addEventListener('click', ()=>{
  state.exploded = !state.exploded;
  document.getElementById('bExplode').classList.toggle('on',state.exploded);
});
document.getElementById('bReset').addEventListener('click', ()=>{
  camera.position.set(0,6.5,13);
  controls.target.set(0,0,0);
  controls.update();
});

window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});

/* ============================================================
   时钟显示（底部）
============================================================ */
function tick(){
  const d = new Date();
  document.getElementById('hh').textContent = String(d.getHours()).padStart(2,'0');
  document.getElementById('mm').textContent = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('ss').textContent = String(d.getSeconds()).padStart(2,'0');
}
setInterval(tick,1000); tick();

/* ============================================================
   动画循环
============================================================ */
const targetPos = new THREE.Vector3();
const currentPos = new THREE.Vector3();
const origPos = new Map();
interactive.forEach(g=>origPos.set(g, g.position.clone()));
origPos.set(caseParts, caseParts.position.clone());

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(),0.05);
  const t = clock.elapsedTime;

  // 爆炸插值
  const tgt = state.exploded?1:0;
  state.explodeT += (tgt - state.explodeT) * Math.min(1, dt*4);
  interactive.forEach(g=>{
    const o = origPos.get(g); const e = g.userData.explode;
    if(e){ g.position.lerpVectors(o, new THREE.Vector3(o.x+e.x,o.y+e.y,o.z+e.z), state.explodeT); }
  });
  // 表壳下沉
  const co = origPos.get(caseParts);
  caseParts.position.y = co.y + (-0.6) * state.explodeT;

  // 机芯运转
  if(state.movement && state.explodeT<0.5){
    const f = state.rate * dt;
    wheels.forEach(w=>{ w.rotation.y -= f * w.userData.spin * 0.05; });
    mainspring.g.rotation.y += f*0.015; // 发条盒缓慢释放
    palletFork.rotation.y = (palletFork.userData.baseY||1.15) + Math.sin(t*state.rate*Math.PI*2*0.4)*0.14;
    (balanceWheel.userData.osc||balanceWheel).rotation.y = Math.sin(t*state.rate*Math.PI*2*0.2)*0.6; // 摆动
  }

  // 爆炸时抬升指针，避免与机芯重叠
  hands.g.position.y = 1.6 * state.explodeT;

  // 指针随真实时间（12 点 = +Z，顺时针为 +Y 旋转）
  const d = new Date();
  const sec = d.getSeconds()+d.getMilliseconds()/1000;
  const min = d.getMinutes()+sec/60;
  const hr = (d.getHours()%12)+min/60;
  hands.sec.rotation.y = sec/60*Math.PI*2;
  hands.min.rotation.y = min/60*Math.PI*2;
  hands.hour.rotation.y = hr/12*Math.PI*2;

  // accent light 微动
  accentPoint.position.x = Math.sin(t*0.5)*2;
  accentPoint.position.z = Math.cos(t*0.5)*2+3;

  controls.update();
  checkHover();
  composer.render();
}

// 隐藏 loader 并启动
setTimeout(()=>{
  const l=document.getElementById('loader');
  l.style.opacity='0'; setTimeout(()=>l.remove(),800);
}, 600);

animate();
</script>
