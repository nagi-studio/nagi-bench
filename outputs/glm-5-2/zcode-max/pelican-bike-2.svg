<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="45%" stop-color="#AEE0EF"/>
      <stop offset="80%" stop-color="#FDD9A8"/>
      <stop offset="100%" stop-color="#FBB679"/>
    </linearGradient>
 
    <!-- Sun glow -->
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFF6D5" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FFE39A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD27A" stop-opacity="0"/>
    </radialGradient>
 
    <radialGradient id="sunCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFBE6"/>
      <stop offset="70%" stop-color="#FFE6A0"/>
      <stop offset="100%" stop-color="#FFCB6E"/>
    </radialGradient>
 
    <!-- Ocean gradient -->
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E86AB"/>
      <stop offset="50%" stop-color="#3FA7D6"/>
      <stop offset="100%" stop-color="#7FCBEA"/>
    </linearGradient>
 
    <!-- Wet sand -->
    <linearGradient id="wetSand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C89A"/>
      <stop offset="100%" stop-color="#D9A86C"/>
    </linearGradient>
 
    <!-- Dry sand -->
    <linearGradient id="drySand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2D9A6"/>
      <stop offset="100%" stop-color="#EBC487"/>
    </linearGradient>
 
    <!-- Pelican body gradient -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#F2F0E8"/>
      <stop offset="100%" stop-color="#D8D2C2"/>
    </linearGradient>
 
    <!-- Pelican beak pouch gradient -->
    <linearGradient id="pouchGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD266"/>
      <stop offset="60%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E0820E"/>
    </linearGradient>
 
    <linearGradient id="beakTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F4B733"/>
      <stop offset="100%" stop-color="#C97E12"/>
    </linearGradient>
 
    <!-- Wing gradient -->
    <linearGradient id="wingGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F4F1E9"/>
      <stop offset="60%" stop-color="#CFC9BA"/>
      <stop offset="100%" stop-color="#A89F8B"/>
    </linearGradient>
 
    <!-- Bike frame -->
    <linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#A93226"/>
    </linearGradient>
 
    <!-- Bike metal for non-frame -->
    <linearGradient id="metalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#566573"/>
      <stop offset="100%" stop-color="#2C3E50"/>
    </linearGradient>
 
    <!-- Wheel rim -->
    <linearGradient id="rimGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34495E"/>
      <stop offset="50%" stop-color="#1B2631"/>
      <stop offset="100%" stop-color="#5D6D7E"/>
    </linearGradient>
 
    <!-- Tire -->
    <radialGradient id="tireGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2C2C2C"/>
      <stop offset="80%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
 
    <!-- Shadow -->
    <radialGradient id="shadowGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
 
    <!-- Wave highlight -->
    <linearGradient id="waveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
 
    <!-- Sun reflection on water -->
    <linearGradient id="sunReflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE6A0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFE6A0" stop-opacity="0"/>
    </linearGradient>
 
    <!-- Spoke pattern via line, repeated individually -->
    <!-- Cloud -->
    <radialGradient id="cloudGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
 
    <!-- Bike wheel group definition -->
    <g id="wheel">
      <!-- Tire -->
      <circle cx="0" cy="0" r="52" fill="url(#tireGrad)"/>
      <!-- Tire tread highlight -->
      <circle cx="0" cy="0" r="52" fill="none" stroke="#3a3a3a" stroke-width="2"/>
      <!-- Rim -->
      <circle cx="0" cy="0" r="42" fill="none" stroke="url(#rimGrad)" stroke-width="6"/>
      <circle cx="0" cy="0" r="40" fill="none" stroke="#1B2631" stroke-width="1"/>
      <!-- Hub -->
      <circle cx="0" cy="0" r="8" fill="url(#metalGrad)"/>
      <circle cx="0" cy="0" r="3" fill="#1B2631"/>
      <!-- Spokes (12) -->
      <g stroke="#BDC3C7" stroke-width="1.2" opacity="0.9">
        <line x1="0" y1="-40" x2="0" y2="40"/>
        <line x1="-40" y1="0" x2="40" y2="0"/>
        <line x1="-28.3" y1="-28.3" x2="28.3" y2="28.3"/>
        <line x1="-28.3" y1="28.3" x2="28.3" y2="-28.3"/>
        <line x1="-20" y1="-34.6" x2="20" y2="34.6"/>
        <line x1="20" y1="-34.6" x2="-20" y2="34.6"/>
        <line x1="-34.6" y1="-20" x2="34.6" y2="20"/>
        <line x1="-34.6" y1="20" x2="34.6" y2="-20"/>
      </g>
    </g>
 
    <!-- Pedal crank -->
    <g id="crank">
      <circle cx="0" cy="0" r="9" fill="url(#metalGrad)"/>
      <circle cx="0" cy="0" r="3" fill="#1B2631"/>
    </g>
  </defs>
 
  <!-- ============ BACKGROUND ============ -->
  <!-- Sky -->
  <rect x="0" y="0" width="800" height="420" fill="url(#sky)"/>
 
  <!-- Sun glow -->
  <circle cx="600" cy="150" r="180" fill="url(#sunGlow)"/>
  <!-- Sun core -->
  <circle cx="600" cy="150" r="48" fill="url(#sunCore)"/>
 
  <!-- Clouds -->
  <g opacity="0.9">
    <ellipse cx="140" cy="110" rx="70" ry="20" fill="url(#cloudGrad)"/>
    <ellipse cx="170" cy="95" rx="45" ry="18" fill="url(#cloudGrad)"/>
    <ellipse cx="110" cy="100" rx="40" ry="16" fill="url(#cloudGrad)"/>
 
    <ellipse cx="380" cy="70" rx="55" ry="15" fill="url(#cloudGrad)"/>
    <ellipse cx="405" cy="58" rx="35" ry="14" fill="url(#cloudGrad)"/>
  </g>
 
  <!-- Distant seagulls -->
  <g fill="none" stroke="#34495E" stroke-width="2" opacity="0.6" stroke-linecap="round">
    <path d="M 250,140 q 8,-8 16,0 q 8,-8 16,0"/>
    <path d="M 300,120 q 6,-6 12,0 q 6,-6 12,0"/>
    <path d="M 470,135 q 7,-7 14,0 q 7,-7 14,0"/>
  </g>
 
  <!-- ============ OCEAN ============ -->
  <rect x="0" y="320" width="800" height="120" fill="url(#ocean)"/>
 
  <!-- Sun reflection on water -->
  <ellipse cx="600" cy="340" rx="120" ry="8" fill="url(#sunReflect)" opacity="0.7"/>
  <ellipse cx="600" cy="360" rx="90" ry="5" fill="url(#sunReflect)" opacity="0.5"/>
  <ellipse cx="600" cy="380" rx="60" ry="3" fill="url(#sunReflect)" opacity="0.4"/>
 
  <!-- Distant waves/horizon -->
  <rect x="0" y="318" width="800" height="3" fill="#FFFFFF" opacity="0.5"/>
 
  <!-- Wave crests -->
  <g fill="url(#waveGrad)">
    <path d="M 0,360 q 20,-6 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 t 40,0 v 8 H 0 Z" opacity="0.6"/>
    <path d="M 0,390 q 30,-5 60,0 t 60,0 t 60,0 t 60,0 t 60,0 t 60,0 t 60,0 t 60,0 t 60,0 t 60,0 t 60,0 t 60,0 t 60,0 v 10 H 0 Z" opacity="0.5"/>
  </g>
 
  <!-- Foam line where wave meets sand -->
  <path d="M 0,438 q 40,-8 80,-2 t 80,-2 t 80,2 t 80,-3 t 80,2 t 80,-2 t 80,2 t 80,-2 t 80,3 v 12 H 0 Z" fill="#FFFFFF" opacity="0.85"/>
 
  <!-- ============ BEACH ============ -->
  <!-- Wet sand -->
  <rect x="0" y="440" width="800" height="40" fill="url(#wetSand)"/>
  <!-- Dry sand -->
  <rect x="0" y="478" width="800" height="122" fill="url(#drySand)"/>
 
  <!-- Sand texture dots -->
  <g fill="#C9A062" opacity="0.4">
    <circle cx="60" cy="520" r="1.5"/>
    <circle cx="120" cy="540" r="1"/>
    <circle cx="200" cy="500" r="1.5"/>
    <circle cx="280" cy="560" r="1"/>
    <circle cx="350" cy="530" r="2"/>
    <circle cx="430" cy="510" r="1"/>
    <circle cx="510" cy="550" r="1.5"/>
    <circle cx="590" cy="525" r="1"/>
    <circle cx="670" cy="545" r="2"/>
    <circle cx="740" cy="515" r="1.5"/>
    <circle cx="90" cy="575" r="1"/>
    <circle cx="240" cy="585" r="1.5"/>
    <circle cx="400" cy="575" r="1"/>
    <circle cx="560" cy="585" r="1.5"/>
    <circle cx="700" cy="575" r="1"/>
  </g>
 
  <!-- Small shells -->
  <g fill="#F5E6D3" stroke="#D4A574" stroke-width="0.5">
    <path d="M 150,560 l -6,8 l 6,8 l 6,-8 z" opacity="0.8"/>
    <path d="M 620,500 l -4,5 l 4,5 l 4,-5 z" opacity="0.7"/>
    <path d="M 480,590 l -5,6 l 5,6 l 5,-6 z" opacity="0.7"/>
  </g>
 
  <!-- Footprint / tire tracks -->
  <g stroke="#C9A062" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round">
    <path d="M 40,540 q 60,-4 120,0 q 60,4 120,0"/>
  </g>
 
  <!-- ============ SHADOW UNDER BIKE ============ -->
  <ellipse cx="410" cy="515" rx="150" ry="14" fill="url(#shadowGrad)"/>
 
  <!-- ============ BICYCLE ============ -->
  <g id="bicycle">
    <!-- Rear wheel -->
    <g transform="translate(290, 470)">
      <use href="#wheel"/>
    </g>
    <!-- Front wheel -->
    <g transform="translate(530, 470)">
      <use href="#wheel"/>
    </g>
 
    <!-- Frame tubes -->
    <g stroke="url(#frameGrad)" stroke-width="9" stroke-linecap="round" fill="none">
      <!-- Down tube: crank to head tube -->
      <line x1="410" y1="470" x2="510" y2="395"/>
      <!-- Top tube: seat to head -->
      <line x1="375" y1="395" x2="510" y2="395"/>
      <!-- Seat tube: crank to seat post -->
      <line x1="410" y1="470" x2="375" y2="395"/>
      <!-- Chain stay: crank to rear hub -->
      <line x1="410" y1="470" x2="290" y2="470"/>
      <!-- Seat stay: seat to rear hub -->
      <line x1="375" y1="395" x2="290" y2="470"/>
      <!-- Fork: head tube to front hub -->
      <line x1="510" y1="395" x2="530" y2="470"/>
    </g>
 
    <!-- Head tube badge highlight -->
    <circle cx="510" cy="395" r="6" fill="#C0392B"/>
 
    <!-- Chain -->
    <g stroke="#2C3E50" stroke-width="2" fill="none" opacity="0.8" stroke-dasharray="3,2">
      <line x1="410" y1="470" x2="290" y2="470"/>
    </g>
    <circle cx="290" cy="470" r="14" fill="none" stroke="#1B2631" stroke-width="3"/>
    <!-- Chainring (front gear) -->
    <circle cx="410" cy="470" r="16" fill="url(#metalGrad)"/>
    <circle cx="410" cy="470" r="16" fill="none" stroke="#1B2631" stroke-width="1.5"/>
    <g stroke="#7F8C8D" stroke-width="1" opacity="0.7">
      <line x1="396" y1="470" x2="424" y2="470"/>
      <line x1="410" y1="456" x2="410" y2="484"/>
      <line x1="400" y1="460" x2="420" y2="480"/>
      <line x1="400" y1="480" x2="420" y2="460"/>
    </g>
    <circle cx="410" cy="470" r="4" fill="#1B2631"/>
 
    <!-- Pedals (rotated to show motion) -->
    <g transform="translate(410, 470)">
      <line x1="-22" y1="-10" x2="22" y2="10" stroke="url(#metalGrad)" stroke-width="4" stroke-linecap="round"/>
      <!-- Pedal 1 -->
      <rect x="-32" y="-14" width="18" height="6" rx="2" fill="#2C3E50"/>
      <!-- Pedal 2 -->
      <rect x="14" y="8" width="18" height="6" rx="2" fill="#2C3E50"/>
    </g>
 
    <!-- Handlebars -->
    <g stroke="url(#metalGrad)" stroke-width="6" stroke-linecap="round" fill="none">
      <line x1="510" y1="395" x2="500" y2="360"/>
      <line x1="500" y1="360" x2="525" y2="350"/>
      <line x1="500" y1="360" x2="475" y2="358"/>
    </g>
    <!-- Grips -->
    <line x1="523" y1="350" x2="530" y2="348" stroke="#1B2631" stroke-width="7" stroke-linecap="round"/>
    <line x1="475" y1="358" x2="468" y2="359" stroke="#1B2631" stroke-width="7" stroke-linecap="round"/>
    <!-- Bell -->
    <circle cx="478" cy="350" r="5" fill="#E74C3C"/>
 
    <!-- Seat post + saddle -->
    <line x1="375" y1="395" x2="372" y2="370" stroke="url(#metalGrad)" stroke-width="5" stroke-linecap="round"/>
    <path d="M 355,372 q 18,-10 36,0 q -4,8 -18,8 q -14,0 -18,-8 z" fill="#1B2631"/>
    <path d="M 358,372 q 14,-7 30,0" stroke="#34495E" stroke-width="1" fill="none"/>
 
    <!-- Basket on front -->
    <g>
      <path d="M 495,378 l 5,28 l 30,0 l 5,-28 z" fill="#D4A574" stroke="#A87444" stroke-width="1.5"/>
      <g stroke="#A87444" stroke-width="1" opacity="0.7">
        <line x1="500" y1="390" x2="530" y2="390"/>
        <line x1="502" y1="400" x2="528" y2="400"/>
        <line x1="505" y1="378" x2="510" y2="406"/>
        <line x1="515" y1="378" x2="518" y2="406"/>
        <line x1="525" y1="378" x2="525" y2="406"/>
      </g>
      <!-- A fish in the basket! -->
      <ellipse cx="515" cy="372" rx="16" ry="7" fill="#7FB3D5"/>
      <path d="M 499,372 l -8,-5 l 0,10 z" fill="#7FB3D5"/>
      <circle cx="522" cy="370" r="1.5" fill="#1B2631"/>
    </g>
  </g>
 
  <!-- ============ PELICAN ============ -->
  <g id="pelican">
    <!-- Legs pedaling (back leg pushing down) -->
    <g stroke="#E0A85C" stroke-width="7" stroke-linecap="round" fill="none">
      <!-- Right leg (forward, up) -->
      <path d="M 420,400 q 5,15 -5,30 q 0,12 8,18"/>
      <!-- Left leg (down stroke) -->
      <path d="M 405,400 q 5,25 20,35 q 8,5 12,18"/>
    </g>
    <!-- Webbed feet on pedals -->
    <g fill="#E0A85C" stroke="#C9904A" stroke-width="1">
      <path d="M 415,448 l -6,8 q 0,4 6,4 q 6,0 6,-4 z"/>
      <path d="M 433,468 l -7,8 q 0,4 7,4 q 7,0 7,-4 z"/>
    </g>
 
    <!-- Tail feathers -->
    <path d="M 320,355 q -28,-8 -38,5 q -5,8 4,12 q 14,2 36,-4 z" fill="url(#wingGrad)" stroke="#9A9078" stroke-width="1"/>
    <g stroke="#9A9078" stroke-width="1" fill="none" opacity="0.6">
      <path d="M 290,358 q 12,2 24,0"/>
      <path d="M 295,363 q 10,2 22,-1"/>
    </g>
 
    <!-- Body (egg-shaped) -->
    <ellipse cx="385" cy="365" rx="75" ry="52" fill="url(#bodyGrad)"/>
    <!-- Body shadow underside -->
    <ellipse cx="385" cy="390" rx="68" ry="22" fill="#D8D2C2" opacity="0.5"/>
 
    <!-- Wing (covering part of body, slightly raised as if steering) -->
    <path d="M 360,330 q 45,-25 75,5 q 8,15 -8,28 q -30,10 -60,-2 q -18,-12 -7,-31 z" fill="url(#wingGrad)" stroke="#A89F8B" stroke-width="1.5"/>
    <!-- Wing feather lines -->
    <g stroke="#9A9078" stroke-width="1.2" fill="none" opacity="0.7">
      <path d="M 370,345 q 25,8 55,2"/>
      <path d="M 375,355 q 22,8 50,0"/>
      <path d="M 380,365 q 20,6 42,-2"/>
    </g>
    <!-- Wing tip feathers -->
    <g fill="url(#wingGrad)" stroke="#9A9078" stroke-width="1">
      <path d="M 435,335 q 12,-2 15,8 q -2,8 -12,6 z"/>
      <path d="M 428,328 q 12,-3 14,6 q -2,7 -11,5 z"/>
    </g>
 
    <!-- Neck (curving up to head) -->
    <path d="M 445,335 q 20,-20 18,-50 q -2,-15 -14,-18 q 22,5 22,30 q 0,28 -18,48 q -8,2 -8,-10 z" fill="url(#bodyGrad)" stroke="#D8D2C2" stroke-width="1"/>
    <!-- Neck back -->
    <path d="M 455,328 q 25,-25 12,-58" fill="none" stroke="#C9C2B0" stroke-width="1"/>
 
    <!-- Head -->
    <ellipse cx="468" cy="270" rx="32" ry="28" fill="url(#bodyGrad)"/>
 
    <!-- Head tuft (breeding crest) -->
    <path d="M 455,248 q -8,-12 2,-18 q 10,-2 12,10 q 2,8 -6,12 z" fill="url(#wingGrad)" stroke="#9A9078" stroke-width="1"/>
 
    <!-- Eye region (light patch around eye, characteristic of pelicans) -->
    <ellipse cx="480" cy="265" rx="12" ry="9" fill="#FFFFFF" opacity="0.6"/>
    <!-- Eye -->
    <circle cx="482" cy="265" r="5.5" fill="#1B2631"/>
    <circle cx="484" cy="263" r="1.8" fill="#FFFFFF"/>
    <!-- Eyebrow (giving expression) -->
    <path d="M 475,256 q 7,-3 13,1" stroke="#8B7355" stroke-width="1.5" fill="none" stroke-linecap="round"/>
 
    <!-- Cheek blush (vivid detail) -->
    <ellipse cx="471" cy="278" rx="6" ry="3.5" fill="#F5A623" opacity="0.4"/>
 
    <!-- Upper beak (long, straight, hooked tip) -->
    <path d="M 492,262 q 45,-6 75,2 q 8,3 6,9 q -2,4 -10,3 q -30,-4 -70,2 q -6,-2 -1,-16 z" fill="url(#beakTop)" stroke="#B07A0E" stroke-width="1"/>
    <!-- Hooked tip of upper beak -->
    <path d="M 565,266 q 8,2 8,8 q -2,4 -8,2 z" fill="#A0660E"/>
 
    <!-- Lower beak / throat pouch (the famous pelican pouch!) -->
    <path d="M 492,275 q 30,5 55,2 q 5,30 -20,42 q -25,8 -42,-8 q -12,-18 7,-36 z" fill="url(#pouchGrad)" stroke="#D18A0E" stroke-width="1.2"/>
    <!-- Pouch wrinkles (texture lines) -->
    <g stroke="#E8A020" stroke-width="0.8" fill="none" opacity="0.7">
      <path d="M 498,285 q 18,8 38,4"/>
      <path d="M 500,295 q 18,10 35,8"/>
      <path d="M 505,305 q 15,10 28,12"/>
      <path d="M 513,313 q 12,8 22,10"/>
    </g>
    <!-- Pouch highlight -->
    <path d="M 500,278 q 22,4 40,1" stroke="#FFE08A" stroke-width="1.5" fill="none" opacity="0.8"/>
 
    <!-- Nostril -->
    <ellipse cx="510" cy="266" rx="2" ry="1" fill="#8B5A0E"/>
 
    <!-- A little scarf fluttering in the wind -->
    <g>
      <path d="M 450,295 q -25,5 -42,18 q -8,8 -2,12 q 18,-6 38,-14 q 10,-6 6,-16 z" fill="#3498DB" opacity="0.9" stroke="#2980B9" stroke-width="1"/>
      <path d="M 450,295 q -22,3 -38,14" stroke="#5DADE2" stroke-width="1" fill="none" opacity="0.6"/>
      <!-- Scarf tail ends -->
      <path d="M 408,313 q -8,6 -6,14 q 4,4 8,-2 z" fill="#3498DB" stroke="#2980B9" stroke-width="1"/>
    </g>
 
    <!-- Wing holding handlebar (small arm extending to handlebar) -->
    <path d="M 440,345 q 30,15 60,12" stroke="url(#wingGrad)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M 440,345 q 30,15 60,12" stroke="#A89F8B" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.3"/>
  </g>
 
  <!-- ============ FOREGROUND DETAILS ============ -->
  <!-- Motion/speed lines behind bike -->
  <g stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.55">
    <line x1="180" y1="455" x2="230" y2="455"/>
    <line x1="150" y1="475" x2="215" y2="475"/>
    <line x1="170" y1="495" x2="225" y2="495"/>
    <line x1="195" y1="515" x2="235" y2="515"/>
  </g>
 
  <!-- Sand kicked up behind rear wheel -->
  <g fill="#E8C89A" opacity="0.8">
    <circle cx="240" cy="490" r="2.5"/>
    <circle cx="225" cy="500" r="2"/>
    <circle cx="255" cy="495" r="1.5"/>
    <circle cx="210" cy="485" r="1.5"/>
    <circle cx="270" cy="505" r="2"/>
    <circle cx="200" cy="510" r="1.5"/>
  </g>
 
  <!-- Small foam bubbles near water -->
  <g fill="#FFFFFF" opacity="0.7">
    <circle cx="60" cy="445" r="2"/>
    <circle cx="75" cy="448" r="1.5"/>
    <circle cx="700" cy="446" r="2"/>
    <circle cx="715" cy="449" r="1.5"/>
  </g>
 
  <!-- A starfish on the sand -->
  <g transform="translate(680, 560)" fill="#E55934" stroke="#C0392B" stroke-width="1">
    <path d="M 0,-12 L 4,-4 L 12,-3 L 6,3 L 8,12 L 0,7 L -8,12 L -6,3 L -12,-3 L -4,-4 Z"/>
    <circle cx="0" cy="0" r="2" fill="#F5B7B1"/>
  </g>
 
  <!-- Palm frond in corner -->
  <g transform="translate(40,470)" opacity="0.85">
    <path d="M 0,0 q -5,-40 5,-80" stroke="#7D5A3C" stroke-width="4" fill="none"/>
