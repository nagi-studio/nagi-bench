<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" style="max-width:100%;height:auto;display:block">
<title id="title">海边骑自行车的鹈鹕</title>
<desc id="desc">一只羽毛细腻的褐鹈鹕迎着海风，骑青绿色自行车沿阳光下的海岸前行。</desc>
<defs>
