  <linearGradient id="wing" x2="1" y2="1"><stop stop-color="#8e7760"/><stop offset=".5" stop-color="#51443d"/><stop offset="1" stop-color="#252b2d"/></linearGradient>
  <linearGradient id="neck" x2="1" y2=".8"><stop stop-color="#fff8df"/><stop offset=".5" stop-color="#d8c8a9"/><stop offset="1" stop-color="#806c5d"/></linearGradient>
