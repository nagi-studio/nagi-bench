  </g>
  <style>
    .rw,.fw{animation:spin 1.6s linear infinite}.rw{transform-origin:540px 700px}.fw{transform-origin:1110px 700px}.rider{animation:bob 1.6s ease-in-out infinite}.head{transform-origin:1020px 245px;animation:nod 3.2s ease-in-out infinite}.foam{animation:drift 6s linear infinite}.flecks{animation:fleck 2s ease-out infinite}
    @keyframes spin{to{transform:rotate(360deg)}}@keyframes bob{50%{transform:translateY(3px)}}@keyframes nod{50%{transform:rotate(1.3deg)}}@keyframes drift{to{stroke-dashoffset:-180}}@keyframes fleck{0%{opacity:0}35%{opacity:.7}to{opacity:0;transform:translate(-42px,-10px)}}
    @media(prefers-reduced-motion:reduce){.rw,.fw,.rider,.head,.foam,.flecks{animation:none!important}}
  </style>
