  <linearGradient id="paint" x2="1" y2="1"><stop stop-color="#65c2b4"/><stop offset=".4" stop-color="#167c78"/><stop offset="1" stop-color="#0b4e54"/></linearGradient>
  <filter id="shadow" x="-30%" y="-80%" width="160%" height="260%"><feGaussianBlur stdDeviation="12"/></filter>
  <g id="wheel"><circle r="145" fill="none" stroke="#172326" stroke-width="14"/><circle r="136" fill="none" stroke="#cad5d2" stroke-width="3"/>
