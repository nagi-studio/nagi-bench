<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="40%" stop-color="#B0E0F6"/>
      <stop offset="100%" stop-color="#E0F4FF"/>
    </linearGradient>
    <!-- Ocean gradient -->
    <linearGradient id="ocean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E90AA"/>
      <stop offset="50%" stop-color="#2BA5C0"/>
      <stop offset="100%" stop-color="#5CC8D8"/>
    </linearGradient>
    <!-- Sand gradient -->
    <linearGradient id="sand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5DEB3"/>
      <stop offset="100%" stop-color="#E8C97A"/>
    </linearGradient>
    <!-- Sun glow -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="60%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </radialGradient>
    <!-- Pelican body gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <!-- Wing gradient -->
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="50%" stop-color="#2C2C2C"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <!-- Beak gradient -->
    <linearGradient id="beakGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F4A830"/>
      <stop offset="100%" stop-color="#E88B1A"/>
    </linearGradient>
    <!-- Pouch gradient -->
    <linearGradient id="pouchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4A830"/>
      <stop offset="100%" stop-color="#D4781A"/>
    </linearGradient>
  </defs>

  <!-- === BACKGROUND === -->
  <!-- Sky -->
  <rect x="0" y="0" width="900" height="600" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="750" cy="90" r="60" fill="url(#sunGlow)"/>
  <circle cx="750" cy="90" r="35" fill="#FFE082"/>

  <!-- Clouds -->
  <g opacity="0.9">
    <ellipse cx="150" cy="80" rx="60" ry="25" fill="white"/>
    <ellipse cx="200" cy="70" rx="50" ry="22" fill="white"/>
    <ellipse cx="110" cy="75" rx="40" ry="18" fill="white"/>
  </g>
  <g opacity="0.7">
    <ellipse cx="550" cy="120" rx="45" ry="18" fill="white"/>
    <ellipse cx="590" cy="112" rx="38" ry="16" fill="white"/>
    <ellipse cx="520" cy="115" rx="30" ry="14" fill="white"/>
  </g>
  <g opacity="0.5">
    <ellipse cx="380" cy="55" rx="35" ry="14" fill="white"/>
    <ellipse cx="410" cy="48" rx="28" ry="12" fill="white"/>
  </g>

  <!-- Ocean -->
  <path d="M0 320 Q100 310 200 320 Q300 330 400 318 Q500 306 600 320 Q700 334 800 318 Q850 312 900 320 L900 440 L0 440 Z" fill="url(#ocean)"/>

  <!-- Waves -->
  <path d="M0 340 Q50 335 100 340 Q150 345 200 340 Q250 335 300 340 Q350 345 400 338 Q450 332 500 340 Q550 348 600 340 Q650 332 700 340 Q750 348 800 340 Q850 332 900 340" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <path d="M0 360 Q60 354 120 360 Q180 366 240 360 Q300 354 360 360 Q420 366 480 358 Q540 352 600 360 Q660 368 720 360 Q780 352 840 360 Q870 364 900 360" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.35"/>
  <path d="M0 380 Q70 374 140 380 Q210 386 280 380 Q350 374 420 380 Q490 386 560 378 Q630 372 700 380 Q770 388 840 380 Q870 376 900 380" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.25"/>

  <!-- Foam line at shore -->
  <path d="M0 430 Q50 425 100 430 Q150 435 200 428 Q250 422 300 430 Q350 438 400 430 Q450 422 500 430 Q550 438 600 428 Q650 420 700 430 Q750 440 800 430 Q850 422 900 430" fill="none" stroke="white" stroke-width="3" opacity="0.7"/>

  <!-- Sand / Beach -->
  <path d="M0 430 Q100 422 200 430 Q300 438 400 428 Q500 420 600 430 Q700 440 800 428 Q850 424 900 430 L900 600 L0 600 Z" fill="url(#sand)"/>

  <!-- Sand texture dots -->
  <g fill="#D4A855" opacity="0.4">
    <circle cx="100" cy="500" r="2"/>
    <circle cx="200" cy="520" r="1.5"/>
    <circle cx="350" cy="490" r="2"/>
    <circle cx="500" cy="530" r="1.5"/>
    <circle cx="650" cy="510" r="2"/>
    <circle cx="750" cy="540" r="1.5"/>
    <circle cx="300" cy="560" r="2"/>
    <circle cx="600" cy="570" r="1.5"/>
    <circle cx="450" cy="480" r="1.5"/>
    <circle cx="820" cy="490" r="2"/>
  </g>

  <!-- Beach grass -->
  <g stroke="#6B8E23" stroke-width="2" fill="none" opacity="0.7">
    <path d="M60 600 Q55 560 65 530"/>
    <path d="M70 600 Q72 555 60 525"/>
    <path d="M80 600 Q85 560 75 535"/>
    <path d="M830 600 Q825 565 835 540"/>
    <path d="M840 600 Q845 560 835 530"/>
    <path d="M850 600 Q855 570 845 545"/>
  </g>

  <!-- Distant sailboat -->
  <g transform="translate(680, 280)">
    <path d="M0 20 L5 0 L10 20 Z" fill="white" opacity="0.8"/>
    <path d="M5 2 L5 20 L15 18 Z" fill="#F0F0F0" opacity="0.7"/>
    <rect x="2" y="20" width="12" height="3" rx="1" fill="#8B4513" opacity="0.6"/>
  </g>

  <!-- Seagulls in distance -->
  <g stroke="#555" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M300 150 Q305 145 310 148 Q315 145 320 150"/>
    <path d="M340 170 Q344 166 348 168 Q352 166 356 170"/>
    <path d="M270 180 Q273 177 276 179 Q279 177 282 180"/>
  </g>

  <!-- === BICYCLE === -->
  <g transform="translate(350, 380)">
    <!-- Rear wheel -->
    <circle cx="0" cy="90" r="52" fill="none" stroke="#333" stroke-width="5"/>
    <circle cx="0" cy="90" r="48" fill="none" stroke="#555" stroke-width="1.5"/>
    <circle cx="0" cy="90" r="6" fill="#666"/>
    <!-- Rear spokes -->
    <g stroke="#888" stroke-width="1">
      <line x1="0" y1="42" x2="0" y2="138"/>
      <line x1="-48" y1="90" x2="48" y2="90"/>
      <line x1="-34" y1="56" x2="34" y2="124"/>
      <line x1="34" y1="56" x2="-34" y2="124"/>
      <line x1="-17" y1="44" x2="17" y2="136"/>
      <line x1="17" y1="44" x2="-17" y2="136"/>
      <line x1="-46" y1="72" x2="46" y2="108"/>
      <line x1="46" y1="72" x2="-46" y2="108"/>
    </g>

    <!-- Front wheel -->
    <circle cx="150" cy="90" r="52" fill="none" stroke="#333" stroke-width="5"/>
    <circle cx="150" cy="90" r="48" fill="none" stroke="#555" stroke-width="1.5"/>
    <circle cx="150" cy="90" r="6" fill="#666"/>
    <!-- Front spokes -->
    <g stroke="#888" stroke-width="1">
      <line x1="150" y1="42" x2="150" y2="138"/>
      <line x1="102" y1="90" x2="198" y2="90"/>
      <line x1="116" y1="56" x2="184" y2="124"/>
      <line x1="184" y1="56" x2="116" y2="124"/>
      <line x1="133" y1="44" x2="167" y2="136"/>
      <line x1="167" y1="44" x2="133" y2="136"/>
      <line x1="104" y1="72" x2="196" y2="108"/>
      <line x1="196" y1="72" x2="104" y2="108"/>
    </g>

    <!-- Frame -->
    <g stroke="#CC2222" stroke-width="5" fill="none" stroke-linecap="round">
      <!-- Seat tube -->
      <line x1="45" y1="35" x2="60" y2="90"/>
      <!-- Down tube -->
      <line x1="60" y1="90" x2="140" y2="45"/>
      <!-- Top tube -->
      <line x1="45" y1="35" x2="130" y2="38"/>
      <!-- Head tube to front wheel -->
      <line x1="130" y1="38" x2="150" y2="90"/>
      <!-- Chain stay -->
      <line x1="0" y1="90" x2="60" y2="90"/>
      <!-- Seat stay -->
      <line x1="0" y1="90" x2="45" y2="35"/>
      <!-- Fork -->
      <line x1="140" y1="45" x2="150" y2="90"/>
    </g>

    <!-- Handlebar -->
    <path d="M128 30 Q135 25 142 30 Q148 35 145 42" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <!-- Handlebar grip -->
    <circle cx="128" cy="29" r="3" fill="#222"/>

    <!-- Seat -->
    <ellipse cx="42" cy="30" rx="14" ry="6" fill="#3A2A1A"/>
    <ellipse cx="42" cy="29" rx="12" ry="5" fill="#5A3A2A"/>

    <!-- Pedals & crank -->
    <circle cx="60" cy="90" r="10" fill="none" stroke="#555" stroke-width="3"/>
    <!-- Pedal arms -->
    <line x1="60" y1="90" x2="45" y2="105" stroke="#444" stroke-width="3"/>
    <line x1="60" y1="90" x2="75" y2="75" stroke="#444" stroke-width="3"/>
    <!-- Pedals -->
    <rect x="38" y="103" width="14" height="5" rx="2" fill="#333"/>
    <rect x="68" y="72" width="14" height="5" rx="2" fill="#333"/>

    <!-- Chain -->
    <path d="M10 90 Q35 100 60 90" fill="none" stroke="#444" stroke-width="2" stroke-dasharray="3,2"/>
  </g>

  <!-- === PELICAN === -->
  <g transform="translate(350, 380)">
    <!-- Tail feathers -->
    <path d="M-15 -10 Q-35 -20 -40 -5 Q-38 5 -20 0 Z" fill="#3A3A3A"/>
    <path d="M-12 -5 Q-30 -12 -35 0 Q-32 8 -15 5 Z" fill="#4A4A4A"/>

    <!-- Body -->
    <ellipse cx="30" cy="-15" rx="50" ry="35" fill="url(#bodyGrad)" stroke="#DDD" stroke-width="0.5"/>

    <!-- Wing (folded) -->
    <path d="M5 -30 Q30 -45 60 -30 Q65 -15 55 0 Q35 10 10 0 Q0 -15 5 -30 Z" fill="url(#wingGrad)"/>
    <!-- Wing feather details -->
    <path d="M15 -25 Q30 -35 50 -25" fill="none" stroke="#5A5A5A" stroke-width="1"/>
    <path d="M12 -15 Q30 -25 52 -15" fill="none" stroke="#5A5A5A" stroke-width="1"/>
    <path d="M14 -5 Q30 -12 50 -5" fill="none" stroke="#5A5A5A" stroke-width="1"/>

    <!-- Neck -->
    <path d="M60 -30 Q75 -50 80 -70 Q83 -85 85 -95" fill="none" stroke="url(#bodyGrad)" stroke-width="16" stroke-linecap="round"/>
    <path d="M60 -30 Q75 -50 80 -70 Q83 -85 85 -95" fill="none" stroke="#F5F5F5" stroke-width="14" stroke-linecap="round"/>

    <!-- Head -->
    <ellipse cx="88" cy="-105" rx="16" ry="14" fill="#FAFAFA"/>
    <!-- Head crest feathers -->
    <path d="M80 -118 Q85 -128 90 -120" fill="none" stroke="#E8D8A0" stroke-width="2"/>
    <path d="M84 -119 Q88 -130 93 -121" fill="none" stroke="#E8D8A0" stroke-width="1.5"/>

    <!-- Eye -->
    <circle cx="93" cy="-110" r="5" fill="white" stroke="#333" stroke-width="1"/>
    <circle cx="94" cy="-110" r="2.5" fill="#1A1A1A"/>
    <circle cx="95" cy="-111" r="1" fill="white"/>

    <!-- Upper beak -->
    <path d="M102 -108 Q125 -106 145 -100 Q148 -98 145 -96 Q125 -98 102 -100 Z" fill="url(#beakGrad)" stroke="#D07010" stroke-width="0.5"/>
    <!-- Beak hook tip -->
    <path d="M143 -100 Q148 -98 146 -94 Q144 -96 143 -96 Z" fill="#CC6600"/>

    <!-- Lower beak / Pouch -->
    <path d="M102 -99 Q120 -96 140 -95 Q135 -80 120 -78 Q105 -80 100 -90 Z" fill="url(#pouchGrad)" opacity="0.9"/>
    <!-- Pouch texture lines -->
    <path d="M105 -95 Q115 -88 125 -85" fill="none" stroke="#C06818" stroke-width="0.5" opacity="0.5"/>
    <path d="M107 -92 Q115 -85 122 -82" fill="none" stroke="#C06818" stroke-width="0.5" opacity="0.5"/>

    <!-- Legs on pedals -->
    <!-- Left leg (on lower pedal) -->
    <path d="M25 15 Q30 40 38 60 Q42 80 45 103" fill="none" stroke="#F4A830" stroke-width="5" stroke-linecap="round"/>
    <!-- Left foot on pedal -->
    <path d="M40 103 L52 106 L52 108 L38 108 L38 105 Z" fill="#F4A830"/>

    <!-- Right leg (on upper pedal) -->
    <path d="M35 10 Q50 30 60 50 Q68 62 75 74" fill="none" stroke="#E89820" stroke-width="5" stroke-linecap="round"/>
    <!-- Right foot on pedal -->
    <path d="M70 73 L82 75 L82 77 L68 77 L68 75 Z" fill="#E89820"/>

    <!-- Wing/arm holding handlebar -->
    <path d="M55 -20 Q80 -10 105 5 Q120 15 128 28" fill="none" stroke="#3A3A3A" stroke-width="6" stroke-linecap="round"/>
    <path d="M55 -20 Q80 -10 105 5 Q120 15 128 28" fill="none" stroke="#4A4A4A" stroke-width="4" stroke-linecap="round"/>
    <!-- Wing tip / "hand" on handlebar -->
    <ellipse cx="128" cy="29" rx="6" ry="4" fill="#3A3A3A"/>
  </g>

  <!-- === FOREGROUND DETAILS === -->
  <!-- Small shells on beach -->
  <g opacity="0.6">
    <path d="M180 520 Q183 515 186 520 Q183 522 180 520 Z" fill="#F0C8A0"/>
    <path d="M620 550 Q624 544 628 550 Q624 553 620 550 Z" fill="#E8B890"/>
    <ellipse cx="720" cy="530" rx="4" ry="3" fill="#F5D5B5"/>
  </g>

  <!-- Starfish -->
  <g transform="translate(150, 555) scale(0.6)" fill="#E87040" opacity="0.7">
    <path d="M0 -15 L4 -4 L15 -5 L7 3 L10 14 L0 8 L-10 14 L-7 3 L-15 -5 L-4 -4 Z"/>
  </g>

  <!-- Footprints in sand (behind bicycle) -->
  <g fill="#D4A050" opacity="0.3">
    <ellipse cx="250" cy="500" rx="5" ry="8"/>
    <ellipse cx="265" cy="515" rx="5" ry="8"/>
    <ellipse cx="248" cy="530" rx="5" ry="8"/>
  </g>

  <!-- Motion lines behind bicycle -->
  <g stroke="#AAA" stroke-width="1.5" opacity="0.4" stroke-linecap="round">
    <line x1="280" y1="450" x2="250" y2="450"/>
    <line x1="285" y1="465" x2="245" y2="465"/>
    <line x1="280" y1="480" x2="255" y2="480"/>
  </g>
</svg>
