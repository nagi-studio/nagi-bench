<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640" role="img" aria-label="A pelican riding a bicycle along a seaside boardwalk at golden hour">
  <defs>
    <!-- Sky gradient: warm golden-hour seaside sky -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7ec4e8"/>
      <stop offset="0.45" stop-color="#aedcf0"/>
      <stop offset="0.75" stop-color="#fbe3b8"/>
      <stop offset="1" stop-color="#ffd9a0"/>
    </linearGradient>
    <!-- Sea gradient -->
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e8fb8"/>
      <stop offset="0.5" stop-color="#3aa3c4"/>
      <stop offset="1" stop-color="#6cc6d8"/>
    </linearGradient>
    <!-- Sand gradient -->
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2d9a8"/>
      <stop offset="1" stop-color="#e3bd82"/>
    </linearGradient>
    <!-- Boardwalk gradient -->
    <linearGradient id="boardwalk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c89b66"/>
      <stop offset="1" stop-color="#a87b4a"/>
    </linearGradient>
    <!-- Pelican body shading -->
    <linearGradient id="bodyShade" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#f2ece2"/>
      <stop offset="1" stop-color="#d9cdb8"/>
    </linearGradient>
    <linearGradient id="wingShade" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#f7f2e8"/>
      <stop offset="0.7" stop-color="#e0d6c2"/>
      <stop offset="1" stop-color="#c4b69c"/>
    </linearGradient>
    <!-- Beak gradient -->
    <linearGradient id="beak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb24d"/>
      <stop offset="0.6" stop-color="#f8923a"/>
      <stop offset="1" stop-color="#e3702a"/>
    </linearGradient>
    <linearGradient id="pouch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc97a"/>
      <stop offset="1" stop-color="#f09a48"/>
    </linearGradient>
    <!-- Sun glow -->
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff6d8" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#ffe9a8" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffe9a8" stop-opacity="0"/>
    </radialGradient>
    <!-- Bike frame metal -->
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e84855"/>
      <stop offset="1" stop-color="#b32638"/>
    </linearGradient>
    <radialGradient id="cloudSoft" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ====================== SKY ====================== -->
  <rect width="960" height="400" fill="url(#sky)"/>
  <circle cx="745" cy="138" r="120" fill="url(#sunGlow)"/>
  <circle cx="745" cy="138" r="42" fill="#fff3c4"/>
  <circle cx="745" cy="138" r="34" fill="#fffbe8"/>

  <!-- Clouds -->
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="170" cy="95" rx="62" ry="17"/>
    <ellipse cx="205" cy="80" rx="44" ry="15"/>
    <ellipse cx="135" cy="82" rx="35" ry="12"/>
  </g>
  <g fill="#ffffff" opacity="0.7">
    <ellipse cx="480" cy="60" rx="50" ry="13"/>
    <ellipse cx="515" cy="48" rx="32" ry="11"/>
  </g>
  <g fill="#ffffff" opacity="0.6">
    <ellipse cx="860" cy="220" rx="46" ry="11"/>
    <ellipse cx="890" cy="208" rx="28" ry="9"/>
  </g>
  <ellipse cx="330" cy="150" rx="90" ry="26" fill="url(#cloudSoft)" opacity="0.8"/>

  <!-- Distant gulls -->
  <g stroke="#5a6b78" stroke-width="2.4" fill="none" stroke-linecap="round">
    <path d="M 580 110 q 9 -9 18 0 q 9 -9 18 0"/>
    <path d="M 640 88 q 7 -7 14 0 q 7 -7 14 0"/>
    <path d="M 545 142 q 6 -6 12 0 q 6 -6 12 0"/>
  </g>

  <!-- ====================== SEA ====================== -->
  <rect x="0" y="300" width="960" height="110" fill="url(#sea)"/>
  <!-- Horizon highlight -->
  <rect x="0" y="300" width="960" height="4" fill="#bfe8f2" opacity="0.8"/>
  <!-- Sun reflection path on water -->
  <g fill="#ffe9b0">
    <ellipse cx="745" cy="318" rx="58" ry="4" opacity="0.7"/>
    <ellipse cx="738" cy="330" rx="44" ry="3.6" opacity="0.6"/>
    <ellipse cx="752" cy="343" rx="50" ry="3.4" opacity="0.55"/>
    <ellipse cx="742" cy="356" rx="36" ry="3" opacity="0.5"/>
    <ellipse cx="748" cy="370" rx="42" ry="3" opacity="0.45"/>
    <ellipse cx="740" cy="384" rx="30" ry="2.6" opacity="0.4"/>
  </g>
  <!-- Wave glints -->
  <g stroke="#cdeef5" stroke-width="2.6" stroke-linecap="round" opacity="0.75" fill="none">
    <path d="M 50 326 q 16 -5 32 0"/>
    <path d="M 130 346 q 14 -4 28 0"/>
    <path d="M 235 322 q 18 -5 36 0"/>
    <path d="M 330 352 q 14 -4 28 0"/>
    <path d="M 420 330 q 16 -5 32 0"/>
    <path d="M 530 360 q 14 -4 28 0"/>
    <path d="M 620 336 q 15 -4 30 0"/>
    <path d="M 855 340 q 14 -4 28 0"/>
    <path d="M 90 372 q 15 -4 30 0"/>
    <path d="M 280 382 q 16 -5 32 0"/>
    <path d="M 480 388 q 14 -4 28 0"/>
    <path d="M 660 376 q 13 -4 26 0"/>
  </g>
  <!-- Sailboat -->
  <g>
    <path d="M 150 296 l 0 -34 l 22 32 z" fill="#fdfaf2"/>
    <path d="M 146 296 l 0 -26 l -14 24 z" fill="#f3e8d2"/>
    <path d="M 132 298 q 22 9 44 0 l -5 8 q -17 6 -34 0 z" fill="#c0392b"/>
  </g>

  <!-- Surf foam where sea meets sand -->
  <path d="M 0 408 q 60 -10 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 V 424 H 0 Z" fill="#eaf7f5"/>
  <path d="M 0 414 q 80 -8 160 0 t 160 0 t 160 0 t 160 0 t 160 0 t 160 0 V 430 H 0 Z" fill="#f7ede0" opacity="0.9"/>

  <!-- ====================== BEACH ====================== -->
  <rect x="0" y="420" width="960" height="100" fill="url(#sand)"/>
  <!-- sand speckles -->
  <g fill="#c79a5e" opacity="0.55">
    <circle cx="80" cy="450" r="2.2"/><circle cx="190" cy="470" r="1.8"/>
    <circle cx="300" cy="444" r="2"/><circle cx="420" cy="478" r="1.7"/>
    <circle cx="560" cy="452" r="2.1"/><circle cx="700" cy="468" r="1.8"/>
    <circle cx="840" cy="446" r="2"/><circle cx="910" cy="476" r="1.6"/>
    <circle cx="140" cy="488" r="1.6"/><circle cx="640" cy="486" r="1.7"/>
  </g>
  <!-- Starfish -->
  <g transform="translate(118 470) scale(0.9)" fill="#e76f51">
    <path d="M 0 -14 L 4 -4 L 14 -3 L 6 4 L 9 14 L 0 8 L -9 14 L -6 4 L -14 -3 L -4 -4 Z"/>
    <circle cx="0" cy="0" r="2.4" fill="#f4a261"/>
  </g>
  <!-- Seashells -->
  <g transform="translate(835 462)">
    <path d="M 0 0 a 11 11 0 0 1 22 0 z" fill="#f6e7d7"/>
    <path d="M 4 0 a 7 7 0 0 1 14 0" fill="none" stroke="#d8b394" stroke-width="1.6"/>
    <path d="M 11 -10 L 11 0" stroke="#d8b394" stroke-width="1.4"/>
  </g>
  <!-- Beach grass tuft -->
  <g stroke="#7da45c" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M 52 510 q -4 -26 -14 -38"/>
    <path d="M 56 510 q 0 -30 4 -42"/>
    <path d="M 60 510 q 6 -24 18 -34"/>
  </g>
  <g stroke="#8fb86d" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M 906 512 q -3 -22 -12 -32"/>
    <path d="M 910 512 q 2 -26 8 -36"/>
  </g>

  <!-- ====================== BOARDWALK ====================== -->
  <rect x="0" y="520" width="960" height="120" fill="url(#boardwalk)"/>
  <g stroke="#8a6038" stroke-width="3">
    <line x1="0" y1="548" x2="960" y2="548"/>
    <line x1="0" y1="578" x2="960" y2="578"/>
    <line x1="0" y1="610" x2="960" y2="610"/>
  </g>
  <g stroke="#8a6038" stroke-width="2.4" opacity="0.85">
    <line x1="90" y1="520" x2="78" y2="548"/>
    <line x1="250" y1="520" x2="240" y2="548"/>
    <line x1="430" y1="520" x2="422" y2="548"/>
    <line x1="610" y1="520" x2="602" y2="548"/>
    <line x1="790" y1="520" x2="782" y2="548"/>
    <line x1="170" y1="548" x2="160" y2="578"/>
    <line x1="340" y1="548" x2="332" y2="578"/>
    <line x1="520" y1="548" x2="512" y2="578"/>
    <line x1="700" y1="548" x2="692" y2="578"/>
    <line x1="880" y1="548" x2="872" y2="578"/>
    <line x1="120" y1="578" x2="110" y2="610"/>
    <line x1="300" y1="578" x2="292" y2="610"/>
    <line x1="480" y1="578" x2="472" y2="610"/>
    <line x1="660" y1="578" x2="652" y2="610"/>
    <line x1="840" y1="578" x2="832" y2="610"/>
  </g>
  <!-- wood grain hints -->
  <g stroke="#9c7044" stroke-width="1.6" opacity="0.6" fill="none">
    <path d="M 30 534 q 50 3 100 0"/>
    <path d="M 560 562 q 60 4 120 0"/>
    <path d="M 200 596 q 70 3 140 0"/>
    <path d="M 720 534 q 55 3 110 0"/>
  </g>

  <!-- ====================== SHADOW ====================== -->
  <ellipse cx="468" cy="566" rx="225" ry="17" fill="#5b3d22" opacity="0.30"/>

  <!-- ====================== BICYCLE + PELICAN ====================== -->
  <g>
    <!-- ===== Rear wheel ===== -->
    <g transform="translate(330 510)">
      <circle r="58" fill="none" stroke="#2b2b2b" stroke-width="9"/>
      <circle r="58" fill="none" stroke="#1a1a1a" stroke-width="3" opacity="0.5"/>
      <circle r="49" fill="none" stroke="#b8b8b8" stroke-width="3"/>
      <g stroke="#9aa3a8" stroke-width="2">
        <line x1="0" y1="0" x2="46" y2="12"/>
        <line x1="0" y1="0" x2="-46" y2="-12"/>
        <line x1="0" y1="0" x2="12" y2="-46"/>
        <line x1="0" y1="0" x2="-12" y2="46"/>
        <line x1="0" y1="0" x2="40" y2="-26"/>
        <line x1="0" y1="0" x2="-40" y2="26"/>
        <line x1="0" y1="0" x2="26" y2="40"/>
        <line x1="0" y1="0" x2="-26" y2="-40"/>
      </g>
      <circle r="7.5" fill="#454545"/>
      <circle r="3.4" fill="#8d9499"/>
    </g>

    <!-- ===== Front wheel ===== -->
    <g transform="translate(610 510)">
      <circle r="58" fill="none" stroke="#2b2b2b" stroke-width="9"/>
      <circle r="58" fill="none" stroke="#1a1a1a" stroke-width="3" opacity="0.5"/>
      <circle r="49" fill="none" stroke="#b8b8b8" stroke-width="3"/>
      <g stroke="#9aa3a8" stroke-width="2">
        <line x1="0" y1="0" x2="44" y2="18"/>
        <line x1="0" y1="0" x2="-44" y2="-18"/>
        <line x1="0" y1="0" x2="18" y2="-44"/>
        <line x1="0" y1="0" x2="-18" y2="44"/>
        <line x1="0" y1="0" x2="36" y2="-31"/>
        <line x1="0" y1="0" x2="-36" y2="31"/>
        <line x1="0" y1="0" x2="31" y2="36"/>
        <line x1="0" y1="0" x2="-31" y2="-36"/>
      </g>
      <circle r="7.5" fill="#454545"/>
      <circle r="3.4" fill="#8d9499"/>
    </g>

    <!-- motion speed lines behind -->
    <g stroke="#9fb6bf" stroke-width="4" stroke-linecap="round" opacity="0.55">
      <line x1="186" y1="462" x2="246" y2="462"/>
      <line x1="166" y1="492" x2="238" y2="492"/>
      <line x1="190" y1="522" x2="248" y2="522"/>
    </g>

    <!-- ===== Frame ===== -->
    <g stroke="url(#frame)" stroke-width="11" stroke-linecap="round" fill="none">
      <!-- chainstay -->
      <line x1="330" y1="510" x2="455" y2="505"/>
      <!-- seat tube -->
      <line x1="455" y1="505" x2="425" y2="408"/>
      <!-- seat stay -->
      <line x1="330" y1="510" x2="425" y2="408"/>
      <!-- top tube -->
      <line x1="425" y1="408" x2="572" y2="420"/>
      <!-- down tube -->
      <line x1="455" y1="505" x2="572" y2="420"/>
      <!-- head tube + fork -->
      <line x1="572" y1="420" x2="585" y2="392"/>
      <line x1="572" y1="420" x2="610" y2="510"/>
    </g>
    <!-- frame highlight -->
    <g stroke="#ff8c94" stroke-width="3" stroke-linecap="round" opacity="0.7" fill="none">
      <line x1="430" y1="404" x2="566" y2="416"/>
    </g>

    <!-- ===== Crank & chain ===== -->
    <circle cx="455" cy="505" r="17" fill="none" stroke="#3a3a3a" stroke-width="5"/>
    <circle cx="455" cy="505" r="6" fill="#3a3a3a"/>
    <g stroke="#4a4a4a" stroke-width="3.4" fill="none" opacity="0.9">
      <line x1="330" y1="498" x2="455" y2="488"/>
      <line x1="330" y1="522" x2="455" y2="521"/>
    </g>

    <!-- ===== Handlebar ===== -->
    <g stroke="#3a3a3a" stroke-width="8" stroke-linecap="round" fill="none">
      <path d="M 585 392 q 4 -22 26 -26"/>
    </g>
    <circle cx="611" cy="366" r="6.6" fill="#7a4a26"/>

    <!-- Wicker basket on handlebar with a fish -->
    <g>
      <path d="M 622 380 l 46 0 l -7 34 l -32 0 z" fill="#c98f4e" stroke="#9c6a33" stroke-width="3"/>
      <g stroke="#9c6a33" stroke-width="2">
        <line x1="625" y1="390" x2="666" y2="390"/>
        <line x1="627" y1="400" x2="664" y2="400"/>
        <line x1="634" y1="381" x2="632" y2="413"/>
        <line x1="646" y1="381" x2="645" y2="413"/>
        <line x1="658" y1="381" x2="657" y2="413"/>
      </g>
      <!-- fish peeking out -->
      <g transform="translate(648 374) rotate(-18)">
        <ellipse cx="0" cy="0" rx="17" ry="7" fill="#79b5d6"/>
        <path d="M 14 0 l 11 -7 l -3 7 l 3 7 z" fill="#5d9cbf"/>
        <circle cx="-9" cy="-1.6" r="1.8" fill="#22303a"/>
        <path d="M -3 -6 q 4 6 0 12" stroke="#5d9cbf" stroke-width="1.6" fill="none"/>
      </g>
    </g>

    <!-- ===== Saddle ===== -->
    <line x1="425" y1="408" x2="418" y2="386" stroke="#3a3a3a" stroke-width="7"/>
    <path d="M 392 386 q 26 -11 54 -2 q -8 12 -26 12 q -20 0 -28 -10 z" fill="#54341c"/>
    <path d="M 396 384 q 22 -8 44 -2" stroke="#7a5230" stroke-width="2.4" fill="none"/>

    <!-- ===================== PELICAN ===================== -->
    <!-- Far leg (behind body) to rear pedal position -->
    <g stroke="#d8862e" stroke-width="11" stroke-linecap="round" fill="none" opacity="0.85">
      <path d="M 430 430 q -8 36 14 56"/>
    </g>
    <!-- far webbed foot on up-pedal -->
    <g transform="translate(449 489)">
      <line x1="-14" y1="-1" x2="6" y2="-1" stroke="#3a3a3a" stroke-width="5"/>
      <path d="M -16 -8 l 26 0 l 9 9 l -36 0 z" fill="#d8862e" opacity="0.85"/>
    </g>

    <!-- Tail feathers -->
    <path d="M 372 392 q -42 -2 -64 22 q 28 4 44 -2 q -18 12 -26 26 q 28 -4 46 -22 z" fill="url(#wingShade)" stroke="#b6a888" stroke-width="2"/>

    <!-- Body -->
    <path d="M 372 386
             q -16 22 -6 44
             q 10 24 44 30
             q 36 6 64 -12
             q 24 -16 30 -44
             q 4 -22 -8 -36
             q -22 -22 -62 -16
             q -42 6 -62 34 z" fill="url(#bodyShade)" stroke="#c9bda6" stroke-width="2.5"/>

    <!-- Belly shading -->
    <path d="M 386 442 q 30 18 64 4 q -28 22 -58 8 q -8 -5 -6 -12 z" fill="#cfc3ac" opacity="0.8"/>

    <!-- Wing folded over body, slightly lifted as if balancing -->
    <path d="M 398 392
             q 38 -18 76 -6
             q 26 9 28 30
             q -10 22 -42 26
             q -34 4 -56 -12
             q -18 -14 -6 -38 z" fill="url(#wingShade)" stroke="#bfb29a" stroke-width="2.5"/>
    <!-- wing feather lines -->
    <g stroke="#b6a888" stroke-width="2.2" fill="none" stroke-linecap="round">
      <path d="M 420 398 q 36 -8 66 6"/>
      <path d="M 416 412 q 38 -6 70 8"/>
      <path d="M 420 426 q 34 -2 60 8"/>
    </g>
    <!-- wingtip dark feathers -->
    <path d="M 486 436 q 14 4 16 -6 q 10 12 -4 18 q -12 5 -12 -12 z" fill="#8e8270"/>

    <!-- Neck: graceful S-curve leaning forward toward the bars -->
    <path d="M 470 380
             q -4 -42 24 -64
             q 22 -17 44 -12
             q 16 4 18 22
             q 2 18 -12 24
             q -16 8 -24 26
             q -7 16 -4 30
             q -22 12 -46 2
             q -4 -16 0 -28 z" fill="url(#bodyShade)" stroke="#c9bda6" stroke-width="2.5"/>

    <!-- Head -->
    <circle cx="546" cy="318" r="29" fill="url(#bodyShade)" stroke="#c9bda6" stroke-width="2.5"/>
    <!-- head crest tuft -->
    <path d="M 528 296 q 6 -14 20 -16 q -4 8 -2 12 q 8 -8 18 -6 q -8 6 -10 12 q -14 -8 -26 -2 z" fill="#e8e0cf"/>

    <!-- Eye -->
    <circle cx="558" cy="312" r="6.8" fill="#ffffff"/>
    <circle cx="560" cy="313" r="4.4" fill="#2c2418"/>
    <circle cx="561.6" cy="311.2" r="1.6" fill="#ffffff"/>
    <!-- eye ring (pelicans have bare orbital skin) -->
    <circle cx="558" cy="312" r="9.4" fill="none" stroke="#f0b86a" stroke-width="2.2"/>

    <!-- ===== Beak with pouch (signature pelican feature) ===== -->
    <!-- gular pouch -->
    <path d="M 566 326
             q 36 10 64 34
             q 14 12 10 22
             q -6 12 -24 6
             q -28 -10 -46 -28
             q -12 -12 -12 -24 z" fill="url(#pouch)" stroke="#d97a2c" stroke-width="2.4"/>
    <!-- pouch crease lines -->
    <g stroke="#e08a3c" stroke-width="1.8" fill="none" opacity="0.8">
      <path d="M 574 336 q 28 12 52 34"/>
      <path d="M 570 346 q 22 12 40 28"/>
    </g>
    <!-- upper bill: long, flat, with hooked tip -->
    <path d="M 564 316
             q 48 8 88 34
             q 10 7 8 13
             q -2 6 -12 4
             q -46 -10 -86 -34
             q -8 -6 -6 -12 q 2 -5 8 -5 z" fill="url(#beak)" stroke="#cf6a24" stroke-width="2.4"/>
    <!-- bill ridge highlight -->
    <path d="M 572 320 q 42 9 78 31" stroke="#ffd08a" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <!-- hooked nail at bill tip -->
    <path d="M 656 360 q 8 2 6 9 q -7 3 -12 -3 z" fill="#c25a1e"/>

    <!-- Nostril slit -->
    <line x1="580" y1="324" x2="596" y2="330" stroke="#b85a1e" stroke-width="2" stroke-linecap="round"/>

    <!-- ===== Near wing-arm reaching to handlebar ===== -->
    <path d="M 452 398
             q 40 -4 86 -22
             q 26 -10 52 -12
             l 14 6
             q -2 10 -14 12
             q -36 8 -64 24
             q -34 18 -64 16
             q -16 -8 -10 -24 z" fill="#efe8d8" stroke="#c2b59c" stroke-width="2.4"/>
    <!-- wing-hand gripping bar -->
    <ellipse cx="603" cy="370" rx="13" ry="9.6" transform="rotate(-24 603 370)" fill="#e6dcc6" stroke="#bfb29a" stroke-width="2.2"/>

    <!-- ===== Near leg pedaling (down stroke) ===== -->
    <path d="M 432 444 q 4 36 24 58 q 4 10 -4 16" stroke="#f0973a" stroke-width="13" stroke-linecap="round" fill="none"/>
    <!-- pedal (near, down position) -->
    <g transform="translate(462 524)">
      <line x1="-16" y1="0" x2="16" y2="0" stroke="#3a3a3a" stroke-width="6"/>
      <!-- near webbed foot -->
      <path d="M -18 -3 l 30 0 q 14 1 18 10 l -8 3 l -8 -4 l -6 5 l -8 -4 l -7 4 l -11 -5 z" fill="#f0973a" stroke="#d8771f" stroke-width="2"/>
    </g>
    <!-- crank arms connecting pedals -->
    <line x1="455" y1="505" x2="462" y2="524" stroke="#3a3a3a" stroke-width="6" stroke-linecap="round"/>
    <line x1="455" y1="505" x2="449" y2="488" stroke="#3a3a3a" stroke-width="6" stroke-linecap="round"/>

    <!-- Jaunty red neckerchief fluttering in sea breeze -->
    <path d="M 506 348 q 16 12 36 8 q -10 14 -28 12 q -14 -2 -18 -12 q 4 -7 10 -8 z" fill="#d94f3d"/>
    <path d="M 506 352 q -22 4 -38 -6 q 4 16 22 20 q 12 2 18 -4 z" fill="#c0392b"/>
    <path d="M 468 346 q -14 -2 -22 -12 q -2 12 8 18 q 8 4 14 -2 z" fill="#d94f3d"/>

    <!-- breeze lines off the scarf and tail -->
    <g stroke="#cfe6ec" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8">
      <path d="M 430 350 q -18 -4 -30 6"/>
      <path d="M 350 376 q -20 -2 -32 8"/>
    </g>
  </g>

  <!-- subtle foreground vignette of warm light -->
  <rect width="960" height="640" fill="#ff9d3f" opacity="0.04"/>
</svg>
