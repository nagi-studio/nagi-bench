    </clipPath>

    <style>
      .wave-line {
        fill: none;
        stroke: rgba(255,255,255,0.72);
        stroke-width: 5;
        stroke-linecap: round;
      }

      .thin-wave {
        fill: none;
        stroke: rgba(255,255,255,0.46);
        stroke-width: 2.5;
        stroke-linecap: round;
      }

      .spoke {
        stroke: #d3e0e7;
        stroke-width: 3;
        stroke-linecap: round;
        opacity: 0.8;
      }

      .frame {
        fill: none;
        stroke: url(#metalGradient);
        stroke-width: 17;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .detail-line {
        fill: none;
        stroke: #5e5348;
        stroke-width: 3;
        stroke-linecap: round;
        opacity: 0.48;
      }

      .feather {
        fill: none;
        stroke: #7f786e;
        stroke-width: 3.5;
        stroke-linecap: round;
        opacity: 0.55;
      }

      .cloud {
        fill: #ffffff;
        opacity: 0.56;
      }
    </style>
  </defs>

