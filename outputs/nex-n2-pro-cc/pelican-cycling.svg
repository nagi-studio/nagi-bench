<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Pelican riding a bicycle by the sea</title>
  <desc id="desc">A vivid realistic vector scene of a pelican riding a bicycle along the seaside, with waves, sand, feathers, shadows, and warm coastal light.</desc>
  <defs>
    <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fc8ef"/>
      <stop offset="0.45" stop-color="#bfe8f4"/>
      <stop offset="0.78" stop-color="#ffe3a6"/>
      <stop offset="1" stop-color="#f4c889"/>
    </linearGradient>

    <linearGradient id="seaGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#157fa4"/>
      <stop offset="0.48" stop-color="#1aa3bc"/>
      <stop offset="1" stop-color="#75d2cf"/>
    </linearGradient>

    <linearGradient id="sandGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8d99d"/>
      <stop offset="0.55" stop-color="#e7b769"/>
      <stop offset="1" stop-color="#c98e45"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff8ca"/>
      <stop offset="0.32" stop-color="#ffd675" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#f9a64a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="pelicanBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9e9"/>
      <stop offset="0.3" stop-color="#f4ead2"/>
      <stop offset="0.72" stop-color="#c7bda9"/>
      <stop offset="1" stop-color="#8d8578"/>
    </linearGradient>

    <linearGradient id="wingGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf2dc"/>
      <stop offset="0.5" stop-color="#d8cbb6"/>
      <stop offset="1" stop-color="#756e66"/>
    </linearGradient>

    <linearGradient id="beakGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f8c447"/>
      <stop offset="0.42" stop-color="#f1a33c"/>
      <stop offset="1" stop-color="#c16e2d"/>
    </linearGradient>

    <linearGradient id="pouchGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5d08d" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#e89e68" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#a9563f" stop-opacity="0.82"/>
    </linearGradient>

    <linearGradient id="metalGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5fbff"/>
      <stop offset="0.18" stop-color="#8295a3"/>
      <stop offset="0.42" stop-color="#2d3b45"/>
      <stop offset="0.72" stop-color="#9eb6c7"/>
      <stop offset="1" stop-color="#1d2830"/>
    </linearGradient>

    <radialGradient id="tireGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0.72" stop-color="#1c252b"/>
      <stop offset="0.84" stop-color="#12181c"/>
      <stop offset="1" stop-color="#020405"/>
    </radialGradient>

    <pattern id="sandSpeckles" width="90" height="70" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="19" r="2.1" fill="#b57d40" opacity="0.27"/>
      <circle cx="45" cy="35" r="1.3" fill="#fff0bf" opacity="0.5"/>
      <circle cx="76" cy="13" r="1.7" fill="#8f6337" opacity="0.23"/>
      <circle cx="28" cy="61" r="1.2" fill="#ad733b" opacity="0.25"/>
      <path d="M61 58c8-3 15-2 21 1" fill="none" stroke="#b67a3a" stroke-width="1.4" opacity="0.22"/>
    </pattern>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="8" dy="20" stdDeviation="13" flood-color="#2b241a" flood-opacity="0.28"/>
    </filter>

    <filter id="fineTexture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="17" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.07"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>

    <filter id="waterShimmer" x="-10%" y="-25%" width="120%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.055" numOctaves="3" seed="9" result="waveNoise"/>
      <feDisplacementMap in="SourceGraphic" in2="waveNoise" scale="10" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <filter id="rimLight" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset in="blur" dx="-4" dy="-5" result="offset"/>
      <feFlood flood-color="#fff4c5" flood-opacity="0.55" result="light"/>
      <feComposite in="light" in2="offset" operator="in" result="rim"/>
      <feMerge>
        <feMergeNode in="rim"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

