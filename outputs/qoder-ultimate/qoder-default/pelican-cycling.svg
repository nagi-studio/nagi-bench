<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" font-family="sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fd3f4"/>
      <stop offset="0.6" stop-color="#cdeefb"/>
      <stop offset="1" stop-color="#fdf6d8"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e93c9"/>
      <stop offset="1" stop-color="#4fc0e8"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4e2ac"/>
      <stop offset="1" stop-color="#e9cd82"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff6c4"/>
      <stop offset="1" stop-color="#ffd86b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfe7ee"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <circle cx="650" cy="120" r="120" fill="url(#sun)"/>
  <circle cx="650" cy="120" r="48" fill="#fff2b0"/>

  <!-- Clouds -->
  <g fill="#ffffff" opacity="0.9">
    <ellipse cx="180" cy="90" rx="55" ry="24"/>
    <ellipse cx="230" cy="80" rx="45" ry="26"/>
    <ellipse cx="130" cy="100" rx="40" ry="20"/>
    <ellipse cx="500" cy="150" rx="40" ry="18"/>
    <ellipse cx="540" cy="145" rx="34" ry="20"/>
  </g>

  <!-- Distant gulls -->
  <g stroke="#5a6b78" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M300 130 q10 -10 20 0 q10 -10 20 0"/>
    <path d="M360 160 q8 -8 16 0 q8 -8 16 0"/>
  </g>

  <!-- Sea -->
  <rect y="330" width="800" height="120" fill="url(#sea)"/>
  <g stroke="#ffffff" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round">
    <path d="M0 360 q40 -12 80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0"/>
    <path d="M0 395 q40 -12 80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0"/>
  </g>

  <!-- Beach -->
  <path d="M0 440 Q400 405 800 440 L800 600 L0 600 Z" fill="url(#sand)"/>
  <!-- Wet sand line -->
  <path d="M0 448 Q400 415 800 448" fill="none" stroke="#d9bd74" stroke-width="4" opacity="0.6"/>

  <!-- Starfish + shells -->
  <g transform="translate(120,545)" fill="#ef8354">
    <path d="M0 -14 L4 -4 L14 -4 L6 2 L9 12 L0 6 L-9 12 L-6 2 L-14 -4 L-4 -4 Z"/>
  </g>
  <ellipse cx="700" cy="560" rx="14" ry="9" fill="#f6c9b0" stroke="#e0a488" stroke-width="2"/>

  <!-- ===== Bicycle ===== -->
  <g stroke="#c0392b" stroke-width="7" fill="none" stroke-linecap="round">
    <!-- Wheels -->
    <circle cx="300" cy="470" r="70" stroke="#2c3e50" stroke-width="9" fill="#ecf0f1"/>
    <circle cx="540" cy="470" r="70" stroke="#2c3e50" stroke-width="9" fill="#ecf0f1"/>
    <!-- Spokes -->
    <g stroke="#95a5a6" stroke-width="2">
      <line x1="300" y1="400" x2="300" y2="540"/>
      <line x1="230" y1="470" x2="370" y2="470"/>
      <line x1="251" y1="421" x2="349" y2="519"/>
      <line x1="349" y1="421" x2="251" y2="519"/>
      <line x1="540" y1="400" x2="540" y2="540"/>
      <line x1="470" y1="470" x2="610" y2="470"/>
      <line x1="491" y1="421" x2="589" y2="519"/>
      <line x1="589" y1="421" x2="491" y2="519"/>
    </g>
    <!-- Hubs -->
    <circle cx="300" cy="470" r="6" fill="#2c3e50" stroke="none"/>
    <circle cx="540" cy="470" r="6" fill="#2c3e50" stroke="none"/>
    <!-- Frame -->
    <path d="M300 470 L420 470 L470 360 L360 360 Z"/>
    <line x1="420" y1="470" x2="540" y2="470"/>
    <line x1="470" y1="360" x2="540" y2="470"/>
    <!-- Seat post + handlebar post -->
    <line x1="360" y1="360" x2="345" y2="330"/>
    <line x1="470" y1="360" x2="500" y2="320"/>
    <!-- Pedal crank -->
    <circle cx="420" cy="470" r="12" fill="#7f8c8d" stroke="#2c3e50" stroke-width="3"/>
    <line x1="420" y1="470" x2="440" y2="500"/>
    <line x1="435" y1="498" x2="452" y2="498" stroke="#2c3e50"/>
  </g>
  <!-- Seat -->
  <path d="M328 330 q17 -8 34 2 l-6 6 q-14 -6 -24 0 Z" fill="#2c3e50"/>
  <!-- Handlebar -->
  <path d="M500 320 q20 -6 30 4" fill="none" stroke="#2c3e50" stroke-width="7" stroke-linecap="round"/>

  <!-- ===== Pelican ===== -->
  <g>
    <!-- Legs to pedals -->
    <line x1="410" y1="300" x2="440" y2="495" stroke="#f0a500" stroke-width="8" stroke-linecap="round"/>
    <path d="M436 495 l16 4 M436 500 l14 8" stroke="#f0a500" stroke-width="6" stroke-linecap="round" fill="none"/>

    <!-- Tail -->
    <path d="M300 250 q-40 5 -60 30 q35 -5 60 5 Z" fill="#cbd3da" stroke="#a9b4bd" stroke-width="2"/>

    <!-- Body -->
    <path d="M300 200 q90 -30 150 30 q30 45 -10 90 q-70 40 -140 5 q-45 -35 -25 -85 q10 -30 25 -40 Z"
          fill="url(#body)" stroke="#c3ccd4" stroke-width="3"/>

    <!-- Wing -->
    <path d="M330 235 q80 -10 120 25 q-30 45 -95 40 q-30 -30 -25 -65 Z"
          fill="#eef2f5" stroke="#c3ccd4" stroke-width="2"/>
    <path d="M360 250 q40 0 70 25 M355 275 q45 -2 80 18" fill="none" stroke="#c3ccd4" stroke-width="2"/>

    <!-- Neck + Head -->
    <path d="M400 210 q30 -50 60 -70 q35 -18 55 8 q12 22 -12 40 q-25 15 -45 40 q-25 20 -58 12 Z"
          fill="url(#body)" stroke="#c3ccd4" stroke-width="3"/>
    <!-- Head -->
    <circle cx="500" cy="150" r="34" fill="#ffffff" stroke="#c3ccd4" stroke-width="3"/>
    <!-- Yellow crest -->
    <path d="M480 122 q20 -18 40 -4 q-8 8 -20 10 q-12 -2 -20 -6 Z" fill="#ffd86b"/>

    <!-- Eye -->
    <circle cx="512" cy="145" r="6" fill="#2c3e50"/>
    <circle cx="514" cy="143" r="2" fill="#ffffff"/>

    <!-- Upper beak -->
    <path d="M528 150 q60 -8 92 6 q-6 12 -22 12 q-40 -6 -70 -4 Z"
          fill="#f6a623" stroke="#d98b12" stroke-width="2"/>
    <!-- Lower beak + pouch -->
    <path d="M528 158 q50 20 92 4 q-8 34 -50 34 q-40 -2 -50 -20 q-4 -12 8 -18 Z"
          fill="#ffcf7a" stroke="#e6a94a" stroke-width="2"/>
    <path d="M540 175 q30 10 62 4" fill="none" stroke="#e6a94a" stroke-width="2"/>
    <!-- Beak tip hook -->
    <path d="M618 156 q10 0 8 10 q-6 2 -10 -2 Z" fill="#d98b12"/>

    <!-- Little fish in pouch -->
    <g transform="translate(560,190)" fill="#5ec6e6">
      <ellipse cx="0" cy="0" rx="9" ry="5"/>
      <path d="M8 0 l8 -5 l0 10 Z"/>
      <circle cx="-4" cy="-1" r="1.5" fill="#2c3e50"/>
    </g>
  </g>

  <!-- Motion lines -->
  <g stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <line x1="150" y1="460" x2="200" y2="460"/>
    <line x1="130" y1="490" x2="185" y2="490"/>
    <line x1="160" y1="520" x2="210" y2="520"/>
  </g>
</svg>
