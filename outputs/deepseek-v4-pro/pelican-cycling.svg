<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="40%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#b8e4f0"/>
    </linearGradient>
    <!-- Ocean gradient -->
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6b8a"/>
      <stop offset="30%" stop-color="#2288aa"/>
      <stop offset="60%" stop-color="#2d9ec0"/>
      <stop offset="100%" stop-color="#3cb8d8"/>
    </linearGradient>
    <!-- Sand gradient -->
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d9a0"/>
      <stop offset="100%" stop-color="#e8c578"/>
    </linearGradient>
    <!-- Sun glow -->
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="40%" stop-color="#ffe082"/>
      <stop offset="70%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#ff980000"/>
    </radialGradient>
    <!-- Pelican body gradient -->
    <linearGradient id="pelicanBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="30%" stop-color="#f5f5f5"/>
      <stop offset="60%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>
    <!-- Pelican wing dark -->
    <linearGradient id="pelicanWing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="40%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <!-- Beak gradient -->
    <linearGradient id="beak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8f00"/>
      <stop offset="50%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <!-- Pouch gradient -->
    <linearGradient id="pouch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffab40"/>
      <stop offset="100%" stop-color="#ffcc80"/>
    </linearGradient>
    <!-- Metal gradient for bike -->
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#636e72"/>
      <stop offset="50%" stop-color="#2d3436"/>
      <stop offset="100%" stop-color="#1e2426"/>
    </linearGradient>
    <!-- Tire gradient -->
    <radialGradient id="tire" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="70%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <!-- Cloud filter -->
    <filter id="cloudBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- Drop shadow -->
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="800" height="600" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="650" cy="100" r="80" fill="url(#sunGlow)"/>
  <circle cx="650" cy="100" r="35" fill="#fff9c4" opacity="0.9"/>

  <!-- Clouds -->
  <g opacity="0.85">
    <ellipse cx="150" cy="80" rx="60" ry="22" fill="white" filter="url(#cloudBlur)"/>
    <ellipse cx="190" cy="70" rx="45" ry="18" fill="white"/>
    <ellipse cx="120" cy="75" rx="40" ry="16" fill="white"/>

    <ellipse cx="380" cy="60" rx="50" ry="18" fill="white" filter="url(#cloudBlur)"/>
    <ellipse cx="420" cy="52" rx="38" ry="15" fill="white"/>
    <ellipse cx="350" cy="55" rx="35" ry="14" fill="white"/>
  </g>

  <!-- Distant ocean horizon line -->
  <rect x="0" y="320" width="800" height="120" fill="url(#ocean)"/>

  <!-- Waves -->
  <g opacity="0.4">
    <path d="M0,360 Q40,350 80,360 Q120,370 160,360 Q200,350 240,360 Q280,370 320,360 Q360,350 400,360 Q440,370 480,360 Q520,350 560,360 Q600,370 640,360 Q680,350 720,360 Q760,370 800,360 L800,380 L0,380 Z" fill="#1a5276"/>
    <path d="M0,370 Q50,362 100,370 Q150,378 200,370 Q250,362 300,370 Q350,378 400,370 Q450,362 500,370 Q550,378 600,370 Q650,362 700,370 Q750,378 800,370 L800,385 L0,385 Z" fill="#1a6b8a"/>
    <path d="M0,380 Q60,375 120,380 Q180,385 240,380 Q300,375 360,380 Q420,385 480,380 Q540,375 600,380 Q660,385 720,380 Q780,375 800,380 L800,395 L0,395 Z" fill="#1d7a9a"/>
  </g>

  <!-- Shore / surf foam -->
  <path d="M0,390 Q100,382 200,388 Q300,394 400,390 Q500,386 600,392 Q700,396 800,390 L800,410 Q700,405 600,410 Q500,415 400,408 Q300,402 200,410 Q100,418 0,412 Z" fill="white" opacity="0.5"/>
  <path d="M0,400 Q80,395 160,402 Q240,410 320,404 Q400,398 480,406 Q560,412 640,404 Q720,398 800,404 L800,418 Q720,412 640,420 Q560,426 480,418 Q400,412 320,420 Q240,426 160,418 Q80,412 0,420 Z" fill="white" opacity="0.35"/>

  <!-- Beach -->
  <rect x="0" y="410" width="800" height="190" fill="url(#sand)"/>

  <!-- Wet sand near water -->
  <rect x="0" y="410" width="800" height="20" fill="#c9a96e" opacity="0.6"/>

  <!-- Sand texture dots -->
  <g opacity="0.15">
    <circle cx="100" cy="480" r="1.5" fill="#8b6914"/>
    <circle cx="200" cy="500" r="1" fill="#8b6914"/>
    <circle cx="350" cy="520" r="1.5" fill="#8b6914"/>
    <circle cx="500" cy="470" r="1" fill="#8b6914"/>
    <circle cx="600" cy="530" r="1.5" fill="#8b6914"/>
    <circle cx="700" cy="490" r="1" fill="#8b6914"/>
    <circle cx="150" cy="550" r="1" fill="#8b6914"/>
    <circle cx="450" cy="560" r="1.5" fill="#8b6914"/>
    <circle cx="300" cy="540" r="1" fill="#8b6914"/>
    <circle cx="550" cy="550" r="1" fill="#8b6914"/>
    <circle cx="50" cy="530" r="1.5" fill="#8b6914"/>
    <circle cx="750" cy="520" r="1" fill="#8b6914"/>
  </g>

  <!-- Small shells on beach -->
  <g opacity="0.5">
    <path d="M180,530 Q185,522 190,530 Q185,534 180,530Z" fill="#f5deb3"/>
    <path d="M450,555 Q453,550 456,555 Q453,558 450,555Z" fill="#ffe4b5"/>
    <path d="M620,510 Q624,504 628,510 Q624,513 620,510Z" fill="#f5deb3"/>
    <path d="M80,560 Q83,555 86,560 Q83,563 80,560Z" fill="#ffe4b5"/>
  </g>

  <!-- Distant palm tree silhouette left -->
  <g opacity="0.7">
    <rect x="55" y="340" width="6" height="75" fill="#5d4037" rx="2"/>
    <path d="M58,345 Q100,330 140,350" stroke="#2e7d32" stroke-width="5" fill="none"/>
    <path d="M58,348 Q20,320 10,355" stroke="#388e3c" stroke-width="4" fill="none"/>
    <path d="M58,350 Q80,320 130,335" stroke="#4caf50" stroke-width="4" fill="none"/>
    <path d="M58,342 Q30,340 15,330" stroke="#43a047" stroke-width="3.5" fill="none"/>
    <path d="M58,345 Q110,345 145,355" stroke="#2e7d32" stroke-width="4.5" fill="none"/>
  </g>

  <!-- Distant palm tree right -->
  <g opacity="0.6">
    <rect x="730" y="350" width="5" height="65" fill="#5d4037" rx="2"/>
    <path d="M733,355 Q760,340 785,355" stroke="#2e7d32" stroke-width="4" fill="none"/>
    <path d="M733,352 Q710,335 700,360" stroke="#388e3c" stroke-width="3.5" fill="none"/>
    <path d="M733,355 Q770,330 790,345" stroke="#4caf50" stroke-width="3.5" fill="none"/>
    <path d="M733,350 Q720,345 710,338" stroke="#43a047" stroke-width="3" fill="none"/>
  </g>

  <!-- Seagulls in distance -->
  <g stroke="#555" stroke-width="2" fill="none" opacity="0.5">
    <path d="M250,130 Q255,122 260,126 Q265,122 270,130"/>
    <path d="M500,90 Q505,82 510,86 Q515,82 520,90"/>
    <path d="M340,110 Q344,104 348,107 Q352,104 356,110"/>
  </g>

  <!-- ==================== BICYCLE ==================== -->
  <g filter="url(#shadow)" transform="translate(280, 350)">

    <!-- Rear wheel -->
    <circle cx="0" cy="120" r="72" fill="url(#tire)" stroke="#1a1a1a" stroke-width="5"/>
    <circle cx="0" cy="120" r="64" fill="none" stroke="#555" stroke-width="1.5"/>
    <circle cx="0" cy="120" r="10" fill="#888" stroke="#666" stroke-width="2"/>
    <!-- Rear spokes -->
    <g stroke="#777" stroke-width="1" opacity="0.6">
      <line x1="0" y1="56" x2="0" y2="184"/>
      <line x1="-64" y1="120" x2="64" y2="120"/>
      <line x1="-45" y1="75" x2="45" y2="165"/>
      <line x1="45" y1="75" x2="-45" y2="165"/>
      <line x1="-25" y1="58" x2="25" y2="182"/>
      <line x1="25" y1="58" x2="-25" y2="182"/>
      <line x1="-55" y1="90" x2="55" y2="150"/>
      <line x1="55" y1="90" x2="-55" y2="150"/>
    </g>
    <!-- Rear tire highlights -->
    <circle cx="0" cy="120" r="68" fill="none" stroke="#555" stroke-width="0.5" opacity="0.5"/>

    <!-- Front wheel -->
    <circle cx="200" cy="120" r="72" fill="url(#tire)" stroke="#1a1a1a" stroke-width="5"/>
    <circle cx="200" cy="120" r="64" fill="none" stroke="#555" stroke-width="1.5"/>
    <circle cx="200" cy="120" r="10" fill="#888" stroke="#666" stroke-width="2"/>
    <!-- Front spokes -->
    <g stroke="#777" stroke-width="1" opacity="0.6">
      <line x1="200" y1="56" x2="200" y2="184"/>
      <line x1="136" y1="120" x2="264" y2="120"/>
      <line x1="155" y1="75" x2="245" y2="165"/>
      <line x1="245" y1="75" x2="155" y2="165"/>
      <line x1="175" y1="58" x2="225" y2="182"/>
      <line x1="225" y1="58" x2="175" y2="182"/>
      <line x1="145" y1="90" x2="255" y2="150"/>
      <line x1="255" y1="90" x2="145" y2="150"/>
    </g>
    <!-- Front tire highlights -->
    <circle cx="200" cy="120" r="68" fill="none" stroke="#555" stroke-width="0.5" opacity="0.5"/>

    <!-- Chain ring (rear) -->
    <circle cx="40" cy="100" r="20" fill="none" stroke="#888" stroke-width="3"/>
    <circle cx="40" cy="100" r="16" fill="none" stroke="#999" stroke-width="1"/>
    <circle cx="40" cy="100" r="4" fill="#777"/>

    <!-- Pedal crank ring -->
    <circle cx="120" cy="90" r="24" fill="none" stroke="#888" stroke-width="3"/>
    <circle cx="120" cy="90" r="20" fill="none" stroke="#999" stroke-width="1"/>
    <circle cx="120" cy="90" r="5" fill="#777"/>

    <!-- Chain -->
    <path d="M40,80 L120,66" stroke="#666" stroke-width="2.5" stroke-dasharray="4,2" fill="none"/>
    <path d="M40,120 L120,114" stroke="#666" stroke-width="2.5" stroke-dasharray="4,2" fill="none"/>

    <!-- Bike frame -->
    <g stroke="url(#metal)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Seat tube -->
      <line x1="80" y1="60" x2="40" y2="100"/>
      <!-- Top tube -->
      <line x1="80" y1="60" x2="170" y2="55"/>
      <!-- Down tube -->
      <line x1="40" y1="100" x2="170" y2="55"/>
      <!-- Head tube -->
      <line x1="170" y1="55" x2="195" y2="80"/>
      <!-- Fork -->
      <line x1="195" y1="80" x2="200" y2="120"/>
      <!-- Chain stay -->
      <line x1="40" y1="100" x2="0" y2="120"/>
      <!-- Seat stay -->
      <line x1="80" y1="60" x2="0" y2="120"/>
    </g>

    <!-- Seat post -->
    <line x1="80" y1="60" x2="82" y2="40" stroke="#888" stroke-width="4" stroke-linecap="round"/>
    <!-- Seat -->
    <ellipse cx="82" cy="36" rx="20" ry="7" fill="#2d3436"/>
    <ellipse cx="82" cy="34" rx="18" ry="5" fill="#636e72"/>

    <!-- Handlebars -->
    <line x1="195" y1="80" x2="195" y2="55" stroke="#888" stroke-width="4" stroke-linecap="round"/>
    <path d="M180,48 Q195,42 210,48" stroke="#636e72" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Grips -->
    <line x1="178" y1="47" x2="182" y2="48" stroke="#444" stroke-width="8" stroke-linecap="round"/>
    <line x1="208" y1="48" x2="212" y2="47" stroke="#444" stroke-width="8" stroke-linecap="round"/>

    <!-- Pedals -->
    <!-- Right pedal (forward) -->
    <line x1="120" y1="90" x2="140" y2="80" stroke="#888" stroke-width="3"/>
    <rect x="134" y="73" width="18" height="7" rx="2" fill="#444" transform="rotate(-26,143,76)"/>
    <!-- Left pedal (back) -->
    <line x1="120" y1="90" x2="100" y2="100" stroke="#888" stroke-width="3"/>
    <rect x="88" y="97" width="18" height="7" rx="2" fill="#444" transform="rotate(26,97,100)"/>

    <!-- Kickstand -->
    <line x1="20" y1="100" x2="35" y2="145" stroke="#777" stroke-width="2" stroke-linecap="round"/>

  </g>

  <!-- ==================== PELICAN ==================== -->
  <g transform="translate(280, 350)">

    <!-- Pelican tail feathers -->
    <path d="M-10,40 Q-40,30 -45,15 Q-35,25 -25,25 Q-40,10 -35,0 Q-25,15 -20,20 Q-30,5 -20,-5 Q-12,10 -15,18 Z" fill="#3a3a3a"/>

    <!-- Pelican body -->
    <ellipse cx="50" cy="20" rx="55" ry="38" fill="url(#pelicanBody)" transform="rotate(-10,50,20)"/>

    <!-- Body feather texture -->
    <g stroke="#ddd" stroke-width="0.8" fill="none" opacity="0.5">
      <path d="M10,10 Q20,8 30,12"/>
      <path d="M20,20 Q30,18 40,22"/>
      <path d="M15,30 Q25,28 35,32"/>
      <path d="M30,8 Q40,5 50,8"/>
      <path d="M40,18 Q50,15 60,18"/>
      <path d="M50,28 Q60,25 70,28"/>
    </g>

    <!-- Pelican belly -->
    <ellipse cx="55" cy="35" rx="40" ry="28" fill="#f0f0f0"/>

    <!-- Wing (folded, dark) -->
    <path d="M30,-5 Q60,-25 85,-10 Q95,-5 90,5 Q80,-10 60,-5 Q45,0 35,5 Q20,10 25,-2Z" fill="url(#pelicanWing)"/>
    <!-- Wing feather details -->
    <g stroke="#555" stroke-width="0.6" fill="none" opacity="0.5">
      <path d="M38,-8 Q55,-18 78,-5"/>
      <path d="M35,-2 Q50,-10 75,0"/>
      <path d="M32,4 Q45,-3 65,5"/>
    </g>

    <!-- Pelican neck -->
    <path d="M75,5 Q90,-20 85,-50 Q82,-65 75,-70" stroke="url(#pelicanBody)" stroke-width="22" fill="none" stroke-linecap="round"/>

    <!-- Pelican head -->
    <ellipse cx="72" cy="-82" rx="20" ry="18" fill="#f5f5f5"/>

    <!-- Head feather tuft -->
    <path d="M60,-95 Q55,-110 52,-115 Q58,-108 62,-105 Q57,-112 58,-118 Q63,-108 65,-102Z" fill="#ddd"/>

    <!-- Eye -->
    <circle cx="65" cy="-85" r="5" fill="white"/>
    <circle cx="64" cy="-85" r="3.5" fill="#ffcc00"/>
    <circle cx="63.5" cy="-85.5" r="2" fill="#111"/>
    <circle cx="63" cy="-86.5" r="0.8" fill="white"/>

    <!-- Eye ring -->
    <circle cx="65" cy="-85" r="5" fill="none" stroke="#ff8f00" stroke-width="1"/>

    <!-- Beak (upper) - long pelican beak -->
    <path d="M54,-90 Q40,-88 18,-75 Q8,-68 5,-55 Q10,-62 20,-68 Q35,-78 52,-83Z" fill="url(#beak)"/>

    <!-- Beak ridge line -->
    <path d="M54,-89 Q38,-85 18,-73" stroke="#e65100" stroke-width="0.8" fill="none"/>

    <!-- Beak tip hook -->
    <path d="M5,-55 Q2,-50 5,-48 Q4,-52 6,-53Z" fill="#d84315"/>

    <!-- Gular pouch (pelican's distinctive throat pouch) -->
    <path d="M54,-82 Q45,-65 38,-55 Q30,-45 28,-42 Q25,-40 28,-38 Q35,-38 40,-45 Q48,-58 55,-75Z" fill="url(#pouch)"/>
    <path d="M54,-82 Q47,-70 40,-58" stroke="#ffab40" stroke-width="0.5" fill="none" opacity="0.6"/>

    <!-- Pelican legs -->
    <!-- Left leg on left pedal -->
    <g>
      <line x1="45" y1="50" x2="95" y2="95" stroke="#ff8f00" stroke-width="5" stroke-linecap="round"/>
      <!-- Left foot on pedal -->
      <path d="M90,93 L105,100 L103,105 L88,98Z" fill="#ff8f00"/>
      <!-- Webbing -->
      <path d="M90,93 Q98,102 105,100" stroke="#ffab40" stroke-width="1" fill="none"/>
    </g>

    <!-- Right leg on right pedal (slightly back) -->
    <g>
      <line x1="50" y1="48" x2="135" y2="78" stroke="#ff8f00" stroke-width="5" stroke-linecap="round"/>
      <!-- Right foot on pedal -->
      <path d="M132,75 L145,82 L143,87 L128,80Z" fill="#ff8f00"/>
      <!-- Webbing -->
      <path d="M132,75 Q140,84 145,82" stroke="#ffab40" stroke-width="1" fill="none"/>
    </g>

    <!-- Wing "hands" gripping handlebars -->
    <path d="M78,-5 Q100,10 120,15 Q130,18 135,15 Q125,12 115,10 Q95,5 80,0Z" fill="#444"/>
    <path d="M80,-5 Q105,-5 130,0 Q140,2 145,0 Q135,-3 125,-5 Q105,-8 82,-8Z" fill="#555"/>

  </g>

  <!-- Motion lines behind bike -->
  <g stroke="#aaa" stroke-width="1.5" stroke-linecap="round" opacity="0.35">
    <line x1="240" y1="460" x2="180" y2="462"/>
    <line x1="235" y1="475" x2="160" y2="478"/>
    <line x1="240" y1="490" x2="190" y2="492"/>
    <line x1="245" y1="445" x2="200" y2="447"/>
  </g>

  <!-- Sand spray from wheels -->
  <g opacity="0.3">
    <circle cx="270" cy="478" r="3" fill="#e8c578"/>
    <circle cx="255" cy="485" r="2" fill="#e8c578"/>
    <circle cx="260" cy="470" r="2.5" fill="#e8c578"/>
    <circle cx="240" cy="480" r="1.5" fill="#e8c578"/>
    <circle cx="250" cy="492" r="2" fill="#e8c578"/>
  </g>

  <!-- Shoreline rocks -->
  <g>
    <ellipse cx="700" cy="435" rx="30" ry="15" fill="#888"/>
    <ellipse cx="700" cy="432" rx="28" ry="13" fill="#999"/>
    <path d="M680,432 Q690,420 700,425 Q710,418 720,432Z" fill="#aaa" opacity="0.5"/>

    <ellipse cx="60" cy="440" rx="20" ry="10" fill="#777"/>
    <ellipse cx="60" cy="438" rx="18" ry="8" fill="#888"/>

    <ellipse cx="760" cy="445" rx="15" ry="8" fill="#999"/>
    <ellipse cx="760" cy="443" rx="13" ry="6" fill="#aaa"/>
  </g>

</svg>