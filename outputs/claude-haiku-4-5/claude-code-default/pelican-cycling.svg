<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E90FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0047AB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#skyGrad)"/>

  <!-- Ocean -->
  <rect y="450" width="1200" height="350" fill="url(#oceanGrad)"/>

  <!-- Sand -->
  <ellipse cx="600" cy="480" rx="600" ry="80" fill="#F4A460"/>

  <!-- Waves -->
  <path d="M 0 450 Q 150 430 300 450 T 600 450 T 900 450 T 1200 450" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 0 500 Q 150 480 300 500 T 600 500 T 900 500 T 1200 500" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Sun -->
  <circle cx="1000" cy="100" r="60" fill="#FFD700" opacity="0.8"/>

  <!-- Clouds -->
  <ellipse cx="200" cy="120" rx="80" ry="40" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="250" cy="100" rx="60" ry="35" fill="#ffffff" opacity="0.7"/>

  <!-- Bicycle frame -->
  <g id="bike">
    <!-- Frame -->
    <line x1="450" y1="280" x2="550" y2="350" stroke="#FF4500" stroke-width="8" stroke-linecap="round"/>
    <line x1="450" y1="280" x2="600" y2="280" stroke="#FF4500" stroke-width="8" stroke-linecap="round"/>
    <line x1="600" y1="280" x2="550" y2="350" stroke="#FF4500" stroke-width="8" stroke-linecap="round"/>

    <!-- Seat -->
    <ellipse cx="480" cy="260" rx="35" ry="15" fill="#333333"/>

    <!-- Handlebars -->
    <line x1="450" y1="280" x2="420" y2="250" stroke="#FF4500" stroke-width="6"/>
    <circle cx="420" cy="250" r="8" fill="#333333"/>
    <circle cx="435" cy="260" r="6" fill="#333333"/>

    <!-- Front wheel -->
    <circle cx="600" cy="350" r="60" fill="none" stroke="#333333" stroke-width="6"/>
    <circle cx="600" cy="350" r="55" fill="none" stroke="#FFD700" stroke-width="3"/>
    <line x1="600" y1="290" x2="600" y2="410" stroke="#666666" stroke-width="2"/>
    <line x1="540" y1="350" x2="660" y2="350" stroke="#666666" stroke-width="2"/>
    <line x1="550" y1="300" x2="650" y2="400" stroke="#666666" stroke-width="1"/>
    <line x1="650" y1="300" x2="550" y2="400" stroke="#666666" stroke-width="1"/>

    <!-- Back wheel -->
    <circle cx="450" cy="350" r="60" fill="none" stroke="#333333" stroke-width="6"/>
    <circle cx="450" cy="350" r="55" fill="none" stroke="#FFD700" stroke-width="3"/>
    <line x1="450" y1="290" x2="450" y2="410" stroke="#666666" stroke-width="2"/>
    <line x1="390" y1="350" x2="510" y2="350" stroke="#666666" stroke-width="2"/>
    <line x1="400" y1="300" x2="500" y2="400" stroke="#666666" stroke-width="1"/>
    <line x1="500" y1="300" x2="400" y2="400" stroke="#666666" stroke-width="1"/>
  </g>

  <!-- Pelican body -->
  <g id="pelican">
    <!-- Body (large, round) -->
    <ellipse cx="520" cy="240" rx="85" ry="100" fill="#F5F5DC"/>
    <ellipse cx="520" cy="240" rx="85" ry="100" fill="none" stroke="#D3D3D3" stroke-width="2"/>

    <!-- Neck -->
    <path d="M 480 170 Q 470 130 480 80" stroke="#F5F5DC" stroke-width="45" fill="none" stroke-linecap="round"/>

    <!-- Head -->
    <ellipse cx="490" cy="50" rx="40" ry="45" fill="#F5F5DC"/>
    <ellipse cx="490" cy="50" rx="40" ry="45" fill="none" stroke="#D3D3D3" stroke-width="2"/>

    <!-- Eye -->
    <circle cx="510" cy="35" r="6" fill="#000000"/>
    <circle cx="512" cy="33" r="2" fill="#ffffff"/>

    <!-- Beak pouch (iconic pelican feature) -->
    <path d="M 515 55 Q 540 65 545 50 Q 540 45 520 45" fill="#FFB6C1" opacity="0.8"/>
    <path d="M 515 55 Q 540 65 545 50 Q 540 45 520 45" fill="none" stroke="#FF69B4" stroke-width="1.5"/>

    <!-- Beak -->
    <path d="M 520 45 L 560 50 L 520 60 Z" fill="#F08080"/>

    <!-- Wing -->
    <ellipse cx="450" cy="200" rx="60" ry="90" fill="#E8E8E8" opacity="0.8" transform="rotate(-30 450 200)"/>

    <!-- Legs -->
    <line x1="510" y1="340" x2="510" y2="360" stroke="#FFB347" stroke-width="8" stroke-linecap="round"/>
    <line x1="530" y1="340" x2="530" y2="360" stroke="#FFB347" stroke-width="8" stroke-linecap="round"/>

    <!-- Feet (webbed) -->
    <ellipse cx="510" cy="368" rx="12" ry="8" fill="#FF8C00"/>
    <ellipse cx="530" cy="368" rx="12" ry="8" fill="#FF8C00"/>
  </g>

  <!-- Pelican gripping handlebars -->
  <g id="pelican-wings-on-bars">
    <path d="M 440 240 Q 420 220 415 250" stroke="#D3D3D3" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 600 240 Q 620 220 625 250" stroke="#D3D3D3" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Smile/happy expression -->
  <path d="M 500 65 Q 510 75 520 65" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Sand beach details -->
  <circle cx="300" cy="460" r="15" fill="#D2B48C" opacity="0.6"/>
  <circle cx="950" cy="475" r="20" fill="#D2B48C" opacity="0.6"/>
  <circle cx="150" cy="485" r="12" fill="#D2B48C" opacity="0.5"/>

  <!-- Sparkle on water -->
  <circle cx="750" cy="550" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="850" cy="600" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="400" cy="520" r="2.5" fill="#ffffff" opacity="0.7"/>
</svg>