<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="40%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0277BD"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9E4B7"/>
      <stop offset="100%" stop-color="#DEB887"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="30%" stop-color="#FFD54F" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#FFFFF5"/>
      <stop offset="100%" stop-color="#F0EBD8"/>
    </radialGradient>
    <linearGradient id="pouchG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="wetSand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C4A265"/>
      <stop offset="50%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>

  <!-- Sun with glow -->
  <circle cx="650" cy="110" r="100" fill="url(#sunGlow)"/>
  <circle cx="650" cy="110" r="38" fill="#FDD835"/>
  <circle cx="650" cy="110" r="32" fill="#FFEE58"/>

  <!-- Clouds -->
  <g opacity="0.92">
    <ellipse cx="120" cy="85" rx="55" ry="22" fill="#fff"/>
    <ellipse cx="160" cy="72" rx="48" ry="28" fill="#fff"/>
    <ellipse cx="200" cy="80" rx="42" ry="20" fill="#fff"/>
    <ellipse cx="145" cy="90" rx="30" ry="12" fill="#f0f8ff"/>
  </g>
  <g opacity="0.7">
    <ellipse cx="450" cy="55" rx="40" ry="16" fill="#fff"/>
    <ellipse cx="480" cy="45" rx="35" ry="22" fill="#fff"/>
    <ellipse cx="510" cy="55" rx="30" ry="14" fill="#fff"/>
  </g>
  <g opacity="0.5">
    <ellipse cx="320" cy="110" rx="30" ry="12" fill="#fff"/>
    <ellipse cx="340" cy="103" rx="25" ry="16" fill="#fff"/>
  </g>

  <!-- Distant birds -->
  <g fill="none" stroke="#455A64" stroke-width="1.5" stroke-linecap="round" opacity="0.35">
    <path d="M580,130 Q585,124 590,130 Q595,124 600,130"/>
    <path d="M610,145 Q614,140 618,145 Q622,140 626,145"/>
    <path d="M555,155 Q558,151 561,155 Q564,151 567,155"/>
  </g>

  <!-- Ocean base -->
  <rect x="0" y="260" width="800" height="160" fill="url(#ocean)"/>

  <!-- Wave layers -->
  <path d="M0,280 Q40,270 80,280 Q120,290 160,280 Q200,270 240,280 Q280,290 320,280 Q360,270 400,280 Q440,290 480,280 Q520,270 560,280 Q600,290 640,280 Q680,270 720,280 Q760,290 800,280 V300 Q760,295 720,300 Q680,305 640,300 Q600,295 560,300 Q520,305 480,300 Q440,295 400,300 Q360,305 320,300 Q280,295 240,300 Q200,305 160,300 Q120,295 80,300 Q40,305 0,300 Z" fill="#29B6F6" opacity="0.5"/>
  <path d="M0,310 Q50,300 100,310 Q150,320 200,310 Q250,300 300,310 Q350,320 400,310 Q450,300 500,310 Q550,320 600,310 Q650,300 700,310 Q750,320 800,310 V330 Q750,326 700,330 Q650,334 600,330 Q550,326 500,330 Q450,334 400,330 Q350,326 300,330 Q250,334 200,330 Q150,326 100,330 Q50,334 0,330 Z" fill="#4FC3F7" opacity="0.4"/>
  <path d="M0,345 Q60,338 120,345 Q180,352 240,345 Q300,338 360,345 Q420,352 480,345 Q540,338 600,345 Q660,352 720,345 Q780,338 800,345" fill="none" stroke="#B3E5FC" stroke-width="2" opacity="0.6"/>

  <!-- Foam line at shore -->
  <path d="M0,395 Q30,388 60,395 Q90,402 120,395 Q150,388 180,395 Q210,402 240,395 Q270,388 300,395 Q330,402 360,395 Q390,388 420,395 Q450,402 480,395 Q510,388 540,395 Q570,402 600,395 Q630,388 660,395 Q690,402 720,395 Q750,388 780,395 Q800,400 800,395" fill="none" stroke="white" stroke-width="3" opacity="0.85"/>
  <path d="M0,398 Q35,392 70,398 Q105,404 140,398 Q175,392 210,398 Q245,404 280,398 Q315,392 350,398 Q385,404 420,398 Q455,392 490,398 Q525,404 560,398 Q595,392 630,398 Q665,404 700,398 Q735,392 770,398 L800,398" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- Beach -->
  <path d="M0,405 Q200,388 400,400 Q600,412 800,395 L800,600 L0,600 Z" fill="url(#sand)"/>

  <!-- Wet sand area -->
  <path d="M0,405 Q200,388 400,400 Q600,412 800,395 L800,435 Q600,445 400,430 Q200,415 0,440 Z" fill="url(#wetSand)" opacity="0.6"/>

  <!-- Sand texture dots -->
  <g fill="#C8A96E" opacity="0.3">
    <circle cx="80" cy="470" r="1.5"/><circle cx="180" cy="500" r="1"/><circle cx="350" cy="480" r="1.5"/>
    <circle cx="500" cy="460" r="1"/><circle cx="620" cy="490" r="1.5"/><circle cx="710" cy="475" r="1"/>
    <circle cx="150" cy="530" r="1"/><circle cx="280" cy="550" r="1.5"/><circle cx="450" cy="540" r="1"/>
    <circle cx="580" cy="520" r="1.2"/><circle cx="680" cy="560" r="1"/>
  </g>

  <!-- Beach grass -->
  <g fill="none" stroke="#6B8E23" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <path d="M45,445 Q48,425 52,445"/>
    <path d="M52,443 Q56,418 60,443"/>
    <path d="M40,447 Q42,430 44,447"/>
    <path d="M58,445 Q62,428 64,447"/>
    <path d="M735,455 Q738,435 741,455"/>
    <path d="M741,453 Q745,430 748,455"/>
    <path d="M730,457 Q732,440 734,457"/>
  </g>

  <!-- Shadow under bicycle on sand -->
  <ellipse cx="370" cy="470" rx="95" ry="10" fill="rgba(0,0,0,0.08)"/>

  <!-- ===== BICYCLE ===== -->
  <g transform="translate(305, 380)">
    <!-- Back wheel -->
    <circle cx="0" cy="55" r="46" fill="none" stroke="#212121" stroke-width="3.5"/>
    <circle cx="0" cy="55" r="42" fill="none" stroke="#424242" stroke-width="0.8" opacity="0.4"/>
    <!-- Back spokes -->
    <g stroke="#9E9E9E" stroke-width="0.8" opacity="0.7">
      <line x1="0" y1="13" x2="0" y2="97"/><line x1="-42" y1="55" x2="42" y2="55"/>
      <line x1="-30" y1="25" x2="30" y2="85"/><line x1="-30" y1="85" x2="30" y2="25"/>
      <line x1="-42" y1="35" x2="42" y2="75"/><line x1="-42" y1="75" x2="42" y2="35"/>
    </g>
    <circle cx="0" cy="55" r="5" fill="#616161"/>
    <circle cx="0" cy="55" r="2" fill="#9E9E9E"/>

    <!-- Front wheel -->
    <circle cx="130" cy="55" r="46" fill="none" stroke="#212121" stroke-width="3.5"/>
    <circle cx="130" cy="55" r="42" fill="none" stroke="#424242" stroke-width="0.8" opacity="0.4"/>
    <!-- Front spokes -->
    <g stroke="#9E9E9E" stroke-width="0.8" opacity="0.7">
      <line x1="130" y1="13" x2="130" y2="97"/><line x1="88" y1="55" x2="172" y2="55"/>
      <line x1="100" y1="25" x2="160" y2="85"/><line x1="100" y1="85" x2="160" y2="25"/>
      <line x1="88" y1="35" x2="172" y2="75"/><line x1="88" y1="75" x2="172" y2="35"/>
    </g>
    <circle cx="130" cy="55" r="5" fill="#616161"/>
    <circle cx="130" cy="55" r="2" fill="#9E9E9E"/>

    <!-- Frame - main triangle -->
    <line x1="0" y1="55" x2="25" y2="8" stroke="#C62828" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="25" y1="8" x2="100" y2="14" stroke="#C62828" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="100" y1="14" x2="0" y2="55" stroke="#C62828" stroke-width="4" stroke-linecap="round"/>
    <!-- Chain stay -->
    <line x1="0" y1="55" x2="68" y2="55" stroke="#C62828" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Seat stay -->
    <line x1="25" y1="8" x2="68" y2="55" stroke="#C62828" stroke-width="3" stroke-linecap="round"/>
    <!-- Fork -->
    <path d="M100,14 Q108,30 130,55" fill="none" stroke="#C62828" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Down tube to bottom bracket connection highlight -->
    <circle cx="68" cy="55" r="3" fill="#B71C1C"/>

    <!-- Seat post -->
    <line x1="25" y1="8" x2="23" y2="-8" stroke="#424242" stroke-width="3" stroke-linecap="round"/>
    <!-- Seat -->
    <path d="M10,-11 Q23,-16 38,-11 Q36,-7 23,-5 Q10,-7 10,-11 Z" fill="#333"/>

    <!-- Handlebar stem -->
    <line x1="96" y1="14" x2="104" y2="-8" stroke="#424242" stroke-width="3" stroke-linecap="round"/>
    <!-- Handlebars -->
    <path d="M92,-6 Q104,-18 118,-8" fill="none" stroke="#424242" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Handlebar grips -->
    <line x1="89" y1="-4" x2="93" y2="-7" stroke="#212121" stroke-width="5" stroke-linecap="round"/>
    <line x1="115" y1="-6" x2="119" y2="-5" stroke="#212121" stroke-width="5" stroke-linecap="round"/>

    <!-- Crank and pedals -->
    <circle cx="68" cy="55" r="9" fill="none" stroke="#555" stroke-width="2"/>
    <line x1="68" y1="44" x2="68" y2="66" stroke="#555" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Pedals -->
    <rect x="59" y="40" width="18" height="5" rx="2" fill="#424242"/>
    <rect x="59" y="63" width="18" height="5" rx="2" fill="#424242"/>
    <rect x="59" y="40" width="18" height="2" rx="1" fill="#616161" opacity="0.5"/>
    <rect x="59" y="63" width="18" height="2" rx="1" fill="#616161" opacity="0.5"/>

    <!-- Chain (simplified) -->
    <path d="M68,55 Q34,72 0,55" fill="none" stroke="#555" stroke-width="1.8" stroke-dasharray="3,2" opacity="0.5"/>
    <!-- Chainring -->
    <circle cx="68" cy="55" r="11" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="2,3" opacity="0.4"/>
  </g>

  <!-- ===== PELICAN ===== -->
  <g transform="translate(330, 310)">
    <!-- Legs with orange-yellow color -->
    <!-- Left leg (reaching to upper pedal) -->
    <path d="M-2,68 Q-8,80 -12,88 Q-14,92 -18,94" fill="none" stroke="#E8A020" stroke-width="5" stroke-linecap="round"/>
    <!-- Right leg (reaching to lower pedal) -->
    <path d="M6,68 Q12,82 16,95 Q18,100 22,108" fill="none" stroke="#E8A020" stroke-width="5" stroke-linecap="round"/>

    <!-- Feet - left -->
    <g transform="translate(-18,94)">
      <path d="M0,0 L-8,6 M0,0 L-5,8 M0,0 L0,8" fill="none" stroke="#E8A020" stroke-width="3.5" stroke-linecap="round"/>
    </g>
    <!-- Feet - right -->
    <g transform="translate(22,108)">
      <path d="M0,0 L-8,6 M0,0 L-5,8 M0,0 L0,8" fill="none" stroke="#E8A020" stroke-width="3.5" stroke-linecap="round"/>
    </g>

    <!-- Tail feathers -->
    <path d="M-28,55 L-52,60 Q-55,62 -50,64 L-25,58 Z" fill="#E0D8C4"/>
    <path d="M-30,58 L-55,66 Q-58,68 -52,70 L-27,62 Z" fill="#D8CFC0"/>
    <path d="M-28,62 L-48,72 Q-50,74 -46,74 L-24,65 Z" fill="#D0C8B8"/>

    <!-- Body -->
    <ellipse cx="0" cy="38" rx="42" ry="40" fill="url(#bodyGrad)" stroke="#DDD8C8" stroke-width="0.8"/>
    <!-- Body highlight -->
    <ellipse cx="-5" cy="28" rx="28" ry="25" fill="white" opacity="0.25"/>
    <!-- Body bottom shading -->
    <ellipse cx="5" cy="52" rx="30" ry="18" fill="#E8E0D0" opacity="0.3"/>

    <!-- Wing -->
    <path d="M-12,22 Q-48,32 -44,58 Q-42,72 -38,76 Q-30,82 -12,78 Q0,72 6,60 Q12,48 8,30 Z" fill="#E2DACE" stroke="#CFC6B0" stroke-width="0.8"/>
    <!-- Wing feather lines -->
    <g fill="none" stroke="#CFC6B0" stroke-width="0.8" opacity="0.6">
      <path d="M-35,42 Q-40,52 -37,68"/>
      <path d="M-28,36 Q-33,50 -28,70"/>
      <path d="M-20,32 Q-24,48 -18,72"/>
      <path d="M-12,28 Q-15,46 -10,72"/>
    </g>
    <!-- Wing highlight -->
    <path d="M-30,38 Q-35,48 -32,58" fill="none" stroke="#F0E8D8" stroke-width="1.5" opacity="0.4"/>

    <!-- Neck - white with slight curve -->
    <path d="M18,15 Q30,2 38,-10 Q42,-18 40,-25 Q38,-30 35,-32" fill="url(#bodyGrad)" stroke="#DDD8C8" stroke-width="0.5"/>
    <path d="M12,18 Q22,8 32,-5 Q38,-14 38,-25" fill="url(#bodyGrad)"/>
    <!-- Neck back line -->
    <path d="M22,12 Q34,0 40,-10 Q43,-18 41,-25" fill="none" stroke="#DDD8C8" stroke-width="0.5"/>

    <!-- Head -->
    <ellipse cx="36" cy="-34" rx="20" ry="17" fill="url(#bodyGrad)" stroke="#DDD8C8" stroke-width="0.5"/>
    <!-- Head highlight -->
    <ellipse cx="33" cy="-38" rx="10" ry="8" fill="white" opacity="0.15"/>

    <!-- Eye ring -->
    <circle cx="30" cy="-37" r="6" fill="#F5F0E0" stroke="#D0C8B0" stroke-width="0.5"/>
    <!-- Eye -->
    <circle cx="30" cy="-37" r="4" fill="#1a1a1a"/>
    <!-- Eye highlight -->
    <circle cx="28.5" cy="-38.5" r="1.5" fill="white"/>

    <!-- Upper beak -->
    <path d="M52,-40 L100,-37 Q104,-36 103,-33 L52,-30 Q49,-34 52,-40 Z" fill="#E88A10" stroke="#D07508" stroke-width="0.5"/>
    <!-- Beak ridge line -->
    <line x1="55" y1="-35" x2="98" y2="-35" stroke="#D07508" stroke-width="0.5" opacity="0.4"/>
    <!-- Beak tip hook -->
    <path d="M100,-37 Q106,-38 105,-33 Q104,-31 103,-33" fill="#D07508"/>

    <!-- Lower beak with pouch -->
    <path d="M52,-30 L82,-28 Q88,-18 80,-10 Q70,-4 55,-16 Q51,-22 52,-30 Z" fill="url(#pouchG)" stroke="#D07508" stroke-width="0.5"/>
    <!-- Pouch texture lines -->
    <g fill="none" stroke="#D07508" stroke-width="0.4" opacity="0.4">
      <path d="M56,-24 Q65,-14 72,-16"/>
      <path d="M58,-22 Q68,-10 76,-14"/>
      <path d="M60,-20 Q70,-8 78,-12"/>
    </g>
    <!-- Pouch highlight -->
    <path d="M58,-26 Q66,-16 74,-18" fill="none" stroke="#FFB74D" stroke-width="1" opacity="0.3"/>

    <!-- Crown feathers (crest) -->
    <g fill="none" stroke="#C8BCA5" stroke-width="2" stroke-linecap="round">
      <path d="M24,-48 Q26,-56 28,-50"/>
      <path d="M28,-49 Q31,-58 33,-51"/>
      <path d="M32,-49 Q34,-56 36,-50"/>
      <path d="M36,-47 Q38,-54 39,-48"/>
    </g>

    <!-- Cheek pouch coloring -->
    <ellipse cx="40" cy="-28" rx="8" ry="5" fill="#FFE0B2" opacity="0.3"/>
  </g>

  <!-- Pelican shadow on beach -->
  <ellipse cx="365" cy="468" rx="30" ry="6" fill="rgba(0,0,0,0.06)"/>

  <!-- Wind/motion lines -->
  <g stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.25">
    <line x1="180" y1="320" x2="230" y2="318"/>
    <line x1="170" y1="340" x2="215" y2="339"/>
    <line x1="160" y1="358" x2="200" y2="357"/>
    <line x1="190" y1="375" x2="225" y2="374"/>
  </g>

  <!-- Light sparkles on water -->
  <g fill="white" opacity="0.4">
    <circle cx="100" cy="300" r="2"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="320" r="1.5"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="290" r="2"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="310" r="1.5"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="340" r="1"><animate attributeName="opacity" values="0.4;0.15;0.4" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="350" r="1.5"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Tiny sailboat in distance -->
  <g transform="translate(560, 270)" opacity="0.5">
    <path d="M0,10 L3,-12 L6,10 Z" fill="white"/>
    <line x1="3" y1="-12" x2="3" y2="12" stroke="#555" stroke-width="0.8"/>
    <path d="M-2,10 Q3,14 8,10" fill="#5DADE2"/>
  </g>
</svg>