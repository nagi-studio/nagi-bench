    <circle cx="340" cy="595" r="52" fill="#F0F0F0"/>
    <circle cx="340" cy="595" r="50" fill="none" stroke="#A0A0A0" stroke-width="2"/>
    <g stroke="#909090" stroke-width="1.3">
      <line x1="340" y1="545" x2="340" y2="645"/>
      <line x1="290" y1="595" x2="390" y2="595"/>
      <line x1="306" y1="561" x2="374" y2="629"/>
      <line x1="306" y1="629" x2="374" y2="561"/>
      <line x1="295" y1="578" x2="385" y2="612"/>
      <line x1="295" y1="612" x2="385" y2="578"/>
    </g>
    <circle cx="340" cy="595" r="9" fill="#666666"/>
    <circle cx="340" cy="595" r="5" fill="#1F1F1F"/>
    <circle cx="338" cy="593" r="1.5" fill="#A0A0A0"/>

    <!-- Front wheel -->
    <circle cx="660" cy="595" r="65" fill="url(#tireRad)"/>
    <circle cx="660" cy="595" r="52" fill="#F0F0F0"/>
    <circle cx="660" cy="595" r="50" fill="none" stroke="#A0A0A0" stroke-width="2"/>
    <g stroke="#909090" stroke-width="1.3">
      <line x1="660" y1="545" x2="660" y2="645"/>
      <line x1="610" y1="595" x2="710" y2="595"/>
      <line x1="626" y1="561" x2="694" y2="629"/>
      <line x1="626" y1="629" x2="694" y2="561"/>
      <line x1="615" y1="578" x2="705" y2="612"/>
      <line x1="615" y1="612" x2="705" y2="578"/>
    </g>
    <circle cx="660" cy="595" r="9" fill="#666666"/>
    <circle cx="660" cy="595" r="5" fill="#1F1F1F"/>
    <circle cx="658" cy="593" r="1.5" fill="#A0A0A0"/>

    <!-- Frame tubes -->
    <g stroke="url(#frameRed)" stroke-width="10" stroke-linecap="round" fill="none">
      <line x1="500" y1="585" x2="640" y2="455"/>
      <line x1="440" y1="465" x2="640" y2="455"/>
      <line x1="500" y1="585" x2="440" y2="465"/>
      <line x1="500" y1="585" x2="340" y2="595"/>
      <line x1="440" y1="465" x2="340" y2="595"/>
    </g>

    <!-- Frame highlights -->
    <g stroke="#FF8888" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7">
      <line x1="503" y1="582" x2="640" y2="453"/>
      <line x1="445" y1="463" x2="638" y2="453"/>
    </g>

    <!-- Crank -->
    <circle cx="500" cy="585" r="16" fill="#404040"/>
    <circle cx="500" cy="585" r="11" fill="#1a1a1a"/>
    <circle cx="500" cy="585" r="4" fill="#666"/>
    <g stroke="#2a2a2a" stroke-width="6" stroke-linecap="round">
      <line x1="500" y1="585" x2="545" y2="618"/>
      <line x1="500" y1="585" x2="455" y2="552"/>
    </g>
    <rect x="535" y="613" width="26" height="9" rx="2" fill="#1a1a1a"/>
    <rect x="535" y="611" width="26" height="2" rx="1" fill="#444"/>
    <rect x="439" y="548" width="26" height="9" rx="2" fill="#1a1a1a"/>
    <rect x="439" y="546" width="26" height="2" rx="1" fill="#444"/>

    <!-- Chain -->
    <path d="M 340 595 Q 420 590 500 600" stroke="#5a5a5a" stroke-width="2" fill="none" stroke-dasharray="3 2"/>

    <!-- Seat -->
    <line x1="440" y1="465" x2="440" y2="440" stroke="#2a2a2a" stroke-width="7" stroke-linecap="round"/>
    <path d="M 408 438 Q 408 432 416 432 L 468 434 Q 478 434 475 442 Q 470 446 460 444 L 418 444 Q 410 444 408 438 Z" fill="#3a2010"/>
    <ellipse cx="440" cy="436" rx="32" ry="5" fill="#5a3018"/>
    <ellipse cx="438" cy="434" rx="20" ry="2" fill="#7a4020" opacity="0.7"/>

    <!-- Handlebar stem and bars -->
    <line x1="640" y1="455" x2="640" y2="420" stroke="#2a2a2a" stroke-width="7" stroke-linecap="round"/>
    <path d="M 580 425 Q 600 415 620 422 L 660 422 Q 680 415 700 425" fill="none" stroke="#2a2a2a" stroke-width="6" stroke-linecap="round"/>
    <line x1="572" y1="425" x2="585" y2="425" stroke="#1a1a1a" stroke-width="11" stroke-linecap="round"/>
    <line x1="695" y1="425" x2="708" y2="425" stroke="#1a1a1a" stroke-width="11" stroke-linecap="round"/>
    <line x1="575" y1="425" x2="580" y2="425" stroke="#FF6644" stroke-width="3" stroke-linecap="round"/>
    <line x1="700" y1="425" x2="705" y2="425" stroke="#FF6644" stroke-width="3" stroke-linecap="round"/>

    <!-- Front fork -->
    <line x1="640" y1="455" x2="660" y2="595" stroke="url(#frameRed)" stroke-width="8" stroke-linecap="round"/>

    <!-- Front basket with fish -->
    <path d="M 668 405 L 720 405 L 715 440 L 673 440 Z" fill="#C09060" stroke="#7A5030" stroke-width="1.5"/>
    <g stroke="#7A5030" stroke-width="0.8" fill="none">
      <line x1="675" y1="412" x2="715" y2="412"/>
      <line x1="676" y1="422" x2="714" y2="422"/>
      <line x1="677" y1="432" x2="713" y2="432"/>
      <line x1="680" y1="405" x2="678" y2="440"/>
      <line x1="690" y1="405" x2="688" y2="440"/>
      <line x1="700" y1="405" x2="700" y2="440"/>
      <line x1="710" y1="405" x2="712" y2="440"/>
    </g>
    <g transform="translate(694, 418)">
      <ellipse cx="0" cy="0" rx="13" ry="6" fill="#7AB8D8"/>
      <ellipse cx="-2" cy="-2" rx="9" ry="3" fill="#A0D0E8" opacity="0.7"/>
      <path d="M 11 0 L 18 -6 L 18 6 Z" fill="#7AB8D8"/>
      <circle cx="-7" cy="-1" r="1.8" fill="#1a1a1a"/>
      <circle cx="-7" cy="-1" r="0.6" fill="#FFF"/>
      <path d="M -5 3 Q 0 5 5 3" stroke="#5090B0" stroke-width="0.5" fill="none"/>
    </g>
  </g>

  <!-- PELICAN -->
  <g id="pelican">
    <!-- Tail feathers -->
    <path d="M 380 425 L 320 415 L 305 425 L 320 435 L 380 440 Z" fill="url(#wing)"/>
    <path d="M 380 430 L 330 425 L 320 432 L 340 445 L 380 445 Z" fill="#9a9a9a" opacity="0.7"/>
    <g stroke="#666" stroke-width="0.6" fill="none">
      <line x1="370" y1="425" x2="325" y2="420"/>
      <line x1="370" y1="432" x2="325" y2="430"/>
      <line x1="370" y1="440" x2="325" y2="440"/>
    </g>

    <!-- Far wing shape behind body -->
    <path d="M 460 410 Q 530 405 590 415 Q 620 420 615 430 Q 595 432 565 425 Q 510 422 470 425 Z" fill="#B8B8B8" opacity="0.7"/>

    <!-- Body -->
    <ellipse cx="455" cy="430" rx="92" ry="58" fill="url(#pelicanBody)"/>

    <!-- Body bottom shading -->
    <path d="M 380 450 Q 420 488 480 490 Q 530 488 545 460 Q 530 480 470 484 Q 410 482 380 450 Z" fill="#BABABA" opacity="0.55"/>

    <!-- Belly highlight -->
    <ellipse cx="430" cy="420" rx="40" ry="20" fill="#FFFFFF" opacity="0.4"/>

    <!-- Folded wing on visible side -->
    <path d="M 405 405 Q 440 395 490 410 Q 530 425 535 460 Q 530 475 495 478 Q 450 478 415 465 Q 395 442 405 405 Z" fill="url(#wing)"/>

    <!-- Feather lines on wing -->
    <g stroke="#777" stroke-width="0.9" fill="none" opacity="0.7">
      <path d="M 425 410 Q 432 432 440 458"/>
      <path d="M 445 410 Q 452 432 458 460"/>
      <path d="M 465 415 Q 472 435 478 462"/>
      <path d="M 485 420 Q 492 440 495 463"/>
      <path d="M 505 430 Q 510 445 512 463"/>
    </g>

    <!-- Dark wing tips -->
    <path d="M 405 455 Q 392 465 386 480 Q 395 482 412 470 Q 415 463 405 455 Z" fill="#1F1F1F"/>
    <path d="M 415 460 Q 405 472 400 485 Q 410 486 422 475 Q 425 468 415 460 Z" fill="#2A2A2A"/>
    <path d="M 425 462 Q 416 475 412 488 Q 422 490 432 478 Q 434 470 425 462 Z" fill="#363636"/>

    <!-- Wing shoulder highlight -->
    <ellipse cx="450" cy="420" rx="25" ry="10" fill="#FFFFFF" opacity="0.5"/>

    <!-- Wing-arm reaching forward to handlebar -->
    <path d="M 510 425 Q 555 420 595 425 Q 615 425 620 432 Q 615 438 595 438 Q 555 438 510 440 Z" fill="url(#pelicanBody)" stroke="#C0C0C0" stroke-width="0.5"/>
    <g stroke="#999" stroke-width="0.6" fill="none" opacity="0.5">
      <path d="M 530 426 Q 545 432 545 436"/>
      <path d="M 555 425 Q 568 432 568 436"/>
      <path d="M 580 425 Q 590 432 590 436"/>
    </g>

    <!-- Wing tip "hand" gripping handlebar -->
    <ellipse cx="612" cy="430" rx="14" ry="8" fill="url(#pelicanBody)" stroke="#A0A0A0" stroke-width="0.6"/>
    <g fill="#666" opacity="0.7">
      <ellipse cx="615" cy="436" rx="3" ry="2"/>
      <ellipse cx="608" cy="437" rx="3" ry="2"/>
      <ellipse cx="601" cy="436" rx="3" ry="2"/>
    </g>

    <!-- Neck S-curve -->
    <path d="M 515 410 C 525 380, 545 360, 575 350 C 600 348, 615 358, 615 380 C 615 395, 600 405, 580 400 C 555 400, 535 415, 525 425 Z" fill="url(#pelicanBody)" stroke="#C8C8C8" stroke-width="0.5"/>
    <path d="M 525 415 C 540 400, 560 388, 590 388 C 600 388, 605 395, 600 400 C 585 402, 565 410, 545 420 Z" fill="#D8D8D8" opacity="0.5"/>

    <!-- Head -->
    <circle cx="605" cy="355" r="34" fill="url(#pelicanBody)"/>
    <path d="M 580 358 Q 590 385 615 388 Q 632 386 635 372 Q 628 378 605 380 Q 588 377 580 358 Z" fill="#D0D0D0" opacity="0.55"/>
    <ellipse cx="600" cy="328" rx="15" ry="6" fill="#FFFFFF" opacity="0.7"/>

    <!-- Eye patch (yellowish skin) -->
    <ellipse cx="615" cy="350" rx="10" ry="7" fill="#FFE08A" opacity="0.7"/>

    <!-- Eye -->
    <circle cx="617" cy="349" r="5" fill="#FFFFFF"/>
    <circle cx="618" cy="350" r="4" fill="#2a1a08"/>
    <circle cx="618" cy="350" r="2.5" fill="#000000"/>
    <circle cx="619" cy="348" r="1.5" fill="#FFFFFF"/>

    <!-- Eyebrow -->
    <path d="M 608 342 Q 618 340 626 343" stroke="#999" stroke-width="0.8" fill="none"/>

    <!-- Upper beak -->
    <path d="M 630 358 Q 670 348 715 352 Q 745 354 752 360 Q 750 366 745 367 Q 715 365 670 367 Q 640 368 630 365 Z" fill="url(#beak)" stroke="#A06820" stroke-width="0.8"/>
    <path d="M 635 358 Q 680 352 720 354 Q 730 356 728 360 Q 700 358 670 360 Q 645 360 635 358 Z" fill="#FFE9B0" opacity="0.5"/>

    <!-- Beak hook -->
    <path d="M 745 362 Q 758 364 760 372 Q 756 376 745 370 Z" fill="#9a6010"/>
    <path d="M 750 365 Q 757 367 758 372" stroke="#7a4810" stroke-width="0.8" fill="none"/>

    <!-- Nostril -->
    <ellipse cx="660" cy="360" rx="2.5" ry="1.2" fill="#6a3a08"/>

    <!-- Beak segment lines -->
    <g stroke="#A06820" stroke-width="0.5" fill="none" opacity="0.5">
      <path d="M 680 358 Q 680 363 680 367"/>
      <path d="M 710 357 Q 710 362 710 366"/>
    </g>

    <!-- Pouch / lower beak -->
    <path d="M 630 370 Q 645 410 685 425 Q 725 425 745 410 Q 752 395 748 378 Q 720 378 685 376 Q 650 374 630 370 Z" fill="url(#pouch)" stroke="#A05020" stroke-width="0.8"/>
    <path d="M 630 370 Q 700 376 748 378" fill="none" stroke="#B04020" stroke-width="0.8"/>
    <path d="M 645 385 Q 670 408 705 414 Q 695 405 670 398 Q 650 390 645 385 Z" fill="#FFD0A0" opacity="0.5"/>
    <g stroke="#9A4018" stroke-width="0.6" fill="none" opacity="0.55">
      <path d="M 650 388 Q 680 410 715 412"/>
      <path d="M 670 400 Q 695 418 720 415"/>
      <path d="M 690 395 Q 710 412 730 405"/>
    </g>

    <!-- Legs -->
    <path d="M 455 485 Q 452 525 458 550" stroke="url(#leg)" stroke-width="9" fill="none" stroke-linecap="round"/>
    <g transform="translate(452, 550)">
      <path d="M 0 0 Q -5 -2 -8 3 Q -7 8 0 9 Q 8 10 14 8 Q 18 5 16 0 Q 14 -3 8 -2 Q 4 -3 0 0 Z" fill="url(#leg)" stroke="#7a3010" stroke-width="0.8"/>
      <g stroke="#7a3010" stroke-width="0.5" fill="none">
        <path d="M -2 4 L 4 8"/>
        <path d="M 4 5 L 10 9"/>
        <path d="M 9 4 L 14 7"/>
      </g>
    </g>

    <path d="M 505 480 Q 525 555 545 612" stroke="url(#leg)" stroke-width="9" fill="none" stroke-linecap="round"/>
