<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9F7A"/>
      <stop offset="30%" stop-color="#FFC59A"/>
      <stop offset="60%" stop-color="#FFE6CB"/>
      <stop offset="100%" stop-color="#B0D8E5"/>
    </linearGradient>
    <radialGradient id="sunRad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFCE6"/>
      <stop offset="55%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFE066" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFE066" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4D90B8"/>
      <stop offset="60%" stop-color="#3D7DA0"/>
      <stop offset="100%" stop-color="#2A5C7E"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFD7A0"/>
      <stop offset="50%" stop-color="#E0C588"/>
      <stop offset="100%" stop-color="#BFA070"/>
    </linearGradient>
    <linearGradient id="pelicanBody" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#EAEAEA"/>
      <stop offset="100%" stop-color="#B8B8B8"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="40%" stop-color="#D0D0D0"/>
      <stop offset="80%" stop-color="#5A5A5A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="beak" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#FFE0A0"/>
      <stop offset="50%" stop-color="#F0B860"/>
      <stop offset="100%" stop-color="#C68A30"/>
    </linearGradient>
    <linearGradient id="pouch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC080"/>
      <stop offset="60%" stop-color="#F09060"/>
      <stop offset="100%" stop-color="#C46030"/>
    </linearGradient>
    <linearGradient id="leg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F08040"/>
      <stop offset="100%" stop-color="#A04010"/>
    </linearGradient>
    <radialGradient id="tireRad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="75%" stop-color="#1F1F1F"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="frameRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E63B3B"/>
      <stop offset="100%" stop-color="#A01818"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1000" height="485" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="770" cy="130" r="140" fill="url(#sunGlow)"/>
  <circle cx="770" cy="130" r="62" fill="url(#sunRad)"/>

  <!-- Clouds -->
  <g fill="#FFFFFF" opacity="0.9">
    <ellipse cx="200" cy="100" rx="65" ry="14"/>
    <ellipse cx="235" cy="88" rx="42" ry="12"/>
    <ellipse cx="170" cy="90" rx="38" ry="11"/>
    <ellipse cx="155" cy="105" rx="32" ry="10"/>
    <ellipse cx="500" cy="65" rx="55" ry="11"/>
    <ellipse cx="535" cy="58" rx="38" ry="10"/>
    <ellipse cx="475" cy="62" rx="32" ry="9"/>
    <ellipse cx="900" cy="220" rx="60" ry="12"/>
    <ellipse cx="935" cy="213" rx="42" ry="10"/>
    <ellipse cx="875" cy="225" rx="30" ry="8"/>
    <ellipse cx="50" cy="180" rx="50" ry="10" opacity="0.7"/>
    <ellipse cx="85" cy="175" rx="32" ry="8" opacity="0.7"/>
  </g>

  <!-- Distant seagulls -->
  <g fill="none" stroke="#444444" stroke-width="1.8" stroke-linecap="round" opacity="0.65">
    <path d="M 600 180 Q 608 172 615 180 M 615 180 Q 622 172 630 180"/>
    <path d="M 650 210 Q 656 204 662 210 M 662 210 Q 668 204 674 210"/>
    <path d="M 100 215 Q 108 207 116 215 M 116 215 Q 124 207 132 215"/>
    <path d="M 350 150 Q 357 144 364 150 M 364 150 Q 371 144 378 150"/>
    <path d="M 430 230 Q 435 226 440 230 M 440 230 Q 445 226 450 230"/>
  </g>

  <!-- Distant land -->
  <path d="M 0 385 Q 80 372 160 378 Q 230 372 290 380 Q 320 378 320 390 L 0 390 Z" fill="#4D6B7F" opacity="0.55"/>

  <!-- Sea -->
  <rect y="390" width="1000" height="95" fill="url(#sea)"/>

  <!-- Sun reflection on water -->
