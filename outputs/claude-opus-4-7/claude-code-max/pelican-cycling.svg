    <ellipse cx="770" cy="395" rx="75" ry="3" fill="#FFE066"/>
    <ellipse cx="770" cy="410" rx="60" ry="2.5" fill="#FFE066" opacity="0.7"/>
    <ellipse cx="770" cy="425" rx="45" ry="2" fill="#FFE066" opacity="0.55"/>
    <ellipse cx="770" cy="440" rx="32" ry="1.8" fill="#FFE066" opacity="0.4"/>
    <ellipse cx="770" cy="455" rx="22" ry="1.5" fill="#FFE066" opacity="0.3"/>
    <ellipse cx="770" cy="470" rx="14" ry="1.2" fill="#FFE066" opacity="0.2"/>
  </g>

  <!-- Waves -->
  <g stroke="#FFFFFF" stroke-width="1.3" fill="none" opacity="0.6">
    <path d="M 0 410 Q 40 405 80 410 T 160 410 T 240 410 T 320 410 T 400 410 T 480 410 T 560 410 T 640 410 T 720 410 T 800 410 T 880 410 T 960 410"/>
    <path d="M 0 430 Q 45 426 90 430 T 180 430 T 270 430 T 360 430 T 450 430 T 540 430 T 630 430 T 720 430 T 810 430 T 900 430 T 990 430"/>
    <path d="M 0 455 Q 50 451 100 455 T 200 455 T 300 455 T 400 455 T 500 455 T 600 455 T 700 455 T 800 455 T 900 455 T 1000 455"/>
    <path d="M 0 475 Q 55 470 110 475 T 220 475 T 330 475 T 440 475 T 550 475 T 660 475 T 770 475 T 880 475 T 990 475" opacity="0.4"/>
  </g>

  <!-- Wet sand band -->
  <path d="M 0 478 Q 200 472 400 480 Q 600 477 800 482 Q 900 480 1000 483 L 1000 502 L 0 502 Z" fill="#A88A65" opacity="0.85"/>

  <!-- Foam -->
  <g fill="#FFFFFF" opacity="0.8">
    <ellipse cx="100" cy="481" rx="18" ry="2"/>
    <ellipse cx="195" cy="478" rx="22" ry="2.5"/>
    <ellipse cx="285" cy="483" rx="18" ry="2"/>
    <ellipse cx="395" cy="481" rx="25" ry="2.5"/>
    <ellipse cx="510" cy="484" rx="20" ry="2"/>
    <ellipse cx="630" cy="479" rx="22" ry="2.2"/>
    <ellipse cx="760" cy="482" rx="18" ry="2"/>
    <ellipse cx="890" cy="481" rx="20" ry="2"/>
    <ellipse cx="980" cy="484" rx="15" ry="1.8"/>
  </g>

  <!-- Sand -->
  <rect y="498" width="1000" height="202" fill="url(#sand)"/>

  <!-- Sand texture -->
  <g fill="#B59868" opacity="0.5">
    <circle cx="80" cy="560" r="2"/>
    <circle cx="150" cy="620" r="1.5"/>
    <circle cx="220" cy="580" r="2.5"/>
    <circle cx="280" cy="660" r="2"/>
    <circle cx="80" cy="680" r="1.5"/>
    <circle cx="200" cy="540" r="1.8"/>
    <circle cx="320" cy="600" r="1.5"/>
    <circle cx="700" cy="540" r="2"/>
    <circle cx="850" cy="600" r="2.5"/>
    <circle cx="920" cy="650" r="2"/>
    <circle cx="180" cy="640" r="1.5"/>
    <circle cx="50" cy="620" r="2"/>
    <circle cx="280" cy="610" r="1.5"/>
    <circle cx="370" cy="660" r="2"/>
    <circle cx="780" cy="640" r="1.5"/>
    <circle cx="880" cy="540" r="2"/>
    <circle cx="950" cy="580" r="1.5"/>
    <circle cx="120" cy="555" r="1.5"/>
    <circle cx="730" cy="680" r="2"/>
    <circle cx="820" cy="570" r="1.5"/>
  </g>

  <!-- Pebbles -->
  <g fill="#937555" opacity="0.7">
    <ellipse cx="160" cy="675" rx="4" ry="2.5"/>
    <ellipse cx="850" cy="660" rx="3.5" ry="2"/>
    <ellipse cx="50" cy="650" rx="3" ry="2"/>
    <ellipse cx="930" cy="595" rx="3.5" ry="2"/>
  </g>

  <!-- Seashell -->
  <g transform="translate(820, 670)">
    <path d="M 0 0 Q -10 -14 -4 -22 Q 0 -26 6 -22 Q 14 -14 9 -3 Q 6 4 0 0 Z" fill="#F5C68C" stroke="#C9966A" stroke-width="0.6"/>
    <path d="M -6 -14 Q 0 -18 6 -14" fill="none" stroke="#C9966A" stroke-width="0.5"/>
    <path d="M -7 -10 Q 0 -13 7 -10" fill="none" stroke="#C9966A" stroke-width="0.4"/>
  </g>

  <!-- Starfish -->
  <g transform="translate(220, 690)" opacity="0.85">
    <path d="M 0 -12 L 3 -3 L 12 -2 L 5 4 L 7 13 L 0 8 L -7 13 L -5 4 L -12 -2 L -3 -3 Z" fill="#E68959" stroke="#A85530" stroke-width="0.6"/>
  </g>

  <!-- Bike tire tracks -->
  <g stroke="#9a7a55" stroke-width="3" fill="none" opacity="0.4" stroke-dasharray="5 3">
    <path d="M 30 665 Q 150 658 270 655"/>
    <path d="M 30 675 Q 150 668 270 665"/>
  </g>

  <!-- Ground shadow under bike -->
  <ellipse cx="500" cy="652" rx="200" ry="14" fill="#5a3018" opacity="0.3"/>

  <!-- BICYCLE -->
  <g id="bicycle">
    <!-- Back wheel -->
