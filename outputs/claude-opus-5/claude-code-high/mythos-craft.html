}
/* 依据邻居与自身发光重新点亮单元格（不透明的发光方块同样发光） */
function reseedCell(x, y, z, ch, id) {
  if (ch === 1) {
    let best = B_LIGHT[id];
    if (!B_OPAQUE[id]) for (const D of DIRS6) {
      const nl = getL(x + D[0], y + D[1], z + D[2], 1);
      if (nl > 0) best = Math.max(best, nl - 1 - B_FILTER[id]);
    }
    if (best > getL(x, y, z, 1)) { setL(x, y, z, 1, best); return true; }
  } else {
    if (B_OPAQUE[id]) return false;
    let best = 0;
    for (const D of DIRS6) {
      const nl = getL(x + D[0], y + D[1], z + D[2], 0);
      if (nl <= 0) continue;
      const v = (D[1] === 1 && nl === 15) ? 15 - B_FILTER[id] : nl - 1 - B_FILTER[id];
      if (v > best) best = v;
    }
    if (best > getL(x, y, z, 0)) { setL(x, y, z, 0, best); return true; }
  }
  return false;
}
/* 单点方块变更后的光照修复 */
function updateLightAt(x, y, z, oldId, newId) {
  for (let ch = 0; ch < 2; ch++) {
    const old = getL(x, y, z, ch);
    if (old < 0) return;
    const dimmer = B_OPAQUE[newId] || B_FILTER[newId] > B_FILTER[oldId] ||
      (ch === 1 && B_LIGHT[oldId] > B_LIGHT[newId]);
    let seeds = [];
    if (dimmer && old > 0) seeds = lightRemove(x, y, z, ch, old);
    reseedCell(x, y, z, ch, newId);
    seeds.push([x, y, z]);
    lightPropagate(seeds, ch);
  }
}

/* =====================================================================
   18. 方块修改
   ===================================================================== */
function setBlock(wx, wy, wz, id) {
  if (wy < 0 || wy >= H) return false;
  const cx = wx >> 4, cz = wz >> 4;
  const c = chunks.get(ckey(cx, cz));
  if (!c || !c.data) return false;
  const i = (((wx & 15) * CZ) + (wz & 15)) * H + wy;
  const old = c.data[i];
  if (old === id) return false;
  c.data[i] = id;
  let e = edits.get(c.key);
  if (!e) { e = new Map(); edits.set(c.key, e); }
  e.set(i, id);
  markDirty(c, false);
  markAround(wx, wz);
  updateLightAt(wx, wy, wz, old, id);
  return true;
}

/* =====================================================================
   19. 体素射线检测 (Amanatides & Woo)
   ===================================================================== */
function raycast(ox, oy, oz, dx, dy, dz, maxD) {
  let x = Math.floor(ox), y = Math.floor(oy), z = Math.floor(oz);
  const sx = dx > 0 ? 1 : -1, sy = dy > 0 ? 1 : -1, sz = dz > 0 ? 1 : -1;
  const tdx = Math.abs(1 / dx), tdy = Math.abs(1 / dy), tdz = Math.abs(1 / dz);
  let tmx = (dx > 0 ? (x + 1 - ox) : (ox - x)) * tdx;
  let tmy = (dy > 0 ? (y + 1 - oy) : (oy - y)) * tdy;
  let tmz = (dz > 0 ? (z + 1 - oz) : (oz - z)) * tdz;
  let nx = 0, ny = 0, nz = 0, t = 0;
  for (let i = 0; i < 256 && t <= maxD; i++) {
    const id = getBlock(x, y, z);
    if (id !== 0 && !B_LIQUID[id]) return { x, y, z, nx, ny, nz, id };
    if (tmx < tmy && tmx < tmz) { x += sx; t = tmx; tmx += tdx; nx = -sx; ny = 0; nz = 0; }
    else if (tmy < tmz) { y += sy; t = tmy; tmy += tdy; nx = 0; ny = -sy; nz = 0; }
    else { z += sz; t = tmz; tmz += tdz; nx = 0; ny = 0; nz = -sz; }
  }
  return null;
}

/* =====================================================================
   20. 玩家
   ===================================================================== */
const PW = 0.32, PH = 1.8, EYE = 1.62;
const G = 30, JUMP = 9.2, WALK = 4.6, SPRINT = 7.0, FLY = 16, SWIM = 3.6;

const player = {
  pos: new THREE.Vector3(0, 60, 0),
  vel: new THREE.Vector3(),
  yaw: 0, pitch: 0,
  onGround: false, fly: false, sprint: false, inWater: false, headWater: false,
  bob: 0, lastSpace: 0, lastW: 0
};
const keys = Object.create(null);

function solidAt(x, y, z) {
  const id = getBlock(Math.floor(x), Math.floor(y), Math.floor(z));
  return B_SOLID[id] === 1;
}
function boxHits(px, py, pz) {
  const x0 = Math.floor(px - PW), x1 = Math.floor(px + PW);
  const z0 = Math.floor(pz - PW), z1 = Math.floor(pz + PW);
  const y0 = Math.floor(py + 0.001), y1 = Math.floor(py + PH - 0.001);
  for (let x = x0; x <= x1; x++) for (let y = y0; y <= y1; y++) for (let z = z0; z <= z1; z++)
    if (B_SOLID[getBlock(x, y, z)]) return true;
  return false;
}
function movePlayer(dx, dy, dz) {
  const p = player.pos;
  if (dx !== 0) {
    p.x += dx;
    if (boxHits(p.x, p.y, p.z)) {
      p.x = dx > 0 ? Math.floor(p.x + PW) - PW - 1e-4 : Math.floor(p.x - PW) + 1 + PW + 1e-4;
      player.vel.x = 0;
    }
  }
  if (dz !== 0) {
    p.z += dz;
    if (boxHits(p.x, p.y, p.z)) {
      p.z = dz > 0 ? Math.floor(p.z + PW) - PW - 1e-4 : Math.floor(p.z - PW) + 1 + PW + 1e-4;
      player.vel.z = 0;
    }
  }
  if (dy !== 0) {
    p.y += dy;
    if (boxHits(p.x, p.y, p.z)) {
      if (dy > 0) { p.y = Math.floor(p.y + PH) - PH - 1e-4; }
      else { p.y = Math.floor(p.y) + 1 + 1e-4; player.onGround = true; }
      player.vel.y = 0;
    }
  }
}

function updatePlayer(dt) {
  const p = player;
  const feetId = getBlock(Math.floor(p.pos.x), Math.floor(p.pos.y + 0.4), Math.floor(p.pos.z));
  const headId = getBlock(Math.floor(p.pos.x), Math.floor(p.pos.y + EYE), Math.floor(p.pos.z));
  p.inWater = feetId === ID.water || headId === ID.water;
  p.headWater = headId === ID.water;

  /* 输入方向 */
  let fx = 0, fz = 0;
  if (keys['KeyW']) fz += 1;
  if (keys['KeyS']) fz -= 1;
  if (keys['KeyA']) fx -= 1;
  if (keys['KeyD']) fx += 1;
  const len = Math.hypot(fx, fz);
  if (len > 0) { fx /= len; fz /= len; }
  const cy = Math.cos(p.yaw), sy = Math.sin(p.yaw);
  /* yaw=0 时朝向 -Z */
  const wx = fx * cy - fz * sy;
  const wz = -(fx * sy + fz * cy);

  const sprinting = p.sprint && len > 0;
  let speed = p.fly ? (sprinting ? FLY * 2 : FLY) : (p.inWater ? SWIM : (sprinting ? SPRINT : WALK));
  if (keys['ShiftLeft'] && !p.fly && !p.inWater) speed *= 0.35;

  if (p.fly) {
    p.vel.x = wx * speed; p.vel.z = wz * speed;
    let vy = 0;
    if (keys['Space']) vy += speed;
    if (keys['ShiftLeft']) vy -= speed;
    p.vel.y = vy;
  } else {
    const accel = p.onGround ? 42 : 14;
    const tx = wx * speed, tz = wz * speed;
    p.vel.x += (tx - p.vel.x) * Math.min(1, accel * dt);
    p.vel.z += (tz - p.vel.z) * Math.min(1, accel * dt);
    if (p.inWater) {
      p.vel.y -= G * 0.28 * dt;
      p.vel.y = Math.max(p.vel.y, -4.5);
      if (keys['Space']) p.vel.y = 4.2;
      if (keys['ShiftLeft']) p.vel.y = -4.2;
    } else {
      p.vel.y -= G * dt;
      if (keys['Space'] && p.onGround) { p.vel.y = JUMP; p.onGround = false; sfx('jump'); }
    }
    p.vel.y = Math.max(p.vel.y, -58);
  }

  p.onGround = false;
  movePlayer(p.vel.x * dt, 0, 0);
  movePlayer(0, 0, p.vel.z * dt);
  movePlayer(0, p.vel.y * dt, 0);

  if (p.pos.y < -12) { p.pos.set(p.pos.x, findGround(p.pos.x, p.pos.z) + 1.2, p.pos.z); p.vel.set(0, 0, 0); }

  /* 走路镜头晃动 + 脚步声 */
  const hs = Math.hypot(p.vel.x, p.vel.z);
  if (p.onGround && hs > 0.6) {
    p.bob += dt * hs * 1.5;
    if (Math.sin(p.bob * 2) > 0.98) sfx('step');
  } else p.bob += dt * 0.4;
}
function findGround(x, z) {
  const ix = Math.floor(x), iz = Math.floor(z);
  for (let y = H - 1; y > 0; y--) if (B_SOLID[getBlock(ix, y, iz)]) return y + 1;
  return SEA + 2;
}

const skyMesh = new THREE.Mesh(

    return lerp(lerp(at(x0, y0, o), at(x0 + 1, y0, o), u), lerp(at(x0, y0 + 1, o), at(x0 + 1, y0 + 1, o), u), v);
  };
  for (let y = 0; y < 128; y++) for (let x = 0; x < 128; x++) {

const pLit = new Float32Array(PMAX * 4 * 2), pSh = new Float32Array(PMAX * 4);
const pIdx = new Uint16Array(PMAX * 6);

  const b = i * 4;
  pIdx.set([b, b + 1, b + 2, b, b + 2, b + 3], i * 6);
}

function spawnParticles(x, y, z, id, n) {
  const tile = B_TILES[id * 6 + 2];
  const col = tile % ATLAS_N, row = (tile / ATLAS_N) | 0;
  let made = 0;
  for (let i = 0; i < PMAX && made < n; i++) {
    const p = parts[i];
    if (p.life > 0) continue;
    made++;
    p.life = 0.55 + Math.random() * 0.5;
    p.x = x + Math.random(); p.y = y + Math.random() * 0.9 + 0.05; p.z = z + Math.random();
    p.vx = (Math.random() - 0.5) * 3.2; p.vy = Math.random() * 3.6 + 0.6; p.vz = (Math.random() - 0.5) * 3.2;
    const q = (Math.random() * 4) | 0, w = (Math.random() * 4) | 0;
    p.u = (col + q * 0.25) / ATLAS_N; p.v = 1 - (row + w * 0.25 + 0.25) / ATLAS_N;
    p.sz = 0.07 + Math.random() * 0.07;
  }
}
function updateParticles(dt) {
  let n = 0;
  const right = new THREE.Vector3(), up = new THREE.Vector3();
  camera.matrixWorld.extractBasis(right, up, new THREE.Vector3());
  for (let i = 0; i < PMAX; i++) {
    const p = parts[i];
    if (p.life <= 0) continue;
    p.life -= dt;
    if (p.life <= 0) continue;
    p.vy -= 26 * dt;
    const nx2 = p.x + p.vx * dt, ny2 = p.y + p.vy * dt, nz2 = p.z + p.vz * dt;
    if (B_SOLID[getBlock(Math.floor(nx2), Math.floor(p.y), Math.floor(p.z))]) { p.vx *= -0.3; }
    else p.x = nx2;
    if (B_SOLID[getBlock(Math.floor(p.x), Math.floor(ny2), Math.floor(p.z))]) { p.vy = 0; p.vx *= 0.7; p.vz *= 0.7; }
    else p.y = ny2;
    if (B_SOLID[getBlock(Math.floor(p.x), Math.floor(p.y), Math.floor(nz2))]) { p.vz *= -0.3; }
    else p.z = nz2;

    const b = n * 4, s = p.sz;
    const rx = right.x * s, ry = right.y * s, rz = right.z * s;
    const ux = up.x * s, uy = up.y * s, uz = up.z * s;
    const P = [
      [p.x - rx - ux, p.y - ry - uy, p.z - rz - uz],
      [p.x + rx - ux, p.y + ry - uy, p.z + rz - uz],
      [p.x + rx + ux, p.y + ry + uy, p.z + rz + uz],
      [p.x - rx + ux, p.y - ry + uy, p.z - rz + uz]
    ];
    const uvq = [[p.u, p.v], [p.u + 0.25 / ATLAS_N, p.v], [p.u + 0.25 / ATLAS_N, p.v + 0.25 / ATLAS_N], [p.u, p.v + 0.25 / ATLAS_N]];
    const lp = getLightPacked(Math.floor(p.x), Math.floor(p.y), Math.floor(p.z));
    const ls = LC[(lp >> 4) & 15], lb = LC[lp & 15];
    for (let k = 0; k < 4; k++) {
      pPos[(b + k) * 3] = P[k][0]; pPos[(b + k) * 3 + 1] = P[k][1]; pPos[(b + k) * 3 + 2] = P[k][2];
      pUv[(b + k) * 2] = uvq[k][0]; pUv[(b + k) * 2 + 1] = uvq[k][1];
      pLit[(b + k) * 2] = ls; pLit[(b + k) * 2 + 1] = lb;
      pSh[b + k] = 0.9;
    }
    n++;
  }
  pGeo.attributes.position.needsUpdate = true;
  pGeo.attributes.uv.needsUpdate = true;
  pGeo.attributes.aLight.needsUpdate = true;
  pGeo.attributes.aShade.needsUpdate = true;
  pGeo.setDrawRange(0, n * 6);
}

let ac = null, muted = false, noiseBuf = null;
function initAudio() {
  if (ac) return;
  try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  noiseBuf = ac.createBuffer(1, ac.sampleRate * 0.35, ac.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
}
function sfx(type) {
  if (!ac || muted) return;
  const t = ac.currentTime;
  if (type === 'break' || type === 'place' || type === 'step') {
    const s = ac.createBufferSource(); s.buffer = noiseBuf;
    const f = ac.createBiquadFilter(); f.type = 'bandpass';
    const g = ac.createGain();
    const cfg = { break: [900, 0.28, 0.16], place: [520, 0.22, 0.10], step: [340, 0.10, 0.07] }[type];
    f.frequency.value = cfg[0] * (0.85 + Math.random() * 0.3);
    f.Q.value = 1.1;
    g.gain.setValueAtTime(cfg[1], t);
    g.gain.exponentialRampToValueAtTime(0.001, t + cfg[2]);
    s.playbackRate.value = 0.9 + Math.random() * 0.4;
    s.connect(f); f.connect(g); g.connect(ac.destination);
    s.start(t); s.stop(t + cfg[2] + 0.02);
  } else if (type === 'jump') {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(320, t);
    o.frequency.exponentialRampToValueAtTime(520, t + 0.08);
    g.gain.setValueAtTime(0.05, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t + 0.12);
  } else if (type === 'magic') {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'triangle'; o.frequency.setValueAtTime(660, t);
    o.frequency.exponentialRampToValueAtTime(1320, t + 0.25);
    g.gain.setValueAtTime(0.07, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t + 0.32);
  }
}

  /* 失去鼠标锁定时清空按键，避免角色一直朝某方向跑 */

  }
});
document.addEventListener('mousemove', e => {
  if (document.pointerLockElement !== canvasEl) return;
  const s = 0.0022;

});
addEventListener('keydown', e => {
  if (!running) return;
  keys[e.code] = true;
  if (e.code.startsWith('Digit')) {
    const n = +e.code.slice(5);

  }
  if (e.code === 'KeyE') {
    const inv = $('inv');
    inv.classList.toggle('on');
    if (inv.classList.contains('on')) document.exitPointerLock();
    else lockPointer();
    e.preventDefault();
  }
  if (e.code === 'Escape') $('inv').classList.remove('on');
  if (e.code === 'F3') { showDebug = !showDebug; $('debug').style.display = showDebug ? 'block' : 'none'; e.preventDefault(); }
  if (e.code === 'KeyF') { player.fly = !player.fly; player.vel.set(0, 0, 0); toast(player.fly ? '飞行模式：开启' : '飞行模式：关闭'); }
  if (e.code === 'KeyM') { muted = !muted; toast(muted ? '静音' : '音效开启'); }
  if (e.code === 'KeyT') { dayCycle = dayCycle > 0 ? 0 : 180; toast(dayCycle ? '昼夜循环：快速' : '时间已固定'); }

  if (e.code === 'BracketLeft') { RD = Math.max(2, RD - 1); buildOffsets(RD); toast('视野距离 ' + RD); }
  if (e.code === 'BracketRight') { RD = Math.min(10, RD + 1); buildOffsets(RD); toast('视野距离 ' + RD); }
  if (e.code === 'Space') {
    const now = performance.now();
    if (now - player.lastSpace < 280) { player.fly = !player.fly; player.vel.y = 0; toast(player.fly ? '飞行模式：开启' : '飞行模式：关闭'); }
    player.lastSpace = now;
    e.preventDefault();
  }
  if (e.code === 'KeyW') {
    const now = performance.now();
    if (now - player.lastW < 280) player.sprint = true;

let actCd = 0;
function currentTarget() {
  const dir = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation);
  const o = camera.position;
  return raycast(o.x, o.y, o.z, dir.x, dir.y, dir.z, 7);
}
function actOnce(isBreak) {
  const hit = currentTarget();
  if (!hit) return;
  if (isBreak) {
    if (hit.id === ID.bedrock) { toast('基岩坚不可摧'); return; }
    spawnParticles(hit.x, hit.y, hit.z, hit.id, 14);
    setBlock(hit.x, hit.y, hit.z, 0);
    sfx(B_LIGHT[hit.id] > 6 ? 'magic' : 'break');
  } else {
    const nx = hit.x + hit.nx, ny = hit.y + hit.ny, nz = hit.z + hit.nz;
    const cur = getBlock(nx, ny, nz);
    if (cur !== 0 && cur !== ID.water && !B_CROSS[cur]) return;
    /* 不能卡进玩家 */
    const p = player.pos;
    if (nx + 1 > p.x - PW && nx < p.x + PW && nz + 1 > p.z - PW && nz < p.z + PW &&
      ny + 1 > p.y && ny < p.y + PH && B_SOLID[HOTBAR[hotSel]]) return;
    setBlock(nx, ny, nz, HOTBAR[hotSel]);

}

/* =====================================================================
   27. 主循环
   ===================================================================== */
let dayCycle = 0;          // 一天的秒数，0 = 固定
let tod = 0.30;            // 0..1
let lastT = performance.now(), acc = 0, fps = 0, fpsT = 0, fpsN = 0;

const SKY_DAY = { z: new THREE.Color(0x3178d8), h: new THREE.Color(0xb4d6f2), f: new THREE.Color(0xbcd8f0) };
const SKY_NIGHT = { z: new THREE.Color(0x050a1e), h: new THREE.Color(0x14203f), f: new THREE.Color(0x101833) };
const SKY_DUSK = { z: new THREE.Color(0x2a3a80), h: new THREE.Color(0xe8935a), f: new THREE.Color(0xc98a70) };
const tmpC1 = new THREE.Color(), tmpC2 = new THREE.Color(), tmpC3 = new THREE.Color();

function updateSky(dt) {
  if (dayCycle > 0) tod = (tod + dt / dayCycle) % 1;
  const ang = (tod - 0.25) * Math.PI * 2;
  const sy = Math.sin(ang), sx = Math.cos(ang);
  skyUni.uSun.value.set(sx * 0.6, sy, sx * 0.8).normalize();
  const alt = clamp(sy, -1, 1);
  const dayF = clamp(alt * 2.2 + 0.35, 0, 1);
  const duskF = clamp(1 - Math.abs(alt) * 4.5, 0, 1);
  uni.uDay.value = clamp(alt * 1.6 + 0.30, 0.16, 1);
  skyUni.uNight.value = clamp(-alt * 3.2 + 0.15, 0, 1);

  tmpC1.copy(SKY_NIGHT.z).lerp(SKY_DAY.z, dayF).lerp(SKY_DUSK.z, duskF * 0.8);
  tmpC2.copy(SKY_NIGHT.h).lerp(SKY_DAY.h, dayF).lerp(SKY_DUSK.h, duskF * 0.9);
  tmpC3.copy(SKY_NIGHT.f).lerp(SKY_DAY.f, dayF).lerp(SKY_DUSK.f, duskF * 0.9);
  skyUni.uZenith.value.copy(tmpC1);
  skyUni.uHorizon.value.copy(tmpC2);
  skyUni.uSunCol.value.setRGB(1, 0.92 - duskF * 0.35, 0.80 - duskF * 0.5);
  cloudUni.uTint.value.copy(tmpC2).lerp(new THREE.Color(0xffffff), 0.55 * dayF + 0.1);

  const far = (RD * CX) * 0.92;
  if (player.headWater) {
    uni.uFogColor.value.setHex(0x18477f);
    uni.uFogNear.value = 0.2; uni.uFogFar.value = 22;
  } else {
    uni.uFogColor.value.copy(tmpC3);
    uni.uFogNear.value = far * 0.45; uni.uFogFar.value = far;
  }
  renderer.setClearColor(tmpC3);
}

function frame() {
  requestAnimationFrame(frame);
  const now = performance.now();
  let dt = (now - lastT) / 1000; lastT = now;
  if (dt > 0.25) dt = 0.25;
  if (!running) return;

  /* 固定步长物理 */
  acc += dt;
  let steps = 0;
  while (acc >= 1 / 120 && steps < 8) { updatePlayer(1 / 120); acc -= 1 / 120; steps++; }

  /* 连续操作 */
  actCd -= dt;
  if (actCd <= 0 && (mouseDown[0] || mouseDown[2]) && document.pointerLockElement === canvasEl)
    actOnce(mouseDown[0]);

  /* 相机 */
  const bobA = player.onGround ? Math.sin(player.bob * 2) * 0.045 : 0;
  const bobB = player.onGround ? Math.abs(Math.cos(player.bob * 2)) * 0.03 : 0;
  camera.rotation.set(player.pitch, player.yaw, bobA * 0.35, 'YXZ');
  camera.position.set(player.pos.x + 0, player.pos.y + EYE + bobB, player.pos.z);
  camera.fov = 74 + (player.sprint && Math.hypot(player.vel.x, player.vel.z) > 5 ? 6 : 0);
  camera.updateProjectionMatrix();
  camera.updateMatrixWorld(true);

  /* 区块流送 */
  const ncx = Math.floor(player.pos.x / CX), ncz = Math.floor(player.pos.z / CZ);
  if (ncx !== pcx || ncz !== pcz) {
    pcx = ncx; pcz = ncz; scanI = 0; streamIdle = false; sweepWork = 0;
    unloadFar();
  }
  streamStep(7);

  /* 天空与粒子 */
  uni.uTime.value += dt;
  updateSky(dt);
  updateParticles(dt);
  skyMesh.position.copy(camera.position);
  cloudMesh.position.set(camera.position.x, 108, camera.position.z);
  cloudUni.uOff.value.set(camera.position.x / 140 + uni.uTime.value * 0.0035, camera.position.z / 140);

  /* 选中框 */
  const hit = document.pointerLockElement === canvasEl ? currentTarget() : null;
  if (hit) {
    hlMesh.visible = true;
    hlMesh.position.set(hit.x + 0.5, hit.y + 0.5, hit.z + 0.5);
  } else hlMesh.visible = false;

  /* 水下 / 岩浆 */
  $('water').style.opacity = player.headWater ? 0.42 : 0;
  const hb = getBlock(Math.floor(player.pos.x), Math.floor(player.pos.y + EYE), Math.floor(player.pos.z));
  $('hurt').style.opacity = hb === ID.lava ? 0.75 : 0;

  renderer.render(scene, camera);

  /* 调试 */
  fpsN++; fpsT += dt;
  if (fpsT > 0.5) { fps = Math.round(fpsN / fpsT); fpsN = 0; fpsT = 0; }
  if (showDebug) {
    terrainAt(Math.floor(player.pos.x), Math.floor(player.pos.z), _ti);
    let tris = 0;
    for (const c of chunks.values()) if (c.meshes) for (const m of c.meshes) tris += m.geometry.index.count / 3;
    $('debug').textContent =
      'FPS ' + fps + '   区块 ' + chunks.size + '   三角面 ' + (tris / 1000).toFixed(1) + 'k\n' +
      'XYZ ' + player.pos.x.toFixed(1) + ' / ' + player.pos.y.toFixed(1) + ' / ' + player.pos.z.toFixed(1) + '\n' +
      '区块坐标 ' + pcx + ', ' + pcz + '   视距 ' + RD + '\n' +
      '生物群系 ' + BIO_NAME[_ti[1]] + '   地表高度 ' + _ti[0] + '\n' +
      '时刻 ' + (tod * 24).toFixed(1) + ' 时   光照 ' + uni.uDay.value.toFixed(2) + '\n' +
      '注视 ' + (hit ? BLOCKS[hit.id].label + ' @ ' + hit.x + ',' + hit.y + ',' + hit.z : '—') + '\n' +
      '状态 ' + (player.fly ? '飞行 ' : '') + (player.inWater ? '水中 ' : '') + (player.onGround ? '地面' : '空中');
  }
}

/* =====================================================================
   28. 启动流程
   ===================================================================== */
function beginWorld(seed, rd, cycle) {
  initWorldGen(seed);
  RD = rd; dayCycle = cycle;
  buildOffsets(RD);
  chunks.clear(); edits.clear();
  pcx = 0; pcz = 0;
  $('menu').classList.add('hide');
  $('loading').classList.remove('hide');
  $('barIn').style.width = '0%';

  const target = 5;                     // 先备妥 5×5 区块
  const need = [];
  for (let dx = -2; dx <= 2; dx++) for (let dz = -2; dz <= 2; dz++) need.push([dx, dz]);

  const stages = ['编织地脉', '雕刻山川', '播种森林', '召唤远古建筑', '点亮星辰'];
  let stage = 0;
  function preload() {
    streamStep(24);
    let done = 0;
    for (const [dx, dz] of need) {
      const c = chunks.get(ckey(dx, dz));
      if (c && c.meshed) done++;
    }
    const pr = done / need.length;
    $('barIn').style.width = (pr * 100).toFixed(0) + '%';
    const st = Math.min(stages.length - 1, Math.floor(pr * stages.length));
    if (st !== stage) { stage = st; $('loadTxt').textContent = stages[st]; }
    if (done >= need.length) {
      /* 落点 */
      getChunkData(0, 0);
      const gy = findGround(12.5, 12.5);
      player.pos.set(12.5, gy + 0.2, 12.5);
      player.vel.set(0, 0, 0);
      player.yaw = Math.PI / 4; player.pitch = -0.12;
      $('loading').classList.add('hide');
      $('hotbar').classList.add('on');
      buildHotbar(); buildInventory();
      running = true;
      lastT = performance.now();
      lockPointer();
      toast('欢迎来到天穹圣坛 · 按 E 打开造物之匣');
      setTimeout(() => sfx('magic'), 400);
      return;
    }
    requestAnimationFrame(preload);
  }
  requestAnimationFrame(preload);
}

$('playBtn').onclick = () => {
  initAudio();
  const raw = $('seedIn').value.trim();
  const seed = raw ? (/^-?\d+$/.test(raw) ? (parseInt(raw, 10) | 0) : hashStr(raw)) : ((Math.random() * 4294967296) | 0);
  $('seedIn').value = seed;
  beginWorld(seed, parseInt($('distIn').value, 10), parseInt($('cycleIn').value, 10));
};
$('seedIn').value = (Math.random() * 100000) | 0;
frame();
</script>
