<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <!-- Gradients -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="60%" style="stop-color:#FFE4B5"/>
      <stop offset="100%" style="stop-color:#FFA07A"/>
    </linearGradient>
    
    <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4682B4"/>
      <stop offset="50%" style="stop-color:#5F9EA0"/>
      <stop offset="100%" style="stop-color:#20B2AA"/>
    </linearGradient>
    
    <linearGradient id="sandGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E4C1"/>
      <stop offset="100%" style="stop-color:#DEB887"/>
    </linearGradient>
    
    <linearGradient id="pelicanBodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA"/>
      <stop offset="50%" style="stop-color:#E8E8E8"/>
      <stop offset="100%" style="stop-color:#D3D3D3"/>
    </linearGradient>
    
    <linearGradient id="pouchGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB347"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    
    <linearGradient id="beakGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFE4B5"/>
      <stop offset="50%" style="stop-color:#FFDAB9"/>
      <stop offset="100%" style="stop-color:#FFA07A"/>
    </linearGradient>
    
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    
    <!-- Filters for realism -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Wave pattern -->
    <pattern id="wavePattern" x="0" y="0" width="100" height="20" patternUnits="userSpaceOnUse">
      <path d="M0 10 Q25 0 50 10 T100 10" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    </pattern>
  </defs>
  
  <!-- Background Sky -->
  <rect x="0" y="0" width="800" height="600" fill="url(#skyGradient)"/>
  
  <!-- Sun -->
  <circle cx="650" cy="100" r="50" fill="url(#sunGradient)" filter="url(#softGlow)"/>
  <g opacity="0.6">
    <line x1="650" y1="30" x2="650" y2="10" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="650" y1="170" x2="650" y2="190" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="580" y1="100" x2="560" y2="100" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="720" y1="100" x2="740" y2="100" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="600" y1="50" x2="585" y2="35" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="700" y1="150" x2="715" y2="165" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="700" y1="50" x2="715" y2="35" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="600" y1="150" x2="585" y2="165" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Clouds -->
  <g opacity="0.9">
    <ellipse cx="150" cy="80" rx="50" ry="25" fill="white"/>
    <ellipse cx="190" cy="70" rx="40" ry="20" fill="white"/>
    <ellipse cx="120" cy="90" rx="35" ry="18" fill="white"/>
    
    <ellipse cx="400" cy="60" rx="45" ry="22" fill="white"/>
    <ellipse cx="440" cy="50" rx="35" ry="18" fill="white"/>
    <ellipse cx="370" cy="70" rx="30" ry="15" fill="white"/>
  </g>
  
  <!-- Distant birds -->
  <g stroke="#555" stroke-width="2" fill="none" opacity="0.5">
    <path d="M100 150 Q110 140 120 150 Q130 140 140 150"/>
    <path d="M200 120 Q208 112 216 120 Q224 112 232 120"/>
    <path d="M500 130 Q510 120 520 130 Q530 120 540 130"/>
  </g>
  
  <!-- Ocean -->
  <rect x="0" y="300" width="800" height="150" fill="url(#oceanGradient)"/>
  <rect x="0" y="300" width="800" height="150" fill="url(#wavePattern)"/>
  
  <!-- Ocean waves detail -->
  <g fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2">
    <path d="M0 320 Q50 310 100 320 T200 320 T300 320 T400 320 T500 320 T600 320 T700 320 T800 320"/>
    <path d="M0 350 Q60 340 120 350 T240 350 T360 350 T480 350 T600 350 T720 350 T800 350"/>
    <path d="M0 380 Q40 370 80 380 T160 380 T240 380 T320 380 T400 380 T480 380 T560 380 T640 380 T720 380 T800 380"/>
    <path d="M0 410 Q70 400 140 410 T280 410 T420 410 T560 410 T700 410 T800 410"/>
  </g>
  
  <!-- Beach -->
  <ellipse cx="400" cy="600" rx="500" ry="200" fill="url(#sandGradient)"/>
  
  <!-- Beach texture (shells and pebbles) -->
  <g fill="#C4A484" opacity="0.5">
    <circle cx="100" cy="520" r="3"/>
    <circle cx="200" cy="550" r="2"/>
    <circle cx="300" cy="530" r="4"/>
    <circle cx="500" cy="540" r="3"/>
    <circle cx="600" cy="520" r="2"/>
    <circle cx="700" cy="550" r="3"/>
    <ellipse cx="150" cy="560" rx="5" ry="3"/>
    <ellipse cx="450" cy="570" rx="4" ry="2"/>
    <ellipse cx="650" cy="530" rx="6" ry="3"/>
  </g>
  
  <!-- Bicycle with pelican -->
  <g transform="translate(300, 380)" filter="url(#shadow)">
    <!-- Bicycle shadow on sand -->
    <ellipse cx="70" cy="130" rx="120" ry="15" fill="rgba(0,0,0,0.15)"/>
    
    <!-- Back wheel -->
    <g transform="translate(0, 60)">
      <circle cx="0" cy="0" r="50" fill="none" stroke="#333" stroke-width="5"/>
      <circle cx="0" cy="0" r="45" fill="none" stroke="#444" stroke-width="2"/>
      <!-- Spokes -->
      <g stroke="#666" stroke-width="1.5">
        <line x1="0" y1="-45" x2="0" y2="45"/>
        <line x1="-45" y1="0" x2="45" y2="0"/>
        <line x1="-32" y1="-32" x2="32" y2="32"/>
        <line x1="32" y1="-32" x2="-32" y2="32"/>
        <line x1="-22" y1="-40" x2="22" y2="40"/>
        <line x1="22" y1="-40" x2="-22" y2="40"/>
        <line x1="-40" y1="-22" x2="40" y2="22"/>
        <line x1="40" y1="-22" x2="-40" y2="22"/>
      </g>
      <!-- Hub -->
      <circle cx="0" cy="0" r="8" fill="#444"/>
      <circle cx="0" cy="0" r="4" fill="#666"/>
      <!-- Tire -->
      <circle cx="0" cy="0" r="50" fill="none" stroke="#222" stroke-width="8"/>
    </g>
    
    <!-- Front wheel -->
    <g transform="translate(140, 60)">
      <circle cx="0" cy="0" r="50" fill="none" stroke="#333" stroke-width="5"/>
      <circle cx="0" cy="0" r="45" fill="none" stroke="#444" stroke-width="2"/>
      <!-- Spokes -->
      <g stroke="#666" stroke-width="1.5">
        <line x1="0" y1="-45" x2="0" y2="45"/>
        <line x1="-45" y1="0" x2="45" y2="0"/>
        <line x1="-32" y1="-32" x2="32" y2="32"/>
        <line x1="32" y1="-32" x2="-32" y2="32"/>
        <line x1="-22" y1="-40" x2="22" y2="40"/>
        <line x1="22" y1="-40" x2="-22" y2="40"/>
        <line x1="-40" y1="-22" x2="40" y2="22"/>
        <line x1="40" y1="-22" x2="-40" y2="22"/>
      </g>
      <!-- Hub -->
      <circle cx="0" cy="0" r="8" fill="#444"/>
      <circle cx="0" cy="0" r="4" fill="#666"/>
      <!-- Tire -->
      <circle cx="0" cy="0" r="50" fill="none" stroke="#222" stroke-width="8"/>
    </g>
    
    <!-- Frame -->
    <g stroke="#C41E3A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Down tube -->
      <line x1="0" y1="60" x2="70" y2="0"/>
      <!-- Top tube -->
      <line x1="70" y1="0" x2="120" y2="10"/>
      <!-- Seat tube -->
      <line x1="70" y1="0" x2="55" y2="60"/>
      <!-- Chain stay -->
      <line x1="0" y1="60" x2="55" y2="60"/>
      <!-- Seat stay -->
      <line x1="0" y1="60" x2="70" y2="0"/>
      <!-- Head tube -->
      <line x1="120" y1="10" x2="140" y2="60"/>
      <!-- Fork -->
      <path d="M120 10 Q130 35 140 60" stroke-width="5"/>
    </g>
    
    <!-- Seat post -->
    <line x1="70" y1="0" x2="65" y2="-25" stroke="#333" stroke-width="4"/>
    <!-- Seat -->
    <ellipse cx="65" cy="-30" rx="18" ry="8" fill="#4a3728"/>
    <ellipse cx="65" cy="-32" rx="15" ry="6" fill="#5d4a3a"/>
    
    <!-- Handlebars -->
    <line x1="120" y1="10" x2="115" y2="-15" stroke="#333" stroke-width="4"/>
    <path d="M100 -20 Q115 -25 130 -20" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Handlebar grips -->
    <ellipse cx="100" cy="-20" rx="8" ry="4" fill="#333"/>
    <ellipse cx="130" cy="-20" rx="8" ry="4" fill="#333"/>
    
    <!-- Pedals and crank -->
    <circle cx="55" cy="60" r="12" fill="#444" stroke="#333" stroke-width="2"/>
    <!-- Crank arms -->
    <line x1="55" y1="60" x2="35" y2="75" stroke="#555" stroke-width="4"/>
    <line x1="55" y1="60" x2="75" y2="45" stroke="#555" stroke-width="4"/>
    <!-- Pedals -->
    <rect x="28" y="72" width="15" height="8" rx="2" fill="#333"/>
    <rect x="68" y="40" width="15" height="8" rx="2" fill="#333"/>
    
    <!-- Chain -->
    <ellipse cx="55" cy="60" rx="18" ry="18" fill="none" stroke="#444" stroke-width="3" stroke-dasharray="4 2"/>
    <path d="M55 78 L0 78 A18 18 0 0 1 0 42 L55 42" fill="none" stroke="#444" stroke-width="3" stroke-dasharray="4 2"/>
    
    <!-- Pelican -->
    <g transform="translate(45, -80)">
      <!-- Body -->
      <ellipse cx="20" cy="30" rx="35" ry="28" fill="url(#pelicanBodyGradient)"/>
      <!-- Body feather texture -->
      <g stroke="#ccc" stroke-width="0.5" fill="none" opacity="0.5">
        <path d="M-5 25 Q20 20 45 25"/>
        <path d="M-5 35 Q20 30 45 35"/>
        <path d="M0 45 Q20 40 40 45"/>
      </g>
      
      <!-- Wing (folded) -->
      <path d="M5 15 Q-15 30 0 50 Q25 55 45 45 Q55 35 50 20 Q40 10 20 12 Z" fill="#E0E0E0" stroke="#bbb" stroke-width="1"/>
      <!-- Wing feather details -->
      <g stroke="#aaa" stroke-width="0.8" fill="none">
        <path d="M10 20 Q25 35 40 40"/>
        <path d="M5 28 Q20 40 35 45"/>
        <path d="M2 38 Q15 48 30 50"/>
      </g>
      
      <!-- Neck -->
      <path d="M40 25 Q60 15 70 -20 Q72 -40 60 -55" fill="url(#pelicanBodyGradient)" stroke="#ddd" stroke-width="1"/>
      
      <!-- Head -->
      <ellipse cx="55" cy="-60" rx="18" ry="15" fill="url(#pelicanBodyGradient)"/>
      
      <!-- Eye area -->
      <ellipse cx="62" cy="-62" rx="8" ry="6" fill="#FFF8DC"/>
      <!-- Eye -->
      <circle cx="64" cy="-62" r="4" fill="#1a1a1a"/>
      <circle cx="65" cy="-63" r="1.5" fill="white"/>
      
      <!-- Eye ring -->
      <circle cx="64" cy="-62" r="6" fill="none" stroke="#4169E1" stroke-width="1.5"/>
      
      <!-- Beak (upper) -->
      <path d="M70 -58 L130 -55 Q135 -52 130 -50 L70 -52 Z" fill="url(#beakGradient)" stroke="#D2691E" stroke-width="1"/>
      <!-- Beak ridge -->
      <line x1="70" y1="-55" x2="125" y2="-52.5" stroke="#E8C4A0" stroke-width="1"/>
      
      <!-- Beak (lower) with pouch -->
      <path d="M70 -52 L120 -50 Q125 -48 120 -45 Q100 -25 70 -40 Z" fill="url(#pouchGradient)" stroke="#D2691E" stroke-width="1"/>
      <!-- Pouch texture lines -->
      <g stroke="#E8A030" stroke-width="0.5" opacity="0.6">
        <path d="M75 -48 Q95 -35 115 -46"/>
        <path d="M78 -45 Q95 -32 110 -44"/>
      </g>
      
      <!-- Hook at beak tip -->
      <path d="M128 -52 Q132 -50 130 -47" fill="none" stroke="#D2691E" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Crest feathers -->
      <g fill="#E8E8E8" stroke="#ccc" stroke-width="0.5">
        <path d="M45 -70 Q42 -80 48 -78 Q52 -72 50 -68 Z"/>
        <path d="M50 -72 Q48 -82 54 -80 Q58 -74 55 -70 Z"/>
        <path d="M55 -70 Q55 -78 60 -76 Q62 -72 58 -68 Z"/>
      </g>
      
      <!-- Legs -->
      <g stroke="#FF8C00" stroke-width="3" fill="none" stroke-linecap="round">
        <!-- Left leg on pedal -->
        <path d="M10 55 Q5 70 -25 95"/>
        <!-- Right leg on other pedal -->
        <path d="M25 55 Q35 70 45 65"/>
      </g>
      
      <!-- Feet -->
      <g fill="#FF8C00" stroke="#E07000" stroke-width="1">
        <!-- Left foot (on pedal) -->
        <path d="M-30 92 L-40 100 L-30 98 L-25 105 L-25 95 L-18 100 L-25 92 Z"/>
        <!-- Right foot -->
        <path d="M42 62 L35 70 L42 68 L45 75 L47 65 L52 70 L47 62 Z"/>
      </g>
      
      <!-- Wing tip showing grip on handlebar -->
      <path d="M48 25 Q65 15 85 5 Q90 8 85 12 Q70 18 55 28" fill="#D8D8D8" stroke="#bbb" stroke-width="1"/>
    </g>
    
    <!-- Basket on front -->
    <g transform="translate(125, -30)">
      <path d="M-15 0 L-20 25 L20 25 L15 0 Z" fill="none" stroke="#8B4513" stroke-width="2"/>
      <line x1="-18" y1="8" x2="18" y2="8" stroke="#8B4513" stroke-width="1.5"/>
      <line x1="-19" y1="16" x2="19" y2="16" stroke="#8B4513" stroke-width="1.5"/>
      <!-- Fish in basket -->
      <g transform="translate(0, 12)">
        <ellipse cx="0" cy="0" rx="12" ry="5" fill="#87CEEB"/>
        <path d="M10 0 L18 -5 L18 5 Z" fill="#87CEEB"/>
        <circle cx="-5" cy="-1" r="1.5" fill="#1a1a1a"/>
      </g>
    </g>
  </g>
  
  <!-- Foreground wave foam -->
  <g fill="rgba(255,255,255,0.7)">
    <ellipse cx="100" cy="445" rx="60" ry="8"/>
    <ellipse cx="300" cy="450" rx="80" ry="10"/>
    <ellipse cx="550" cy="448" rx="70" ry="9"/>
    <ellipse cx="750" cy="452" rx="50" ry="7"/>
  </g>
  
  <!-- Beach grass -->
  <g stroke="#556B2F" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M50 480 Q55 450 45 420"/>
    <path d="M55 480 Q60 455 50 430"/>
    <path d="M60 480 Q58 460 65 425"/>
    
    <path d="M750 490 Q755 460 745 430"/>
    <path d="M755 490 Q760 465 750 440"/>
    <path d="M760 490 Q758 470 765 435"/>
  </g>
  
  <!-- Small starfish -->
  <g transform="translate(680, 530)" fill="#FF6B6B" stroke="#E05555" stroke-width="1">
    <path d="M0 -10 L2 -3 L10 -3 L4 2 L6 10 L0 5 L-6 10 L-4 2 L-10 -3 L-2 -3 Z"/>
  </g>
  
  <!-- Seashell -->
  <g transform="translate(180, 545)">
    <path d="M0 0 Q5 -10 15 -8 Q20 -5 18 0 Q15 5 5 5 Q0 3 0 0" fill="#FFF5EE" stroke="#DEB887" stroke-width="1"/>
    <path d="M2 0 Q7 -6 12 -5" fill="none" stroke="#DEB887" stroke-width="0.5"/>
    <path d="M3 2 Q8 -2 13 -1" fill="none" stroke="#DEB887" stroke-width="0.5"/>
  </g>
</svg>