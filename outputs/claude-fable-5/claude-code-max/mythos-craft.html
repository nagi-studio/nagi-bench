<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>神话方块世界 MythCraft</title>
<style>
  :root{ --gold:#e8c55a; --gold2:#b9913a; --ink:#0b0e14; --panel:rgba(10,13,20,.78); }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#000; }
  body{ font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif; color:#e8e6df; -webkit-user-select:none; user-select:none; }
  #app, #app canvas{ position:fixed; inset:0; display:block; }
  /* ---------- overlay ---------- */
  #ov{ position:fixed; inset:0; z-index:30; display:flex; align-items:center; justify-content:center;
       background:radial-gradient(120% 90% at 50% 10%, rgba(8,10,18,.42) 0%, rgba(6,8,14,.78) 70%, rgba(4,5,9,.92) 100%); }
  #ov.hide{ display:none; }
  .panel{ width:min(680px, 92vw); max-height:92vh; overflow:auto; background:var(--panel); border:1px solid rgba(232,197,90,.35);
          border-radius:14px; padding:26px 30px 22px; backdrop-filter:blur(10px); box-shadow:0 30px 80px rgba(0,0,0,.6); text-align:center; }
  .panel::-webkit-scrollbar{ width:0; }
  h1{ font-size:40px; letter-spacing:.12em; font-weight:800;
      background:linear-gradient(180deg,#f7e7ae 0%, #e8c55a 45%, #9c7426 100%); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ margin-top:6px; font-size:13px; color:#b9b4a6; letter-spacing:.28em; }
  .sub b{ color:var(--gold); font-weight:600; }
  .rule{ height:1px; margin:16px auto 14px; width:84%; background:linear-gradient(90deg,transparent,rgba(232,197,90,.55),transparent); }
  .wonders{ display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin:10px 2px 2px; }
  .wonders span{ font-size:12px; color:#cfc9b8; background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08);
                 border-radius:8px; padding:7px 2px; letter-spacing:.05em; }
  .wonders span.found{ color:var(--gold); border-color:rgba(232,197,90,.55); }
  .keys{ display:grid; grid-template-columns:1fr 1fr; gap:5px 18px; margin:14px 8px 4px; text-align:left; }
  .keys div{ font-size:12.5px; color:#aFA89a; color:#afa89a; display:flex; justify-content:space-between; gap:10px; }
  .keys b{ font-weight:600; color:#e8e6df; font-family:ui-monospace,Menlo,monospace; background:rgba(255,255,255,.07);
           border:1px solid rgba(255,255,255,.12); border-radius:5px; padding:0 7px; white-space:nowrap; }
  #ovLoad{ margin:18px 8px 4px; }
  #ovBar{ height:8px; border-radius:5px; background:rgba(255,255,255,.08); overflow:hidden; border:1px solid rgba(255,255,255,.1); }
  #ovFill{ height:100%; width:0%; background:linear-gradient(90deg,#9c7426,#e8c55a); transition:width .12s; }
  #ovText{ margin-top:8px; font-size:12px; color:#b9b4a6; letter-spacing:.08em; }
  #ovBtn{ display:none; margin:16px auto 4px; padding:13px 46px; font-size:17px; letter-spacing:.3em; text-indent:.3em; color:#1a1408;
          background:linear-gradient(180deg,#f3dd92,#d8ab3e); border:1px solid #f7e7ae; border-radius:10px; cursor:pointer; font-weight:700; }
  #ovBtn:hover{ filter:brightness(1.08); }
  .foot{ margin-top:14px; font-size:11px; color:#7d796d; letter-spacing:.1em; }
  /* ---------- HUD ---------- */
  #hud{ position:fixed; left:12px; top:10px; z-index:20; font:12px/1.7 ui-monospace,Menlo,monospace; color:#fff;
        text-shadow:0 1px 2px rgba(0,0,0,.9); display:none; pointer-events:none; white-space:pre; }
  #lm{ position:fixed; right:12px; top:10px; z-index:20; display:none; pointer-events:none; text-align:right;
       font:12px/1.6 ui-monospace,Menlo,monospace; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.9); }
  #lm .arr{ display:inline-block; transition:transform .12s linear; font-weight:700; color:var(--gold); }
  #lm .cnt{ color:#cfc9b8; }
  #ch{ position:fixed; left:50%; top:50%; z-index:20; width:18px; height:18px; transform:translate(-50%,-50%);
       display:none; pointer-events:none; mix-blend-mode:difference; }
  #ch::before,#ch::after{ content:""; position:absolute; background:#fff; }
  #ch::before{ left:8px; top:0; width:2px; height:18px; }
  #ch::after{ left:0; top:8px; width:18px; height:2px; }
  /* ---------- hotbar ---------- */
  #hb{ position:fixed; left:50%; bottom:14px; transform:translateX(-50%); z-index:20; display:none; gap:5px; padding:5px;
       background:rgba(8,10,16,.55); border:1px solid rgba(255,255,255,.14); border-radius:10px; backdrop-filter:blur(6px); }
  .slot{ width:46px; height:46px; border:2px solid rgba(255,255,255,.18); border-radius:7px; position:relative; background:rgba(0,0,0,.25); }
  .slot canvas{ width:100%; height:100%; image-rendering:pixelated; border-radius:5px; }
  .slot .num{ position:absolute; left:3px; top:1px; font:10px ui-monospace,monospace; color:rgba(255,255,255,.75); text-shadow:0 1px 1px #000; }
  .slot.sel{ border-color:var(--gold); box-shadow:0 0 10px rgba(232,197,90,.45); transform:translateY(-3px); }
  #toasts{ position:fixed; left:50%; top:70px; transform:translateX(-50%); z-index:25; display:flex; flex-direction:column; gap:8px;
           align-items:center; pointer-events:none; }
  .toast{ padding:8px 22px; background:rgba(10,12,18,.82); border:1px solid rgba(232,197,90,.55); color:#f3e6bb; border-radius:99px;
          font-size:13px; letter-spacing:.12em; animation:tin .25s ease-out; box-shadow:0 8px 30px rgba(0,0,0,.5); }
  .toast.big{ font-size:15px; padding:12px 30px; color:var(--gold); }
  @keyframes tin{ from{ opacity:0; transform:translateY(-8px); } }
  .toast.out{ opacity:0; transform:translateY(-6px); transition:all .45s; }
  #wet{ position:fixed; inset:0; z-index:15; background:rgba(18,52,140,.34); display:none; pointer-events:none; }
  #vig{ position:fixed; inset:0; z-index:14; pointer-events:none; background:radial-gradient(75% 75% at 50% 50%, transparent 60%, rgba(0,0,0,.38) 100%); }
  #err{ position:fixed; inset:0; z-index:99; display:none; align-items:center; justify-content:center; background:#0b0e14; color:#e8e6df;
        font-size:14px; line-height:2; text-align:center; padding:20px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="vig"></div>
<div id="wet"></div>
<div id="hud"></div>
<div id="lm"></div>
<div id="ch"></div>
<div id="hb"></div>
<div id="toasts"></div>
<div id="ov">
  <div class="panel">
    <h1>神话方块世界</h1>
    <div class="sub">MYTHCRAFT · <b>柏林噪声无限地形</b> · 一次性生成的单文件体素世界</div>
    <div class="rule"></div>
    <div style="font-size:12.5px;color:#cfc9b8;letter-spacing:.15em">探索散落大地的 十大神话奇观</div>
    <div class="wonders" id="ovList"></div>
    <div class="keys">
      <div><span>移动 / 跳跃</span><b>W A S D · 空格</b></div>
      <div><span>环视</span><b>鼠标</b></div>
      <div><span>破坏方块</span><b>左键</b></div>
      <div><span>放置方块</span><b>右键</b></div>
      <div><span>选择方块</span><b>滚轮 · 1-9</b></div>
      <div><span>疾跑 / 潜行</span><b>Shift / C</b></div>
      <div><span>飞行开关(空格升 C 降)</span><b>F</b></div>
      <div><span>回到出生点 / 视距</span><b>R · - =</b></div>
    </div>
    <div id="ovLoad">
      <div id="ovBar"><div id="ovFill"></div></div>
      <div id="ovText">正在唤醒诸神…</div>
    </div>
    <button id="ovBtn">进 入 世 界</button>
    <div class="foot">单文件 HTML · Three.js · Perlin Noise · 程序化像素纹理 · 种子 20260610</div>
  </div>
</div>
<div id="err"></div>

<script type="module">
/* ================================================================
   MythCraft — 神话方块世界
   单文件《我的世界》风格体素引擎:柏林噪声无限地形 + 十大神话奇观
   ================================================================ */
const $ = id => document.getElementById(id);
const ovFill = $('ovFill'), ovText = $('ovText'), ovBtn = $('ovBtn');
function fatal(msg){ const e = $('err'); e.style.display = 'flex'; e.innerHTML = msg; }
function boot(t, p){ ovText.textContent = t; if (p != null) ovFill.style.width = (p * 100).toFixed(0) + '%'; }

boot('正在加载 Three.js 引擎…', 0.02);
let THREE;
try {
  THREE = await import('https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js')
    .catch(() => import('https://unpkg.com/three@0.160.0/build/three.module.js'));
} catch (e) {
  fatal('Three.js 加载失败,请检查网络后刷新。<br>Failed to load Three.js from CDN.'); throw e;
}

/* ---------------- utils ---------------- */
const SEED = 20260610;
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const smoothstep = (a, b, x) => { const t = clamp((x - a) / (b - a), 0, 1); return t * t * (3 - 2 * t); };
function mulberry32(a){ return function(){ a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
function hashInt(x, z, s){ let h = (Math.imul(x, 374761393) + Math.imul(z, 668265263) + Math.imul(s, 2246822519)) | 0;
  h = Math.imul(h ^ h >>> 13, 1274126177); return (h ^ h >>> 16) >>> 0; }
const hash01 = (x, z, s) => hashInt(x, z, s) / 4294967296;

/* ---------------- Perlin noise (2D/3D + fbm/ridged) ---------------- */
function makeNoise(seed){
  const rnd = mulberry32(seed), p = new Uint8Array(512), t = [];
  for (let i = 0; i < 256; i++) t[i] = i;
  for (let i = 255; i > 0; i--){ const j = (rnd() * (i + 1)) | 0; const k = t[i]; t[i] = t[j]; t[j] = k; }
  for (let i = 0; i < 512; i++) p[i] = t[i & 255];
  const fade = x => x * x * x * (x * (x * 6 - 15) + 10);
  function g2(h, x, y){ switch (h & 7){ case 0: return x + y; case 1: return -x + y; case 2: return x - y; case 3: return -x - y;
    case 4: return x; case 5: return -x; case 6: return y; default: return -y; } }
  function g3(h, x, y, z){ const m = h % 12;
    const u = m < 8 ? x : y, v = m < 4 ? y : (m === 12 || m === 14 ? x : z);
    return ((m & 1) ? -u : u) + ((m & 2) ? -v : v); }
  function n2(x, y){
    const X = Math.floor(x), Y = Math.floor(y); x -= X; y -= Y;
    const Xi = X & 255, Yi = Y & 255, u = fade(x), v = fade(y);
    const a = p[Xi] + Yi, b = p[Xi + 1] + Yi;
    return lerp(lerp(g2(p[a], x, y), g2(p[b], x - 1, y), u),
                lerp(g2(p[a + 1], x, y - 1), g2(p[b + 1], x - 1, y - 1), u), v) * 0.709;
  }
  function n3(x, y, z){
    const X = Math.floor(x), Y = Math.floor(y), Z = Math.floor(z); x -= X; y -= Y; z -= Z;
    const Xi = X & 255, Yi = Y & 255, Zi = Z & 255, u = fade(x), v = fade(y), w = fade(z);
    const A = p[Xi] + Yi, AA = p[A] + Zi, AB = p[A + 1] + Zi, B = p[Xi + 1] + Yi, BA = p[B] + Zi, BB = p[B + 1] + Zi;
    return lerp(
      lerp(lerp(g3(p[AA], x, y, z),     g3(p[BA], x - 1, y, z), u),
           lerp(g3(p[AB], x, y - 1, z), g3(p[BB], x - 1, y - 1, z), u), v),
      lerp(lerp(g3(p[AA + 1], x, y, z - 1),     g3(p[BA + 1], x - 1, y, z - 1), u),
           lerp(g3(p[AB + 1], x, y - 1, z - 1), g3(p[BB + 1], x - 1, y - 1, z - 1), u), v), w) * 0.84;
  }
  function fbm2(x, y, oct){
    let s = 0, amp = 1, tot = 0;
    for (let i = 0; i < oct; i++){ s += n2(x, y) * amp; tot += amp; amp *= 0.5; x *= 2.01; y *= 2.01; }
    return clamp(s / tot / 0.62, -1, 1);
  }
  function ridged2(x, y, oct){
    let s = 0, amp = 1, tot = 0;
    for (let i = 0; i < oct; i++){ s += (1 - Math.abs(n2(x, y))) * amp; tot += amp; amp *= 0.5; x *= 2.03; y *= 2.03; }
    return clamp(((s / tot) - 0.52) / 0.45, 0, 1);
  }
  return { n2, n3, fbm2, ridged2 };
}
const N = makeNoise(SEED);
/* ================================================================
   程序化像素纹理图集 (16x16 tile, 8x8 atlas = 128x128)
   ================================================================ */
boot('正在绘制像素纹理…', 0.06);
const T = 16, AC = 8;
const atlas = document.createElement('canvas'); atlas.width = atlas.height = T * AC;
const AG = atlas.getContext('2d', { willReadFrequently: true });
const painters = [];
function defTile(fn){ painters.push(fn); return painters.length - 1; }
function hex(c){ return [(c >> 16) & 255, (c >> 8) & 255, c & 255]; }
function css(r, g, b){ return `rgb(${r | 0},${g | 0},${b | 0})`; }
// 基础噪点填充:从调色板取色 + 亮度抖动
function nz(g, x0, y0, pal, R, jit = 10){
  for (let y = 0; y < T; y++) for (let x = 0; x < T; x++){
    const [r, gg, b] = hex(pal[(R() * pal.length) | 0]); const j = (R() - 0.5) * 2 * jit;
    g.fillStyle = css(r + j, gg + j, b + j); g.fillRect(x0 + x, y0 + y, 1, 1);
  }
}
function speck(g, x0, y0, n, colors, R){
  for (let i = 0; i < n; i++){ g.fillStyle = colors[(R() * colors.length) | 0];
    g.fillRect(x0 + (R() * T) | 0, y0 + (R() * T) | 0, 1, 1); }
}
const DIRT_P = [0x8a5a32, 0x7d5029, 0x96653c, 0x6e4423];
const STONE_P = [0x7e7e7e, 0x747474, 0x888888, 0x6c6c6c];
const TL = {};
TL.grassTop = defTile((g, x, y, R) => { nz(g, x, y, [0x6fae3d, 0x65a437, 0x7ab947, 0x5d9a31], R, 8);
  speck(g, x, y, 14, ['#4d8526', '#85c455'], R); });
TL.grassSide = defTile((g, x, y, R) => { nz(g, x, y, DIRT_P, R);
  for (let i = 0; i < T; i++){ const d = 3 + ((hashInt(i, 7, 3) % 3)); // 锯齿草皮边
    for (let yy = 0; yy < d; yy++){ g.fillStyle = yy < 2 ? '#6fae3d' : '#5d9a31'; g.fillRect(x + i, y + yy, 1, 1); } }
  speck(g, x, y, 8, ['#5c3b1e', '#9c6b40'], R); });
TL.dirt = defTile((g, x, y, R) => { nz(g, x, y, DIRT_P, R); speck(g, x, y, 12, ['#5c3b1e', '#a4734a', '#4e351d'], R); });
TL.stone = defTile((g, x, y, R) => { nz(g, x, y, STONE_P, R, 7);
  for (let i = 0; i < 3; i++){ let px = (R() * T) | 0, py = (R() * T) | 0; g.fillStyle = '#5f5f5f';
    for (let s = 0; s < 5; s++){ g.fillRect(x + (px & 15), y + (py & 15), 1, 1); px += R() < 0.5 ? 1 : 0; py += R() < 0.6 ? 1 : -0; } } });
TL.cobble = defTile((g, x, y, R) => { nz(g, x, y, [0x6e6e6e, 0x7d7d7d, 0x656565], R, 6);
  for (const [cx, cy, r] of [[3, 3, 3], [11, 3, 3], [4, 11, 3], [12, 11, 3], [8, 7, 2]]){
    g.fillStyle = '#8b8b8b'; g.fillRect(x + cx - r + 1, y + cy - r + 1, r * 2 - 1, r * 2 - 1);
    g.fillStyle = '#4f4f4f';
    g.fillRect(x + cx - r, y + cy - r + 1, 1, r * 2 - 1); g.fillRect(x + cx + r, y + cy - r + 1, 1, r * 2 - 1);
    g.fillRect(x + cx - r + 1, y + cy - r, r * 2 - 1, 1); g.fillRect(x + cx - r + 1, y + cy + r, r * 2 - 1, 1); }
  speck(g, x, y, 10, ['#9a9a9a', '#585858'], R); });
TL.sand = defTile((g, x, y, R) => { nz(g, x, y, [0xe3d29b, 0xdac88f, 0xeeddaa, 0xd2bf83], R, 6);
  speck(g, x, y, 10, ['#c4b075', '#f4e6b8'], R); });
TL.sandstone = defTile((g, x, y, R) => { nz(g, x, y, [0xe0cf9a, 0xd9c68d, 0xe7d7a6], R, 4);
  g.fillStyle = '#c9b376'; g.fillRect(x, y, T, 1); g.fillRect(x, y + 15, T, 1);
  g.fillStyle = '#cdb87c'; g.fillRect(x, y + 5, T, 1); g.fillRect(x, y + 10, T, 1); speck(g, x, y, 6, ['#bda86c'], R); });
TL.sandCarve = defTile((g, x, y, R) => { painters[TL.sandstone](g, x, y, R);
  g.fillStyle = '#9a8450'; // 荷鲁斯之眼风格刻纹
  g.fillRect(x + 4, y + 5, 8, 1); g.fillRect(x + 3, y + 6, 2, 1); g.fillRect(x + 11, y + 6, 2, 1);
  g.fillRect(x + 6, y + 7, 4, 2); g.fillRect(x + 7, y + 9, 2, 1); g.fillRect(x + 10, y + 10, 2, 2); g.fillRect(x + 5, y + 10, 1, 3); });
TL.water = defTile((g, x, y, R) => { nz(g, x, y, [0x3b6fd6, 0x3567cb, 0x4378e0], R, 6);
  for (let i = 0; i < 5; i++){ g.fillStyle = 'rgba(160,200,255,.45)';
    g.fillRect(x + (R() * 12) | 0, y + (R() * 16) | 0, 2 + (R() * 3) | 0, 1); } });
TL.logSide = defTile((g, x, y, R) => { for (let i = 0; i < T; i++){ const c = [0x6b4a2a, 0x5d3f22, 0x745133, 0x4e351d][hashInt(i, 1, 9) % 4];
    const [r, gg, b] = hex(c); for (let yy = 0; yy < T; yy++){ const j = (R() - 0.5) * 14; g.fillStyle = css(r + j, gg + j, b + j); g.fillRect(x + i, y + yy, 1, 1); } } });
TL.logTop = defTile((g, x, y, R) => { nz(g, x, y, [0x6b4a2a], R, 6);
  const rings = ['#a8814f', '#5d3f22', '#bd9560', '#6b4a2a', '#4e351d'];
  for (let i = 0; i < 5; i++){ const o = 2 + i * 1.4 | 0; g.strokeStyle = rings[i]; g.strokeRect(x + o + .5, y + o + .5, T - o * 2 - 1, T - o * 2 - 1); } });
TL.leaves = defTile((g, x, y, R) => { nz(g, x, y, [0x3e6b22, 0x35601c, 0x477a28, 0x2c5117], R, 8);
  speck(g, x, y, 16, ['#234511', '#558f33', '#1c3a0d'], R); });
TL.plank = defTile((g, x, y, R) => { nz(g, x, y, [0xb08d52, 0xa8854b, 0xb9965b], R, 6);
  g.fillStyle = '#7d5e33'; for (const yy of [3, 7, 11, 15]) g.fillRect(x, y + yy, T, 1);
  g.fillStyle = '#8d6c3d'; g.fillRect(x + 4, y, 1, 4); g.fillRect(x + 12, y + 4, 1, 4); g.fillRect(x + 6, y + 8, 1, 4); g.fillRect(x + 11, y + 12, 1, 4);
  speck(g, x, y, 8, ['#9a7843', '#c7a368'], R); });
TL.snow = defTile((g, x, y, R) => { nz(g, x, y, [0xf4f8fb, 0xeaf1f7, 0xfcfeff], R, 4); speck(g, x, y, 6, ['#dce7f0'], R); });
TL.snowSide = defTile((g, x, y, R) => { nz(g, x, y, DIRT_P, R);
  for (let i = 0; i < T; i++){ const d = 3 + (hashInt(i, 5, 4) % 2); for (let yy = 0; yy < d; yy++){ g.fillStyle = yy < 2 ? '#f4f8fb' : '#dce7f0'; g.fillRect(x + i, y + yy, 1, 1); } } });
TL.marble = defTile((g, x, y, R) => { nz(g, x, y, [0xf2f0ea, 0xece9e1, 0xf8f6f1], R, 3);
  for (let i = 0; i < 3; i++){ let px = (R() * T) | 0, py = (R() * T) | 0; g.fillStyle = 'rgba(170,170,165,.6)';
    for (let s = 0; s < 7; s++){ g.fillRect(x + (px & 15), y + (py & 15), 1, 1); px += 1; py += R() < 0.4 ? 1 : 0; } } });
TL.pillar = defTile((g, x, y, R) => { for (let i = 0; i < T; i++){ const v = [0xf4f2ec, 0xdcd9d0, 0xe9e6de, 0xc9c6bc][i % 4];
    const [r, gg, b] = hex(v); for (let yy = 0; yy < T; yy++){ const j = (R() - 0.5) * 6; g.fillStyle = css(r + j, gg + j, b + j); g.fillRect(x + i, y + yy, 1, 1); } } });
TL.pillarTop = defTile((g, x, y, R) => { painters[TL.marble](g, x, y, R);

  const t = bl.tiles[1], d = AG.getImageData((t % AC) * T, ((t / AC) | 0) * T, T, T).data;
  let r = 0, g = 0, b = 0; for (let k = 0; k < d.length; k += 4){ r += d[k]; g += d[k + 1]; b += d[k + 2]; }
  const n = d.length / 4; return [r / n, g / n, b / n]; });

/* ================================================================
   地形:柏林噪声高度场 + 生物群系 + 洞穴
   ================================================================ */
const SXX = 16, SY = 128, SEA = 30, REG = 96;
const hCache = new Map();
function heightAt(x, z){
  const k = x + ',' + z; const c = hCache.get(k); if (c !== undefined) return c;
  const cont = N.fbm2(x * 0.0022, z * 0.0022, 3);            // 大陆架
  const hill = N.fbm2(x * 0.0062 + 500, z * 0.0062 + 500, 4); // 丘陵
  const mMask = smoothstep(0.12, 0.55, N.fbm2(x * 0.0035 + 900, z * 0.0035 - 700, 3));
  const ridge = N.ridged2(x * 0.013 - 300, z * 0.013 + 800, 3);
  let h = 36 + cont * 16 + hill * 8 + mMask * (0.3 + 0.7 * ridge) * 46;
  h = lerp(h, 20, smoothstep(-0.2, -0.55, cont) * 0.92);      // 海洋下陷
  h += N.n2(x * 0.05, z * 0.05) * 2;
  const v = clamp(Math.round(h), 4, 100);
  if (hCache.size > 400000) hCache.clear();
  hCache.set(k, v); return v;
}
function biomeAt(x, z){
  const temp = N.fbm2(x * 0.0028 + 710, z * 0.0028 - 330, 2);
  const wet = N.fbm2(x * 0.0032 - 555, z * 0.0032 + 222, 2);
  if (temp < -0.4) return 'snow';
  if (temp > 0.3 && wet < 0.04) return 'desert';
  if (wet > 0.16) return 'forest';
  return 'plains';
}

/* ================================================================
   神话奇观建筑库 —— 结构以"确定性方块清单"缓存,按区块切片写入
   put(x,y,z,id,soft):soft 只填充空气(树叶/装饰),硬方块后写覆盖
   ================================================================ */
const structCache = new Map();
function struct(key, build){
  let s = structCache.get(key); if (s) return s;
  s = { blocks: [], minx: 1e9, minz: 1e9, maxx: -1e9, maxz: -1e9 };
  const put = (x, y, z, id, soft) => { x = Math.round(x); y = Math.round(y); z = Math.round(z);
    if (y < 0 || y >= SY) return; s.blocks.push(x, y, z, id | (soft ? 64 : 0));
    if (x < s.minx) s.minx = x; if (x > s.maxx) s.maxx = x; if (z < s.minz) s.minz = z; if (z > s.maxz) s.maxz = z; };
  build(put); structCache.set(key, s); return s;
}
function box(put, x0, y0, z0, x1, y1, z1, id, soft){
  for (let x = x0; x <= x1; x++) for (let y = y0; y <= y1; y++) for (let z = z0; z <= z1; z++) put(x, y, z, id, soft);
}
function disc(put, cx, y, cz, r, id, soft){
  const ri = Math.ceil(r);
  for (let dx = -ri; dx <= ri; dx++) for (let dz = -ri; dz <= ri; dz++)
    if (dx * dx + dz * dz <= r * r + 0.1) put(cx + dx, y, cz + dz, id, soft);
}
function colY(put, x, y0, z, h, id){ for (let i = 0; i < h; i++) put(x, y0 + i, z, id); }
function ballAt(put, cx, cy, cz, r, id, soft){
  const ri = Math.ceil(r);
  for (let dx = -ri; dx <= ri; dx++) for (let dy = -ri; dy <= ri; dy++) for (let dz = -ri; dz <= ri; dz++)
    if (dx * dx + dy * dy * 1.6 + dz * dz <= r * r + 0.1) put(cx + dx, cy + dy, cz + dz, id, soft);
}
function leafBlob(put, cx, cy, cz, rx, ry, R, id){
  const rxi = Math.ceil(rx), ryi = Math.ceil(ry);
  for (let dx = -rxi; dx <= rxi; dx++) for (let dy = -ryi; dy <= ryi; dy++) for (let dz = -rxi; dz <= rxi; dz++){
    const f = (dx * dx + dz * dz) / (rx * rx) + (dy * dy) / (ry * ry);
    if (f <= 1 && (f < 0.55 || R() > 0.18)) put(cx + dx, cy + dy, cz + dz, id, true);
  }
}
function foundation(put, x0, z0, x1, z1, baseY, id){
  for (let x = x0; x <= x1; x++) for (let z = z0; z <= z1; z++){
    const hg = heightAt(x, z);
    for (let y = Math.max(2, hg - 1); y < baseY; y++) put(x, y, z, id);
  }
}
const groundY = (x, z) => Math.max(heightAt(x, z), SEA + 1);

/* ---------- 世界之树 Yggdrasil ---------- */
function genWorldTree(put, x0, z0, R){
  const y0 = groundY(x0, z0), H = 44 + ((R() * 8) | 0);
  for (let k = 0; k < 6; k++){                                  // 蟠龙根系
    const ang = k * 1.047 + R() * 0.5, len = 9 + R() * 5;
    for (let t = 0; t < len; t++){
      const px = x0 + Math.cos(ang) * t * 1.15, pz = z0 + Math.sin(ang) * t * 1.15;
      ballAt(put, px, y0 + 2.5 - t * 0.55, pz, Math.max(1, 3.2 * (1 - t / len)), B.YLOG);
    }
  }
  const tw = y => [x0 + Math.sin(y * 0.19) * 1.4, z0 + Math.cos(y * 0.16) * 1.4];
  for (let y = 0; y <= H; y++){                                 // 扭曲主干
    const [cx, cz] = tw(y);
    disc(put, cx, y0 + y, cz, 1.3 + 4.4 * Math.pow(1 - y / H, 1.35), B.YLOG);
  }
  const [topX, topZ] = tw(H);
  leafBlob(put, topX, y0 + H + 3, topZ, 13 + R() * 2, 6.5, R, B.YLEAF);   // 巨型树冠
  for (let i = 0; i < 9; i++){                                  // 黄金分割螺旋枝条
    const f = i / 9, by = H * (0.5 + 0.42 * f), ang = i * 2.39996 + R() * 0.3, blen = 14 - 8 * f;
    const [bx0, bz0] = tw(by);
    let px = bx0, pz = bz0, py = y0 + by;
    for (let t = 0; t <= blen; t++){
      px = bx0 + Math.cos(ang) * t; pz = bz0 + Math.sin(ang) * t;
      py = y0 + by + t * 0.42 - Math.max(0, t - blen * 0.66) * 0.7;
      put(px, py, pz, B.YLOG); if (t < 3) put(px, py - 1, pz, B.YLOG);
    }
    leafBlob(put, px, py + 1, pz, 4 + R() * 2, 3, R, B.YLEAF);
    if (R() < 0.7) put(px, py - 1, pz, B.GLOW, true);           // 萤石果
  }
  for (let i = 0; i < 18; i++){                                 // 垂藤与灯果
    const ang = R() * 6.283, rr = 3 + R() * 10;
    const vx = topX + Math.cos(ang) * rr, vz = topZ + Math.sin(ang) * rr, vy = y0 + H + 1 - ((R() * 3) | 0);
    const len = 2 + ((R() * 5) | 0);
    for (let d = 0; d < len; d++) put(vx, vy - d, vz, B.YLEAF, true);
    if (R() < 0.5) put(vx, vy - len, vz, B.GLOW, true);
  }
  disc(put, x0, y0, z0, 7, B.GRASS, true);
}

/* ---------- 奥林匹斯神殿 ---------- */
function genTemple(put, x0, z0, R){
  const BY = groundY(x0, z0) + 1;
  box(put, x0 - 14, BY, z0 - 10, x0 + 14, BY + 17, z0 + 10, B.AIR);      // 清场
  foundation(put, x0 - 13, z0 - 9, x0 + 13, z0 + 9, BY - 1, B.STONE);
  for (let i = 0; i < 3; i++)                                            // 三层基座
    box(put, x0 - (13 - i), BY - 1 + i, z0 - (9 - i), x0 + (13 - i), BY - 1 + i, z0 + (9 - i), B.MARBLE);
  for (let x = -10; x <= 10; x += 2){ colY(put, x0 + x, BY + 2, z0 - 6, 7, B.PILLAR); colY(put, x0 + x, BY + 2, z0 + 6, 7, B.PILLAR); }
  for (let z = -4; z <= 4; z += 2){ colY(put, x0 - 10, BY + 2, z0 + z, 7, B.PILLAR); colY(put, x0 + 10, BY + 2, z0 + z, 7, B.PILLAR); }
  box(put, x0 - 11, BY + 9, z0 - 7, x0 + 11, BY + 9, z0 + 7, B.MARBLE);  // 楣梁
  for (let x = -11; x <= 11; x += 2){ put(x0 + x, BY + 9, z0 - 7, B.GOLD); put(x0 + x, BY + 9, z0 + 7, B.GOLD); }
  for (let dz = -7; dz <= 7; dz++){                                      // 阶梯山形屋顶
    const ry = BY + 10 + ((7 - Math.abs(dz)) * 0.55 | 0);
    box(put, x0 - 11, BY + 10, z0 + dz, x0 + 11, ry, z0 + dz, B.AIR);
    box(put, x0 - 11, ry, z0 + dz, x0 + 11, ry, z0 + dz, B.MARBLE);
    for (let y = BY + 10; y <= ry; y++){ put(x0 - 11, y, z0 + dz, B.MARBLE); put(x0 + 11, y, z0 + dz, B.MARBLE); }
  }
  put(x0 - 11, BY + 14, z0, B.GOLD); put(x0 + 11, BY + 14, z0, B.GOLD);  // 山墙金顶
  for (const s of [-1, 1]){                                              // 内殿墙
    box(put, x0 - 8, BY + 2, z0 + s * 5, x0 + 8, BY + 8, z0 + s * 5, B.MARBLE);
  }
  box(put, x0 - 8, BY + 2, z0 - 4, x0 - 8, BY + 8, z0 + 4, B.MARBLE);
  box(put, x0 + 8, BY + 2, z0 - 4, x0 + 8, BY + 8, z0 + 4, B.MARBLE);
  box(put, x0 + 8, BY + 2, z0 - 1, x0 + 8, BY + 5, z0 + 1, B.AIR);       // 殿门
  box(put, x0 - 5, BY + 2, z0 - 1, x0 - 3, BY + 2, z0 + 1, B.GOLD);      // 祭坛
  put(x0 - 4, BY + 3, z0, B.GLOW);
  colY(put, x0 - 6, BY + 2, z0, 4, B.GOLD); put(x0 - 6, BY + 6, z0, B.GLOW); // 神像
  for (const sx of [-1, 1]) for (const sz of [-1, 1]) put(x0 + sx * 7, BY + 2, z0 + sz * 4, B.GLOW);
  for (let px = 12; px <= 22; px++){                                     // 神道
    for (let dz = -1; dz <= 1; dz++){ const hg = groundY(x0 + px, z0 + dz); put(x0 + px, hg, z0 + dz, B.COBBLE); }
  }
  for (const s of [-1, 1]){ const hg = groundY(x0 + 15, z0 + s * 3);
    colY(put, x0 + 15, hg + 1, z0 + s * 3, 2, B.PILLAR); put(x0 + 15, hg + 3, z0 + s * 3, B.GLOW); }
}

/* ---------- 天空浮岛 ---------- */
function genFloatIsland(put, x0, yI, z0, r, R, shrine){
  for (let dx = -r; dx <= r; dx++) for (let dz = -r; dz <= r; dz++){
    const d = Math.sqrt(dx * dx + dz * dz); if (d > r + 0.3) continue;
    const topY = yI + Math.round(N.n2((x0 + dx) * 0.13, (z0 + dz) * 0.13) * 1.6 * (1 - d / r));
    const depth = (r - d) * 1.05 + N.n2(dx * 0.31 + 5, dz * 0.33) * 2.5;
    const bot = Math.round(topY - 2 - Math.max(0, depth));
    for (let y = bot; y <= topY; y++)
      put(x0 + dx, y, z0 + dz, y === topY ? B.GRASS : y > topY - 3 ? B.DIRT : B.STONE);
    if (d > r - 1.4 && R() < 0.3){ const len = 2 + ((R() * 4) | 0);      // 垂藤
      for (let l = 1; l <= len; l++) put(x0 + dx, bot - l, z0 + dz, B.LEAVES, true); }
  }
  ballAt(put, x0, yI - 4 - r, z0, 2.2, B.CRYSTAL); put(x0, yI - 4 - r, z0, B.GLOW); // 岛底悬晶
  if (shrine){                                                           // 顶部神龛
    box(put, x0 - 2, yI + 1, z0 - 2, x0 + 2, yI + 8, z0 + 2, B.AIR);
    box(put, x0 - 2, yI + 1, z0 - 2, x0 + 2, yI + 1, z0 + 2, B.MARBLE);
    for (const sx of [-2, 2]) for (const sz of [-2, 2]) colY(put, x0 + sx, yI + 2, z0 + sz, 3, B.PILLAR);
    box(put, x0 - 2, yI + 5, z0 - 2, x0 + 2, yI + 5, z0 + 2, B.MARBLE);
    put(x0, yI + 6, z0, B.GOLD); put(x0, yI + 2, z0, B.GOLD); put(x0, yI + 3, z0, B.GLOW);
  } else {
    colY(put, x0, yI + 1, z0, 4, B.LOG); leafBlob(put, x0, yI + 5, z0, 3, 2.4, R, B.LEAVES);
  }
}

/* ---------- 彩虹虹桥 Bifrost ---------- */
function genBifrost(put, ax, ay, az, bx, by, bz){
  const mx = (ax + bx) / 2, mz = (az + bz) / 2, my = Math.max(ay, by) + 9;
  const dist = Math.hypot(bx - ax, bz - az), nSeg = Math.ceil(dist * 2.4);
  const bez = t => [ lerp(lerp(ax, mx, t), lerp(mx, bx, t), t),
                     lerp(lerp(ay, my, t), lerp(my, by, t), t),
                     lerp(lerp(az, mz, t), lerp(mz, bz, t), t) ];
  for (let i = 0; i <= nSeg; i++){
    const t = i / nSeg, [px, py, pz] = bez(t), [qx, , qz] = bez(Math.min(1, t + 0.02));
    let dx = qx - px, dz = qz - pz; const dl = Math.hypot(dx, dz) || 1; dx /= dl; dz /= dl;
    const ci = BIF[((i / 4) | 0) % 6];
    for (let w = -1; w <= 1; w++){
      const wx = px - dz * w, wz = pz + dx * w;
      put(wx, py - 1, wz, ci);
      for (let c = 0; c <= 3; c++) put(wx, py + c, wz, B.AIR);          // 净空可通行
    }
  }
}
/* ---------- 法老金字塔 ---------- */
function genPyramid(put, x0, z0, R){
  const BY = groundY(x0, z0), W = 13, L = 12;
  disc(put, x0, 0, z0, 17, B.AIR, true);                                 // 占位(无副作用)
  for (let dx = -17; dx <= 17; dx++) for (let dz = -17; dz <= 17; dz++){ // 沙漠化地表
    if (dx * dx + dz * dz > 17 * 17) continue;
    const hg = heightAt(x0 + dx, z0 + dz); if (hg <= SEA) continue;
    put(x0 + dx, hg, z0 + dz, B.SAND); put(x0 + dx, hg - 1, z0 + dz, B.SAND);
  }
  box(put, x0 - 14, BY + 1, z0 - 14, x0 + 14, BY + 18, z0 + 14, B.AIR);
  foundation(put, x0 - W, z0 - W, x0 + W, z0 + W, BY + 1, B.SANDSTONE);
  for (let i = 0; i <= L; i++){                                          // 主体
    const half = W - i;
    box(put, x0 - half, BY + 1 + i, z0 - half, x0 + half, BY + 1 + i, z0 + half, B.SANDSTONE);
  }
  for (let v = -W + 1; v < W; v += 2){                                   // 象形雕纹带
    put(x0 + v, BY + 2, z0 - W, B.SANDCARVE); put(x0 + v, BY + 2, z0 + W, B.SANDCARVE);
    put(x0 - W, BY + 2, z0 + v, B.SANDCARVE); put(x0 + W, BY + 2, z0 + v, B.SANDCARVE);
  }
  box(put, x0 - 3, BY + 2, z0 - 3, x0 + 3, BY + 5, z0 + 3, B.AIR);       // 法老墓室
  for (let i = 0; i < 6; i++) put(x0 - 3 + ((R() * 7) | 0), BY + 2, z0 - 3 + ((R() * 7) | 0), B.GOLD);
  colY(put, x0, BY + 2, z0, 2, B.GOLD); put(x0, BY + 4, z0, B.GLOW);
  box(put, x0, BY + 2, z0 - W - 1, x0, BY + 4, z0 - 3, B.AIR);           // 甬道
  put(x0, BY + 14, z0, B.GOLD); put(x0, BY + 15, z0, B.GLOW);            // 金顶圣火
  for (const s of [-1, 1]){                                              // 入口双碑
    const bx = x0 + s * 4, bz = z0 - W - 4, hg = groundY(bx, bz);
    colY(put, bx, hg + 1, bz, 5, B.OBSIDIAN); put(bx, hg + 6, bz, B.GOLD);
  }
}

/* ---------- 巨石阵 ---------- */
function genStonehenge(put, x0, z0, R){
  for (let k = 0; k < 8; k++){
    const ang = k * Math.PI / 4;
    const cx = x0 + Math.cos(ang) * 8, cz = z0 + Math.sin(ang) * 8;
    const hg = groundY(cx, cz);
    const p1 = [cx + Math.cos(ang + 1.5708) * 1.5, cz + Math.sin(ang + 1.5708) * 1.5];
    const p2 = [cx - Math.cos(ang + 1.5708) * 1.5, cz - Math.sin(ang + 1.5708) * 1.5];
    box(put, Math.round(cx) - 2, hg + 1, Math.round(cz) - 2, Math.round(cx) + 2, hg + 7, Math.round(cz) + 2, B.AIR);
    colY(put, p1[0], hg + 1, p1[1], 4, B.MOSSY); colY(put, p2[0], hg + 1, p2[1], 4, B.MOSSY);
    for (let t = -1; t <= 1; t++) put(cx + Math.cos(ang + 1.5708) * t * 1.5, hg + 5, cz + Math.sin(ang + 1.5708) * t * 1.5, B.MOSSY);
  }
  const hg0 = groundY(x0, z0);
  box(put, x0 - 1, hg0 + 1, z0, x0 + 1, hg0 + 1, z0, B.MOSSY);           // 祭坛石
  for (let i = 0; i < 20; i++){ const a = R() * 6.283, rr = R() * 7;
    put(x0 + Math.cos(a) * rr, groundY(x0 + Math.cos(a) * rr, z0 + Math.sin(a) * rr), z0 + Math.sin(a) * rr, B.COBBLE, true); }
}

/* ---------- 通天塔 ---------- */
function genBabel(put, x0, z0, R){
  const BY = groundY(x0, z0) + 1, tiers = [10, 8.5, 7, 5.5, 4];
  box(put, x0 - 12, BY, z0 - 12, x0 + 12, BY + 36, z0 + 12, B.AIR);
  foundation(put, x0 - 10, z0 - 10, x0 + 10, z0 + 10, BY, B.STONEBRICK);
  tiers.forEach((rr, ti) => {
    const yb = BY + ti * 6, ri = Math.ceil(rr);
    for (let dx = -ri; dx <= ri; dx++) for (let dz = -ri; dz <= ri; dz++){
      const d = Math.sqrt(dx * dx + dz * dz); if (d > rr) continue;
      put(x0 + dx, yb, z0 + dz, B.STONEBRICK);                           // 层间楼板
      if (d > rr - 1.6){                                                 // 外壁
        const sect = Math.floor((Math.atan2(dz, dx) + Math.PI) / (2 * Math.PI) * Math.round(rr * 2.2));
        for (let y = 1; y <= 5; y++){
          if (y >= 2 && y <= 3 && sect % 3 === 0) continue;              // 窗洞
          put(x0 + dx, yb + y, z0 + dz, hash01(dx, dz, ti) < 0.18 ? B.MOSSY : B.STONEBRICK);
        }
        if (sect % 5 === 0) put(x0 + dx, yb + 5, z0 + dz, B.GLOW);       // 灯带
      }
    }
    if (ti === 0) box(put, x0 + ri - 2, yb + 1, z0 - 1, x0 + ri + 1, yb + 3, z0 + 1, B.AIR); // 塔门
  });
  const ty = BY + 30;
  box(put, x0 - 2, ty, z0 - 2, x0 + 2, ty, z0 + 2, B.MARBLE);            // 顶部圣所
  for (const sx of [-2, 2]) for (const sz of [-2, 2]) colY(put, x0 + sx, ty + 1, z0 + sz, 3, B.PILLAR);
  box(put, x0 - 2, ty + 4, z0 - 2, x0 + 2, ty + 4, z0 + 2, B.GOLD);
  colY(put, x0, ty + 1, z0, 4, B.GOLD); put(x0, ty + 5, z0, B.GLOW); put(x0, ty + 6, z0, B.GLOW);
}

/* ---------- 巨龙遗骸 ---------- */
function genDragon(put, x0, z0, R){
  const th = R() * 6.283, dirx = Math.cos(th), dirz = Math.sin(th), len = 24;
  const px2 = (-dirz), pz2 = dirx;
  let sy0 = 0;
  for (let t = 0; t <= len; t++){
    const px = x0 + dirx * t, pz = z0 + dirz * t;
    const sy = Math.max(heightAt(px, pz), SEA) + 2 + Math.round(Math.sin(t / len * Math.PI) * 4.5);
    if (t === 0) sy0 = sy;
    put(px, sy, pz, B.BONE); put(px, sy - 1, pz, B.BONE);                // 脊椎
    if (t % 4 === 1) put(px, sy + 1, pz, B.BONE);                        // 背棘
    if (t >= 5 && t <= 19 && t % 3 === 2){                               // 肋骨拱
      for (const side of [-1, 1]) for (let a = 0.18; a <= 1.62; a += 0.2){
        const lat = Math.sin(a) * 5.4, drop = (1 - Math.cos(a)) * 6;
        put(px + px2 * lat * side, sy + 2 - drop, pz + pz2 * lat * side, B.BONE);
      }
    }
  }
  const hx = x0 - dirx * 3, hz = z0 - dirz * 3, hy = sy0;                // 颅骨
  box(put, Math.round(hx) - 2, hy - 1, Math.round(hz) - 2, Math.round(hx) + 2, hy + 2, Math.round(hz) + 2, B.BONE);
  box(put, Math.round(hx - dirx * 3) - 1, hy - 1, Math.round(hz - dirz * 3) - 1, Math.round(hx - dirx * 3) + 1, hy, Math.round(hz - dirz * 3) + 1, B.BONE);
  for (const side of [-1, 1]){
    put(hx + px2 * 2 * side - dirx, hy + 1, hz + pz2 * 2 * side - dirz, B.OBSIDIAN);   // 眼窝
    put(hx + px2 * 2 * side + dirx * 2, hy + 3, hz + pz2 * 2 * side + dirz * 2, B.BONE); // 角
    put(hx + px2 * 2 * side + dirx * 3, hy + 4, hz + pz2 * 2 * side + dirz * 3, B.BONE);
  }
  let ta = th, tx = x0 + dirx * len, tz = z0 + dirz * len;               // 卷曲尾骨
  for (let t = 0; t < 10; t++){
    ta += 0.22; tx += Math.cos(ta); tz += Math.sin(ta);
    put(tx, Math.max(heightAt(tx, tz), SEA) + Math.max(1, 2 - (t / 4 | 0)), tz, B.BONE);
  }
}

/* ---------- 千本鸟居 ---------- */

  box(put, sx + 1, base + 1, z0 - 1, sx + 3, base + 3, z0 + 1, B.AIR);
  box(put, sx, base + 1, z0, sx, base + 2, z0, B.AIR);                   // 门
  box(put, sx - 1, base + 4, z0 - 3, sx + 5, base + 4, z0 + 3, B.LACQUER);

/* ---------- 黑曜石方尖碑 / 废墟 / 水晶尖塔林 ---------- */
function genObelisk(put, x0, z0, R){

  box(put, x0 - 1, hg + 1, z0 - 1, x0 + 1, hg + 9, z0 + 1, B.AIR);

  put(x0, hg + 4, z0 + 1, B.GLOW); put(x0, hg + 4, z0 - 1, B.GLOW);

function genRuins(put, x0, z0, R){

function genCrystals(put, x0, z0, R){

  parts.forEach((p, i) => { pPos.set([p.x, p.y, p.z], i * 3); pCol.set([p.r, p.g, p.b], i * 3); });
  pGeo.setDrawRange(0, parts.length);
  pGeo.attributes.position.needsUpdate = true; pGeo.attributes.color.needsUpdate = true;
}
// 音效(WebAudio 合成)
let ACX = null;
function ac(){ if (!ACX){ try { ACX = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (ACX && ACX.state === 'suspended') ACX.resume(); return ACX; }
function sndBreak(id){ const a = ac(); if (!a) return;
  const dur = 0.1, buf = a.createBuffer(1, (a.sampleRate * dur) | 0, a.sampleRate), ch = buf.getChannelData(0);
  for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / ch.length);
  const src = a.createBufferSource(); src.buffer = buf;
  const fl = a.createBiquadFilter(); fl.type = 'lowpass';
  const wood = [B.LOG, B.PLANK, B.LACQUER, B.YLOG].includes(id), leafy = [B.LEAVES, B.YLEAF, B.GRASS, B.SAND].includes(id);
  fl.frequency.value = leafy ? 1100 : wood ? 540 : 760;
  const g = a.createGain(); g.gain.setValueAtTime(0.22, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, a.currentTime + dur);
  src.connect(fl); fl.connect(g); g.connect(a.destination); src.start();
}
function sndPlace(){ const a = ac(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain(); o.type = 'square';
  o.frequency.setValueAtTime(175, a.currentTime); o.frequency.exponentialRampToValueAtTime(95, a.currentTime + 0.06);
  g.gain.setValueAtTime(0.1, a.currentTime); g.gain.exponentialRampToValueAtTime(0.005, a.currentTime + 0.07);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime + 0.08);
}
function chime(){ const a = ac(); if (!a) return;
  [523, 659, 784].forEach((f, i) => { const o = a.createOscillator(), g = a.createGain(); o.type = 'triangle';
    o.frequency.value = f; const t0 = a.currentTime + i * 0.09;
    g.gain.setValueAtTime(0.001, t0); g.gain.exponentialRampToValueAtTime(0.13, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.5);
    o.connect(g); g.connect(a.destination); o.start(t0); o.stop(t0 + 0.55); });
}
function doBreak(){ const h = raycast(7); if (!h || h.id === B.BEDROCK) return;
  setBlock(h.x, h.y, h.z, B.AIR); burst(h.x, h.y, h.z, h.id); sndBreak(h.id); }
function doPlace(){ const h = raycast(7); if (!h || (!h.fx && !h.fy && !h.fz)) return;
  const bx = h.x + h.fx, by = h.y + h.fy, bz = h.z + h.fz;
  if (by < 0 || by >= SY) return;
  const cur = getBlock(bx, by, bz); if (cur !== B.AIR && cur !== B.WATER) return;
  if (aabbHit(bx, by, bz)) return;
  setBlock(bx, by, bz, PALETTE[sel]); sndPlace(); }

/* ================================================================
   UI:快捷栏 / 提示 / 罗盘 / HUD / 覆盖层状态机
   ================================================================ */
const hb = $('hb'); let sel = 0;
PALETTE.forEach((id, i) => {
  const sl = document.createElement('div'); sl.className = 'slot';
  const cv = document.createElement('canvas'); cv.width = cv.height = 32;
  const g = cv.getContext('2d'); g.imageSmoothingEnabled = false;
  const t = BLOCKS[id].tiles[1];
  g.drawImage(atlas, (t % AC) * T, ((t / AC) | 0) * T, T, T, 0, 0, 32, 32);
  const n = document.createElement('span'); n.className = 'num'; n.textContent = i + 1;
  sl.append(cv, n); hb.appendChild(sl);
});
function select(i, quiet){ sel = i;
  [...hb.children].forEach((s, j) => s.classList.toggle('sel', j === i));
  if (!quiet) toast(BLOCKS[PALETTE[i]].name); }
select(0, true);
function toast(msg, big){ const t = document.createElement('div'); t.className = 'toast' + (big ? ' big' : '');
  t.textContent = msg; $('toasts').appendChild(t);
  setTimeout(() => t.classList.add('out'), big ? 2600 : 1600);
  setTimeout(() => t.remove(), big ? 3200 : 2150); }
let foundCount = 0;
function renderWonderList(){
  $('ovList').innerHTML = WONDERS.map(w => `<span class="${w.found ? 'found' : ''}">${w.found ? '✓ ' : ''}${w.n}</span>`).join('');
}
renderWonderList();
function updateWonders(){
  let best = null, bd = 1e9;
  for (const w of WONDERS){
    const dist = Math.hypot(w.x - player.x, w.z - player.z);
    if (!w.found && dist < 24){ w.found = true; foundCount++; chime();
      toast(`发现奇观 · ${w.n} (${foundCount}/10)`, true);
      if (foundCount === 10) setTimeout(() => toast('十大神话奇观,全部点亮', true), 1400); }
    if (!w.found && dist < bd){ bd = dist; best = w; }
  }
  if (best){
    const yawTo = Math.atan2(-(best.x - player.x), -(best.z - player.z));
    let rel = yawTo - player.yaw;
    rel = ((rel + Math.PI) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI) - Math.PI;
    $('lm').innerHTML = `<span class="arr" style="transform:rotate(${(-rel * 57.2958).toFixed(0)}deg)">&uarr;</span> ${best.n} ${bd | 0}m<br><span class="cnt">奇观 ${foundCount}/10</span>`;
  } else $('lm').innerHTML = `<span class="cnt">奇观 ${foundCount}/10 · 传说尽收眼底</span>`;
}
function updateHUD(fps){
  const dirs = ['北', '西北', '西', '西南', '南', '东南', '东', '东北'];
  const di = ((Math.round(player.yaw / (Math.PI / 4)) % 8) + 8) % 8;
  const hh = (dayT * 24) | 0, mm = ((dayT * 24 * 60) | 0) % 60;
  $('hud').textContent = `FPS ${fps}  第 ${dayCount} 天 ${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}\n` +
    `X ${player.x.toFixed(1)}  Y ${player.y.toFixed(1)}  Z ${player.z.toFixed(1)}  朝向 ${dirs[di]}` + (player.fly ? '\n飞行模式' : '');
}
let locked = false, everPlayed = false, startedOnce = false, holdL = false, holdR = false, tL = 0, tR = 0;
ovBtn.addEventListener('click', () => { ac();
  const el = renderer.domElement;
  try { const p = el.requestPointerLock({ unadjustedMovement: true });
    if (p && p.catch) p.catch(() => el.requestPointerLock()); }
  catch (e) { el.requestPointerLock(); }
});
document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === renderer.domElement;
  keys.clear(); holdL = holdR = false;
  $('ov').classList.toggle('hide', locked);
  $('hud').style.display = $('lm').style.display = $('ch').style.display = locked ? 'block' : 'none';
  $('hb').style.display = locked ? 'flex' : 'none';
  if (locked){ everPlayed = true;
    if (!startedOnce){ startedOnce = true; setTimeout(() => toast('跟随右上角罗盘,寻访十大奇观', true), 600); }
    updateHUD(0); updateWonders();
  } else if (everPlayed){ ovBtn.textContent = '继 续 探 索'; renderWonderList(); }
});
document.addEventListener('pointerlockerror', () => toast('鼠标锁定失败,请点击页面后重试'));
document.addEventListener('mousemove', e => { if (!locked) return;
  player.yaw -= e.movementX * 0.0023; player.pitch = clamp(player.pitch - e.movementY * 0.0023, -1.55, 1.55); });
document.addEventListener('mousedown', e => { if (!locked) return; ac();
  if (e.button === 0){ holdL = true; tL = -0.12; doBreak(); }
  if (e.button === 2){ holdR = true; tR = -0.12; doPlace(); } });
document.addEventListener('mouseup', e => { if (e.button === 0) holdL = false; if (e.button === 2) holdR = false; });
document.addEventListener('contextmenu', e => e.preventDefault());
addEventListener('wheel', e => { if (!locked) return; e.preventDefault();
  select((sel + (e.deltaY > 0 ? 1 : -1) + 9) % 9); }, { passive: false });
document.addEventListener('keydown', e => {
  if (!locked) return;
  keys.add(e.code);
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'KeyF'){ player.fly = !player.fly; player.vy = 0; toast(player.fly ? '飞行模式 开' : '飞行模式 关'); }
  if (e.code === 'KeyR') respawn();
  if (e.code.startsWith('Digit')){ const n = +e.code.slice(5); if (n >= 1 && n <= 9) select(n - 1); }
  if (e.code === 'Minus'){ VIEW = Math.max(4, VIEW - 1); fitFog(); lastCenter = null; toast('渲染距离 ' + VIEW + ' 区块'); }
  if (e.code === 'Equal'){ VIEW = Math.min(10, VIEW + 1); fitFog(); lastCenter = null; toast('渲染距离 ' + VIEW + ' 区块'); }
});
document.addEventListener('keyup', e => keys.delete(e.code));
addEventListener('blur', () => keys.clear());
addEventListener('resize', () => { renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); });

/* ================================================================
   主循环 + 启动序列
   ================================================================ */
const orbitC = { x: SP.x + 14, z: SP.z + 6 };
let last = performance.now(), fps = 0, fpsCnt = 0, fpsT = 0, hudT = 0, wonderT = 0;
function frame(now){
  requestAnimationFrame(frame);
  const dt = Math.min((now - last) / 1000, 0.1); last = now;
  fpsCnt++; fpsT += dt; if (fpsT >= 0.5){ fps = Math.round(fpsCnt / fpsT); fpsCnt = 0; fpsT = 0; }
  if (locked){
    stepPlayer(dt);
    camera.position.set(player.x, player.y + 1.62, player.z);
    camera.rotation.set(player.pitch, player.yaw, 0);
    if (holdL){ tL += dt; while (tL > 0.24){ tL -= 0.24; doBreak(); } }
    if (holdR){ tR += dt; while (tR > 0.26){ tR -= 0.26; doPlace(); } }
    const h = raycast(7);
    if (h){ hl.visible = true; hl.position.set(h.x + 0.5, h.y + 0.5, h.z + 0.5); } else hl.visible = false;
  } else if (!everPlayed){                                     // 开场环绕镜头
    const t = now * 0.00007;
    camera.position.set(orbitC.x + Math.cos(t) * 54, heightAt(orbitC.x, orbitC.z) + 32, orbitC.z + Math.sin(t) * 54);
    camera.lookAt(SP.x, heightAt(SP.x, SP.z) + 10, SP.z);
  }
  const px = camera.position.x, pz = camera.position.z;
  updateChunks(px, pz, everPlayed ? 7 : 28);
  sweepChunks(dt, px, pz);
  updateSky(dt, px, pz);
  const inW = getBlock(Math.floor(px), Math.floor(camera.position.y), Math.floor(pz)) === B.WATER;
  $('wet').style.display = inW ? 'block' : 'none';
  if (inW){ scene.fog.near = 2; scene.fog.far = 28; scene.fog.color.set(0x2050b8); renderer.setClearColor(0x2050b8); }
  stepParts(dt);
  hudT += dt; if (hudT > 0.25 && locked){ hudT = 0; updateHUD(fps); }
  wonderT += dt; if (wonderT > 0.3 && locked){ wonderT = 0; updateWonders(); }
  renderer.render(scene, camera);
}
const frameP = () => new Promise(r => requestAnimationFrame(r));
async function waitReady(){
  const R0 = 3, total = (R0 * 2 + 1) ** 2, scx = SP.x >> 4, scz = SP.z >> 4;
  while (true){
    let done = 0;
    for (let dx = -R0; dx <= R0; dx++) for (let dz = -R0; dz <= R0; dz++){
      const c = chunks.get(ckey(scx + dx, scz + dz)); if (c && c.meshes) done++;
    }
    boot(`正在铸造大陆与诸神遗迹… ${done}/${total}`, 0.16 + 0.84 * done / total);
    if (done >= total) break;
    await frameP();
  }
  $('ovLoad').style.display = 'none';
  ovBtn.style.display = 'inline-block';
  if (!matchMedia('(pointer:fine)').matches) toast('本作需要键盘与鼠标游玩', true);
}
requestAnimationFrame(frame);
waitReady();
</script>
