<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变定义 -->
  <defs>
    <!-- 天空渐变 -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="0.4">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#B0E0E6"/>
    </linearGradient>
    <!-- 海水渐变 -->
    <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4682B4"/>
      <stop offset="100%" stop-color="#1E90FF"/>
    </linearGradient>
    <!-- 沙滩渐变 -->
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5DEB3"/>
      <stop offset="100%" stop-color="#DEB887"/>
    </linearGradient>
  </defs>

  <!-- 背景-天空 -->
  <rect width="800" height="200" fill="url(#skyGrad)"/>
  
  <!-- 远景海浪/海平面 -->
  <path d="M0 180 Q200 170 400 185 T800 180 L800 220 L0 220 Z" fill="url(#seaGrad)" opacity="0.8"/>

  <!-- 中景海面 -->
  <path d="M0 220 Q150 210 300 225 T600 218 T800 222 L800 320 L0 320 Z" fill="url(#seaGrad)"/>
  
  <!-- 沙滩地面 -->
  <path d="M0 320 L800 320 L800 500 L0 500 Z" fill="url(#sandGrad)"/>

  <!-- 海浪波纹 -->
  <path d="M20 290 Q40 285 60 292" stroke="#ADD8E6" stroke-width="2" fill="none"/>
  <path d="M120 288 Q140 282 160 290" stroke="#ADD8E6" stroke-width="2" fill="none"/>
  <path d="M350 295 Q370 288 390 294" stroke="#ADD8E6" stroke-width="2" fill="none"/>
  <path d="M580 292 Q600 286 620 293" stroke="#ADD8E6" stroke-width="2" fill="none"/>
  <path d="M720 289 Q740 284 760 291" stroke="#ADD8E6" stroke-width="2" fill="none"/>

  <!-- 自行车 -->
  <!-- 后轮 -->
  <circle cx="220" cy="420" r="35" stroke="#333" stroke-width="4" fill="none"/>
  <circle cx="220" cy="420" r="5" fill="#222"/>
  <!-- 前轮 -->
  <circle cx="420" cy="410" r="35" stroke="#333" stroke-width="4" fill="none"/>
  <circle cx="420" cy="410" r="5" fill="#222"/>
  <!-- 车架 -->
  <path d="M220 420 L320 340 L420 410 L320 380 Z" stroke="#8B4513" stroke-width="5" fill="none"/>
  <!-- 车座、车把、脚踏 -->
  <path d="M320 340 L310 320" stroke="#8B4513" stroke-width="4" fill="none"/>
  <path d="M320 340 L380 330" stroke="#8B4513" stroke-width="4" fill="none"/>
  <path d="M280 390 L270 405" stroke="#8B4513" stroke-width="3" fill="none"/>

  <!-- 鹈鹕主体 -->
  <!-- 身体 -->
  <ellipse cx="320" cy="345" rx="65" ry="40" fill="#F8F8F8" stroke="#CCC" stroke-width="2"/>
  <!-- 翅膀 -->
  <path d="M270 330 Q240 310 225 335 Q245 360 275 350 Z" fill="#E8E8E8" stroke="#BBB" stroke-width="1.5"/>
  <path d="M370 335 Q400 315 415 340 Q395 365 365 355 Z" fill="#E8E8E8" stroke="#BBB" stroke-width="1.5"/>
  <!-- 长颈 -->
  <path d="M380 330 Q410 290 440 300" stroke="#F0F0F0" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- 头部 -->
  <circle cx="445" cy="298" r="14" fill="#F5F5F5" stroke="#CCC" stroke-width="2"/>
  <!-- 眼睛 -->
  <circle cx="452" cy="294" r="3" fill="#111"/>
  <!-- 鹈鹕巨喙（喉囊） -->
  <path d="M455 300 Q490 310 485 340 Q460 350 448 335 Z" fill="#FFB347" stroke="#E69500" stroke-width="2"/>
  <!-- 腿脚（踩脚踏） -->
  <path d="M290 375 L272 402" stroke="#FFB347" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M330 380 L345 408" stroke="#FFB347" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- 远景小云朵 -->
  <g opacity="0.7">
    <circle cx="100" cy="100" r="20" fill="#fff"/>
    <circle cx="125" cy="90" r="25" fill="#fff"/>
    <circle cx="150" cy="102" r="18" fill="#fff"/>
  </g>
  <g opacity="0.6">
    <circle cx="600" cy="110" r="22" fill="#fff"/>
    <circle cx="628" cy="98" r="26" fill="#fff"/>
    <circle cx="655" cy="112" r="20" fill="#fff"/>
  </g>
</svg>