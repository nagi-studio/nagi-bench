<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';

const TAU = Math.PI * 2;

/* ============================ renderer / scene ============================ */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);
scene.fog = new THREE.Fog(0x05060a, 70, 170);

const camera = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 400);
const CAM_HOME = new THREE.Vector3(20, 26, 47);
const CAM_START = new THREE.Vector3(-6, 74, 112);
camera.position.copy(CAM_START);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 6, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 24;
controls.maxDistance = 130;
controls.maxPolarAngle = 1.52;

controls.autoRotateSpeed = -0.9;

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

/* lighting: luxury product photography */

keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.left = keyLight.shadow.camera.bottom = -30;

rimCool.position.set(-28, 12, -22);

rimWarm.position.set(16, 8, -30);

scene.add(new THREE.AmbientLight(0x30323c, 0.55));

/* ============================ canvas textures ============================ */
function genevaStripes() {
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const g = c.getContext('2d');
  const stripe = 64;
  for (let x = 0; x < 512; x += stripe) {
    const gr = g.createLinearGradient(x, 0, x + stripe, 0);
    gr.addColorStop(0, '#9aa0a8'); gr.addColorStop(0.42, '#e6e9ee');
    gr.addColorStop(0.58, '#e6e9ee'); gr.addColorStop(1, '#9aa0a8');
    g.fillStyle = gr; g.fillRect(x, 0, stripe, 512);
  }
  g.globalAlpha = 0.07; g.strokeStyle = '#ffffff';
  for (let i = 0; i < 260; i++) {
    const y = Math.random() * 512;
    g.beginPath(); g.moveTo(0, y); g.bezierCurveTo(170, y + 9, 340, y - 9, 512, y); g.stroke();
  }
  g.globalAlpha = 1;
  return c;
}

function perlage() {
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const g = c.getContext('2d');
  g.fillStyle = '#b7bac1'; g.fillRect(0, 0, 512, 512);
  const r = 58, sx = 96, sy = 84;
  for (let row = 0, y = -r; y < 512 + r; y += sy, row++) {
    for (let x = -r + (row % 2 ? sx / 2 : 0); x < 512 + r; x += sx) {
      const gr = g.createRadialGradient(x, y, 4, x, y, r);
      gr.addColorStop(0, '#d9dce2'); gr.addColorStop(0.75, '#b9bcc3'); gr.addColorStop(1, '#969aa2');
      g.fillStyle = gr; g.beginPath(); g.arc(x, y, r, 0, TAU); g.fill();
      g.globalAlpha = 0.12; g.strokeStyle = '#f2f4f8';
      for (let k = 1; k <= 3; k++) { g.beginPath(); g.arc(x, y, r * k / 3.4, 0, TAU); g.stroke(); }
      g.globalAlpha = 1;
    }
  }
  return c;
}

function brushedConcentric() {
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const g = c.getContext('2d');
  g.fillStyle = '#c9ccd2'; g.fillRect(0, 0, 512, 512);
  g.translate(256, 256);
  for (let r = 6; r < 380; r += 2) {
    g.globalAlpha = 0.05 + Math.random() * 0.1;
    g.strokeStyle = Math.random() > 0.5 ? '#eef0f4' : '#8f939b';
    g.beginPath(); g.arc(0, 0, r, Math.random() * TAU, Math.random() * TAU + TAU * 0.75); g.stroke();
  }
  return c;
}

function floorGradient() {
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(256, 256, 20, 256, 256, 256);
  gr.addColorStop(0, '#262b34'); gr.addColorStop(0.55, '#12151c'); gr.addColorStop(1, '#05060a');
  g.fillStyle = gr; g.fillRect(0, 0, 512, 512);
  return c;
}

function texFrom(canvas, { srgb = false, repeat = 1 } = {}) {
  const t = new THREE.CanvasTexture(canvas);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  if (srgb) t.colorSpace = THREE.SRGBColorSpace;
  t.repeat.set(repeat, repeat);
  t.anisotropy = 8;
  return t;
}

/* ============================ materials ============================ */
const stripesCanvas = genevaStripes();
const perlageCanvas = perlage();

const M = {
  whiteGold: new THREE.MeshPhysicalMaterial({ color: 0xf2ede4, metalness: 1, roughness: 0.07, envMapIntensity: 1.35 }),
  steelPolish: new THREE.MeshPhysicalMaterial({ color: 0xf4f6f9, metalness: 1, roughness: 0.09, envMapIntensity: 1.25 }),
  steelSatin: new THREE.MeshPhysicalMaterial({ color: 0xd6d9de, metalness: 1, roughness: 0.34, envMapIntensity: 1.0 }),
  roseGold: new THREE.MeshPhysicalMaterial({ color: 0xe9b490, metalness: 1, roughness: 0.14, envMapIntensity: 1.3 }),
  gold: new THREE.MeshPhysicalMaterial({ color: 0xd9b36c, metalness: 1, roughness: 0.2, envMapIntensity: 1.2 }),
  blued: new THREE.MeshPhysicalMaterial({ color: 0x2a3f9e, metalness: 1, roughness: 0.22, envMapIntensity: 1.35 }),
  anthracite: new THREE.MeshPhysicalMaterial({ color: 0x2b2d33, metalness: 0.9, roughness: 0.5, envMapIntensity: 0.7 }),
  darkSteel: new THREE.MeshPhysicalMaterial({ color: 0x55585f, metalness: 1, roughness: 0.3, envMapIntensity: 0.9 }),
  springSteel: new THREE.MeshPhysicalMaterial({ color: 0x39415e, metalness: 1, roughness: 0.34, envMapIntensity: 1.0 }),
  stripes: new THREE.MeshPhysicalMaterial({
    color: 0xffffff, metalness: 1, roughness: 0.52,
    map: texFrom(stripesCanvas, { srgb: true, repeat: 1 / 34 }),
    roughnessMap: texFrom(stripesCanvas, { repeat: 1 / 34 }),
    envMapIntensity: 1.15
  }),
  perlage: new THREE.MeshPhysicalMaterial({
    color: 0xffffff, metalness: 1, roughness: 0.58,
    map: texFrom(perlageCanvas, { srgb: true, repeat: 1 / 12 }),
    roughnessMap: texFrom(perlageCanvas, { repeat: 1 / 12 }),
    envMapIntensity: 1.0
  }),
  brushedBezel: new THREE.MeshPhysicalMaterial({
    color: 0xffffff, metalness: 1, roughness: 0.3,
    map: texFrom(brushedConcentric(), { srgb: true }), envMapIntensity: 1.1
  }),
  ruby: new THREE.MeshPhysicalMaterial({
    color: 0xc2102f, metalness: 0.25, roughness: 0.12, clearcoat: 1,
    emissive: 0x2a0009, envMapIntensity: 1.4
  }),
  lume: new THREE.MeshStandardMaterial({ color: 0xe6ffe4, emissive: 0x86ff9e, emissiveIntensity: 2.3, roughness: 0.6 }),
  sapphire: new THREE.MeshPhysicalMaterial({
    color: 0xffffff, metalness: 0, roughness: 0.03, transmission: 1, thickness: 0.6,
    ior: 1.76, clearcoat: 1, clearcoatRoughness: 0.04, specularIntensity: 1,
    attenuationColor: 0xdfe9ff, attenuationDistance: 60, envMapIntensity: 1.2
  })
};
M.lume.userData.lume = true;

/* ============================ geometry helpers ============================ */
function extrudeFlat(shape, depth, mat, bevel = 0.12) {
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth, bevelEnabled: bevel > 0, bevelThickness: bevel, bevelSize: bevel * 0.8,
    bevelSegments: 2, curveSegments: 28
  });
  geo.rotateX(Math.PI / 2); // shape (x, y) -> world (x, y=down-depth, z=shapeY)
  return new THREE.Mesh(geo, mat);
}

function circleShape(r, x = 0, y = 0) {
  const s = new THREE.Shape();
  s.absarc(x, y, r, 0, TAU, false);
  return s;
}

function gearShape(radius, teeth, sharp = false, toothDepth = null) {
  const td = toothDepth ?? Math.max(radius * 0.16, 0.22);
  const root = radius - td;
  const s = new THREE.Shape();
  const step = TAU / teeth;
  for (let i = 0; i < teeth; i++) {
    const a = i * step;
    if (i === 0) s.moveTo(Math.cos(a) * root, Math.sin(a) * root);
    if (sharp) {
      const mid = a + step * 0.42;
      s.lineTo(Math.cos(mid) * radius, Math.sin(mid) * radius);
      s.lineTo(Math.cos(a + step) * root, Math.sin(a + step) * root);
    } else {
      s.lineTo(Math.cos(a + step * 0.30) * root, Math.sin(a + step * 0.30) * root);
      s.lineTo(Math.cos(a + step * 0.44) * radius, Math.sin(a + step * 0.44) * radius);
      s.lineTo(Math.cos(a + step * 0.62) * radius, Math.sin(a + step * 0.62) * radius);
      s.lineTo(Math.cos(a + step) * root, Math.sin(a + step) * root);
    }
  }
  s.closePath();
  return s;
}

/* spoked wheel: toothed rim + hub + spokes */
function makeWheel({ radius, teeth, thickness, mat, hubR = 0.85, spokes = 4, sharp = false, spokeW = 0.5, toothDepth = null }) {
  const g = new THREE.Group();
  const rimShape = gearShape(radius, teeth, sharp, toothDepth);
  const hole = new THREE.Path(); hole.absarc(0, 0, radius * 0.72, 0, TAU, true);
  rimShape.holes.push(hole);
  const rim = extrudeFlat(rimShape, thickness, mat, 0.06);
  rim.castShadow = true;
  g.add(rim);

  const hub = new THREE.Mesh(new THREE.CylinderGeometry(hubR, hubR, thickness * 1.7, 24), mat);
  hub.position.y = -thickness / 2; hub.castShadow = true;
  g.add(hub);

  const spokeLen = radius * 0.72 - hubR * 0.4;
  for (let i = 0; i < spokes; i++) {
    const sp = new THREE.Mesh(new THREE.BoxGeometry(spokeW, thickness * 0.82, spokeLen), mat);
    const a = (i / spokes) * TAU + (spokes === 3 ? 0.4 : 0);
    sp.position.set(Math.sin(a) * (hubR * 0.4 + spokeLen / 2), -thickness / 2, Math.cos(a) * (hubR * 0.4 + spokeLen / 2));
    sp.rotation.y = a;
    sp.castShadow = true;
    g.add(sp);
  }
  return g;
}

function spiralTube(r0, r1, turns, tubeR, mat, yStep = 0, tailLift = 0) {
  const pts = [];
  const n = Math.floor(turns * 60);
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    const a = t * turns * TAU;
    const r = r0 + (r1 - r0) * t;
    let y = t * yStep;
    if (tailLift > 0 && t > 0.93) y += ((t - 0.93) / 0.07) * tailLift;
    pts.push(new THREE.Vector3(Math.cos(a) * r, y, Math.sin(a) * r));
  }
  const curve = new THREE.CatmullRomCurve3(pts);
  const mesh = new THREE.Mesh(new THREE.TubeGeometry(curve, n * 2, tubeR, 6, false), mat);
  mesh.castShadow = true;
  return mesh;
}

function makeScrew(mat, slotMat) {
  const g = new THREE.Group();
  const head = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.6, 0.5, 20), mat);
  head.castShadow = true;
  const slot = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.1, 0.16), slotMat);
  slot.position.y = 0.22;
  g.add(head, slot);
  return g;
}

function makeJewel(r = 0.72) {
  const g = new THREE.Group();
  const chaton = new THREE.Mesh(new THREE.TorusGeometry(r + 0.22, 0.2, 10, 28), M.gold);
  chaton.rotation.x = Math.PI / 2;
  const jewel = new THREE.Mesh(new THREE.CylinderGeometry(r, r * 0.92, 0.42, 20), M.ruby);
  jewel.position.y = 0.05;
  g.add(chaton, jewel);
  return g;
}

function armShape(x1, z1, x2, z2, w1, w2) {
  const dx = x2 - x1, dz = z2 - z1, len = Math.hypot(dx, dz);
  const nx = -dz / len, nz = dx / len;
  const s = new THREE.Shape();
  s.moveTo(x1 + nx * w1 / 2, z1 + nz * w1 / 2);
  s.lineTo(x2 + nx * w2 / 2, z2 + nz * w2 / 2);
  s.lineTo(x2 - nx * w2 / 2, z2 - nz * w2 / 2);
  s.lineTo(x1 - nx * w1 / 2, z1 - nz * w1 / 2);
  s.closePath();
  return s;
}

/* ============================ part registry ============================ */
const PARTS = {};
function definePart(id, zh, en, desc) { PARTS[id] = { id, zh, en, desc, meshes: [] }; }
function registerPart(group, id) {
  group.traverse(o => {
    if (o.isMesh) {
      o.material = o.material.clone();
      o.userData.partId = id;
      PARTS[id].meshes.push(o);
    }
  });
}

const jewelMeshes = [];
function buildBridge(elements, topY, mat, jewelSpots, screwSpots, partId, explodeY) {
  const g = new THREE.Group();
  let idx = 0;
  for (const el of elements) {
    const shape = el.type === 'disc'
      ? circleShape(el.r, el.x, el.z)
      : armShape(el.x1, el.z1, el.x2, el.z2, el.w1, el.w2);
    const mesh = extrudeFlat(shape, 0.8, mat, 0.16);
    mesh.position.y = topY + idx * 0.035; // tiny stagger avoids z-fighting
    mesh.castShadow = true; mesh.receiveShadow = true;
    g.add(mesh);
    idx++;
  }
  for (const [jx, jz] of jewelSpots) {
    const j = makeJewel(0.66);
    j.position.set(jx, topY + 0.16 + idx * 0.035, jz);
    g.add(j);
    j.traverse(o => { if (o.isMesh && o.material.color.getHex() === M.ruby.color.getHex()) jewelMeshes.push(o); });
    // register ruby meshes into the shared jewels part
    j.traverse(o => { if (o.isMesh && o.material === M.ruby) jewelMeshes[jewelMeshes.length - 1] = o; });
  }
  for (const [sx, sz] of screwSpots) {
    const sc = makeScrew(M.blued, M.darkSteel);
    sc.position.set(sx, topY + 0.2 + idx * 0.035, sz);
    sc.rotation.y = Math.random() * TAU;
    g.add(sc);
  }
  watch.add(g);
  registerPart(g, partId);
  explodable(g, new THREE.Vector3(0, explodeY, 0));
  return g;
}

  // second hand: blued steel rod + counterweight
  const secGroup = new THREE.Group();
  const rodGeo = new THREE.CylinderGeometry(0.1, 0.1, 13.8, 8);
  rodGeo.rotateX(Math.PI / 2);
  const rod = new THREE.Mesh(rodGeo, M.blued);
  rod.position.set(0, 0, 4.6);
  const weight = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.85, 0.16, 24), M.blued);
  weight.position.set(0, 0, -2.3);
  const tip = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.24, 0.5, 10), M.roseGold);
  secGroup.add(rod, weight, tip);
  secGroup.position.y = 11.12;
  secGroup.name = 'second';

  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.7, 0.5, 16), M.roseGold);
  cap.position.y = 11.1;

  handsGroup.add(hourHand, hourLume, minHand, minLume, secGroup, cap);
}
watch.add(handsGroup);
registerPart(handsGroup, 'hands');
explodable(handsGroup, new THREE.Vector3(0, 6.2, 0));
const hourHand = handsGroup.getObjectByName('hour');
const hourLume = handsGroup.getObjectByName('hourLume');
const minHand = handsGroup.getObjectByName('minute');
const minLume = handsGroup.children.find(o => o.position.y === 10.82);
const secHand = handsGroup.getObjectByName('second');

/* ---- sapphire crystal ---- */
const crystalGroup = new THREE.Group();
{
  const crystal = new THREE.Mesh(new THREE.CylinderGeometry(17.15, 17.15, 0.75, 96), M.sapphire);
  crystal.position.y = 12.3;
  crystalGroup.add(crystal);
}
watch.add(crystalGroup);
explodable(crystalGroup, new THREE.Vector3(0, 13.5, 0));
// crystal intentionally not pickable: it would occlude everything beneath

/* ---- floor ---- */
{
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0xffffff, map: texFrom(floorGradient(), { srgb: true }),
    metalness: 0.85, roughness: 0.34, envMapIntensity: 0.6
  });
  const floor = new THREE.Mesh(new THREE.CircleGeometry(80, 72), floorMat);
  floor.geometry.rotateX(-Math.PI / 2);
  floor.position.y = -2.0;
  floor.receiveShadow = true;
  scene.add(floor);
}

/* ============================ post-processing ============================ */
const size = renderer.getDrawingBufferSize(new THREE.Vector2());
const composerTarget = new THREE.WebGLRenderTarget(size.width, size.height, { samples: 4, type: THREE.HalfFloatType });
const composer = new EffectComposer(renderer, composerTarget);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(size.width, size.height), 0.42, 0.55, 0.78);
composer.addPass(bloom);
composer.addPass(new OutputPass());

/* ============================ interaction ============================ */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2(-10, -10);
let pointerClient = { x: 0, y: 0 };
let hoverId = null, selectedId = null;
const pickMeshes = [];
for (const id in PARTS) for (const m of PARTS[id].meshes) pickMeshes.push(m);

const tip = document.getElementById('tip');
const infoBody = document.getElementById('infoBody');
const infoClose = document.getElementById('infoClose');

function setHighlight(id, level) {
  for (const m of PARTS[id].meshes) {
    const mat = m.material;
    if (!mat.emissive || mat.userData.lume) continue;
    if (mat.userData._origEm === undefined) mat.userData._origEm = mat.emissive.getHex();
    if (level === 0) { mat.emissive.setHex(mat.userData._origEm); mat.emissiveIntensity = 1; }
    else { mat.emissive.setHex(0xc9a05a); mat.emissiveIntensity = level === 1 ? 0.24 : 0.42; }
  }
}

function showSpecs() {
  infoBody.innerHTML = `
    <h2>机芯参数</h2>
    <h3>Calibre SQ-21</h3>
    <ul class="specs">
      <li><span>上链方式</span><span>手动上链 · 镂空</span></li>
      <li><span>振频</span><span>28,800 vph (4 Hz)</span></li>
      <li><span>宝石轴承</span><span>21 钻</span></li>
      <li><span>动力储存</span><span>约 48 小时</span></li>
      <li><span>表壳</span><span>41 mm · 18K 白金</span></li>
      <li><span>镜面</span><span>双面蓝宝石水晶</span></li>
      <li><span>指针时标</span><span>玫瑰金 · 荧光涂层</span></li>
    </ul>`;
  infoClose.style.display = 'none';
}
function showPart(id) {
  const p = PARTS[id];
  infoBody.innerHTML = `<h2>${p.zh}</h2><h3>${p.en}</h3><p>${p.desc}</p>`;
  infoClose.style.display = 'block';
}
showSpecs();

function selectPart(id) {
  if (selectedId) setHighlight(selectedId, 0);
  selectedId = id;
  if (id) { setHighlight(id, 2); showPart(id); } else showSpecs();
}
infoClose.addEventListener('click', () => selectPart(null));

renderer.domElement.addEventListener('pointermove', e => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  pointerClient = { x: e.clientX, y: e.clientY };
});

let downPos = null;
renderer.domElement.addEventListener('pointerdown', e => {
  downPos = { x: e.clientX, y: e.clientY };
  if (controls.autoRotate) { controls.autoRotate = false; btnRotate.classList.remove('active'); }
});
renderer.domElement.addEventListener('click', e => {
  if (downPos && Math.hypot(e.clientX - downPos.x, e.clientY - downPos.y) > 6) return; // was a drag
  selectPart(hoverId === selectedId ? null : hoverId);
});

/* buttons */
const btnExplode = document.getElementById('btnExplode');
const btnRotate = document.getElementById('btnRotate');
const btnReset = document.getElementById('btnReset');
btnRotate.classList.add('active');

let explodeTarget = 0, explodeCur = 0;
btnExplode.addEventListener('click', () => {
  explodeTarget = explodeTarget > 0.5 ? 0 : 1;
  btnExplode.classList.toggle('active', explodeTarget === 1);
});
btnRotate.addEventListener('click', () => {
  controls.autoRotate = !controls.autoRotate;
  btnRotate.classList.toggle('active', controls.autoRotate);
});
let camAnim = null;
btnReset.addEventListener('click', () => {
  camAnim = { from: camera.position.clone(), to: CAM_HOME.clone(), t: 0 };
});

/* ============================ animation ============================ */
const BALANCE_FREQ = 4; // Hz = 28,800 vph
const ESCAPE_TEETH = 15;
const clock = new THREE.Clock();
let introT = 0;

function smoothstep(x) { return x * x * (3 - 2 * x); }

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  /* real-time hands */
  const now = new Date();
  const sec = now.getSeconds() + now.getMilliseconds() / 1000;
  const min = now.getMinutes() + sec / 60;
  const hr = (now.getHours() % 12) + min / 60;
  const secA = -sec / 60 * TAU, minA = -min / 60 * TAU, hrA = -hr / 12 * TAU;
  hourHand.rotation.y = hrA; hourLume.rotation.y = hrA;
  minHand.rotation.y = minA; minLume.rotation.y = minA;
  secHand.rotation.y = secA;

  /* gear train, consistent ratios & alternating directions */
  centerWheel.rotation.y = minA;
  thirdWheel.rotation.y = -minA * (48 / 36);
  fourthWheel.rotation.y = secA;
  barrelGroup.rotation.y = -minA / 6;

  /* escapement: stepped escape wheel synced to the beat */
  const beat = t * BALANCE_FREQ * 2;               // half-oscillations
  const beatIdx = Math.floor(beat);
  const frac = beat - beatIdx;
  const snap = frac < 0.82 ? 0 : smoothstep((frac - 0.82) / 0.18);
  escapeWheel.rotation.y = (beatIdx + snap) * (TAU / ESCAPE_TEETH / 2);

  /* balance + pallet + breathing hairspring */
  const phase = Math.sin(TAU * BALANCE_FREQ * t);
  balanceSpinner.rotation.y = 2.55 * phase;
  palletInner.rotation.y = palletInner.userData.baseAngle + 0.11 * Math.tanh(phase * 3.5);
  const breathe = 1 + 0.045 * Math.sin(TAU * BALANCE_FREQ * t + Math.PI / 2);
  hairspring.scale.set(breathe, 1, breathe);

  /* explode interpolation */
  explodeCur += (explodeTarget - explodeCur) * 0.055;
  if (Math.abs(explodeTarget - explodeCur) > 0.0004) {
    const e = explodeCur * explodeCur * (3 - 2 * explodeCur);
    for (const it of explodables) it.group.position.copy(it.base).addScaledVector(it.off, e);
  }

  /* intro camera glide */
  if (introT < 1) {
    introT = Math.min(1, introT + dt / 2.4);
    const e = 1 - Math.pow(1 - introT, 3);
    camera.position.lerpVectors(CAM_START, CAM_HOME, e);
  }
  if (camAnim) {
    camAnim.t = Math.min(1, camAnim.t + dt / 0.9);
    const e = 1 - Math.pow(1 - camAnim.t, 3);
    camera.position.lerpVectors(camAnim.from, camAnim.to, e);
    if (camAnim.t >= 1) camAnim = null;
  }

  /* hover raycast */
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(pickMeshes, false);
  const newHover = hits.length ? hits[0].object.userData.partId : null;
  if (newHover !== hoverId) {
    if (hoverId && hoverId !== selectedId) setHighlight(hoverId, 0);
    hoverId = newHover;
    if (hoverId) {
      if (hoverId !== selectedId) setHighlight(hoverId, 1);
      const p = PARTS[hoverId];
      tip.innerHTML = `${p.zh}<small>${p.en}</small>`;
      tip.style.opacity = 1;
      document.body.style.cursor = 'pointer';
    } else {
      tip.style.opacity = 0;
      document.body.style.cursor = '';
    }
  }
  if (hoverId) {
    tip.style.left = pointerClient.x + 'px';
    tip.style.top = pointerClient.y + 'px';
  }

  controls.update();
  composer.render();
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

animate();
requestAnimationFrame(() => {
  const loader = document.getElementById('loader');
  loader.style.opacity = 0;
  setTimeout(() => loader.remove(), 1000);
});
</script>
</body>
