<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="60%" style="stop-color:#E0F4FF"/>
      <stop offset="100%" style="stop-color:#FFE4B5"/>
    </linearGradient>
    <linearGradient id="seaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#1E5AA8"/>
    </linearGradient>
    <linearGradient id="sandGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4D03F"/>
      <stop offset="100%" style="stop-color:#C9A227"/>
    </linearGradient>
    <linearGradient id="pelicanBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5DC"/>
      <stop offset="50%" style="stop-color:#DEB887"/>
      <stop offset="100%" style="stop-color:#CD853F"/>
    </linearGradient>
    <linearGradient id="waterInPouch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4A90D9;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  
  <!-- 天空背景 -->
  <rect width="800" height="350" fill="url(#skyGradient)"/>
  
  <!-- 太阳 -->
  <circle cx="650" cy="80" r="50" fill="#FFD700" filter="url(#sunGlow)">
    <animate attributeName="r" values="50;52;50" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="80" r="45" fill="#FFE484"/>
  
  <!-- 太阳光晕 -->
  <g opacity="0.3">
    <line x1="650" y1="20" x2="650" y2="5" stroke="#FFD700" stroke-width="3"/>
    <line x1="650" y1="140" x2="650" y2="155" stroke="#FFD700" stroke-width="3"/>
    <line x1="590" y1="80" x2="575" y2="80" stroke="#FFD700" stroke-width="3"/>
    <line x1="710" y1="80" x2="725" y2="80" stroke="#FFD700" stroke-width="3"/>
  </g>
  
  <!-- 云朵1 -->
  <g>
    <ellipse cx="150" cy="60" rx="40" ry="25" fill="white" opacity="0.9"/>
    <ellipse cx="180" cy="50" rx="35" ry="22" fill="white" opacity="0.9"/>
    <ellipse cx="120" cy="55" rx="30" ry="20" fill="white" opacity="0.9"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;20,0;0,0" dur="15s" repeatCount="indefinite"/>
  </g>
  
  <!-- 云朵2 -->
  <g>
    <ellipse cx="400" cy="100" rx="35" ry="20" fill="white" opacity="0.8"/>
    <ellipse cx="430" cy="95" rx="30" ry="18" fill="white" opacity="0.8"/>
    <ellipse cx="375" cy="98" rx="25" ry="15" fill="white" opacity="0.8"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-15,0;0,0" dur="12s" repeatCount="indefinite"/>
  </g>
  
  <!-- 海鸥 -->
  <g>
    <path d="M300,120 Q310,110 320,120 M320,120 Q330,110 340,120" stroke="#333" stroke-width="2" fill="none">
      <animateTransform attributeName="transform" type="translate" values="0,0;50,0;0,0" dur="8s" repeatCount="indefinite"/>
    </path>
  </g>
  <g>
    <path d="M250,150 Q255,142 260,150 M260,150 Q265,142 270,150" stroke="#333" stroke-width="2" fill="none">
      <animateTransform attributeName="transform" type="translate" values="0,0;-30,-10;-60,0" dur="10s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- 海洋 -->
  <rect x="0" y="280" width="800" height="150" fill="url(#seaGradient)"/>
  
  <!-- 海浪 -->
  <g>
    <path d="M0,320 Q50,310 100,320 T200,320 T300,320 T400,320 T500,320 T600,320 T700,320 T800,320" fill="rgba(255,255,255,0.3)">
      <animate attributeName="d" values="M0,320 Q50,310 100,320 T200,320 T300,320 T400,320 T500,320 T600,320 T700,320 T800,320;M0,325 Q50,315 100,325 T200,325 T300,325 T400,325 T500,325 T600,325 T700,325 T800,325;M0,320 Q50,310 100,320 T200,320 T300,320 T400,320 T500,320 T600,320 T700,320 T800,320" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M0,340 Q60,330 120,340 T240,340 T360,340 T480,340 T600,340 T720,340 T800,340" fill="rgba(255,255,255,0.2)">
      <animate attributeName="d" values="M0,340 Q60,330 120,340 T240,340 T360,340 T480,340 T600,340 T720,340 T800,340;M0,345 Q60,335 120,345 T240,345 T360,345 T480,345 T600,345 T720,345 T800,345;M0,340 Q60,330 120,340 T240,340 T360,340 T480,340 T600,340 T720,340 T800,340" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M0,360 Q70,350 140,360 T280,360 T420,360 T560,360 T700,360" fill="rgba(255,255,255,0.15)">
      <animate attributeName="d" values="M0,360 Q70,350 140,360 T280,360 T420,360 T560,360 T700,360;M0,365 Q70,355 140,365 T280,365 T420,365 T560,365 T700,365;M0,360 Q70,350 140,360 T280,360 T420,360 T560,360 T700,360" dur="6s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- 沙滩 -->
  <polygon points="0,380 800,380 800,500 0,500" fill="url(#sandGradient)"/>
  
  <!-- 沙滩纹理 -->
  <g opacity="0.3">
    <circle cx="100" cy="420" r="3" fill="#8B7355"/>
    <circle cx="200" cy="450" r="2" fill="#8B7355"/>
    <circle cx="350" cy="430" r="4" fill="#8B7355"/>
    <circle cx="500" cy="460" r="2" fill="#8B7355"/>
    <circle cx="650" cy="440" r="3" fill="#8B7355"/>
    <circle cx="750" cy="470" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 贝壳 -->
  <ellipse cx="150" cy="440" rx="8" ry="5" fill="#FFE4C4" stroke="#DEB887" stroke-width="1"/>
  <ellipse cx="600" cy="455" rx="6" ry="4" fill="#FFE4C4" stroke="#DEB887" stroke-width="1"/>
  
  <!-- 自行车组 -->
  <g transform="translate(280, 350)">
    <!-- 后轮 -->
    <g>
      <circle cx="0" cy="40" r="30" fill="none" stroke="#333" stroke-width="4"/>
      <circle cx="0" cy="40" r="25" fill="none" stroke="#666" stroke-width="1"/>
      <!-- 辐条 -->
      <g stroke="#888" stroke-width="1.5">
        <line x1="0" y1="15" x2="0" y2="65"/>
        <line x1="-15" y1="40" x2="15" y2="40"/>
        <line x1="-10.6" y1="20" x2="10.6" y2="60"/>
        <line x1="-10.6" y1="60" x2="10.6" y2="20"/>
      </g>
      <circle cx="0" cy="40" r="5" fill="#444"/>
    </g>
    
    <!-- 前轮 -->
    <g>
      <circle cx="120" cy="40" r="30" fill="none" stroke="#333" stroke-width="4"/>
      <circle cx="120" cy="40" r="25" fill="none" stroke="#666" stroke-width="1"/>
      <!-- 辐条 -->
      <g stroke="#888" stroke-width="1.5">
        <line x1="120" y1="15" x2="120" y2="65"/>
        <line x1="105" y1="40" x2="135" y2="40"/>
        <line x1="109.4" y1="20" x2="130.6" y2="60"/>
        <line x1="109.4" y1="60" x2="130.6" y2="20"/>
      </g>
      <circle cx="120" cy="40" r="5" fill="#444"/>
    </g>
    
    <!-- 车架 -->
    <g fill="none" stroke="#E74C3C" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <!-- 主三角架 -->
      <path d="M0,40 L60,20 L120,40 M60,20 L30,40"/>
      <!-- 座管 -->
      <path d="M55,22 L50,-10"/>
      <!-- 头管 -->
      <path d="M115,38 L125,-5"/>
      <!-- 下叉 -->
      <path d="M30,40 L120,40"/>
    </g>
    
    <!-- 座椅 -->
    <ellipse cx="50" cy="-15" rx="15" ry="6" fill="#2C3E50"/>
    <ellipse cx="50" cy="-18" rx="12" ry="4" fill="#34495E"/>
    
    <!-- 车把 -->
    <g stroke="#333" stroke-width="3" fill="none">
      <path d="M125,-5 L135,-20"/>
      <path d="M130,-22 L145,-18" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <!-- 车链护板 -->
    <ellipse cx="15" cy="40" rx="12" ry="8" fill="#F39C12" stroke="#E67E22" stroke-width="2"/>
    
    <!-- 脚踏 -->
    <g>
      <rect x="-5" y="35" width="30" height="6" rx="2" fill="#7F8C8D" transform="rotate(0, 10, 40)">
        <animateTransform attributeName="transform" type="rotate" values="0,10,40;360,10,40" dur="2s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  
  <!-- 鹈鹕（骑在自行车上） -->
  <g transform="translate(320, 220)">
    <!-- 鹈鹕动画 -->
    <animateTransform attributeName="transform" type="translate" values="320,220;325,218;320,220;315,218;320,220" dur="0.5s" repeatCount="indefinite"/>
    
    <!-- 尾巴 -->
    <path d="M-60,20 Q-80,30 -75,50 Q-70,45 -65,35" fill="#CD853F" stroke="#8B4513" stroke-width="1"/>
    
    <!-- 左翅膀（后方） -->
    <path d="M-20,-20 Q-50,-40 -70,-20 Q-50,-10 -20,-5" fill="url(#pelicanBody)" stroke="#8B4513" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="0,-20,-15;-15,-20,-15;0,-20,-15" dur="0.3s" repeatCount="indefinite"/>
    </path>
    
    <!-- 身体 -->
    <ellipse cx="0" cy="10" rx="55" ry="40" fill="url(#pelicanBody)" stroke="#8B4513" stroke-width="2"/>
    <ellipse cx="-10" cy="15" rx="30" ry="25" fill="#F5DEB3" opacity="0.5"/>
    
    <!-- 右翅膀（前方，部分可见） -->
    <path d="M30,-15 Q60,-35 80,-15 Q60,-5 30,5" fill="url(#pelicanBody)" stroke="#8B4513" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="0,30,-10;15,30,-10;0,30,-10" dur="0.3s" repeatCount="indefinite"/>
    </path>
    
    <!-- 脖子 -->
    <path d="M40,-10 Q60,-40 70,-60 Q75,-70 70,-75" fill="url(#pelicanBody)" stroke="#8B4513" stroke-width="2"/>
    <ellipse cx="55" cy="-35" rx="8" ry="12" fill="#F5DEB3" opacity="0.4"/>
    
    <!-- 头部 -->
    <ellipse cx="75" cy="-80" rx="20" ry="18" fill="url(#pelicanBody)" stroke="#8B4513" stroke-width="2"/>
    <ellipse cx="70" cy="-85" rx="10" ry="8" fill="#F5DEB3" opacity="0.4"/>
    
    <!-- 眼睛 -->
    <ellipse cx="82" cy="-85" rx="6" ry="7" fill="white" stroke="#333" stroke-width="1"/>
    <ellipse cx="83" cy="-86" rx="3" ry="4" fill="#1a1a1a"/>
    <circle cx="84" cy="-88" r="1.5" fill="white"/>
    
    <!-- 眉毛表情 -->
    <path d="M75,-95 Q82,-98 90,-95" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- 巨大的喙 -->
    <g>
      <!-- 上喙 -->
      <path d="M90,-85 Q140,-90 160,-85 Q165,-83 160,-80 L100,-78 Q95,-82 90,-85" fill="#E8A838" stroke="#CC8800" stroke-width="2"/>
      <!-- 喙的纹理线 -->
      <path d="M100,-82 Q130,-85 155,-83" stroke="#CC8800" stroke-width="1" fill="none" opacity="0.5"/>
      <path d="M105,-80 Q135,-82 158,-80" stroke="#CC8800" stroke-width="1" fill="none" opacity="0.5"/>
      
      <!-- 下喙和喉囊 -->
      <path d="M95,-78 Q100,-75 105,-72 Q140,-65 155,-75 Q165,-80 160,-85 L150,-80 Q120,-70 100,-75 Z" fill="url(#waterInPouch)" stroke="#CC8800" stroke-width="2"/>
      <!-- 喉囊网格线 -->
      <g stroke="#4A90D9" stroke-width="0.5" opacity="0.6" fill="none">
        <path d="M110,-76 Q130,-72 150,-77"/>
        <path d="M108,-74 Q128,-70 148,-75"/>
        <path d="M112,-78 Q132,-74 152,-79"/>
      </g>
      
      <!-- 水中的鱼 -->
      <ellipse cx="135" cy="-72" rx="8" ry="4" fill="#FF6B6B" transform="rotate(-15, 135, -72)">
        <animate attributeName="cx" values="135;138;135" dur="1s" repeatCount="indefinite"/>
      </ellipse>
      <path d="M142,-74 L146,-72 L142,-70" fill="#FF6B6B" transform="rotate(-15, 143, -72)"/>
    </g>
    
    <!-- 头顶羽毛 -->
    <path d="M70,-98 Q75,-108 72,-110 Q78,-105 75,-98" fill="#CD853F" stroke="#8B4513" stroke-width="1"/>
    <path d="M65,-96 Q68,-104 65,-106 Q70,-102 68,-96" fill="#DEB887" stroke="#8B4513" stroke-width="1"/>
    
    <!-- 腿部（抓住车把） -->
    <g stroke="#CD853F" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M70,-5 Q145,-25 145,-18"/>
      <path d="M65,-5 Q140,-20 138,-15"/>
    </g>
    <!-- 脚爪 -->
    <g fill="#CD853F" stroke="#8B4513" stroke-width="1">
      <path d="M145,-18 L148,-15 L150,-18 L148,-21 Z"/>
      <path d="M138,-15 L140,-13 L142,-15 L140,-17 Z"/>
    </g>
    
    <!-- 腿上的护膝（搞笑元素） -->
    <ellipse cx="30" cy="35" rx="12" ry="8" fill="#3498DB" stroke="#2980B9" stroke-width="2"/>
    <text x="30" y="38" text-anchor="middle" font-size="6" fill="white">&#9889;</text>
  </g>
  
  <!-- 速度线效果 -->
  <g stroke="#87CEEB" stroke-width="2" opacity="0.5">
    <line x1="100" y1="350" x2="140" y2="350">
      <animate attributeName="x1" values="100;90;100" dur="0.3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="140;130;140" dur="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="120" y1="370" x2="160" y2="370">
      <animate attributeName="x1" values="120;110;120" dur="0.25s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="160;150;160" dur="0.25s" repeatCount="indefinite"/>
    </line>
    <line x1="150" y1="390" x2="190" y2="390">
      <animate attributeName="x1" values="150;140;150" dur="0.35s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="190;180;190" dur="0.35s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- 飞溅的水花粒子 -->
  <g fill="#87CEEB" opacity="0.7">
    <circle cx="350" cy="410" r="3">
      <animate attributeName="cy" values="410;390;410" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="415" r="2">
      <animate attributeName="cy" values="415;395;415" dur="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="345" cy="412" r="2.5">
      <animate attributeName="cy" values="412;392;412" dur="0.45s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="0.45s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 标题文字 -->
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5D4037" font-weight="bold">
    &#128692;‍♂️ 海边骑行的鹈鹕 Pelican Beach Rider &#127754;
  </text>
</svg>
