import * as THREE from 'three';

window.addEventListener('error',e=>{const d=document.getElementById('err');d.style.display='block';d.textContent='Error: '+e.message;});

const TAU=Math.PI*2;
const $=id=>document.getElementById(id);

const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));

renderer.shadowMap.enabled=true;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x07070a);

const camera=new THREE.PerspectiveCamera(38,innerWidth/innerHeight,2,400);

const controls=new OrbitControls(camera,renderer.domElement);

const pmrem=new THREE.PMREMGenerator(renderer);

function canvasTex(w,h,draw){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const x=c.getContext('2d');draw(x);
  const t=new THREE.CanvasTexture(c);
  t.colorSpace=THREE.SRGBColorSpace;
  t.anisotropy=Math.min(8,renderer.capabilities.getMaxAnisotropy());
  return t;
}
const texGeneva=canvasTex(512,512,x=>{
  x.fillStyle='#d7dbe1';x.fillRect(0,0,512,512);
  x.save();x.translate(256,256);x.rotate(-0.35);
  for(let i=-9;i<9;i++){
    const g=x.createLinearGradient(i*64,0,(i+1)*64,0);
    g.addColorStop(0,'#eef1f6');g.addColorStop(.55,'#cdd1d9');g.addColorStop(1,'#b6bac4');
    x.fillStyle=g;x.fillRect(i*64,-420,64,840);
  }
  x.restore();
});
texGeneva.wrapS=texGeneva.wrapT=THREE.RepeatWrapping;texGeneva.repeat.set(.12,.12);
const texPerlage=canvasTex(512,512,x=>{
  x.fillStyle='#d2d6dc';x.fillRect(0,0,512,512);
  let row=0;
  for(let ry=-10;ry<560;ry+=40,row++){
    for(let cx=(row%2?0:20)-20;cx<560;cx+=40){
      const g=x.createRadialGradient(cx,ry,2,cx,ry,30);
      g.addColorStop(0,'rgba(255,255,255,.32)');
      g.addColorStop(.72,'rgba(122,126,134,.12)');
      g.addColorStop(1,'rgba(38,40,46,.28)');
      x.fillStyle=g;x.beginPath();x.arc(cx,ry,30,0,TAU);x.fill();
    }
  }
});
texPerlage.wrapS=texPerlage.wrapT=THREE.RepeatWrapping;texPerlage.repeat.set(.16,.16);
const texRadial=canvasTex(512,512,x=>{
  x.fillStyle='#cfd3da';x.fillRect(0,0,512,512);
  for(let r=8;r<256;r+=4){
    x.strokeStyle=(r%8<4)?'rgba(255,255,255,.11)':'rgba(28,30,36,.11)';
    x.lineWidth=2.2;x.beginPath();x.arc(256,256,r,0,TAU);x.stroke();
  }
});
texRadial.wrapS=texRadial.wrapT=THREE.RepeatWrapping;
function radialFor(R){const t=texRadial.clone();t.needsUpdate=true;const rep=1/(2*R);t.repeat.set(rep,rep);t.offset.set(.5,.5);return t;}
const texBrand=canvasTex(512,512,x=>{
  x.clearRect(0,0,512,512);
  x.strokeStyle='#2b2210';x.lineWidth=7;
  x.beginPath();x.arc(256,256,225,0,TAU);x.stroke();
  x.fillStyle='#2b2210';x.textAlign='center';
  x.font='700 128px Georgia';x.fillText('OPUS',256,262);
  x.font='400 38px Georgia';x.fillText('G E N È V E',256,346);
  x.font='400 30px Georgia';x.fillText('OS · 01',256,178);
});
const texBackRing=canvasTex(1024,1024,x=>{
  x.clearRect(0,0,1024,1024);
  const str='OPUS GENÈVE ✦ CALIBRE OS-01 ✦ VINGT-TROIS (23) RUBIS ✦ 21600 A/H ✦ SWISS LEVER ✦ SAPPHIRE ✦ ';
  x.fillStyle='#ffffff';x.font='600 38px Georgia';x.textAlign='center';
  for(let i=0;i<str.length;i++){
    const a=i/str.length*TAU;
    x.save();x.translate(512,512);x.rotate(a);x.fillText(str[i],0,-478);x.restore();
  }
});
const texGlow=canvasTex(256,256,x=>{
  const g=x.createRadialGradient(128,128,4,128,128,126);
  g.addColorStop(0,'rgba(255,255,255,.95)');
  g.addColorStop(.4,'rgba(255,255,255,.28)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g;x.fillRect(0,0,256,256);
});

function phys(p){return new THREE.MeshPhysicalMaterial(p);}
const M={
  steel:phys({color:0xd8dce2,metalness:1,roughness:.16,envMapIntensity:1.35}),
  satin:phys({color:0xb9bec6,metalness:1,roughness:.38,envMapIntensity:1.0}),
  bridge:phys({color:0xe4e7ec,metalness:.95,roughness:.3,map:texGeneva,envMapIntensity:1.15}),
  plate:phys({color:0xd3d7dd,metalness:.9,roughness:.4,map:texPerlage,envMapIntensity:1.0}),
  gold:phys({color:0xdcb56e,metalness:1,roughness:.24,envMapIntensity:1.25}),
  goldp:phys({color:0xe8c67c,metalness:1,roughness:.1,envMapIntensity:1.5}),
  blued:phys({color:0x2e52d4,metalness:1,roughness:.22,clearcoat:.8,clearcoatRoughness:.15,envMapIntensity:1.2}),
  dark:phys({color:0x596069,metalness:1,roughness:.42,envMapIntensity:.9,side:THREE.DoubleSide}),
  black:phys({color:0x17181c,metalness:.7,roughness:.5,envMapIntensity:.6}),
  silver:phys({color:0xcfd4db,metalness:1,roughness:.35,envMapIntensity:1.0}),
  lume:new THREE.MeshStandardMaterial({color:0xd9ffea,emissive:0x8effc4,emissiveIntensity:2.3,metalness:0,roughness:.5}),
  ruby:phys({color:0xd81545,metalness:0,roughness:.08,transmission:.5,ior:1.76,thickness:.3,clearcoat:1,clearcoatRoughness:.05,emissive:0x33020c,emissiveIntensity:.5,envMapIntensity:1.2}),
  sapphire:phys({color:0xffffff,metalness:0,roughness:.02,transmission:1,ior:1.77,thickness:.45,clearcoat:1,clearcoatRoughness:.03,specularIntensity:1.2,envMapIntensity:1.5,side:THREE.DoubleSide}),
  backglass:phys({color:0xffffff,metalness:0,roughness:.02,transmission:1,ior:1.77,thickness:.25,clearcoat:1,envMapIntensity:1.3,side:THREE.DoubleSide})
};

const key=new THREE.SpotLight(0xfff2e2,2600,0,.46,.55,2);
key.position.set(20,34,26);
key.castShadow=true;
key.shadow.mapSize.set(2048,2048);
key.shadow.bias=-0.00025;
key.shadow.normalBias=.02;
key.shadow.camera.near=10;key.shadow.camera.far=140;
scene.add(key);scene.add(key.target);
const rim=new THREE.DirectionalLight(0x9fb6ff,1.5);rim.position.set(-26,12,-28);scene.add(rim);
const fill=new THREE.DirectionalLight(0xffe6c8,.45);fill.position.set(-16,4,26);scene.add(fill);
const spark=new THREE.PointLight(0xffe9c0,60,90,2);scene.add(spark);
const under=new THREE.PointLight(0xc9a962,25,50,2);under.position.set(0,-10,10);scene.add(under);

const halo1=new THREE.Sprite(new THREE.SpriteMaterial({map:texGlow,color:0x2b2216,transparent:true,opacity:.6,blending:THREE.AdditiveBlending,depthWrite:false,depthTest:false}));
halo1.scale.set(130,130,1);halo1.renderOrder=-10;scene.add(halo1);
const halo2=new THREE.Sprite(new THREE.SpriteMaterial({map:texGlow,color:0x0d1424,transparent:true,opacity:.5,blending:THREE.AdditiveBlending,depthWrite:false,depthTest:false}));
halo2.scale.set(230,230,1);halo2.renderOrder=-11;scene.add(halo2);

const floorG=new THREE.Group();floorG.position.y=-14.6;scene.add(floorG);
const refl=new Reflector(new THREE.PlaneGeometry(360,360),{clipBias:.003,textureWidth:1024,textureHeight:1024,color:0x14151a});
refl.rotation.x=-Math.PI/2;floorG.add(refl);
const shadowCatch=new THREE.Mesh(new THREE.PlaneGeometry(360,360),new THREE.ShadowMaterial({opacity:.42}));
shadowCatch.rotation.x=-Math.PI/2;shadowCatch.position.y=.02;shadowCatch.receiveShadow=true;floorG.add(shadowCatch);
const pool=new THREE.Mesh(new THREE.CircleGeometry(60,64),new THREE.MeshBasicMaterial({map:texGlow,color:0x241d10,transparent:true,opacity:.5,blending:THREE.AdditiveBlending,depthWrite:false}));
pool.rotation.x=-Math.PI/2;pool.position.y=.05;floorG.add(pool);

function zcyl(rt,rb,h,mat,seg){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg||32),mat);
  m.rotation.x=Math.PI/2;m.castShadow=m.receiveShadow=true;return m;
}
function box(w,h,d,mat){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.castShadow=m.receiveShadow=true;return m;
}
function shMesh(geo,mat){
  const m=new THREE.Mesh(geo,mat);m.castShadow=m.receiveShadow=true;return m;
}
function screwMesh(x,y,z,r){
  r=r||.24;
  const g=new THREE.Group();
  const h=zcyl(r,r*.92,.1,M.blued,24);g.add(h);
  const s=box(r*1.75,.055,.035,M.black);s.position.z=.052;s.rotation.z=Math.random()*Math.PI;g.add(s);
  g.position.set(x,y,z);return g;
}
function jewelAt(x,y,z,rr){
  rr=rr||.26;
  const g=new THREE.Group();
  const c=shMesh(new THREE.TorusGeometry(rr+.15,.085,12,32),M.goldp);g.add(c);
  const j=zcyl(rr,rr*.82,.17,M.ruby,24);j.position.z=.02;j.userData.noHi=true;g.add(j);
  g.position.set(x,y,z);return g;
}
function sectorHoles(shape,inner,outer,n,halfAng,rot){
  for(let i=0;i<n;i++){
    const a0=rot+i*TAU/n+halfAng,a1=rot+(i+1)*TAU/n-halfAng;
    if(a1<=a0)continue;
    const p=new THREE.Path();
    p.absarc(0,0,outer,a0,a1,false);
    p.absarc(0,0,inner,a1,a0,true);
    p.closePath();shape.holes.push(p);
  }
}
function gearGeo(o){
  const teeth=o.teeth,rootR=o.rootR,tipR=o.tipR,thick=o.thick;
  const toothFrac=o.toothFrac||.52,tipFrac=o.tipFrac||.22,bevel=(o.bevel!==undefined)?o.bevel:.02;
  const s=new THREE.Shape();const P=TAU/teeth;
  for(let i=0;i<teeth;i++){
    const a0=i*P,gap=P*(1-toothFrac);
    for(let k=0;k<=2;k++){
      const a=a0+gap*k/2,px=Math.cos(a)*rootR,py=Math.sin(a)*rootR;
      if(i===0&&k===0)s.moveTo(px,py);else s.lineTo(px,py);
    }
    const fl=(P*toothFrac-P*tipFrac)/2,t0=a0+gap+fl,t1=t0+P*tipFrac;
    s.lineTo(Math.cos(t0)*tipR,Math.sin(t0)*tipR);
    s.lineTo(Math.cos(t1)*tipR,Math.sin(t1)*tipR);
  }
  s.closePath();
  if(o.holeR){const h=new THREE.Path();h.absarc(0,0,o.holeR,0,TAU,true);s.holes.push(h);}
  if(o.circleHoles)for(const c of o.circleHoles){const h=new THREE.Path();h.absarc(c[0],c[1],c[2],0,TAU,true);s.holes.push(h);}
  if(o.spokes){
    const rimIn=rootR-(o.rimW||.42),hub=o.hubR||.6;
    const halfAng=((o.spokeW||.36)/((hub+rimIn)/2))/2;
    sectorHoles(s,hub,rimIn,o.spokes,halfAng,P*.5);
  }
  const g=new THREE.ExtrudeGeometry(s,{depth:thick,bevelEnabled:true,bevelThickness:bevel,bevelSize:bevel,bevelSegments:1,curveSegments:20});
  g.translate(0,0,-thick/2);
  return g;
}
function escGeo(){
  const N=20,rootR=1.14,tipR=1.62,P=TAU/N;
  const s=new THREE.Shape();
  for(let i=0;i<N;i++){
    const a=i*P,lead=a+.52*P,back=lead+.11*P,mid=a+.27*P,midR=(rootR+tipR)*.5*.92;
    const px=Math.cos(a)*rootR,py=Math.sin(a)*rootR;
    if(i===0)s.moveTo(px,py);else s.lineTo(px,py);
    s.quadraticCurveTo(Math.cos(mid)*midR,Math.sin(mid)*midR,Math.cos(lead)*tipR,Math.sin(lead)*tipR);
    s.lineTo(Math.cos(back)*rootR,Math.sin(back)*rootR);
  }
  s.closePath();
  const h=new THREE.Path();h.absarc(0,0,.16,0,TAU,true);s.holes.push(h);
  sectorHoles(s,.42,rootR-.3,4,.16,P*.5);
  const g=new THREE.ExtrudeGeometry(s,{depth:.14,bevelEnabled:true,bevelThickness:.015,bevelSize:.015,bevelSegments:1,curveSegments:14});
  g.translate(0,0,-.07);return g;
}
function lobe(d,r1,r2){
  const ph=Math.acos(THREE.MathUtils.clamp((r1-r2)/d,-1,1));
  const s=new THREE.Shape();
  s.absarc(0,0,r1,ph,TAU-ph,false);
  s.absarc(d,0,r2,-ph,ph,false);
  s.closePath();return s;
}
function annulus(outer,inner,thick,mat,bevel){
  const s=new THREE.Shape();s.absarc(0,0,outer,0,TAU,false);
  const h=new THREE.Path();h.absarc(0,0,inner,0,TAU,true);s.holes.push(h);
  const g=new THREE.ExtrudeGeometry(s,{depth:thick,bevelEnabled:true,bevelThickness:bevel||.03,bevelSize:bevel||.03,bevelSegments:1,curveSegments:48});
  g.translate(0,0,-thick/2);
  return shMesh(g,mat);
}
function roundRect(w,h,r){
  const s=new THREE.Shape(),x=-w/2,y=-h/2;
  s.moveTo(x+r,y);
  s.lineTo(x+w-r,y);s.absarc(x+w-r,y+r,r,-Math.PI/2,0,false);
  s.lineTo(x+w,y+h-r);s.absarc(x+w-r,y+h-r,r,0,Math.PI/2,false);
  s.lineTo(x+r,y+h);s.absarc(x+r,y+h-r,r,Math.PI/2,Math.PI,false);
  s.lineTo(x,y+r);s.absarc(x+r,y+r,r,Math.PI,Math.PI*1.5,false);
  s.closePath();return s;
}
function pts2shape(a){
  const s=new THREE.Shape();s.moveTo(a[0][0],a[0][1]);

}

function reg(id,group,off){
  P[id]={def:DEFS[id],group,off,base:group.position.clone(),meshes:[]};
  group.traverse(o=>{
    if(o.isMesh){
      o.userData.pid=id;

        o.material=o.material.clone();
        o.userData.e0=o.material.emissive?o.material.emissive.getHex():0;
        P[id].meshes.push(o);
      }
      if(!o.userData.nopick)pick.push(o);
    }
  });
  W.add(group);
}

  if(opts.jewel!==false){const jh=new THREE.Path();jh.absarc(d,0,.3,0,TAU,true);s.holes.push(jh);}
  const geo=new THREE.ExtrudeGeometry(s,{depth:.28,bevelEnabled:true,bevelThickness:.04,bevelSize:.04,bevelSegments:2,curveSegments:28});
  const mesh=shMesh(geo,M.bridge);mesh.rotation.z=ang;
  const g=new THREE.Group();g.position.set(aP[0],aP[1],1.0);g.add(mesh);
  g.add(screwMesh(0,0,.34,.24));
  if(opts.jewel!==false)g.add(jewelAt(dx,dy,.34,.26));
  const pillar=zcyl(.42,.46,1.54,M.satin,24);pillar.position.set(0,0,-.81);g.add(pillar);
  if(opts.extra)opts.extra(g,dx,dy);
  reg(id,g,off);
  return g;
}

window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='e')toggleExplode();
  else if(k==='r')toggleRotate();
  else if(k==='l')toggleLabels();
  else if(k==='i')togglePanel();
});
controls.addEventListener('start',()=>{if(controls.autoRotate){controls.autoRotate=false;bR.classList.remove('on');}});
if(innerWidth>1000){panel.classList.add('open');bP.classList.add('on');}
showOverview();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});

const rt=new THREE.WebGLRenderTarget(1,1,{type:THREE.HalfFloatType,samples:renderer.capabilities.isWebGL2?4:0});
const composer=new EffectComposer(renderer,rt);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),.35,.55,.8);
composer.addPass(bloom);
composer.addPass(new OutputPass());
composer.setSize(innerWidth,innerHeight);

const clk=$('clk'),dot=$('dot');
const vLbl=new THREE.Vector3();
function ease01(k){return k*k*(3-2*k);}
let first=true;
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);
  const tt=clock.getElapsedTime();
  const dnow=new Date();
  const tSec=dnow.getTime()/1000;
  const tmod=tSec%86400;
  const b=tSec*6,bf=Math.floor(b),frac=b-bf;

  const hh=dnow.getHours()%12,mm=dnow.getMinutes(),ss=dnow.getSeconds()+dnow.getMilliseconds()/1000;
  SPIN.handH.rotation.z=-TAU*(hh+mm/60+ss/3600)/12;
  SPIN.hourPipe.rotation.z=SPIN.handH.rotation.z;
  SPIN.handM.rotation.z=-TAU*(mm+ss/60)/60;
  const s6=ss*6,sBase=Math.floor(s6),sFrac=s6-sBase;
  const stepped=(sBase+(1-Math.pow(1-Math.min(sFrac/.22,1),3)))/6;
  SPIN.handS.rotation.z=-TAU*stepped/60;
  SPIN.secRod.rotation.z=SPIN.handS.rotation.z;

  SPIN.center.rotation.z=-TAU*(tmod%3600)/3600;
  SPIN.third.rotation.z=TAU*(tmod%450)/450;
  SPIN.fourth.rotation.z=-TAU*(tmod%60)/60;
  SPIN.barrel.rotation.z=TAU*(tmod%21600)/21600;
  SPIN.spring.rotation.z=SPIN.barrel.rotation.z;
  SPIN.ratchet.rotation.z=SPIN.barrel.rotation.z;
  SPIN.decor.rotation.z=TAU*(tmod%43200)/43200;

  const k40=b%40,e1=1-Math.pow(1-Math.min((k40-Math.floor(k40))/.25,1),3);
  SPIN.escape.rotation.z=(Math.floor(k40)+e1)*(TAU/40);
  const pf=(bf%2===0)?1:-1;
  const e2=1-Math.pow(1-Math.min(frac/.3,1),3);
  SPIN.rock.rotation.z=.15*pf*(2*e2-1);
  const bal=2.4*Math.sin(Math.PI*(b%2));
  SPIN.balance.rotation.z=bal;
  SPIN.hair.rotation.z=4.14+bal*.045;
  const brs=1+.028*Math.sin(Math.PI*(b%2));
  SPIN.hair.scale.set(brs,brs,1);

  ex+=(exT-ex)*Math.min(1,dt*3.2);
  if(Math.abs(exT-ex)<.0005)ex=exT;
  const ek=ease01(ex);
  for(const id in P){
    const p=P[id];
    p.group.position.copy(p.base).addScaledVector(p.off,ek);
  }

  W.position.y=Math.sin(tt*.6)*.28;
  spark.position.set(Math.cos(tt*.23)*26,14+6*Math.sin(tt*.13),Math.sin(tt*.23)*26);

  if(tw){
    let k=(performance.now()-tw.st)/tw.d;
    if(k>=1)k=1;
    const e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
    camera.position.lerpVectors(tw.p0,tw.p1,e);
    controls.target.lerpVectors(tw.t0,tw.t1,e);
    if(k===1)tw=null;
  }
  controls.update();

  if(hasPointer){
    ray.setFromCamera(ndc,camera);
    const hit=ray.intersectObjects(pick,false)[0];
    const id=hit?hit.object.userData.pid:null;
    if(id!==hv){
      if(hv&&hv!==sel)setHi(hv,null);
      hv=id;
      if(hv&&hv!==sel)setHi(hv,0x54400f);
      document.body.style.cursor=hv?'pointer':'default';
    }
    if(hv){
      tip.style.opacity=1;
      tip.style.left=(px+16)+'px';
      tip.style.top=(py-10)+'px';
      tip.textContent=DEFS[hv].cn+' · '+DEFS[hv].en;
    }else tip.style.opacity=0;
  }
  if(sel){
    const pulse=.75+.25*Math.sin(tt*5);
    for(const m of P[sel].meshes)m.material.emissiveIntensity=pulse;
  }

  const showL=labelsOn||ex>.5;
  for(const id of LABELED){
    const el=P[id].label;
    if(!showL){el.classList.remove('show');continue;}
    P[id].group.getWorldPosition(vLbl);
    vLbl.project(camera);
    if(vLbl.z>1){el.classList.remove('show');continue;}
    el.style.left=(vLbl.x*.5+.5)*innerWidth+'px';
    el.style.top=(-vLbl.y*.5+.5)*innerHeight+'px';
    el.classList.add('show');
    el.classList.toggle('act',sel===id);
  }

  clk.textContent=dnow.toTimeString().slice(0,8);
  dot.style.opacity=frac<.5?1:.35;

  composer.render();
  if(first){
    first=false;
    $('fade').classList.add('out');
    flyTo(new THREE.Vector3(17,8,36),new THREE.Vector3(0,.3,0),1900);
  }
}
animate();
</script>
</body>
</html>
