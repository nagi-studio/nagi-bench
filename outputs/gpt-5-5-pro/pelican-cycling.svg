<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 760"
  width="1200"
  height="760"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">海边骑自行车的鹈鹕</title>
  <desc id="desc">一只逼真而生动的鹈鹕在海边小路上骑着自行车，背景有夕阳、海浪、沙滩和海风。</desc>

  <defs>
    <!-- Sky and sea gradients -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec8ff"/>
      <stop offset="45%" stop-color="#ffd49a"/>
      <stop offset="100%" stop-color="#f8b27c"/>
    </linearGradient>

    <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c96c9"/>
      <stop offset="55%" stop-color="#1e7fa8"/>
      <stop offset="100%" stop-color="#0f5f7e"/>
    </linearGradient>

    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4cf91"/>
      <stop offset="100%" stop-color="#dba862"/>
    </linearGradient>

    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6b0"/>
      <stop offset="65%" stop-color="#ffc45f"/>
      <stop offset="100%" stop-color="#ff9b4a" stop-opacity="0.45"/>
    </radialGradient>

    <!-- Pelican body gradients -->
    <linearGradient id="featherGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf5"/>
      <stop offset="45%" stop-color="#e8e4d7"/>
      <stop offset="100%" stop-color="#b9b2a2"/>
    </linearGradient>

    <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0df"/>
      <stop offset="65%" stop-color="#9c9587"/>
      <stop offset="100%" stop-color="#5d594f"/>
    </linearGradient>

    <linearGradient id="beakGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe39c"/>
      <stop offset="45%" stop-color="#f3b65f"/>
      <stop offset="100%" stop-color="#cf7d3c"/>
    </linearGradient>

    <linearGradient id="pouchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8c68f"/>
      <stop offset="100%" stop-color="#d47e59"/>
    </linearGradient>

    <radialGradient id="wheelGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#777"/>
      <stop offset="75%" stop-color="#222"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>

    <!-- Soft shadow and texture -->
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.28"/>
    </filter>

    <filter id="lightBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <filter id="featherNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>

    <style>
      .wave {
        animation: waveMove 5s ease-in-out infinite alternate;
      }

      .wheel {
        transform-box: fill-box;
        transform-origin: center;
        animation: spin 2.4s linear infinite;
      }

      .pedal {
        transform-box: fill-box;
        transform-origin: center;
        animation: spin 2.4s linear infinite;
      }

      .wingTip {
        animation: wingLift 3.2s ease-in-out infinite alternate;
        transform-origin: 710px 385px;
      }

      .cloud {
        animation: drift 18s ease-in-out infinite alternate;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes waveMove {
        from { transform: translateX(-14px); }
        to { transform: translateX(18px); }
      }

      @keyframes wingLift {
        from { transform: rotate(-2deg); }
        to { transform: rotate(5deg); }
      }

      @keyframes drift {
        from { transform: translateX(-18px); }
        to { transform: translateX(24px); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="760" fill="url(#skyGrad)"/>

  <!-- Sun glow -->
  <circle cx="995" cy="155" r="98" fill="url(#sunGrad)" opacity="0.95"/>
  <circle cx="995" cy="155" r="155" fill="#ffd176" opacity="0.18" filter="url(#lightBlur)"/>

  <!-- Clouds -->
  <g class="cloud" opacity="0.72">
    <ellipse cx="160" cy="105" rx="66" ry="26" fill="#ffffff"/>
    <ellipse cx="214" cy="99" rx="46" ry="22" fill="#ffffff"/>
    <ellipse cx="104" cy="113" rx="42" ry="19" fill="#ffffff"/>
  </g>

  <g class="cloud" opacity="0.52">
    <ellipse cx="605" cy="76" rx="58" ry="20" fill="#fff8ef"/>
    <ellipse cx="654" cy="73" rx="39" ry="17" fill="#fff8ef"/>
    <ellipse cx="562" cy="82" rx="36" ry="15" fill="#fff8ef"/>
  </g>

  <!-- Distant birds -->
  <g fill="none" stroke="#4b5961" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <path d="M360 150 Q378 136 396 150 Q414 136 432 150"/>
    <path d="M460 115 Q473 105 486 115 Q499 105 512 115"/>
    <path d="M840 104 Q854 92 868 104 Q882 92 896 104"/>
  </g>

  <!-- Sea -->
  <path d="M0 318 C190 302 322 338 510 319 C694 300 856 332 1200 309 L1200 562 L0 562 Z"
        fill="url(#seaGrad)"/>

  <!-- Sea reflections -->
  <g opacity="0.38" fill="none" stroke="#fff3c6" stroke-linecap="round">
    <path d="M875 214 C925 207 982 211 1046 204" stroke-width="4"/>
    <path d="M840 245 C905 237 996 244 1080 233" stroke-width="3"/>
    <path d="M910 277 C958 270 1022 275 1112 268" stroke-width="3"/>
  </g>

  <!-- Waves -->
  <g class="wave" fill="none" stroke="#e9fbff" stroke-linecap="round" opacity="0.9">
    <path d="M30 382 C85 357 125 407 180 382 S285 357 340 382 S445 407 500 382" stroke-width="5"/>
    <path d="M640 370 C700 348 748 394 810 371 S930 350 992 374 S1100 394 1165 369" stroke-width="5"/>
    <path d="M70 470 C130 447 178 493 240 470 S350 448 415 473" stroke-width="4"/>
    <path d="M530 455 C602 430 650 481 724 456 S852 432 926 457" stroke-width="4"/>
    <path d="M760 520 C820 498 880 545 940 520 S1050 498 1120 522" stroke-width="4"/>
  </g>

  <!-- Beach and road -->
  <path d="M0 540 C188 506 363 565 560 534 C754 503 942 544 1200 514 L1200 760 L0 760 Z"
        fill="url(#sandGrad)"/>

  <path d="M0 650 C250 615 430 664 628 640 C820 616 992 648 1200 620 L1200 760 L0 760 Z"
        fill="#8a755d" opacity="0.9"/>

  <path d="M0 675 C260 642 430 691 628 667 C828 642 984 674 1200 646"
        fill="none" stroke="#d8c09a" stroke-width="8" opacity="0.5"/>

  <!-- Sand grains -->
  <g opacity="0.32" fill="#8f6c3d">
    <circle cx="73" cy="592" r="2"/>
    <circle cx="144" cy="632" r="1.8"/>
    <circle cx="247" cy="570" r="1.6"/>
    <circle cx="334" cy="620" r="2"/>
    <circle cx="1070" cy="586" r="2.2"/>
    <circle cx="1005" cy="635" r="1.5"/>
    <circle cx="918" cy="570" r="1.8"/>
    <circle cx="778" cy="603" r="2"/>
  </g>

  <!-- Main cast shadow -->
  <ellipse cx="620" cy="666" rx="360" ry="44" fill="#2a211b" opacity="0.28" filter="url(#lightBlur)"/>

  <!-- Bicycle -->
  <g filter="url(#softShadow)">
    <!-- Wheels -->
    <g class="wheel">
      <circle cx="425" cy="610" r="108" fill="none" stroke="url(#wheelGrad)" stroke-width="13"/>
      <circle cx="425" cy="610" r="86" fill="none" stroke="#d9d9d9" stroke-width="2" opacity="0.85"/>
      <circle cx="425" cy="610" r="8" fill="#222"/>
      <g stroke="#dadada" stroke-width="2" opacity="0.9">
        <line x1="425" y1="610" x2="425" y2="502"/>
        <line x1="425" y1="610" x2="425" y2="718"/>
        <line x1="425" y1="610" x2="317" y2="610"/>
        <line x1="425" y1="610" x2="533" y2="610"/>
        <line x1="425" y1="610" x2="349" y2="534"/>
        <line x1="425" y1="610" x2="501" y2="686"/>
        <line x1="425" y1="610" x2="501" y2="534"/>
        <line x1="425" y1="610" x2="349" y2="686"/>
      </g>
    </g>

    <g class="wheel">
      <circle cx="805" cy="610" r="108" fill="none" stroke="url(#wheelGrad)" stroke-width="13"/>
      <circle cx="805" cy="610" r="86" fill="none" stroke="#d9d9d9" stroke-width="2" opacity="0.85"/>
      <circle cx="805" cy="610" r="8" fill="#222"/>
      <g stroke="#dadada" stroke-width="2" opacity="0.9">
        <line x1="805" y1="610" x2="805" y2="502"/>
        <line x1="805" y1="610" x2="805" y2="718"/>
        <line x1="805" y1="610" x2="697" y2="610"/>
        <line x1="805" y1="610" x2="913" y2="610"/>
        <line x1="805" y1="610" x2="729" y2="534"/>
        <line x1="805" y1="610" x2="881" y2="686"/>
        <line x1="805" y1="610" x2="881" y2="534"/>
        <line x1="805" y1="610" x2="729" y2="686"/>
      </g>
    </g>

    <!-- Frame -->
    <g fill="none" stroke="#1d3844" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
      <path d="M425 610 L575 490 L672 610 Z"/>
      <path d="M575 490 L805 610"/>
      <path d="M575 490 L615 610"/>
      <path d="M615 610 L805 610"/>
      <path d="M672 610 L805 610"/>
      <path d="M575 490 L552 430"/>
      <path d="M805 610 L843 455"/>
    </g>

    <!-- Highlights on frame -->
    <g fill="none" stroke="#67c4d7" stroke-width="4" stroke-linecap="round" opacity="0.55">
      <path d="M450 598 L570 503 L650 602"/>
      <path d="M604 503 L780 596"/>
      <path d="M845 462 L814 590"/>
    </g>

    <!-- Seat -->
    <path d="M505 416 C540 398 590 400 619 417 C598 435 546 439 505 416 Z"
          fill="#2a241f"/>
    <path d="M518 414 C548 405 585 406 607 418" fill="none" stroke="#73695f" stroke-width="3" opacity="0.55"/>

    <!-- Handlebar -->
    <g fill="none" stroke="#1d3844" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
      <path d="M843 455 C884 415 914 421 934 442"/>
      <path d="M934 442 C948 456 939 477 916 475"/>
    </g>
    <path d="M913 433 C927 435 937 443 943 453"
          fill="none" stroke="#8ed7e6" stroke-width="4" opacity="0.6" stroke-linecap="round"/>

    <!-- Crank and pedals -->
    <g class="pedal">
      <circle cx="615" cy="610" r="24" fill="none" stroke="#202020" stroke-width="8"/>
      <line x1="615" y1="610" x2="575" y2="572" stroke="#202020" stroke-width="8" stroke-linecap="round"/>
      <line x1="615" y1="610" x2="655" y2="648" stroke="#202020" stroke-width="8" stroke-linecap="round"/>
      <rect x="547" y="562" width="54" height="12" rx="6" fill="#202020"/>
      <rect x="629" y="642" width="54" height="12" rx="6" fill="#202020"/>
    </g>
  </g>

  <!-- Pelican -->
  <g filter="url(#softShadow)">
    <!-- Tail feathers -->
    <g transform="translate(486 381) rotate(-14)">
      <path d="M0 45 C-52 18 -78 -22 -96 -78 C-45 -56 -8 -30 25 16 Z"
            fill="url(#wingGrad)" stroke="#736e64" stroke-width="3"/>
      <path d="M18 55 C-22 23 -42 -15 -52 -64 C-13 -42 18 -12 45 29 Z"
            fill="#d9d1bd" stroke="#8a8274" stroke-width="2"/>
      <path d="M35 62 C8 31 -2 -6 -3 -49 C28 -25 49 7 65 42 Z"
            fill="#f1ead7" stroke="#8a8274" stroke-width="2"/>
    </g>

    <!-- Body -->
    <path
      d="M504 388
         C535 298 653 259 739 315
         C817 366 804 480 735 527
         C655 580 511 542 468 466
         C449 430 466 404 504 388 Z"
      fill="url(#featherGrad)"
      stroke="#817b70"
      stroke-width="4"
      filter="url(#featherNoise)"
    />

    <!-- Belly highlight -->
    <ellipse cx="631" cy="438" rx="118" ry="90" fill="#fffdf6" opacity="0.52"/>

    <!-- Wing -->
    <g class="wingTip">
      <path
        d="M616 372
           C690 346 790 376 858 441
           C792 462 716 474 646 450
           C607 436 590 399 616 372 Z"
        fill="url(#wingGrad)"
        stroke="#6e685f"
        stroke-width="4"
      />
      <path d="M656 403 C711 403 771 419 829 449" fill="none" stroke="#4b4741" stroke-width="4" opacity="0.45"/>
      <path d="M641 425 C700 431 752 443 802 462" fill="none" stroke="#f6f0df" stroke-width="4" opacity="0.55"/>
      <path d="M706 378 C711 411 704 439 688 461" fill="none" stroke="#4d4944" stroke-width="3" opacity="0.4"/>
      <path d="M749 393 C751 419 744 442 731 462" fill="none" stroke="#4d4944" stroke-width="3" opacity="0.35"/>
    </g>

    <!-- Neck -->
    <path
      d="M727 325
         C742 258 721 222 672 208
         C629 195 595 213 590 248
         C585 285 637 300 658 329
         C681 360 708 366 727 325 Z"
      fill="url(#featherGrad)"
      stroke="#817b70"
      stroke-width="4"
      filter="url(#featherNoise)"
    />

    <!-- Head -->
    <path
      d="M595 229
         C604 188 651 164 698 177
         C740 188 761 224 750 263
         C740 302 696 319 653 303
         C612 288 586 267 595 229 Z"
      fill="#fff8e9"
      stroke="#817b70"
      stroke-width="4"
    />

    <!-- Crown feather texture -->
    <g fill="none" stroke="#c9c0ad" stroke-width="2" opacity="0.7">
      <path d="M620 206 C650 195 690 197 724 216"/>
      <path d="M610 229 C649 218 696 224 735 248"/>
      <path d="M622 271 C657 288 700 288 731 267"/>
    </g>

    <!-- Eye -->
    <circle cx="688" cy="226" r="12" fill="#21201d"/>
    <circle cx="692" cy="222" r="4" fill="#fff"/>

    <!-- Beak upper -->
    <path
      d="M732 237
         C814 213 907 219 1004 260
         C903 275 811 281 733 266
         C720 260 721 243 732 237 Z"
      fill="url(#beakGrad)"
      stroke="#8c6238"
      stroke-width="4"
      stroke-linejoin="round"
    />

    <!-- Beak lower pouch -->
    <path
      d="M735 266
         C828 279 919 276 1004 260
         C964 313 870 339 779 313
         C742 303 724 286 735 266 Z"
      fill="url(#pouchGrad)"
      stroke="#8c6238"
      stroke-width="4"
      stroke-linejoin="round"
      opacity="0.96"
    />

    <!-- Beak ridge -->
    <path d="M748 247 C826 237 914 242 987 260"
          fill="none" stroke="#fff1be" stroke-width="4" opacity="0.72" stroke-linecap="round"/>

    <!-- Pouch wrinkles -->
    <g fill="none" stroke="#a75f49" stroke-width="2.4" opacity="0.45">
      <path d="M760 282 C810 305 887 310 958 279"/>
      <path d="M787 302 C836 321 899 319 936 294"/>
      <path d="M824 270 C816 289 814 303 820 316"/>
      <path d="M888 271 C879 291 874 306 879 320"/>
    </g>

    <!-- Legs -->
    <g stroke="#c36b3b" stroke-width="13" stroke-linecap="round" fill="none">
      <path d="M574 520 C563 553 552 580 546 610"/>
      <path d="M694 522 C680 556 661 582 646 609"/>
    </g>

    <!-- Feet gripping pedals -->
    <g fill="#e08245" stroke="#8c4c2f" stroke-width="3">
      <path d="M529 604 C548 598 568 604 579 618 C555 622 535 621 518 615 Z"/>
      <path d="M626 596 C648 591 669 598 681 613 C653 619 634 617 618 609 Z"/>
    </g>

    <!-- Wing/hand holding handlebar suggestion -->
    <path
      d="M749 393
         C802 395 855 421 905 462
         C885 477 850 467 820 448
         C790 429 761 421 739 421 Z"
      fill="#d8cfba"
      stroke="#756f65"
      stroke-width="4"
      opacity="0.95"
    />
    <path d="M895 462 C908 455 920 456 930 467"
          fill="none" stroke="#d8cfba" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Foreground motion streaks -->
  <g opacity="0.45" fill="none" stroke="#fff5dc" stroke-linecap="round">
    <path d="M165 662 C238 652 310 655 371 642" stroke-width="5"/>
    <path d="M830 694 C906 682 979 686 1052 674" stroke-width="5"/>
    <path d="M58 708 C142 698 205 704 288 692" stroke-width="4"/>
  </g>

  <!-- Small splashes of sea breeze -->
  <g fill="none" stroke="#e8fbff" stroke-linecap="round" opacity="0.65">
    <path d="M214 430 C247 414 281 418 310 434" stroke-width="4"/>
    <path d="M945 379 C975 365 1009 368 1036 384" stroke-width="4"/>
    <path d="M72 516 C107 501 137 506 164 521" stroke-width="3"/>
  </g>
</svg>