<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%">
  <defs>
    <!-- 天空渐变 -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B" /> <!-- 深邃夜色 -->
      <stop offset="40%" stop-color="#701A75" /> <!-- 梦幻紫红 -->
      <stop offset="75%" stop-color="#F43F5E" /> <!-- 晚霞红 -->
      <stop offset="100%" stop-color="#F97316" /> <!-- 温暖橙黄 -->
    </linearGradient>

    <!-- 太阳光晕 -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFDE7" stop-opacity="1" />
      <stop offset="30%" stop-color="#FDE047" stop-opacity="0.8" />
      <stop offset="60%" stop-color="#F43F5E" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#F97316" stop-opacity="0" />
    </radialGradient>

    <!-- 海洋渐变 -->
    <linearGradient id="seaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" /> <!-- 倒映天空 -->
      <stop offset="20%" stop-color="#4F46E5" /> <!-- 深蓝 -->
      <stop offset="60%" stop-color="#0E7490" /> <!-- 碧绿 -->
      <stop offset="100%" stop-color="#083344" /> <!-- 暗青 -->
    </linearGradient>

    <!-- 沙滩渐变 -->
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF08A" /> <!-- 潮湿的金色沙子 -->
      <stop offset="30%" stop-color="#EAB308" />
      <stop offset="100%" stop-color="#854D0E" />
    </linearGradient>

    <!-- 鹈鹕喙部渐变 -->
    <linearGradient id="beakGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FED7AA" />
      <stop offset="70%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>

    <!-- 鹈鹕喉囊（半透明） -->
    <linearGradient id="pouchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FB7185" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FDA4AF" stop-opacity="0.6" />
    </linearGradient>

    <!-- 自行车车架薄荷绿 -->
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#99F6E4" />
      <stop offset="100%" stop-color="#0F766E" />
    </linearGradient>

    <!-- 金属铬质感 -->
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- 柔和阴影滤镜 -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.4" />
    </filter>

    <!-- 模糊发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- ==================== 背景层 ==================== -->
  <!-- 天空 -->
  <rect width="1000" height="700" fill="url(#skyGrad)" />

  <!-- 太阳与光晕 -->
  <circle cx="500" cy="380" r="280" fill="url(#sunGlow)" opacity="0.6" />
  <circle cx="500" cy="380" r="140" fill="url(#sunGlow)" opacity="0.9" />
  <circle cx="500" cy="380" r="60" fill="#FFFDF5" filter="url(#glow)" />

  <!-- 远山/海岛剪影 -->
  <path d="M 0 420 Q 200 390 400 420 T 800 410 T 1000 420 L 1000 440 L 0 440 Z" fill="#4D0E4E" opacity="0.5" />

  <!-- 海洋与海浪 -->
  <path d="M 0 420 Q 250 410 500 425 T 1000 420 L 1000 520 Q 750 530 500 515 T 0 520 Z" fill="url(#seaGrad)" />
  <!-- 海浪波光 -->
  <path d="M 0 440 Q 300 425 600 445 T 1000 435" stroke="#FCE7F3" stroke-width="2" fill="none" opacity="0.4" />
  <path d="M 0 470 Q 200 485 500 465 T 1000 480" stroke="#FBCFE8" stroke-width="3" fill="none" opacity="0.3" />
  <ellipse cx="500" cy="435" rx="120" ry="2" fill="#FFFDE7" opacity="0.7" filter="url(#glow)" />
  <ellipse cx="480" cy="455" rx="80" ry="1.5" fill="#FFFDE7" opacity="0.6" />
  <ellipse cx="520" cy="480" rx="150" ry="2" fill="#FFFDE7" opacity="0.4" filter="url(#glow)" />

  <!-- 远景飞鸟 -->
  <g stroke="#701A75" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M 780 160 Q 788 150 796 160 Q 804 150 812 160" />
    <path d="M 830 135 Q 836 127 842 135 Q 848 127 854 135" stroke-width="1.5" />
    <path d="M 750 120 Q 754 114 758 120 Q 762 114 766 120" stroke-width="1" />
  </g>

  <!-- 左侧椰子树剪影 -->
  <g fill="#1E1B4B" opacity="0.85">
    <path d="M -20 700 Q 80 400 30 150 C 35 150 45 150 50 150 Q 100 400 0 700 Z" />
    <!-- 椰叶 -->
    <path d="M 35 150 Q -30 140 -80 180 Q -20 170 35 150" />
    <path d="M 35 150 Q 10 90 -20 50 Q 5 100 35 150" />
    <path d="M 35 150 Q 80 80 140 60 Q 85 110 35 150" />
    <path d="M 35 150 Q 110 140 160 200 Q 90 170 35 150" />
    <path d="M 35 150 Q 60 210 50 270 Q 40 200 35 150" />
  </g>

  <!-- 沙滩 -->
  <path d="M 0 510 Q 350 490 700 525 T 1000 510 L 1000 700 L 0 700 Z" fill="url(#sandGrad)" />
  <!-- 沙滩纹理与潮汐线 -->
  <path d="M 0 540 Q 450 515 1000 550" stroke="#CA8A04" stroke-width="4" fill="none" opacity="0.4" />
  <path d="M 0 590 Q 500 570 1000 600" stroke="#854D0E" stroke-width="3" fill="none" opacity="0.3" />

  <!-- 自行车与人物整体阴影 -->
  <ellipse cx="500" cy="635" rx="280" ry="18" fill="#451A03" opacity="0.6" filter="url(#glow)" />


  <!-- ==================== 自行车背景部分 ==================== -->
  <!-- 后车轮 -->
  <g id="rear-wheel">
    <!-- 轮胎 -->
    <circle cx="320" cy="520" r="110" fill="none" stroke="#1E293B" stroke-width="18" />
    <!-- 复古白边胎侧 -->
    <circle cx="320" cy="520" r="100" fill="none" stroke="#FEF08A" stroke-width="8" />
    <!-- 车圈 -->
    <circle cx="320" cy="520" r="91" fill="none" stroke="url(#chromeGrad)" stroke-width="6" />
    <!-- 车辐条 -->
    <g stroke="#E2E8F0" stroke-width="1.5" opacity="0.7">
      <line x1="320" y1="410" x2="320" y2="630" />
      <line x1="210" y1="520" x2="430" y2="520" />
      <line x1="242" y1="442" x2="398" y2="598" />
      <line x1="242" y1="598" x2="398" y2="442" />
      <line x1="270" y1="425" x2="370" y2="615" />
      <line x1="370" y1="425" x2="270" y2="615" />
      <line x1="215" y1="470" x2="425" y2="570" />
      <line x1="215" y1="570" x2="425" y2="470" />
    </g>
    <!-- 轴承 -->
    <circle cx="320" cy="520" r="16" fill="url(#chromeGrad)" />
    <!-- 后泥除 (挡泥板) -->
    <path d="M 210 510 A 115 115 0 0 1 405 440" stroke="url(#mintGrad)" stroke-width="12" fill="none" stroke-linecap="round" />
    <line x1="320" y1="520" x2="225" y2="480" stroke="url(#chromeGrad)" stroke-width="3" />
    <line x1="320" y1="520" x2="265" y2="425" stroke="url(#chromeGrad)" stroke-width="3" />
  </g>


  <!-- ==================== 鹈鹕背景部分 (后肢、后羽) ==================== -->
  <!-- 左侧翅膀 (扬起挥舞，显得生动活泼) -->
  <g id="far-wing" filter="url(#softShadow)">
    <path d="M 400 290 C 330 250 260 170 220 90 C 245 125 290 190 320 210 C 315 150 300 90 290 30 C 315 70 350 140 360 190 C 380 130 395 70 400 20 C 410 70 425 140 430 220 Z" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="2" />
    <!-- 羽毛细节阴影 -->
    <path d="M 320 210 Q 340 160 350 120" stroke="#94A3B8" stroke-width="2" fill="none" />
    <path d="M 360 190 Q 380 140 390 90" stroke="#94A3B8" stroke-width="2" fill="none" />
  </g>

  <!-- 左腿 (踏在对侧脚踏板上) -->
  <g id="far-leg">
    <path d="M 390 410 Q 405 440 395 460" stroke="#CBD5E1" stroke-width="16" stroke-linecap="round" fill="none" />
    <path d="M 395 460 L 425 470" stroke="#D97706" stroke-width="10" stroke-linecap="round" fill="none" />
    <!-- 蹼足 -->
    <path d="M 425 470 L 450 460 L 445 480 L 420 480 Z" fill="#B45309" />
  </g>

  <!-- 远端脚踏板 -->
  <rect x="415" y="465" width="30" height="8" rx="3" fill="#475569" opacity="0.8" />


  <!-- ==================== 自行车车架与传动系统 ==================== -->
  <!-- 车架钢管 -->
  <g id="frame" stroke="url(#mintGrad)" stroke-linecap="round" fill="none">
    <!-- 后平叉 -->
    <path d="M 320 520 L 480 520" stroke-width="14" />
    <!-- 后上叉 -->
    <path d="M 320 520 L 420 360" stroke-width="10" />
    <!-- 立管 -->
    <path d="M 480 520 L 420 360" stroke-width="15" />
    <!-- 弧形复古双前管 (沙滩车特色双梁) -->
    <path d="M 420 380 Q 520 370 610 320" stroke-width="12" />
    <path d="M 420 410 Q 510 410 610 340" stroke-width="10" />
    <!-- 下管 -->
    <path d="M 480 520 Q 560 500 610 330" stroke-width="15" />
  </g>

  <!-- 链条罩与链条 -->
  <path d="M 315 510 L 485 500 Q 505 500 505 520 Q 505 540 485 540 L 315 530 Z" fill="url(#mintGrad)" stroke="#0F766E" stroke-width="2" />
  <!-- 牙盘 -->
  <circle cx="480" cy="520" r="32" fill="none" stroke="url(#chromeGrad)" stroke-width="6" />
  <circle cx="480" cy="520" r="24" fill="#1E293B" opacity="0.8" />


  <!-- ==================== 鹈鹕身体与头部 ==================== -->
  <!-- 鹈鹕躯干 (丰满温润的身体) -->
  <path d="M 390 330 C 340 330 320 390 380 435 C 450 465 490 395 470 330 C 450 300 420 310 390 330 Z" fill="#F8FAFC" filter="url(#softShadow)" />
  <!-- 羽毛纹理亮部与暗部 -->
  <path d="M 350 375 Q 340 400 375 425" stroke="#E2E8F0" stroke-width="3" fill="none" stroke-linecap="round" />
  <path d="M 375 390 Q 380 415 415 425" stroke="#CBD5E1" stroke-width="3" fill="none" stroke-linecap="round" />
  <!-- 翘起的可爱尾羽 -->
  <path d="M 350 340 L 300 330 C 290 345 300 360 320 365 L 310 375 C 325 380 340 375 355 365 Z" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1" />

  <!-- 优雅的 S 型脖颈 -->
  <path d="M 460 320 Q 505 290 480 210 Q 460 145 510 115 L 535 130 Q 490 165 505 230 Q 520 280 475 325 Z" fill="#F8FAFC" />

  <!-- 头部 -->
  <circle cx="510" cy="120" r="32" fill="#F8FAFC" />
  <!-- 脑后呆毛 (蓬松的羽毛冠) -->
  <path d="M 485 110 Q 460 90 445 110 Q 470 115 485 118 Z" fill="#E2E8F0" />
  <path d="M 488 100 Q 465 80 455 100 Q 475 105 488 108 Z" fill="#F8FAFC" />

  <!-- 大嘴 (上喙) -->
  <path d="M 530 110 Q 610 115 675 132 C 685 135 680 143 670 143 L 525 140 Z" fill="url(#beakGrad)" filter="url(#softShadow)" />
  <!-- 尖锐的喙钩 -->
  <path d="M 668 131 Q 682 133 674 143 Q 666 136 668 131" fill="#D97706" />
  <!-- 喙部反光 -->
  <path d="M 540 114 Q 610 120 660 133" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6" />

  <!-- 标志性大喉囊 (下嘴) -->
  <path d="M 525 140 Q 570 215 625 165 L 655 141 Z" fill="url(#pouchGrad)" />
  <!-- 喉囊半透明褶皱线与隐约的小鱼影子（写实生动细节） -->
  <path d="M 540 155 Q 575 195 615 163" stroke="#F43F5E" stroke-width="2" fill="none" opacity="0.4" />
  <path d="M 555 170 Q 585 192 605 170" stroke="#F43F5E" stroke-width="1.5" fill="none" opacity="0.4" />
  <!-- 喉囊中隐约透出吞下的小鱼轮廓 -->
  <path d="M 565 175 Q 580 185 595 175" stroke="#E11D48" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.15" />

  <!-- 眼睛 (生动的神态) -->
  <circle cx="515" cy="105" r="9" fill="#FFFFFF" stroke="#1E293B" stroke-width="1.5" />
  <circle cx="517" cy="105" r="5" fill="#0F172A" />
  <circle cx="519" cy="103" r="2" fill="#FFFFFF" /> <!-- 高光 -->
  <!-- 喜悦的眉毛 -->
  <path d="M 506 94 Q 518 88 528 97" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" fill="none" />

  <!-- 帅气的金色复古飞行员墨镜 -->
  <g id="sunglasses" filter="url(#softShadow)">
    <path d="M 510 102 Q 525 101 522 115 Q 511 116 508 107 Z" fill="#F59E0B" stroke="#B45309" stroke-width="1.5" opacity="0.85" />
    <path d="M 526 104 Q 538 103 534 117 Q 525 118 523 109 Z" fill="#F59E0B" stroke="#B45309" stroke-width="1.5" opacity="0.85" />
    <line x1="519" y1="106" x2="526" y2="107" stroke="#B45309" stroke-width="2" />
    <path d="M 511 104 Q 518 103 520 112" stroke="#FFF" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6" /> <!-- 墨镜反光 -->
  </g>


  <!-- ==================== 自行车前部与配件 ==================== -->
  <!-- 前车轮 -->
  <g id="front-wheel">
    <circle cx="680" cy="520" r="110" fill="none" stroke="#1E293B" stroke-width="18" />
    <circle cx="680" cy="520" r="100" fill="none" stroke="#FEF08A" stroke-width="8" />
    <circle cx="680" cy="520" r="91" fill="none" stroke="url(#chromeGrad)" stroke-width="6" />
    <g stroke="#E2E8F0" stroke-width="1.5" opacity="0.7">
      <line x1="680" y1="410" x2="680" y2="630" />
      <line x1="570" y1="520" x2="790" y2="520" />
      <line x1="602" y1="442" x2="758" y2="598" />
      <line x1="602" y1="598" x2="758" y2="442" />
      <line x1="630" y1="425" x2="730" y2="615" />
      <line x1="730" y1="425" x2="630" y2="615" />
      <line x1="575" y1="470" x2="785" y2="570" />
      <line x1="575" y1="570" x2="785" y2="470" />
    </g>
    <circle cx="680" cy="520" r="16" fill="url(#chromeGrad)" />
    <!-- 前泥除 -->
    <path d="M 625 435 A 115 115 0 0 1 765 470" stroke="url(#mintGrad)" stroke-width="12" fill="none" stroke-linecap="round" />
    <line x1="680" y1="520" x2="760" y2="475" stroke="url(#chromeGrad)" stroke-width="3" />
  </g>

  <!-- 前叉 (前轮中心连接至车头) -->
  <path d="M 610 320 L 620 350 L 680 520" stroke="url(#mintGrad)" stroke-width="14" stroke-linecap="round" fill="none" />
  <path d="M 610 320 L 620 350 L 680 520" stroke="url(#chromeGrad)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.3" />

  <!-- 车把立管与复古弯把 -->
  <path d="M 610 320 L 605 250" stroke="url(#chromeGrad)" stroke-width="10" stroke-linecap="round" fill="none" />
  <!-- 车把横梁 (向后弯曲延伸) -->
  <path d="M 605 250 Q 580 230 535 255" stroke="url(#chromeGrad)" stroke-width="8" stroke-linecap="round" fill="none" />
  <!-- 橡胶把套 -->
  <path d="M 540 252 Q 532 257 528 260" stroke="#1E293B" stroke-width="12" stroke-linecap="round" fill="none" />

  <!-- 车座 (复古皮革大弹簧车座) -->
  <g id="saddle" filter="url(#softShadow)">
    <!-- 金属弹簧支撑 -->
    <path d="M 405 355 Q 415 375 405 385 M 430 355 Q 440 375 430 385" stroke="url(#chromeGrad)" stroke-width="4" fill="none" />
    <!-- 皮革坐垫 -->
    <path d="M 380 345 C 380 345 390 330 430 335 C 455 338 450 355 425 355 C 400 355 380 345 380 345 Z" fill="#78350F" />
    <path d="M 385 343 C 395 335 425 339 440 342" stroke="#A16207" stroke-width="2" fill="none" /> <!-- 坐垫高光线 -->
  </g>


  <!-- ==================== 鹈鹕前景部分 (前肢、前腿、围巾) ==================== -->
  <!-- 右腿 (踏在近端脚踏板上，腿部弯曲用力) -->
  <g id="near-leg" filter="url(#softShadow)">
    <!-- 大腿羽毛 -->
    <path d="M 430 410 Q 460 440 445 465" stroke="#F8FAFC" stroke-width="22" stroke-linecap="round" fill="none" />
    <!-- 橙色小腿 -->
    <path d="M 445 465 L 515 560" stroke="#F97316" stroke-width="11" stroke-linecap="round" fill="none" />
    <!-- 骨节细节 -->
    <circle cx="445" cy="465" r="7" fill="#EA580C" />
    <!-- 踏在脚踏板上的鸭蹼足 -->
    <path d="M 515 560 Q 545 550 565 558 L 555 582 Q 530 585 510 568 Z" fill="#EA580C" />
    <!-- 蹼足褶皱 -->
    <path d="M 515 560 L 565 558 M 512 566 L 558 575" stroke="#9A3412" stroke-width="2.5" />
  </g>

  <!-- 近端脚踏板 -->
  <g id="near-pedal" filter="url(#softShadow)">
    <!-- 曲柄 -->
    <line x1="480" y1="520" x2="515" y2="560" stroke="url(#chromeGrad)" stroke-width="8" stroke-linecap="round" />
    <circle cx="480" cy="520" r="10" fill="url(#chromeGrad)" />
    <!-- 脚踏 -->
    <rect x="500" y="555" width="35" height="12" rx="4" fill="#1E293B" stroke="#475569" stroke-width="2" />
  </g>

  <!-- 右侧翅膀 (伸向前方，稳稳抓握住车把) -->
  <path d="M 450 335 C 485 320 520 295 545 258 C 540 270 525 295 485 335 C 500 320 535 285 540 262 C 525 295 490 345 440 355 Z" fill="#F8FAFC" filter="url(#softShadow)" />
  <!-- 羽翅末端包裹车把把手 -->
  <path d="M 545 258 C 548 253 538 248 532 258 C 525 268 535 272 542 262 Z" fill="#E2E8F0" />

  <!-- 迎风飘扬的红白条纹围巾 -->
  <g id="scarf" filter="url(#softShadow)">
    <!-- 脖子上的围巾圈 -->
    <path d="M 478 205 Q 495 195 508 212 Q 495 228 478 215 Z" fill="#DC2626" />
    <!-- 飘带 1 (主飘带，大波浪) -->
    <path d="M 478 210 C 410 195 345 225 270 195 C 320 240 390 220 478 218 Z" fill="#DC2626" />
    <!-- 飘带 2 (副飘带，色调略暗体现立体感) -->
    <path d="M 482 216 C 420 220 365 260 290 245 C 330 280 400 250 482 224 Z" fill="#991B1B" />

    <!-- 围巾白条纹装饰 -->
    <g stroke="#F8FAFC" stroke-width="5" fill="none" opacity="0.9" stroke-linecap="round">
      <!-- 圈上的条纹 -->
      <path d="M 488 200 L 493 218" />
      <!-- 飘带 1 的条纹 -->
      <path d="M 315 204 L 322 225" />
      <path d="M 360 207 L 368 227" />
      <path d="M 410 210 L 418 226" />
      <!-- 飘带 2 的条纹 -->
      <path d="M 330 247 L 338 268" stroke-width="4" opacity="0.7" />
      <path d="M 380 245 L 388 264" stroke-width="4" opacity="0.7" />
      <path d="M 430 238 L 438 254" stroke-width="4" opacity="0.7" />
    </g>

    <!-- 围巾流苏 -->
    <path d="M 270 195 L 260 190 M 270 198 L 258 196 M 271 203 L 260 205" stroke="#DC2626" stroke-width="2" />
    <path d="M 290 245 L 280 242 M 290 249 L 278 250 M 291 254 L 280 258" stroke="#991B1B" stroke-width="2" />
  </g>


  <!-- ==================== 前置藤编车筐与里面的小鱼 ==================== -->
  <g id="basket-group" filter="url(#softShadow)">
    <!-- 车筐挂架 -->
    <path d="M 605 255 L 635 265 M 615 300 L 635 305" stroke="url(#chromeGrad)" stroke-width="4" />

    <!-- 篮子里的鱼儿 (充满童趣与故事性) -->
    <!-- 鱼儿 1 (朝天看，带着惊讶的逗趣表情) -->
    <g id="fish1">
      <path d="M 630 270 Q 642 225 655 242 Q 662 260 645 270 Z" fill="#94A3B8" />
      <!-- 鱼肚白 -->
      <path d="M 630 270 Q 642 245 645 270" fill="#E2E8F0" />
      <!-- 鱼鳃与大圆眼 -->
      <circle cx="642" cy="246" r="4" fill="#FFF" />
      <circle cx="642" cy="246" r="2" fill="#000" />
      <!-- 惊讶的小嘴 -->
      <ellipse cx="637" cy="242" rx="1.5" ry="2" fill="#334155" />
    </g>

    <!-- 鱼儿 2 (倒挂在篮边，露出一截欢快的鱼尾) -->
    <g id="fish2">
      <path d="M 665 265 L 682 215 C 672 210 692 200 692 210 L 685 265 Z" fill="#475569" />
      <!-- 尾鳍条纹 -->
      <path d="M 678 212 L 686 205 M 683 213 L 691 206" stroke="#1E293B" stroke-width="1" />
    </g>

    <!-- 藤编车筐主体 -->
    <rect x="625" y="260" width="75" height="65" rx="8" fill="#D97706" stroke="#92400E" stroke-width="3" />
    <!-- 藤编经纬纹理线 -->
    <g stroke="#78350F" stroke-width="2" opacity="0.6">
      <!-- 横线 -->
      <line x1="625" y1="273" x2="700" y2="273" />
      <line x1="625" y1="286" x2="700" y2="286" />
      <line x1="625" y1="299" x2="700" y2="299" />
      <line x1="625" y1="312" x2="700" y2="312" />
      <!-- 竖线 -->
