<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6bc4"/>
      <stop offset="40%" stop-color="#4db8ff"/>
      <stop offset="100%" stop-color="#87ceeb"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a8fcc"/>
      <stop offset="50%" stop-color="#2196f3"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d9a0"/>
      <stop offset="100%" stop-color="#d4a960"/>
    </linearGradient>
    <linearGradient id="sunGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#fff5c0" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ffd54f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff8f00" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sunGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5c0" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ffd54f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff8f00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="palmTrunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="50%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="60%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#bdbdbd"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#9e9e9e"/>
    </linearGradient>
    <linearGradient id="beakGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8f00"/>
      <stop offset="40%" stop-color="#f57c00"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="pouchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#ff9800"/>
    </linearGradient>
    <linearGradient id="wheelMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="50%" stop-color="#bdbdbd"/>
      <stop offset="100%" stop-color="#9e9e9e"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f44336"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <clipPath id="sceneClip">
      <rect x="0" y="0" width="800" height="600" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#sceneClip)">
    <!-- Sky -->
    <rect width="800" height="600" fill="url(#sky)"/>

    <!-- Sun -->
    <circle cx="650" cy="100" r="60" fill="url(#sunGlow2)" opacity="0.8"/>
    <circle cx="650" cy="100" r="35" fill="#fff9c4" opacity="0.9"/>
    <circle cx="650" cy="100" r="28" fill="#ffeb3b"/>

    <!-- Clouds -->
    <g opacity="0.85">
      <ellipse cx="150" cy="90" rx="60" ry="22" fill="white" opacity="0.9"/>
      <ellipse cx="120" cy="85" rx="40" ry="18" fill="white" opacity="0.95"/>
      <ellipse cx="180" cy="88" rx="45" ry="20" fill="white" opacity="0.9"/>
      <ellipse cx="155" cy="78" rx="35" ry="15" fill="white"/>

      <ellipse cx="450" cy="60" rx="50" ry="18" fill="white" opacity="0.8"/>
      <ellipse cx="430" cy="55" rx="35" ry="14" fill="white" opacity="0.85"/>
      <ellipse cx="475" cy="58" rx="40" ry="16" fill="white" opacity="0.8"/>

      <ellipse cx="320" cy="120" rx="55" ry="20" fill="white" opacity="0.75"/>
      <ellipse cx="295" cy="115" rx="38" ry="15" fill="white" opacity="0.8"/>
      <ellipse cx="345" cy="118" rx="42" ry="17" fill="white" opacity="0.75"/>
    </g>

    <!-- Ocean -->
    <rect x="0" y="280" width="800" height="120" fill="url(#ocean)"/>

    <!-- Ocean waves -->
    <g fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5">
      <path d="M0,300 Q50,293 100,300 Q150,307 200,300 Q250,293 300,300 Q350,307 400,300 Q450,293 500,300 Q550,307 600,300 Q650,293 700,300 Q750,307 800,300"/>
      <path d="M0,315 Q40,308 80,315 Q120,322 160,315 Q200,308 240,315 Q280,322 320,315 Q360,308 400,315 Q440,322 480,315 Q520,308 560,315 Q600,322 640,315 Q680,308 720,315 Q760,322 800,315"/>
      <path d="M0,330 Q45,323 90,330 Q135,337 180,330 Q225,323 270,330 Q315,337 360,330 Q405,323 450,330 Q495,337 540,330 Q585,323 630,330 Q675,337 720,330 Q765,323 800,330"/>
      <path d="M0,348 Q60,341 120,348 Q180,355 240,348 Q300,341 360,348 Q420,355 480,348 Q540,341 600,348 Q660,355 720,348 Q780,341 800,345"/>
    </g>

    <!-- Foam line -->
    <path d="M0,390 Q30,385 60,388 Q90,391 120,387 Q150,383 180,387 Q210,391 240,386 Q270,381 300,386 Q330,391 360,386 Q390,381 420,387 Q450,393 480,387 Q510,381 540,387 Q570,393 600,387 Q630,381 660,387 Q690,393 720,387 Q750,381 780,386 L800,385 L800,400 L0,400 Z" fill="white" opacity="0.5"/>

    <!-- Beach/Sand -->
    <path d="M0,400 Q100,385 200,395 Q300,405 400,390 Q500,375 600,388 Q700,401 800,392 L800,600 L0,600 Z" fill="url(#sand)"/>

    <!-- Wet sand near water -->
    <path d="M0,400 Q100,385 200,395 Q300,405 400,390 Q500,375 600,388 Q700,401 800,392 L800,415 Q700,418 600,412 Q500,406 400,415 Q300,424 200,414 Q100,404 0,412 Z" fill="#c9a96e" opacity="0.6"/>

    <!-- Palm tree left -->
    <g transform="translate(80,280)">
      <path d="M0,120 Q5,80 -5,40 Q-8,20 2,0" stroke="url(#palmTrunk)" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path d="M-5,35 Q-15,30 -35,20" stroke="url(#palmTrunk)" stroke-width="5" fill="none"/>
      <!-- Leaves -->
      <g fill="#2e7d32" opacity="0.9">
        <path d="M2,0 Q-30,-15 -55,-8 Q-40,-25 -2,-5 Z"/>
        <path d="M2,0 Q25,-20 50,-15 Q35,-30 5,-8 Z"/>
        <path d="M2,0 Q-20,-30 -40,-35 Q-25,-45 0,-12 Z"/>
        <path d="M2,0 Q20,-35 38,-38 Q30,-48 5,-15 Z"/>
        <path d="M2,0 Q-5,-35 -15,-45 Q0,-50 5,-18 Z"/>
        <path d="M2,0 Q10,-35 18,-42 Q8,-50 2,-18 Z"/>
      </g>
      <!-- Coconuts -->
      <circle cx="-3" cy="2" r="4" fill="#5d4037"/>
      <circle cx="5" cy="4" r="3.5" fill="#4e342e"/>
      <circle cx="1" cy="6" r="3" fill="#6d4c41"/>
    </g>

    <!-- Palm tree right -->
    <g transform="translate(700,290) scale(-1,1)">
      <path d="M0,110 Q8,70 -2,35 Q-5,15 5,0" stroke="url(#palmTrunk)" stroke-width="9" fill="none" stroke-linecap="round"/>
      <g fill="#2e7d32" opacity="0.85">
        <path d="M5,0 Q-25,-18 -48,-12 Q-35,-28 3,-8 Z"/>
        <path d="M5,0 Q28,-22 48,-18 Q38,-32 8,-10 Z"/>
        <path d="M5,0 Q-18,-32 -35,-38 Q-22,-48 3,-14 Z"/>
        <path d="M5,0 Q22,-35 36,-40 Q28,-50 7,-16 Z"/>
        <path d="M5,0 Q-3,-38 -10,-48 Q3,-52 6,-20 Z"/>
      </g>
      <circle cx="3" cy="2" r="3.5" fill="#5d4037"/>
      <circle cx="8" cy="4" r="3" fill="#4e342e"/>
    </g>

    <!-- Seagulls -->
    <g fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
      <path d="M520,140 Q525,135 530,138 Q535,135 540,140"/>
      <path d="M560,120 Q564,116 568,118 Q572,116 576,120"/>
      <path d="M490,160 Q493,156 496,158 Q499,156 502,160"/>
    </g>

    <!-- ========== PELICAN ON BICYCLE ========== -->
    <g transform="translate(280, 310)" filter="url(#softShadow)">

      <!-- Bicycle -->
      <g>
        <!-- Back wheel -->
        <circle cx="-50" cy="70" r="38" fill="none" stroke="#333" stroke-width="3"/>
        <circle cx="-50" cy="70" r="35" fill="none" stroke="#555" stroke-width="1.5"/>
        <circle cx="-50" cy="70" r="3" fill="#333"/>
        <!-- Back wheel spokes -->
        <g stroke="#777" stroke-width="0.8">
          <line x1="-50" y1="32" x2="-50" y2="108"/>
          <line x1="-88" y1="70" x2="-12" y2="70"/>
          <line x1="-77" y1="43" x2="-23" y2="97"/>
          <line x1="-23" y1="43" x2="-77" y2="97"/>
          <line x1="-62" y1="35" x2="-38" y2="105"/>
          <line x1="-38" y1="35" x2="-62" y2="105"/>
        </g>

        <!-- Front wheel -->
        <circle cx="70" cy="70" r="38" fill="none" stroke="#333" stroke-width="3"/>
        <circle cx="70" cy="70" r="35" fill="none" stroke="#555" stroke-width="1.5"/>
        <circle cx="70" cy="70" r="3" fill="#333"/>
        <!-- Front wheel spokes -->
        <g stroke="#777" stroke-width="0.8">
          <line x1="70" y1="32" x2="70" y2="108"/>
          <line x1="32" y1="70" x2="108" y2="70"/>
          <line x1="43" y1="43" x2="97" y2="97"/>
          <line x1="97" y1="43" x2="43" y2="97"/>
          <line x1="58" y1="35" x2="82" y2="105"/>
          <line x1="82" y1="35" x2="58" y2="105"/>
        </g>

        <!-- Tires (rubber) -->
        <circle cx="-50" cy="70" r="38" fill="none" stroke="#222" stroke-width="5" opacity="0.3"/>
        <circle cx="70" cy="70" r="38" fill="none" stroke="#222" stroke-width="5" opacity="0.3"/>

        <!-- Frame -->
        <g stroke="url(#frameGrad)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <!-- Seat tube -->
          <line x1="-10" y1="15" x2="-25" y2="55"/>
          <!-- Top tube -->
          <line x1="-10" y1="15" x2="40" y2="25"/>
          <!-- Down tube -->
          <line x1="40" y1="25" x2="-25" y2="55"/>
          <!-- Chain stay -->
          <line x1="-25" y1="55" x2="-50" y2="70"/>
          <!-- Seat stay -->
          <line x1="-10" y1="15" x2="-50" y2="70"/>
          <!-- Head tube / fork -->
          <line x1="40" y1="25" x2="55" y2="45"/>
          <line x1="55" y1="45" x2="70" y2="70"/>
          <!-- Handlebar stem -->
          <line x1="40" y1="25" x2="50" y2="8"/>
          <!-- Handlebar -->
          <line x1="42" y1="5" x2="58" y2="5"/>
          <circle cx="42" cy="5" r="3" fill="#333"/>
          <circle cx="58" cy="5" r="3" fill="#333"/>
        </g>

        <!-- Seat -->
        <ellipse cx="-10" cy="12" rx="12" ry="4" fill="#333"/>
        <ellipse cx="-10" cy="11" rx="10" ry="3" fill="#555"/>

        <!-- Pedals & crank -->
        <circle cx="-25" cy="55" r="8" fill="none" stroke="#666" stroke-width="2"/>
        <circle cx="-25" cy="55" r="2" fill="#444"/>
        <line x1="-25" y1="47" x2="-25" y2="63" stroke="#666" stroke-width="2.5"/>
        <rect x="-32" y="45" width="7" height="3" rx="1" fill="#888" transform="rotate(-30,-28.5,46.5)"/>
        <rect x="-22" y="61" width="7" height="3" rx="1" fill="#888" transform="rotate(-30,-18.5,62.5)"/>

        <!-- Chain -->
        <ellipse cx="-37" cy="62" rx="16" ry="10" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>

        <!-- Fender -->
        <path d="M-85,45 Q-50,20 -15,45" fill="none" stroke="#c62828" stroke-width="2.5" opacity="0.7"/>
      </g>

      <!-- ========== PELICAN ========== -->
      <g transform="translate(-15, -30)">
        <!-- Tail feathers -->
        <path d="M-35,40 Q-55,30 -60,45 Q-50,38 -40,48 Z" fill="#9e9e9e" opacity="0.8"/>
        <path d="M-30,42 Q-52,35 -55,50 Q-45,42 -35,50 Z" fill="#bdbdbd" opacity="0.7"/>

        <!-- Body -->
        <ellipse cx="0" cy="25" rx="40" ry="22" fill="url(#bodyGrad)" stroke="#ccc" stroke-width="0.5"/>
        <!-- Body shading -->
        <ellipse cx="5" cy="30" rx="30" ry="15" fill="#e0e0e0" opacity="0.5"/>

        <!-- Wing (folded) -->
        <path d="M-10,10 Q-35,15 -45,35 Q-30,30 -5,25 Z" fill="url(#wingGrad)" stroke="#bbb" stroke-width="0.5"/>
        <!-- Wing feather details -->
        <path d="M-8,15 Q-25,18 -35,30" fill="none" stroke="#aaa" stroke-width="0.7" opacity="0.6"/>
        <path d="M-5,18 Q-20,22 -28,32" fill="none" stroke="#aaa" stroke-width="0.7" opacity="0.5"/>
        <path d="M-3,21 Q-15,25 -22,33" fill="none" stroke="#aaa" stroke-width="0.7" opacity="0.4"/>

        <!-- Wing (raised/active) -->
        <path d="M5,10 Q25,-15 45,-25 Q35,-10 20,5 Q30,0 40,-18 Q32,-5 18,8 Z" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5" opacity="0.9"/>
        <path d="M10,5 Q30,-12 42,-22" fill="none" stroke="#bbb" stroke-width="0.7" opacity="0.5"/>
        <path d="M15,2 Q28,-8 38,-18" fill="none" stroke="#bbb" stroke-width="0.7" opacity="0.4"/>

        <!-- Legs (cycling posture) -->
        <!-- Right leg (on pedal) -->
        <path d="M10,40 Q15,50 5,62 Q0,55 8,45" fill="#ff8f00" stroke="#e65100" stroke-width="1"/>
        <!-- Left leg (extended) -->
        <path d="M-5,42 Q-10,52 -15,58 Q-12,55 -2,48" fill="#ff8f00" stroke="#e65100" stroke-width="1"/>
        <!-- Feet -->
        <path d="M5,62 Q2,66 -3,65 Q0,63 5,62" fill="#ff8f00" stroke="#e65100" stroke-width="0.5"/>
        <path d="M-15,58 Q-18,62 -23,61 Q-20,59 -15,58" fill="#ff8f00" stroke="#e65100" stroke-width="0.5"/>

        <!-- Neck -->
        <path d="M25,15 Q35,-5 40,-30 Q38,-25 30,0 Q28,10 25,15" fill="url(#bodyGrad)" stroke="#ddd" stroke-width="0.5"/>

        <!-- Head -->
        <ellipse cx="42" cy="-35" rx="12" ry="10" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
        <!-- Head shading -->
        <ellipse cx="44" cy="-33" rx="8" ry="6" fill="#eee" opacity="0.5"/>

        <!-- Eye -->
        <circle cx="48" cy="-37" r="3.5" fill="white" stroke="#333" stroke-width="0.5"/>
        <circle cx="49" cy="-37" r="2" fill="#1a237e"/>
        <circle cx="49.5" cy="-37.5" r="0.7" fill="white"/>

        <!-- Beak (upper) -->
        <path d="M50,-36 Q70,-40 82,-35 Q78,-33 65,-32 Q55,-32 50,-34 Z" fill="url(#beakGrad)" stroke="#e65100" stroke-width="0.5"/>
        <!-- Beak tip hook -->
        <path d="M82,-35 Q84,-34 82,-33" fill="#e65100" stroke="#bf360c" stroke-width="0.5"/>

        <!-- Beak (lower) -->
        <path d="M50,-33 Q65,-30 78,-33 Q75,-35 65,-34 Q55,-34 50,-33 Z" fill="#ff9800" stroke="#e65100" stroke-width="0.3"/>

        <!-- Pouch -->
        <path d="M50,-32 Q60,-22 70,-28 Q65,-20 55,-25 Q52,-28 50,-32 Z" fill="url(#pouchGrad)" stroke="#e65100" stroke-width="0.5" opacity="0.85"/>
        <!-- Pouch texture -->
        <path d="M55,-28 Q60,-24 65,-27" fill="none" stroke="#e65100" stroke-width="0.3" opacity="0.5"/>
        <path d="M53,-30 Q58,-26 63,-29" fill="none" stroke="#e65100" stroke-width="0.3" opacity="0.4"/>

        <!-- Crown tuft -->
        <path d="M38,-42 Q40,-50 42,-45 Q43,-52 45,-46 Q46,-50 44,-42" fill="#9e9e9e" stroke="#bbb" stroke-width="0.3"/>

        <!-- Throat patch -->
        <ellipse cx="46" cy="-28" rx="5" ry="3" fill="#fff3e0" opacity="0.5"/>
      </g>
    </g>

    <!-- Beach details -->
    <!-- Shells -->
    <g transform="translate(180,440)" opacity="0.6">
      <path d="M0,0 Q3,-5 6,0 Q3,2 0,0" fill="#f5f5dc" stroke="#d4a960" stroke-width="0.5"/>
    </g>
    <g transform="translate(520,430)" opacity="0.5">
      <path d="M0,0 Q2,-4 4,0 Q2,1.5 0,0" fill="#ffe0b2" stroke="#d4a960" stroke-width="0.5"/>
    </g>
    <g transform="translate(350,455)" opacity="0.4">
      <circle cx="0" cy="0" r="2" fill="#f5f5dc"/>
      <circle cx="5" cy="2" r="1.5" fill="#ffe0b2"/>
    </g>

    <!-- Starfish -->
    <g transform="translate(600,445) scale(0.5)" opacity="0.5">
      <polygon points="0,-12 3,-4 12,-4 5,2 7,10 0,5 -7,10 -5,2 -12,-4 -3,-4" fill="#e57373" stroke="#c62828" stroke-width="0.5"/>
    </g>

    <!-- Footprints -->
    <g fill="#c9a96e" opacity="0.3">
      <ellipse cx="420" cy="450" rx="3" ry="5" transform="rotate(-10,420,450)"/>
      <ellipse cx="435" cy="455" rx="3" ry="5" transform="rotate(5,435,455)"/>
      <ellipse cx="450" cy="448" rx="3" ry="5" transform="rotate(-5,450,448)"/>
    </g>

    <!-- Shadow under pelican/bicycle -->
    <ellipse cx="300" cy="470" rx="80" ry="8" fill="rgba(0,0,0,0.1)"/>
  </g>
</svg>
